 Jézus! a te véred szent! Légyen szívünk bűntől ment; mert örök életet veled az remélhet, Ki megveti a vétket. \n7. Szent törvényed fáklyája Világoljon pályánkra! Mert e földi úton, tudjuk, el nem téved, Ki híven követ téged. \n8. Fogjad azért kezünket, S magad vezérelj minket; Mert a te utadon Istenünkhöz vezet A hit, remény, szeretet. \n9. Ha szemeink meglátnak Jobbján te szent Atyádnak: Ott a Szentlélekkel örök egyességben Üdvözíts majd az égben!"},{"m":443,"r":379,"c":"Lelkem, adj dolgot magadnak, Hirdessed édes Uradnak Jóvoltát és felség","b":"1. Lelkem, adj dolgot magadnak, Hirdessed édes Uradnak Jóvoltát és felségét. Hirdessed ajándékinak Melyeket ad barátinak, Nagyságát és szépségét. Uram te reád gerjedez Szívem, és rólad zengedez Nyelvem kész indulattal, Mert voltál s vagy te népedhez, Áron vett örökségedhez Drága jó akarattal. \n2. Kijelentéd irgalmadban, Szentséges végvacsorádban, Hogy áldozattá lettél; A benned bízó hívekért, Halált nemző vétkeikért Egyszer eleget tettél. Kikkel is végig lakozol És karjaidon hordozol, Sőt azokkal egyesülsz; Szentlelked által bennük vagy, Noha felséged dicső nagy, S az Atyának jobbján ülsz. \n3. Azért, akik tusakodnak, Bűneiken szomorkodnak És hittel reád néznek; Idvezítésedet várják, Bűn előtt szívük bezárják, Megtérni igyekeznek; Kívánnak néked engedni, Szent életben nevelkedni És futnak jóvoltodhoz: Azok, mint édes fiaid, Kebeleden nőtt juhaid, Méltók szent asztalodhoz. \n4. De a színes képmutatók, Bűnt vetők, gonoszt aratók Innen távol menjenek; Megtérni nem tudó szívek, Álnokságra felvont ívek E jóval ne éljenek. Ti, álnokságnak fiai, Fussatok el, mert javai Az Úrnak nem tiétek; Ha éltek itt méltatlanul, A harag csalhatatlanul Reátok száll, higyjétek. \n5. Hát lelkem, hallgasd Uradat, Próbáld meg tennenmagadat, Úgy járulj ez asztalhoz. Higyj, térj meg, a bűnt útáljad, Az Istent féljed, szolgáljad, fuss hozzá, mint kőfalhoz. Uram, ezekre kész vagyok, De hibáim sokak, nagyok, Rajtam nagy terhek vannak: Ó Jézus, engem ne hagyj el, Segélj, tőlem ne maradj el, Sőt válassz el magadnak."},{"m":444,"r":null,"c":"Ó, Istennek választott kedves népe, Kit ékesít szentséges lelki képe:","b":"1. Ó, Istennek választott kedves népe, Kit ékesít szentséges lelki képe: Vigyázz te belső ékességedre, Szépségedre. \n2. A te szemeid az Úrra nézzenek, Szent rendelési előtted legyenek, Az Úrnak kertje hogy virágozzék, illatozzék. \n3. Szent Igéjét híven s tisztán hirdessed, Háza tisztaságát híven szeressed, A jókat vedd és tartsd kebeledben, Szerelmedben. \n4. Akik hitüknek szép jelét mutatják, Magukat szent áldozatul állatják, Azokat, mint illik, csókolgassad És biztassad. \n5. Az igaz útról kik eltévelyedtek, Feslett és rossz életre vetemedtek, Térítsd meg őket hasznos intéssel És feddéssel. \n6. Hogyha szeretetből lett intésednek, Megvetvén a bűnt, kész szívvel engednek, Jó szemmel tovább is nézz azokra, Járj javokra. \n7. Így az Úr háza nem romlik, sőt épül, Ékes voltában napról-napra szépül, Plántái nőnek az Úr kedvére, Örömére. \n8. Te pedig, hívek hűséges pásztora, Segéld gyenge népedet minden jóra, Hogy a szent igazságot szeresse, Azt kövesse."},{"m":445,"r":null,"c":"Szólsz hozzám, Istenem, s én választ adni készen Mármár megindulok, ho","b":"1. Szólsz hozzám, Istenem, s én választ adni készen Mármár megindulok, hogy rád bízzam magam, De látod, köt s lehúz még régi csüggedésem, Áldd  meg ma lelkemet több hittel, ó, Uram. \n2. Sok szép ígéretem, ó, hányszor megtagadtam, A nagy fogadkozást, hogy csak tiéd szívem. A bűnös gyengeség bús rabjának maradtam, És  törvényed szerint nem éltem semmiben. \n3. Ha jót tettél velem, ha áldva látogattál: Én nem dicsértelek s nem hirdettem neved; Nem értettem, mikor szenvedni, sírni hagytál, Hogy  ha szeretsz, miért sújt veszsződ engemet? \n4. Köt még a földi jó, a bűn, a földi örvény, S tehozzád bűnömért, lásd, el nem juthatok. A béklyó súlya nyom, levetném, öszszetörném, De  lelkem gyenge még s jaj, öszszeroskadok. \n5. Más nem tanít meg rá, csak égi bölcsességed, Hogy bölcsen bízzak és szolgáljak úgy neked. Mit érek nélküled? Add, hogy imádva téged, Bús,  gyarló bűnös én, hadd légyek gyermeked. \n6. Nagy lelked élt, Uram, a prófétás időkben, Az fénylett át a szent s apostol életén; Áldj meg s kegyelmedet reám is töltsd ki bőven, Hogy  Jézust nézzem és ővéle győzzek én."},{"m":446,"r":380,"c":"Uram, bocsásd el népedet békével, Idvezítésed kívánt örömével, Mert me","b":"1. Uram, bocsásd el népedet békével, Idvezítésed kívánt örömével, Mert megtaláltuk, amit lelkünk kedvel, Megragadjuk hittel, nem bocsátjuk el; Már ő miénk, mi vagyunk az övéi, Véle egy testek, java részesei. \n2. E gyarló testben Jézus él már, nem mi, Hű szerelmétől nem szakaszt el semmi. Ó, Jézus, gyenge hitünket neveljed, Te magad lelkünk az égre emeljed, Hogy így lelkünket az ég dicső vára Fogja be, annak örökös javára."},{"m":447,"r":285,"c":"Uram, bocsássad el Szolgádat békével, Szent ígéreted szerint, Mert te","b":"1. Uram, bocsássad el Szolgádat békével, Szent ígéreted szerint, Mert te idvezítőd Én szemeim előtt Nékem nyilván megjelent. \n2. Kit világos fényül Pogányoknak küldél, Kinek fényességével Nyilván kijelenék A szent Izráelnek Nagy dicsősége széjjel."},{"m":448,"r":381,"c":"Hirdetvén az Úr halálát, Uram, néked adunk hálát, Hogy nemcsak tartod","b":"1. Hirdetvén az Úr halálát, Uram, néked adunk hálát, Hogy nemcsak tartod testünket, Hanem táplálod lelkünket. \n2. Ma is ételt készítettél Ennek, s asztalt terítettél, Melyről Fiad szent testével, Elégítél szent vérével. \n3. Ezzel világos jelt adtál S minket arról megbiztattál, Hogy ha igaz hitünk lészen, Fiad miénk lesz egészen. \n4. Kérünk, Uram, adj kegyelmet, És nyújts nekünk segedelmet, Hogy Jézusunkat szeressük És őtet végig kövessük. \n5. Az ő megtöretett teste, melylyel váltságunk kereste, Lelkünk máskor is táplálja, A bűnért meg ne utálja. \n6. Segítsd gyarló tehetségünk, Véle kötött szövetségünk Hogy szent és állandó légyen, Mígnem lelkünk hozzá mégyen. \n7. Amely fogadást ma tettünk, Midőn asztalodról ettünk, Uram, segélj, hogy megálljuk, A bűnöket megutáljuk."},{"m":449,"r":null,"c":"Uram, téged tisztellek Méltó hálaadással. Áldom neved, míg élek, Szép","b":"1. Uram, téged tisztellek Méltó hálaadással. Áldom neved, míg élek, Szép dícséret-mondással, És hirdetem mindennek Nagy voltát kegyelmednek. \n2. Mert te voltál Istenem Anyám méhétől fogva. Felkölt a bűn ellenem Hogy tőrbe ejtsen fogva, De lelked engem megszánt, Rólam minden tőrt elhányt. \n3. Igazságod palástját Reám kiterjesztetted, Szentlelkednek áldását Bennem felgerjesztetted, Hogy megújulást végyek: Hozzád hasonló légyek. \n4. Hát vajjon hogy lehetne, Ó Jézus, egy drága kincs, Hogy lelkem ne szeretne, Holott nálad főbb jó nincs. Csak te vagy a valóság, Út, élet és igazság. \n5. Szeretlek is bizonynyal, Lelkem hozzád kiterjed. Bár halnék meg azonnal, Ha szívem rád nem gerjed: Mert halál és ítélet Nálad nélkül az élet. \n6. Szívem vallástételét Jó lelkiismerettel Megtartom, s adom jelét Kegyes és szent élettel, Hogy életem folyása Légyen másnak lámpása. \n7. Szent lábaidnál ülök, Hallgatok törvényedre, Bűnt útálok, kerülök, Hogy lehessek kedvedre, S megmutassam valóban: Örül szívem a jóban. \n8. Mert tudom: akik járnak A romlott testnek útján, Tőled hiába várnak Áldást haláluk után. Jaj lesz vége dolguknak, El kell veszni azoknak. \n9. De nékem reménységem Vagyon az én Uramban, Hiszem: lesz idvességem, Csak járjak jó útamban: Ha követem világát, Meglátom szent országát. \n10. De mivel, Uram, e test, Melyben lelkem sátoroz, Gyakran csügged s igen rest, A Sátán is jár s oroz: Kérlek, oktass Lelkeddel, Végy körül kegyelmeddel."},{"m":450,"r":null,"c":"Drága dolog az Úr Istent dicsérni, Színe előtt kegyesen énekelni, Ékes","b":"1. Drága dolog az Úr Istent dicsérni, Színe előtt kegyesen énekelni, Ékes dolog szent nevét magasztalni, A híveknek őelőtte szolgálni. \n2. Ő gyógyít meg szomorodott szíveket, Vigasztalja az elalélt lelkeket, Ő enyhít meg sok keserűségeket, Mind testi, mind lelki betegségeket. \n3. Az őnéki csodálatos tanácsa, Hogy a szelídeket felmagasztalja, De a kevély gonoszokat utálja, És azokat a földig megalázza. \n4. Énekeljünk néki hálaadással, Vigasságos hangicsáló szerszámmal: Beszélgessünk e mi kegyes Urunkkal, Magasztalván őtet imádságunkkal. \n5. Dicsérd azért, Jeruzsálem, Uradat! Keresztyénség, magasztald Megváltódat! Áldjad, Sion, menynyei királyodat! Híveknek serege, te szent Atyádat!"},{"m":451,"r":null,"c":"Száma nincsen, Uram, jótéteményidnek, Vége, hoszsza nincsen kegyelmess","b":"1. Száma nincsen, Uram, jótéteményidnek, Vége, hoszsza nincsen kegyelmességednek; Azért magasztallak felette mindennek, Mert hiszen én lelkem te ígéretednek. \n2. Kiáltásom, Uram, tőled el nem vetéd, Az én nyavalyámat csak te magad nézéd; Atyai voltodat rajtam éreztetéd, Irgalmasságodat mikor megjelentéd. \n3. A pokol torkából te kiszabadítál, és az én lelkemben engem megnyugtattál, Te ígéreteddel mikoron biztattál, Fiad által ismét fiaddá fogadtál. \n4. Kész mindenha lelkem néked énekelni, Mind e világ előtt rólad vallást tenni, Sok jótételidért néked hálát adni, Örökkön örökké tégedet dícsérni."},{"m":452,"r":null,"c":"Jézus, édes emlékezet, Te adsz szívünknek örömet: Már hozzád vontad sz","b":"1. Jézus, édes emlékezet, Te adsz szívünknek örömet: Már hozzád vontad szívemet; Vezéreljed lépésimet. \n2. Jézus, megtérők reménye, Hozzád kiáltóknak szíve, Téged keresőknek kincse, Megtalálóknak mindene! \n3. Jézus, szívnek édessége, Élő kútja, fényessége, Minden kincsének szekrénye, Kívánságának jó vége: \n4. Sem nyelv azt meg nem mondhatja, Sem betű fel nem írhatja, Csak ki próbálta, tudhatja, Hogy milyen a Jézus lángja. \n5. Te vagy kegyelem kútfeje, Igaz hazánk fényessége, Búbánatnak enyhítője, Boldogságnak megszerzője. \n6. Tégedet áldnak mennyégben, Magasztalnak dicsőségben; Jézus, vigasztalj éltünkben, Juttass Atyádnak kedvében. \n7. Téged kövessünk egy szívvel, Énekléssel, könyörgéssel, Hogy mi is a Szentlélekkel Lehessünk egyek Istennel. \n8. Jézus, mennyben légy örömünk, Ki voltál földön érdemünk; Benned minden dicsőségünk, Ó, mi Urunk és Istenünk!"},{"m":453,"r":385,"c":"Hozzád kiáltok, én Istenem, Mert érzem, mily gyarló vagyok, Ellenségim","b":"1. Hozzád kiáltok, én Istenem, Mert érzem, mily gyarló vagyok, Ellenségim sokak s nagyok, Az ó-ember harcol ellenem. \n2. Szerez lelkemnek sokféle bajt, Mivel erősebb nálamnál, Lakozik szintén házamnál; Ha meg nem szánsz, jaj, tőribe hajt. \n3. Öldököld meg, Uram, én bennem Ez ó-embert, hogy meghaljon, Maga pártjára ne vonjon: Ne kelljen igáját felvennem. \n4. Küldd el hozzám áldott lelkedet, Ki által bánja, gyűlölje Szívem a bűnt, sőt megölje, Mely megbántotta Felségedet. \n5. Támaszd fel, Uram, valójában Az új embert én szívemben; Hadd nyugodjék kebelemben, S örüljek az úr jóvoltában. \n6. Az igazságnak tudománya Járásomban vezéreljen, Hogy lelkem-testem úgy éljen, Mint szent akaratod kívánja. \n7. Taníts meg te szent törvényedből, Felségedet mint tiszteljem, Máshoz magam mint viseljem, Hogy ki ne essem szerelmedből. \n8. Kész lészek, Uram, ím fogadom: Szent törvényed szerint élek, Járok, kelek, fekszem vélek: Zálogul szívem néked adom."},{"m":454,"r":null,"c":"Jézus, édes emlékezet, Te adsz szívünknek örömet: Már hozzád vontad sz","b":"1. Jézus, édes emlékezet, Te adsz szívünknek örömet: Már hozzád vontad szívemet; Vezéreljed lépésimet. \n2. Jézus, megtérők reménye, Hozzád kiáltóknak szíve, Téged keresőknek kincse, Megtalálóknak mindene! \n3. Jézus, szívnek édessége, Élő kútja, fényessége, Minden kincsének szekrénye, Kívánságának jó vége: \n4. Sem nyelv azt meg nem mondhatja, Sem betű fel nem írhatja, Csak ki próbálta, tudhatja, Hogy milyen a Jézus lángja. \n5. Te vagy kegyelem kútfeje, Igaz hazánk fényessége, Búbánatnak enyhítője, Boldogságnak megszerzője. \n6. Tégedet áldnak mennyégben, Magasztalnak dicsőségben; Jézus, vigasztalj éltünkben, Juttass Atyádnak kedvében. \n7. Téged kövessünk egy szívvel, Énekléssel, könyörgéssel, Hogy mi is a Szentlélekkel Lehessünk egyek Istennel. \n8. Jézus, mennyben légy örömünk, Ki voltál földön érdemünk; Benned minden dicsőségünk, Ó, mi Urunk és Istenünk!"},{"m":455,"r":392,"c":"Testvérek, menjünk bát ran, hamar leszáll az éj, E földi pusztaságban","b":"1. Testvérek, menjünk bát ran, hamar leszáll az éj, E földi pusztaságban Megállni nagy veszély. Hát merítsünk erőt A menny felé sietni, Nem állva megpihenni A boldog cél előtt. \n2. A keskeny útra té rünk, Ne rettentsen meg az; Ki elhívott, vezérünk, Tudjuk, hogy hű s igaz. Mint egykor Ő tevé, Most véle s benne bízva, Arcát ki-ki fordítsa A szent város felé. \n3. Óemberünk ha szen ved, Az jó nekünk, tudom; Ki vérnek, testnek enged, Az nem jár jó úton. A láthatót ne bánd, Csak rázd le, mi kötözne: Hadd törjön éned öszsze, Menvén halálon át. \n4. Zarándok módra jár va, Legyen kezünk üres; Csak terhet vesz magára, Ki pénzt, vagyont keres. Hadd gyűjtsön a világ, Mi tőle el se kérjük, Kevéssel is beérjük, Bennünket gond se bánt. \n5. Az út el van hagyat va, Borítja sok tövis; nehéz emelni rajta Még a keresztet is. De egy út van csupán, Így hát előre bátran, Keresztül minden gáton, Hű Mesterünk után. \n6. Úgy járunk itt, lenéz ve, Mint ismeretlenek; Sokan nem vesznek észre, Hangunk se hallva meg. De aki ránk figyel, Víg énekünket hallja. Szent reménység sugallja, Mit ajkunk énekel. \n7. Ha botlanak a gyön gék, Segítsen az erős; Hordjuk, emeljük önként, Kin gyöngesége győz. Tartsunk jól öszsze hát, Tudjunk utolsók lenni, A bajt vállunkra venni E földi élten át. \n8. Menjünk vígan siet ve, Hisz utunk egyre fogy; Nap megy napot követve, S a test majd sírba rogy. Csak még egy kis tűrés! Ha Őt híven követjük: A láncot mind levetjük S vár ránk az égi rész. \n9. Elmúlik nemsoká ra a földi vándorút, És az örök hazába, ki hű volt, mind bejut. Ott vár angyalsereg, Ott várnak mind a szentek, S az Atyánál pihentek, Megfáradt gyermekek."},{"m":456,"r":null,"c":"Hatalmas Isten, könyörgünk, Szent Felségedhez kiáltunk, Mert igen megn","b":"1. Hatalmas Isten, könyörgünk, Szent Felségedhez kiáltunk, Mert igen megnyomorodtunk, Fejünket nincsen már kihez hajtanunk. \n2. Irgalmas Isten, hallgass meg, Bűnünket nékünk bocsásd meg, A te hitedet építsd meg És Szentlelkeddel, kérünk, vígasztalj meg! \n3. Jertek énhozzám, bűnösök, Fiaim nékem legyetek, Mert én is Atyátok lészek, Ha bűnötökből énhozzám megtértek! \n4. Értsük meg hát ő mondását, Ismerjük meg bűneinket, Kövessük meg Istenünket, Így megmenthetjük ördögtől lelkünket. \n5. Hagyjuk el a nagy vakságot, És kérjünk világosságot, Mert ő gyűlöl hamisságot És csak szereti az egy igazságot. \n6. Nincs igaz más, mint a Krisztus, Mert igazság ő beszéde; Maradjunk azért ezekben, Ne kételkedjünk Isten beszédében."},{"m":457,"r":388,"c":"Ó, Jézus, árva csend ben az ajtón kívül állsz, Bejönnél már, de né mán","b":"1. Ó, Jézus, árva csend ben az ajtón kívül állsz, Bejönnél már, de né mán kulcsfordulásra vársz. Mi mondjuk, hogy miénk vagy, te vagy a név, a jel: Ó, szégyen, hogy te légy  az, akinek várni kell. \n2. Ó, Jézus, most kopog tatsz, sebhelyes még a kéz; Könnymarta kedves ar cod oly búsan intve néz. Ó, áldott, drága jóság, mely enynyit tűrve vár! Ó, bűnök szörnyű bű ne, mely téged így kizár! \n3. Ó, Jézus, szólsz, s a szív hez a szó szelíden ér: „Így bánsz velem? - teér ted hullt testemből a vér!” Bús szégyennel behívunk, az ajtónk nyitva már. Jöjj, Jézus, jöjj, ne hagyj  el, a szívünk várva vár."},{"m":458,"r":399,"c":"Aki értem megnyíltál, Rejts el, ó, örök kőszál! Az a víz s a drága vér","b":"1. Aki értem megnyíltál, Rejts el, ó, örök kőszál! Az a víz s a drága vér, Melyet ontál a bűnér', Gyógyír légyen lelkemnek, Bűntől s vádtól mentsen meg! \n2. Törvényednek eleget Bűnös ember nem tehet; Buzgóságom égne bár, S folyna könynyem, mint az ár: Elégtételt az nem ad, Csak te válthatsz meg magad. \n3. Jövök, semmit nem hozva, Keresztedbe fogózva, Meztelen, hogy felruházz, Árván, bízva, hogy megszánsz; Nem hagy a bűn pihenést: Mosd le, ó, mert megemészt! \n4. Ha bevégzem életem, és lezárul már szemem, Ismeretlen bár az út, Hozzád lelkem mennybe jut: Aki értem megnyíltál, Rejts el, ó, örök kőszál!"},{"m":459,"r":null,"c":"Az Isten Bárányára Letészem bűnöm én, És lelkem béke várja Ott a keres","b":"1. Az Isten Bárányára Letészem bűnöm én, És lelkem béke várja Ott a kereszt tövén. A szívem mindenestül Az Úr elé viszem, Megtisztul minden szennytül A Jézus vériben, A Jézus vériben. \n2. Megtörve és üresen Adom magam neki, Hogy újjá ő teremtsen, Az űrt ő töltse ki. Minden gondom, keservem Az Úrnak átadom, Ő hordja minden terhem, Eltörli bánatom, Eltörli bánatom. \n3. Örök kőszálra állva A lelkem megpihen; Nyugszom Atyám házába’ Jézus kegyelmiben. Az ő nevét imádom Most mindenek felett; Jézus az én királyom, Imámra felelet, Imámra felelet. \n4. Szeretnék lenni, mint ő, Alázatos, szelíd, Követni híven, mint ő, Atyám parancsait. Szeretnék lakni nála, Hol menynyei sereg Dicső harmóniába’ Örök imát rebeg, Örök imát rebeg."},{"m":460,"r":383,"c":"Amint vagyok, sok bűn alatt, De hallva hívó hangodat, Ki értem áldozád","b":"1. Amint vagyok, sok bűn alatt, De hallva hívó hangodat, Ki értem áldozád magad: Fogadj el, Jézusom! \n2. Amint vagyok - nem várva, hogy Lelkemnek terhe, szenynye fogy, Te, aki megtisztíthatod: - Fogadj el, Jézusom! \n3. Amint vagyok - bár gyötrelem, S kétség rágódik lelkemen, Kívül harc, bennem félelem: - Fogadj el, Jézusom! \n4. Amint vagyok - vak és szegény, Hogy kincset leljek benned én, S derüljön éjszakámra fény: - Fogadj el, Jézusom! \n5. Amint vagyok - nincs semmi gát, Kegyelmed mit ne törne át; Hadd bízza lelkem rád magát: - Fogadj el, Jézusom! \n6. Amint vagyok - hogy a te szent Szerelmed tudjam, mit jelent Már itt s majd egykor odafent: - Fogadj el, Jézusom!"},{"m":461,"r":null,"c":"Bár bűn és kín gyötör, És nehéz bár szívem, A Sátán életemre tör: Kéts","b":"1. Bár bűn és kín gyötör, És nehéz bár szívem, A Sátán életemre tör: Kétségbe nem esem. \n2. Bár vétkem súlya nagy, Mégis hozzád jövök. A bűnnek gyűlölője vagy, De kegyelmed örök. \n3. Az én erőm kicsiny, S a bűn erős nagyon: Te tudsz s akarsz segíteni, Hát segíts bajomon! \n4. Az ég oly meszsze van, Még meszszebb tőled én, De szent igédben írva van, Hogy irgalmad enyém. \n5. Nem félek senkitől, Hisz te vigyázsz reám, Már bánat és gond sem gyötör: Meghallgatod imám. \n6. Jézusban bízva én szívemet átadom, Mert így, tudom: akármi ér, Atyám szeret nagyon."},{"m":462,"r":null,"c":"Csak vezess, Uram, végig, és fogd kezem, Míg boldogan a célhoz elérkez","b":"1. Csak vezess, Uram, végig, és fogd kezem, Míg boldogan a célhoz elérkezem, Mert nélküled az én  erőm oly kevés, De hol te  jársz előttem, nincs ret tegés. \n2. Szent irgalmaddal szívemet födjed bé, Tedd örömben és bánatban csöndessé, Hogy hadd pihenjen lá badnál gyermeked, Ki szemle hunyva téged híven  követ. \n3. Ha gyarlóságom meg nem is érzené: A vak homályból te mutatsz ég felé; Csak vezess, Uram, vé gig, és fogd kezem, Míg boldo gan a célhoz elér kezem."},{"m":463,"r":339,"c":"Isten élő Lelke, jöjj, Áldva szállj le rám, Égi lángod járja át szívem","b":"1. Isten élő Lelke, jöjj, Áldva szállj le rám, Égi lángod járja át szívem és a szám! Oldj fel, küldj el, Tölts el tűzzel! Isten élő Lelke, jöjj, áldva szállj le rám! \n2. Isten élő Lelke, jöjj, légy vezérem itt, Ó, segíts, hogy hagyjam el bűnök útjait! Oldj fel, küldj el, tölts el tűzzel! Isten élő Lelke, jöjj, légy vezérem itt! \n3. Isten élő Lelke, jöjj, hadd lehessek szent, S Jézusommal légyek egy már e földön lent! Oldj fel, küldj el, tölts el tűzzel! Isten élő Lelke, jöjj, hadd lehessek szent! \n4. Isten élő Lelke, jöjj, győzedelmet adj, S majd a végső harcon át mennybe fölragadj! Oldj fel, küldj el, tölts el tűzzel! Isten élő Lelke, jöjj, győzedelmet adj!"},{"m":464,"r":326,"c":"Jöjj, királyom, Jé zusom! Szívem,  íme, megnyitom. A  go nosztól óvj t","b":"1. Jöjj, királyom, Jé zusom! Szívem,  íme, megnyitom. A  go nosztól óvj te meg, Meg  ne  rontson engemet. \n2. Véreddel, mely el- kifolyt, Mosd le  rólam, ami folt; É let  útját megmutasd, Én  meg  nem találom azt. \n3. Gyógyítsd meg sok nya valyám, Enyhíts  szívem bánatán; Két ség,  gond ha gyötrenek, Biz tasd  nádszál hitemet. \n4. Van hatalmad rá,  tudom, Míveld,  édes Jézusom: Hit,  re mény és szeretet Tölt se  be a szívemet. \n5. A keresztet te  adod, Adj hoz zá alázatot: Hord jam  olyan csendesen, Mint  egy kor te, Mesterem. \n6. Majd ha véget ér  a harc S megpi hentetni akarsz: meg ra gadom jobbodat, S menny or szágod béfogad."},{"m":465,"r":302,"c":"Sze líd szemed, Úr  Jézus, Jól  látja minden  vétkemet, Sze mélyemet n","b":"1. Sze líd szemed, Úr  Jézus, Jól  látja minden  vétkemet, Sze mélyemet ne  vesse  meg Sze líd szemed, Úr  Jézus. \n2. Sze líd szemed, Úr  Jézus, Te kintsen rám, ha  roskadok, Ad jon békét,  bocsá natot  Szelíd szemed,  Úr Jézus. \n3. Sze líd szemed, Úr  Jézus, Tu dom, hogy vádat  is emel; Vét keztem én,  ítél jen el  Szelíd szemed,  Úr Jézus. \n4. Sze líd szemed, Úr  Jézus, E lítél bár, lásd,  én megint Csak  várom, hogy  majd rám  tekint  Szelíd szemed,  Úr Jézus."},{"m":466,"r":null,"c":"Rád tekint már hitem, Megváltóm, Istenem, A Golgotán: Halld könyörgése","b":"1. Rád tekint már hitem, Megváltóm, Istenem, A Golgotán: Halld könyörgésemet, És vedd el vétkemet; Mostantól hadd legyek Tied csupán. \n2. Szívemet töltse be Kegyelmed ereje Buzgósággal! Meghaltál érettem; Add: szívem s életem Teérted éghessen Forró lánggal! \n3. Ha elfog utamon Félelem s fájdalom: Fogd kezemet! Derítsd fel éjemet, Szárítsd fel könynyemet: Tévelygésben ne hagyd Én lelkemet! \n4. Éltem ha fogyva fogy, És a halál ahogy Jön már felém: Megváltóm, ments te meg Kétségtől engemet, Nálad hogy üdvömet Meglássam én."},{"m":467,"r":387,"c":"Mily jó, ha bűntől már szabad, Az Úr szolgája vagy; A bűn szolgája gyá","b":"1. Mily jó, ha bűntől már szabad, Az Úr szolgája vagy; A bűn szolgája gyáva rab, A Krisztusé szabad. \n2. A bűn sötétben tévelyeg És bajba dönt vakon; De Krisztus kézen fog s vezet Világos utakon. \n3. A bűnben kín van s gyűlölet, Mi mást, más minket öl; Öröm köt egybe s szeretet Az Úr szívén belöl. \n4. Már szolgád lettem, Jézusom, Ki értem áldozál; Más uram nincsen, jól tudom, Mert bűnből kihozál. \n5. Légy áldott, Krisztusom, te nagy! Hadd adjam át szívem: Vedd szívesen, hogy hol te vagy, E szív is ott legyen."},{"m":468,"r":null,"c":"Zengd Jézus nevét, zengd, vi lág, őt, angyalok, áldjátok! Felékesítve","b":"1. Zengd Jézus nevét, zengd, vi lág, őt, angyalok, áldjátok! Felékesítve homlo kát, Királylyá Jézust, Jézust koronázzátok! \n2. Ti vértanúi Isten nek, Kik mennyben szolgáljátok A Bárányt, ki megöle tett: királylyá Jézust, Jézust koronázzátok! \n3. Ti választottak, szent hí vek, Mind akit ő megváltott, Szent irgalmát dicsérjé tek: királylyá Jézust, Jézust koronázzátok! \n4. Ti bűnösök, mert ő hor dott Tiértetek kínt s átkot, És szent vérével áldo zott: királylyá Jézust, Jézust koronázzátok! \n5. Ti népek, törzsek, kik bár hol Az ő szavát halljátok: Nagy jóvoltáért hálá ból királylyá Jézust, Jézust koronázzátok! \n6. Mily boldogság lesz majd, ha  fenn A Jézus előtt állok És mindörökké zenghe tem: királylyá Jézust, Jézust koronázzátok!"},{"m":469,"r":null,"c":"Jézus, nyájas és szelíd, Láss meg engemet, Hallgassad meg, hű Megváltó","b":"1. Jézus, nyájas és szelíd, Láss meg engemet, Hallgassad meg, hű Megváltóm, gyermekedet! \n2. Bűnöm láncát oldja fel Kegyelmed s a hit; Törjed öszsze balga szívem bálványait! \n3. Szabadságot adj nekem És tiszta szívet, Vonj magadhoz, Jézusom, hogy járjak veled! \n4. Vezess engem utadon: Magad légy az út, Melyen lelkem a halálból életre jut. \n5. Jézus, nyájas és szelíd, Láss meg engemet: El ne engedd, hű Megváltóm, már kezemet!"},{"m":470,"r":null,"c":"Úr Jézus, nézz le rám, Jöjj, mosd le bűnömet, Sok földi szenvedély köt","b":"1. Úr Jézus, nézz le rám, Jöjj, mosd le bűnömet, Sok földi szenvedély kötöz: jöjj, oldj fel engemet. \n2. Úr Jézus, nézz le rám, Gond és bú látogat; Hű szolgád: ízleljem ígért, szent nyugodalmadat. \n3. Úr Jézus, nézz le rám, Ne tévedhessek el; A menny felé sötéten át te légy az úti jel. \n4. Úr Jézus, nézz le rám, Ha nő a félelem, Ár zúg és ellenség szorít, légy, Megváltóm, velem! \n5. Úr Jézus, nézz le rám, Mert harcom terhe nagy, Ily tenger kín és baj között Az életem Te vagy. \n6. Úr Jézus, nézz le rám, Ha elvonult az ár, Te szent derűd derítsen és az örök napsugár."},{"m":471,"r":393,"c":"Fel, barátim, drága Jézus zászlaja alatt, Rajta, bátran! megsegít és g","b":"1. Fel, barátim, drága Jézus zászlaja alatt, Rajta, bátran! megsegít és győzedelmet ad. Bízzatok, mert Jézus eljön, ő a fővezér, Zengje ajkunk: hozzád esdünk győzedelemér'! \n2. Lám, a Sátán serge talpon, szembetörni kész, A legbátrabb harcosoknak bátorsága vész. Bízzatok, mert Jézus eljön, ő a fővezér, Zengje ajkunk: hozzád esdünk győzedelemér'! \n3. Szóljon a kürt, fenn lobogjon győzedelmi jel, Így előre Jézusunkkal: néki győzni kell! Bízzatok, mert Jézus eljön, ő a fővezér, Zengje ajkunk: hozzád esdünk győzedelemér'! \n4. Harci zajban, küzdelemben oldalunkon áll, Benne higygyünk, ő segít meg szívünk harcinál. Bízzatok, mert Jézus eljön, ő a fővezér, Zengje ajkunk: hozzád esdünk győzedelemér'!"},{"m":472,"r":null,"c":"Menynyit zengi a lelki békét, A szívek csendjét énekünk, Bár künn kín","b":"1. Menynyit zengi a lelki békét, A szívek csendjét énekünk, Bár künn kín és ínség üzenget Sok hangos jajszóval nekünk. Az óra, testvér, gyorsan elfut S az ember útja, sorsa zord, Nincs rá időd, hogy álmodozva A lelked meddőn tékozold. \n2. Ebből az éhség csal ki könynyet, Az ott a fagy miatt remeg, Házad táján sorvadva élnek Éhes, lerongyolt gyermekek. Az apjuk gyötrött mély szemében A meghasonlás láza él, Értük megmentő harcra kelni: Elhívatás, testvéri cél. \n3. Lelkek éjét oszlatni fénynyel: Reád az Úr ezt bízta, lásd, S azt, hogy hozz Krisztus szent nevével A bűnösnek szabadulást. Az Isten vérét adta értünk; Láttasd, hogy szent példája hat, S hogy áldott útját árva hittel Te is adod egész magad. \n4. Adj éjt, napot, add át erődet, Add kincsedet, add szívedet, Rontó lelkek gáncsa nem árthat, Győztes csak egy: a szeretet. A Mester lelke járt előtted S kitűzi most eléd a célt, Munkára hát, ne késs, serénykedj Megváltódért, Királyodért. \n5. Áldott Jézus, a földre jöttél S vállaltál értünk szörnyű kínt; Bárcsak tudnánk, Igéd követve, Mi is szenvedni, tűrni mind. Sok szolgád, férfi, nő, ma bízva Átadjuk szívünket neked; Hogy munkánk éljen és teremjen: Gyújtsd fel bennünk szerelmedet!"},{"m":473,"r":398,"c":"Emeld fel szíved, füled nyisd meg Te kemény nyakú Izrael! Isten paranc","b":"1. Emeld fel szíved, füled nyisd meg Te kemény nyakú Izrael! Isten parancsolatát értsd meg, Törvényire figyelmezzél. \n2. ÉN VAGYOK ISTENED EGYEDÜL, Ki a szolgálatból téged Kihoztalak nagy ínségedből: Ne légyenek más istenid. \n3. NE CSINÁLJ SEMMI BÁLVÁNYKÉPET Akárminémű dologból; Ne imádjad, ne tiszteld őket, Mert nagy haragom megindúl. \n4. URADNAK ISTENEDNEK NEVÉT SOHA NE VEGYED HIÁBA, Mert aki nem becsüli nevét, Megbünteti azt valóba'. \n5. HAT NAP MINDEN DOLGODAT TÉGYED, NYUGODJÁL A HETEDIKEN, Mert hogy teremte mindeneket, E nap megnyugovék Isten. \n6. A TE ATYÁDAT ÉS ANYÁDAT TISZTELJED szeressed híven, Hogy hoszszú életet, sok jókat Adjon tenéked az Isten. \n7. Embert NE ÖLJ, ne tégy vérontást, PARÁZNASÁGBA NE TÉVEDJ, NE OROZZ, gyűlöljed a lopást, HAMIS BIZONYSÁGOT NE TÉGY. \n8. FELEBARÁTODNAK Ő HÁZÁT NE KÍVÁND, se házastársát, Szolgáját, szolgálóleányát, Se barmát, semmi marháját. \n9. Uram, hatalmas a te Igéd, Még zengését is rettegjük, Irgalmadból velünk azt tégyed, Hogy akaratodat tégyük."},{"m":474,"r":168,"c":"Istennel járni, lakozni, Szent élettel illatozni, Igaz hitben nem habo","b":"1. Istennel járni, lakozni, Szent élettel illatozni, Igaz hitben nem habozni: Jézus Krisztus, taníts, Taníts imádkozni!"},{"m":475,"r":null,"c":"\"Imádkozzatok és buzgón kérjetek!\" Bűnös voltunkért, Uram, ó, ne vess","b":"1. \"Imádkozzatok és buzgón kérjetek!\" Bűnös voltunkért, Uram, ó, ne vess meg! Tiszta szívet és Szentlelket adj nékünk, Hallgass meg Fiad nevébe', ha kérünk. \n2. „Keressetek buzgón és megtaláltok!” - Téged keresünk, Uram: hogy bűn s átok Erőt ne vegyen mirajtunk, légy nékünk Égi utunk, igazságunk, életünk! \n3. „Zörgessetek buzgón Isten ajtaján!” - Elfáradtunk, Uram, e világ zaján; Ó, nyisd meg az égi béke szép honát, Add, hogy zenghessünk örök halleluját!"},{"m":476,"r":409,"c":"Siess nagy Úr Isten én segítségemre, És légy figyelmetes az én beszéde","b":"1. Siess nagy Úr Isten én segítségemre, És légy figyelmetes az én beszédemre, Emlékezzél reá szent ígéretedre, Hajtsad füleidet én könyörgésemre. \n2. Hitből, tiszta szívből azért arra kérlek: Engedd, szent igédből hogy ismerhesselek, Teljes életemben hogy dícsérhesselek, Minden dolgaimban téged nézhesselek. \n3. Az én életemet tartsd meg szent nevedért, A te szent Fiadnak kedves szerelméért; Nagy hálákat adok tenéked ezekért, Ha meghallgatsz, Uram, engem jóvoltodért. \n4. Nem kérem a végre hoszszú életemet, Hogy itt e világon hízlaljam testemet, Sem hogy öregbítsem híremet-nevemet, De hogy dícsérhessem te Istenségedet. \n5. Világi életem csak árnyék énnékem, Mint a szép folyóvíz, elmúlik éntőlem, De a te országod örök lakóhelyem, Melybe Jézus Krisztus által helyheztetem. \n6. Szent Fiad vállára rakád bűneimet, Ördög rabságából megváltál engemet, Érette fiaddá fogadál engemet, Örökössé tevél, mint édes gyermeket. \n7. Bízvást merek azért néked könyörögni, Az én ajakimmal áldozatot tenni; Mint kegyes Atyámmal, te veled szólani, Minden szükségemet szépen megbeszélni. \n8. A te népeidet, Uram, immár szánd meg, Súlyos ostorodat tőlünk immár vond meg, Te nagy haragodat, szent Atyánk, enyhítsd meg: Gyülekezetedet immáron építsd meg! \n9. Rútságát bűnünknek Úr Isten, ne nézzed, Hanem szent Fiadnak halálát tekintsed, És áldozatjának szent érdemét nézzed: Szegény fiaidat immár megsegéljed. \n10. A te jóvoltodért mindörökké áldunk, Irgalmasságodért is felmagasztalunk. Háládatlanságot távoztass el tőlünk, Új és tiszta szívet teremts már mi bennünk! \n11. Tied legyen, Isten, mindenben dicsőség A te szent Fiaddal, és minden tisztesség, Szentlélek Istennel egyenlő felségben, A Szentháromságban mind örökké! Ámen."},{"m":477,"r":404,"c":"Halld meg, Uram, esedezésünket, Irgalmadból szánd meg mi ügyünket, Mer","b":"1. Halld meg, Uram, esedezésünket, Irgalmadból szánd meg mi ügyünket, Mert érezzük számtalan bűnünket, Melyekkel bémocskoltuk lelkünket. \n2. Törvényedet minden nap hallottuk, Szántszándékkal mégis megrontottuk, Jó Atyánkat így haragítottuk, Ő szent lelkét megszomorítottuk. \n3. Tisztünkben is hányszor restelkedtünk, Gyarlóságból menynyi hibát tettünk, Szeretettel akikhez köttettünk, Azok ellen mely sokat vétettünk. \n4. Méltók vagyunk, hogy kárhozatban hagyj, De te, Uram, jó és irgalmas vagy, Minden megtérőkhöz kegyelmed nagy; Kérünk, abba minket is béfogadj. \n5. Szent Fiadnak kiontatott vére Lett lelkünknek váltsága és bére, Tekints, kérünk, az ő érdemére. Bűneinkért ne vonj ítéletre. \n6. Megígérted, kegyelmes Istenünk, Hogy e felől jó hitben kell lennünk, Ha azoknak mi is megengedünk. Kik valaha vétettek ellenünk. \n7. Segíts, Uram, hogy ezt mívelhessük, Feleinket híven szerethessük, Naponként a bűnt levetkezhessük. Az örök életet elvehessük."},{"m":478,"r":null,"c":"Ó, irgalmas Isten, Én könyörgésemben Füledet hozzám hajtsad; Ó, igen j","b":"1. Ó, irgalmas Isten, Én könyörgésemben Füledet hozzám hajtsad; Ó, igen jó Isten, Minden szükségemben Áldásod szaporítsad. \n2. Ó, hatalmas Isten, Keserűségemben Szívemet vidámítsad; Ó, nagy és szent Isten, Minden félelmemben Elmémet bátorítsad. \n3. Ó, örök Úr Isten, A veszedelmekben Segedelmedet nyújtsad; Ó, igaz Úr Isten, Kételkedésemben Hitemet gyámolítsad. \n4. Ó, áldott Úr Isten: Rossz testiségemben Lelkem hozzád hódítsad; Ó, erős Úr Isten, A világ fényében Szemem világosítsad. \n5. Ó, teremtő Isten, A kísértetekben A Sátánt elfordítsad; Ó, megváltó Isten, sok vétkezésimben Irgalmad bizonyítsad. \n6. Ó, szentelő Isten, Erőtlenségimben Kegyelmedet újítsad; Ó, kegyelmes Isten, Éltemnek végében Lelkemet boldogítsad."},{"m":479,"r":411,"c":"Hinni taníts, Uram, kérni taníts! Gyermeki, nagy hitet kérni taníts!","b":"1. Hinni taníts, Uram, kérni taníts! Gyermeki, nagy hitet kérni taníts!  Indítsd fel szívemet, Buzduljon fel, neked Gyűjteni lelkeket! Kérni taníts! \n2. Hinni taníts, Uram, kérni taníts! Lélekből, lelkesen kérni taníts!  Üdvözítőm te vagy, Észt, erőt, szívet adj. Lelkeddel el ne hagyj! Kérni taníts! \n3. Hinni taníts, Uram, kérni taníts! Gyorsan elszáll a perc: kérni taníts!  Lásd gyengeségemet, Erősíts engemet, Míg diadalt nyerek: Kérni taníts! \n4. Hinni taníts, Uram, kérni taníts! Jézus, te viszszajössz: várni taníts!  Majd ha kegyelmesen Nézed az életem: Állhassak csendesen. Hinni taníts!"},{"m":480,"r":402,"c":"Ó, könyörgést meghallgató Édes Atya, mindenható, Ha lelkem hozzád emel","b":"1. Ó, könyörgést meghallgató Édes Atya, mindenható, Ha lelkem hozzád emelkedik, És a buzgóság szárnyain, Ajakim óhajtásain Elődbe érvén, reménykedik: Érzem, hogy az örök élet Már e földön az enyém lett. \n2. Ha örömmel gerjedezem És rebegni igyekezem, Tetőled menynyi áldást vészek! Feltekintvén rád, Atyámra, Könny csordul már az orcámra; Azáltal olyan újjá lészek, Mint a plánta, mikor arra Harmatcseppet szülsz hajnalra. \n3. Ha szívemet bánat járja, Szemem keserűség árja: Előtted való zokogásom; Titkon ajtómat behajtva És magánosan sóhajtva Akkor is édes újulásom, Mert minden könynyűvel, jajjal könynyebbül sorsom egy bajjal. \n4. Ha templomban megjelenek, Ahol öszszesereglenek, Felséges neved imádói: Velük együtt fohászkodva Úgy tetszik, mintha vigadva Ott volnék, hol a menny lakói A te királyi székednek Előtte letelepednek. \n5. Te, ki a szív mozdulásit, Mint a vizeknek folyásit, Szabadon hajtod ide s tova, Neveld ezt az érzést bennem, És taníts jól könyörgenem; Majd egyszer pedig, menynyek ura, Vigy be az egek egébe, Imádásod szent helyébe."},{"m":481,"r":403,"c":"Ó, felséges Úr, egek királya! Nagyságod a menny és föld csudálja; Neve","b":"1. Ó, felséges Úr, egek királya! Nagyságod a menny és föld csudálja; Nevedre minden térdek meghajolnak, Széked előtt angyalok udvarolnak. Mégis hozzánk úgy leereszkedtél, Hogy Fiad által Atyánkká lettél, És mikor szükségünkben esedezünk, Gyönyörködöl, ha Atyánknak nevezünk. \n2. Nagyobb kegyelem ennél mi lehet, Hogy a bűnös tehozzád úgy mehet, Mint Atyjához, aki könynyen könyörül És szerelmes fia kárán nem örül. A terhes kereszt alatt levőknek, Ínség, betegség alatt nyögőknek Az az egy gondolat ad könynyebbséget, Hogy Atyjuk vagy s látsz bajukban jó véget. \n3. Ó, édes Atyánk, nyújtsd kegyelmedet, Hogy mi is úgy szeressünk tégedet, Mint a fiak, kik érzik, hogy illetlen, Ha szívük az atyjukhoz tiszteletlen. Emeld fel lelkünk gyakran menynyekbe, Hogy ne merüljünk a földiekbe, Hanem addig is, míg majd haza mégyünk, Hozzád vágyódásunkkal otthon légyünk."},{"m":482,"r":null,"c":"Mi kegyes Atyánk, kit vallunk hitünkben: Légy segítségül ily nagy szük","b":"1. Mi kegyes Atyánk, kit vallunk hitünkben: Légy segítségül ily nagy szükségünkben, Építs meg minket mi természetünkben, Ki vagy menynyekben. \n2. A te szent neved szenteltessék köztünk, Ne uralkodjék hamisság mibennünk; A te szent Igéd hirdettessék köztünk, Hogy el ne veszszünk. \n3. Jöjjön miközénk a te szent országod, Csak te bírj minket, bűnös fiaidat; Ismerhessük meg a te szent Fiadat, Krisztus Urunkat. \n4. Ne légyen bennünk ördögnek országa, Ne bírjon minket a bűnnek soksága; Szálljon mi közénk hitnek igaz ága, Megtisztulása. \n5. Természetünket ne hagyjad követnünk; Akaratodat építsed mi bennünk, Hogy mindenekben tenéked engedjünk: Ne hagyj elesnünk! \n6. Mi kenyerünket mindennap megadjad, Dolgunkban áldást, csendes nyugodalmat; És mindenekben testünket tápláljad És oltalmazzad. \n7. Megbocsásd nékünk gonosz bűneinket, Álnokságinkat, hitetlenséginket: Végy ki közülünk minden irígységet, És gyűlölséget. \n8. És ne vígy minket gonosz kísértetbe', Ne hagyj elvesznünk a mi bűneinkbe'; Oltalmazz minket, ne essünk kétségbe, Ördög kezébe. \n9. Szabadítsál meg minket a gonosztól, Bűntől, ördögtől, minden álnokságtól, Ellenséginktől, hirtelen haláltól, És kárhozattól. \n10. Dicsőség néked mennyben, örök Isten! Ki mihozzánk vagy engedelmességben: Hallgass meg minket e könyörgésünkben, Áldj meg hitünkben!"},{"m":483,"r":405,"c":"Mennybéli felséges Isten, Kinek dicsőséged ott fenn Boldog lelkek sere","b":"1. Mennybéli felséges Isten, Kinek dicsőséged ott fenn Boldog lelkek seregitül Láttatik véghetetlenül: E teljes világ általad Teremtetett, áll és marad. \n2. Te noha ily felséges vagy, Erőd, méltóságod ily nagy, Mégis minket, kik föld pora S hitvány férgek vagyunk, arra Méltóztatsz, hogy fiaidnak Hívassunk, s te MI Atyánknak. \n3. Fiúi bizodalomban Azért te elődbe mostan Járulunk imádságunkkal, Reggeli áldozatunkkal; MI ATYÁNK, tiszteletünket Vedd bé, halld meg kérésünket. \n4. SZENTELTESSÉK MEG TE NEVED, Azaz: mivelünk azt tegyed, Hogy igazán megismerjünk Téged, féljünk és tiszteljünk, Szemlélvén nagy bölcs munkáid S minden tökéletességid. \n5. Gondolatunk és beszédünk, Sőt a mi egész életünk Úgy folyjon s úgy tündököljék, Hogy mindenek megismerjék. Hogy te vagy, szent Isten, Atyánk, Fiaidnak te vagy példánk. \n6. JÖJJÖN EL A TE ORSZÁGOD, Töltse bé uralkodásod, Ó, mi királyunk, e földet; Szaporítsad seregedet, Drága Igédnek kész szállást, Adj mindenütt szabad folyást. \n7. Ha egyházad ellenségi Igyekeznek azt rontani: Te velünk egy táborba szállj, És előnkbe hadnagyul állj; Szégyenítsd ellenséginket, Tartsd meg, bírj, vezérelj minket. \n8. LEGYEN A TE AKARATOD; Ami jó s rendes, te tudod; Azért mi akaratunkat Tetszésed után hordozd, azt Szeressük, amit szeretsz, de gyűlöljük, amit gyűlölsz te. \n9. Engedjünk néked mindenben, MINT dicső seregid MENNYBEN: Ha velünk keményen bánsz is, Szenvedjük békével azt is; Tiéd mind testünk, mind lelkünk, Teremtőnk, szabad vagy velünk. \n10. ADD MEG NEKÜNK KENYERÜNKET NAPONKÉNT, eledelünket: Viselj gondot életünkről, E mi halandó testünkről; Szolgáltass jó egészséget, Termő időt, békességet. \n11. Szállíts áldást munkáinkra, Minden marhánk s jószágunkra; Javaiddal pedig nékünk Adj mértékletesen élnünk, Rád nézve háládatosan, Mások iránt irgalmasan. \n12. BOCSÁSSAD MEG BŰNEINKET: Mind ama nagy veszettséget, Amely első szüléinktől Szállott reánk örökségül, Mind amely rossz gyümölcsöket Boszszúdra e rossz fa termett. \n13. Nézvén szent Fiad vérére, Ne vonj minket ítéletre, És vétkeinkért meg ne feddj, Sőt mindenekben megengedj, AMINT MI IS MEGENGEDÜNK, HA KIK VÉTETTEK ELLENÜNK. \n14. ÉS NE VÍGY A KÍSÉRTETBE, Mely rajtunk erőt vehetne! Jól tudod, mily gyarlók vagyunk, könynyen tántorodik lábunk; SZABADÍTS AMA GONOSZTÓL, Ki lest hány nekünk akárhol. \n15. Hogyha pedig dicsőséges Néked s nekünk épületes A kísértőt ránk bocsátni, Hitünket próbára vonni: Add nekünk a győzedelmet, Ezzel koronázd hitünket. \n16. Hogy tőled kérjük ezeket, Ily okok indítnak minket: MERT TIED AZ ORSZÁG: néped Vagyunk mi és örökséged, Jó királyunkhoz szükségben Hogyne folyamnánk merészen? \n17. Velünk jól tenni akarván, Arra tehetséged is van, TIED A teljes HATALOM, Égi s földi birodalom; Jól tenni méltó is hozzád, DICSŐSÉG tér ebből reád. \n18. Aki kérésében haboz, Az tőled üres választ hoz, De mi, Krisztus érdeméből Nyugodt szívvel lévén erről, Hogy megadsz, valamit kértünk, Kérésünkhöz ÁMEN-t kötünk."},{"m":484,"r":null,"c":"Mi Atyánk, ó, kegyes Isten, Ki vagy a magas menynyekben: Szenteltessék","b":"1. Mi Atyánk, ó, kegyes Isten, Ki vagy a magas menynyekben: Szenteltessék neved szívvel; A te országod jöjjön el; Te akaratod meglégyen Ez földön, miképpen mennyben. \n2. Mindennapi kenyerünket Add meg, bocsásd meg vétkünket, Amint mi is megbocsátunk Azoknak, kiktől bántattunk; És ne vigy a kísértetbe, De szabadíts gonosz ellen. \n3. Mert tied, Uram, az ország, Tied minden hatalmasság, Megadhatsz azért minékünk Mindent, amit tőled kérünk; Tied a dicsőség, Ámen. Most és örökké úgy légyen."},{"m":485,"r":423,"c":"Jézus Krisztus, szép fényes hajnal, Ki feltámadsz új világgal, És megá","b":"1. Jézus Krisztus, szép fényes hajnal, Ki feltámadsz új világgal, És megáldasz minden jókkal: \n2. Te vagy nékünk egy reménységünk, Isten előtt közbenjárónk, Szép koronánk, ékességünk. \n3. Világosítsd a mi szívünket: Ismerhessünk meg tégedet; Tanulhassuk szent Igédet. \n4. Az ördögnek csalárdságától, Lelki-testi nyavalyától, Őrizz hamis tudománytól. \n5. Az Atyával és Szentlélekkel, Hogy tégedet tiszta szívvel Mindörökké áldjunk! Ámen."},{"m":486,"r":419,"c":"Szívem megalázván, tehozzád megyek, Elődbe, Istenem, hál'adást viszek","b":"1. Szívem megalázván, tehozzád megyek, Elődbe, Istenem, hál'adást viszek És szent Fiad által néked könyörgök. \n2. Áldott légy, én Uram, hogy megtartottál, Bút és kárt ez éjjel rám nem bocsátál, Angyali sereggel oltalmam voltál. \n3. E reggeli időt megadtad érnem, Melyben egészséges elmém és testem; Kérlek, minden jóra vezérelj engem. \n4. Mai nap ezt velem cselekedd, Uram: Mindenféle bűntől magam óvhassam, Hitem jó gyümölcsét hogy el ne rontsam. \n5. Ételem, italom mérsékelt legyen, Tobzódás, részegség ne nehezítsen, Rossz gondolat bennem erőt ne vegyen. \n6. Lágyítsd meg énbennem az indulatot, Meg ne háborítsak soha másokat, És haragtartásra ne adjak okot. \n7. Jól tudod, Istenem, mily gyarló vagyok, Különb-különb bűnre mily könynyen hajlok! Adjad: megtérhessek, mikor bűnt vallok! \n8. Igaz ítéleted ne ostorozzon, Bűnből a Krisztusért ingyen oldozzon, Érdemem szerint rám átkot ne hozzon. \n9. Magamat egészen neked szentelem: Kegyelmes oltalmad legyen mellettem, Szentlelked és Igéd legyen vezérem. \n10. Külső károktól is ments meg engemet, Ne emészsze bánat és bú szívemet; Tartsd jó egészségben gyarló testemet! \n11. Istenem, tenéked legyen dicsőség, A Szentháromságban ki vagy egy Felség: Csak tégedet illet minden tisztesség!"},{"m":487,"r":424,"c":"Magasztallak én téged, Isten, egeknek királyát, Hogy tőlem meszsze űzt","b":"1. Magasztallak én téged, Isten, egeknek királyát, Hogy tőlem meszsze űzted A sötét éjnek homályát. Nem küldél rám betegséget, Sem egyéb ínséget, Épségben megtartottál, E napra engem juttattál. \n2. Szívből könyörgök néked, Kegyes teremtő Istenem: E napot is engedd meg Békességgel véghezvinnem, Akaratodat tanulnom, Útaidban járnom; Oltalmad béfedezzen, Kedvem kedved szerint légyen. \n3. Igaz utadra taníts, Hogy veled együtt járhassak, És tőled el ne taszíts, Hogy kísértetbe ne jussak. Jóvoltodból tarts meg engem, Én édes Istenem, Hogy a bűn csalárdságát, Észre vegyem undokságát. \n4. Az igaz hitnek tüzét Bennem Krisztusért éleszszed, Gyarlóságomnak vétkét Soha szememre ne vessed; Fogadásodat tekintsd meg, Szent Fiadért tarts meg, Ki értem eleget tett, Törvény átkától megmentett. \n5. Reménységgel ruházz fel, Ördög tőrébe ne essem, Szívem hozzád gerjeszd fel, Ne csak hasznomat keressem. Atyafi szent szeretetet, Adj jámbor életet; Szeress, mint sajátodat, Kövessem akaratodat. \n6. Szent Igédet vallanom Adjad tisztán, homály nélkül És szolgádnak mondatnom Minden képmutatás nélkül; kincscsel semmit sem gondolok, Más jutalmat várok: A szentek seregében, Tarts meg gyülekezetében. \n7. E napot is engedd meg, Uram, békével megfutnom, Hivatalom hasznával Magam s cselédim táplálnom, Hogy szent nevedet dicsérjem, Oltalmadat nyerjem: Testemnek megmaradást, Lelkemnek adj boldog szállást. \n8. Uram, egyedül vagy jó. Te vagy út, élet, igazság, De én életem gyarló. Gondolatom csak hamisság. Táplálj Krisztus szent testével, Itass szent vérével, Hogy örökké nevednek, Énekeljek Felségednek. \n9. Hála légyen Atyának, Fiúnak és Szentléleknek, Kitől minden jók vagynak: Ne engedj azért ördögnek Engem, igaz megváltottad, Gyenge juhocskádat: Lelkem a boldogságba, Vigyed a paradicsomba."},{"m":488,"r":224,"c":"Szent vagy, szent vagy, szent vagy, Mindenható Isten, Énekünk jó regge","b":"1. Szent vagy, szent vagy, szent vagy, Mindenható Isten, Énekünk jó reggel száll hozzád szívesen. Szent vagy, szent vagy, szent vagy, Végtelen kegyelem, Három személyben áldott egy Isten! \n2. Szent vagy, szent vagy, szent vagy, Kit a szentek áldnak, Koronájukat letészik teelőtted; Angyali seregek térdelve imádnak, Ki voltál, vagy s nem érsz soha véget. \n3. Szent vagy, szent vagy, szent vagy, Földi köd bár elfed, És bűnös szem nem látja dicsőségedet, Csak te vagy szent, Isten, és senki kívüled: Teljes hatalmú szentség, szeretet! \n4. Szent vagy, szent vagy, szent vagy, Nagy és erős Isten; Minden műved dicsér az ég-, föld- s tengeren! Szent vagy, szent vagy, szent vagy, áldott, véghetetlen: Három személyben egy áldott Isten!"},{"m":489,"r":351,"c":"Örök élet reggele, Fény a véghetetlen fényből, Egy sugárt küldj ránk t","b":"1. Örök élet reggele, Fény a véghetetlen fényből, Egy sugárt küldj ránk te le, Kik új napra ébredénk föl; Fényed lelkünk éjjelét Űzze szét. \n2. Jóságodnak harmata Gyarló életünkre hulljon, Szívünk, mely kiszárada, Vigaszodtól felviduljon, S híveid közt légy jelen Szüntelen. \n3. Bűn ruháját vessük el A szövetség vére által, Vétkeink fedezzük el Tőled nyert fehér ruhánkkal, Hogy hitünk legyőzze majd Mind a bajt. \n4. S majd vezess az égbe föl, Irgalomnak napvilága, könynyek gyászos völgyiből Üdvösségnek szép honába, Hol az üdv és béke majd Egyre tart."},{"m":490,"r":null,"c":"Igaz Bíró, nagy Úr Isten, Ki állatsz mindent jó rendben, Reggelt, délt","b":"1. Igaz Bíró, nagy Úr Isten, Ki állatsz mindent jó rendben, Reggelt, délt, estvét rendelted S híveidnek megszentelted: \n2. Krisztus, hívek megtartója, Egeknek igazgatója, Mindeneknek alkotója, Te vagy bölcsen formálója: \n3. Szentlélek, egy igaz Isten, Ki lakol minden hívekben, Tartasz mindent igaz rendben: Tőled függ minden keresztyén. \n4. Szentháromság, egy Istenség, Ki vagy mindenre elégség: Csak tiéd minden tisztesség, Néked adassék dicsőség!\n5. Te teremtettél bennünket: Bírd hát jóra életünket; Ne nézd gyarló esetünket: Segéld erőtlenségünket. \n6. Hogy mi csak tiéid légyünk, Téged szüntelen dícsérjünk: Légyen szeretet mi bennünk, Egymás közt egyesek légyünk. \n7. Oltsd meg patvarinknak tüzét, Vedd el bűneinknek terhét: Adj minékünk csendességet, Lelki-testi békességet. \n8. E világon úgy élhessünk, Hogy bűnünkben el ne veszszünk, Hanem menynyekbe mehessünk, S véled örökké élhessünk. \n9. Dicsőség légyen tenéked, Menny, föld magasztaljon téged, Mert mindenekre kegyelmed, Mint a bő árvíz, kiterjed."},{"m":491,"r":null,"c":"A nap immár felvirradván, Kérjük az Istent mindnyájan: Hogy ezen az eg","b":"1. A nap immár felvirradván, Kérjük az Istent mindnyájan: Hogy ezen az egész napon Bűntől minket oltalmazzon. \n2. Nyelvünket megtartóztassa És a bűnre ne bocsássa, Szemeinket bétakarja, Gonoszra nézni ne hagyja. \n3. Szíveink tiszták legyenek, Gonosz bűnt be ne vegyenek; Kevélységet gyűlöljenek, Dobzódást ne szeressenek. \n4. Hogy, mikor a nap elnyugszik És az éj béalkonyodik, Mi egészen tiszták légyünk És őtet vígan dícsérjük. \n5. Dícséret légyen Atyánknak, És egyetlen-egy Fiának, És a mi Vígasztalónknak, Kitől minden jók származnak."},{"m":492,"r":null,"c":"Felséges Atya Úr Isten, Ez napnak ő kezdetiben Könyörgünk: tarts meg h","b":"1. Felséges Atya Úr Isten, Ez napnak ő kezdetiben Könyörgünk: tarts meg hitünkben És az igazszeretetben. \n2. Bűneinket megbocsássad, És szívünket vígasztaljad, Vallásunkat bátorítsad, És Szentlelked nékünk adjad: \n3. Hogy ne ártson az ellenség, Távol légyen minden kétség, Testi-lelki fertelmesség, És a gonosz eretnekség. \n4. Adjad meg nékünk éltünkben Egymást szeretnünk szívünkben; Élhessünk nagy békességben, És hitnek jó gyümölcsében. \n5. Lelkünket és jószágunkat, Néked ajánljuk magunkat: Vezéreld a mi útunkat, És viseld jóra gondunkat. \n6. Engedd ezt nékünk Krisztusért, Te egyetlenegy Fiadért, És érettünk Szószólónkért, Egy elég áldozatunkért. \n7. Hálákat adunk, Úr Isten, Te szent Fiadnak akképen, Szentlélekkel egyetemben, Mostan és minden időben."},{"m":493,"r":null,"c":"Dícsérlek, Uram, téged, Hogy ez elmúlt éjjel életem megőrizted Hatalma","b":"1. Dícsérlek, Uram, téged, Hogy ez elmúlt éjjel életem megőrizted Hatalmas kezeddel; Setétségnek tőriből, Mely környülvett vala, Íme, engemet kivől, Ó mindennek Ura! \n2. Néked adok hálákat, Én kegyes Istenem, És kérlek, mint Atyámat: Ma is tarts meg engem, Hogy szolgálhassak néked Akaratod szerint: Éltemet vezéreljed, Légy velem óránkint! \n3. Hogy el ne tévelyedjem A te ösvényidtől, Ne ártson ellenségem, Őrizkedjem bűntől: Őrizz meg jóvoltodból, Uram, téged kérlek, Ördög álnokságától Hogy semmit ne féljek. \n4. Adjad, hogy erős hittel Bízzam szent Fiadban; Bűneimet töröld el. Tarts meg irgalmadban. Hiszem, hogy ezt megadod, Amint megígérted; Bűnünket megbocsátod, Ha könyörgünk néked. \n5. Szeress jó reménységgel, Mely nem ejt szégyenben; Atyafi szeretettel Építsél éltemben, Hogy szívből szerethessem Felebarátomat, És ebben ne keressem Csak az én hasznomat. \n6. Engedd, hogy szent Igédet Bátran megvallhassam, Tisztemben hűségemet Néked megtarthassam; Senki engem e földön Tőled el ne vonjon, Híveid seregében Felséged megtartson. \n7. Hogy szent dícséretedre Végezzem e napot, Tőled ne térjek félre, Vezérljed útamot; Áldd meg termő földünket, Őrizz meg éltünkben, Mert minden szerencsénket Ajánljuk kezedben."},{"m":494,"r":418,"c":"Tenéked, Uram, hálát adok Hozzám való jóvoltodért, És teljes szívemből","b":"1. Tenéked, Uram, hálát adok Hozzám való jóvoltodért, És teljes szívemből vígadok Rám árasztott jó kedvedért, Mert ím meghallgattál, Engem kiragadtál Nyavalyáimból, Szívbéli vidulást, Adtál szabadulást Sok bánatimból. \n2. Ím, feltámasztád napom fényét Mely homályba béborult volt, Elmosád rólam lelkem szenynyét, Melyben hevertem, mint egy holt. Nyomorúság között, Mint egy lekötözött, Mikor hányattam: Voltál segítséggel, Hogy én több ínséggel Ne bántattassam. \n3. Atyai gondviselésedet Sok ezerszer megpróbáltam, Reám kinyújtott kezeidet, Jó Istenem, által láttam; Tégedet dícsérlek Azért, míg itt élek E gyarló testben; Szájamnak szózatja Eged általhatja: Hiszek Igédben. \n4. Ma kezeidbe ajánlottam, Amit csak adtál énnékem; Felköltömkor is azt mondottam: Magad bírj engem, Istenem! Hogy a bűnnek rabja, Ne legyek szolgája; Adj estét érnem! Ki uralkodol s élsz És senkitől nem félsz: Ne hagyj elvesznem!"},{"m":495,"r":420,"c":"Hálát adok néked, mennybéli Isten, Szent Fiadnak, a Krisztusnak nevébe","b":"1. Hálát adok néked, mennybéli Isten, Szent Fiadnak, a Krisztusnak nevében, Hogy engemet ez éjjel megőriztél, Minden veszedelemtől megmentettél; Tartsd meg, kérlek, e napon is éltemet, Bűntől, minden kártól ments meg engemet. \n2. Magam, Uram, ajánlom szent kezedbe, Mind testem, lelkem vedd őrizetedbe, Szent angyalidat ne vedd el mellőlem, Szent Lelked se távozzék el éntőlem, Hogy vakmerő bűnöktől ma is menten Megőriztessék épen testem, lelkem. \n3. Könyörgök, Uram, minden emberekért, De főképpen a hív keresztyénekért, Minden rokonimért, kik téged félnek, Akik vagy itt, vagy meszsze földön élnek; Minden gonosztól őket is őrizd meg, És minden javaiddal látogasd meg. \n4. A szegény rabokat és betegeket, Kik ínségükben óhajtnak tégedet, Uram, vigasztald meg bágyadt szívükben, Szenvedésükből mentsd ki kegyelmesen; És térítsd meg a szegény bűnösöket, Add, hogy jó véghez vigyük életüket."},{"m":496,"r":421,"c":"Hálát adunk néked, menynyei Atyánk, Ki mindenkor kegyesen vigyázsz reá","b":"1. Hálát adunk néked, menynyei Atyánk, Ki mindenkor kegyesen vigyázsz reánk. \n2. Ím az elmúlt éjjel is megnyugtattál, E napra jó kedvedből virrasztottál. \n3. Áldj meg kérünk, e napon is bennünket, Védelmezd kártól lelkünket, testünket. \n4. Segélj meg hivatalos munkáinkban, Részeltess lelki, testi áldásidban. \n5. Oltalmazz meg minden bűnbe eséstől, Téged félhessünk, tisztelhessünk szentül. \n6. Erősíts, nevelj naponként a hitben, Tarts meg végig atyai szerelmedben. \n7. Hogy Fiaddal s Lelkeddel egyetemben Néked víg szívvel szolgálhassunk! Ámen."},{"m":497,"r":422,"c":"Mi szent Atyánk, ki lakozol mennyégben, És uralkodol az egy Istenségbe","b":"1. Mi szent Atyánk, ki lakozol mennyégben, És uralkodol az egy Istenségben, Szent Fiaddal, Lelkeddel dicsőségben Tiszteltetel földön és a mennyégben: \n2. Szenteltessék, Uram, a te szent neved, Dícsértessék mitőlünk, mert érdemled, Hogy ez éjjel minket te szent Felséged, Kegyelmesen őrizett Istenséged. \n3. A gonosznak tőribe nem eresztél, Sőt a te szent angyaliddal őrzettél, És álmunkból életben felköltöttél, Lelki, testi veszélytől megmentettél. \n4. Szent kezedbe ajánljuk mi lelkünket, Mai nap is tápláljad mi testünket, Védelmezzed, Uram, a mi éltünket, Lelki-testi veszélytől ments meg minket. \n5. Te vagy Uram, egyedül, mi Istenünk, menynyen, földön nincs nekünk több reményünk; Légy te azért, Uram Isten, pásztorunk, Szükségünkben táplálónk és oltalmunk. \n6. Kegyelmeddel tartóztasd meg lelkünket, Hogy bűnnel ne fertőztessük testünket; Világosítsd inkáb sötét elménket, Hogy megtartsuk, Uram, te szent törvényed. \n7. A te Szentlelked minket ösvényidben, Vezéreljen, Uram, szent törvényidben, Ma és életünknek minden rendiben, Hogy így hozzád juthassunk az egekben."},{"m":498,"r":425,"c":"Ki hívta az éjszakát elő, Hogy megnyugodjatok, Ti, a napnak terhét vis","b":"1. Ki hívta az éjszakát elő, Hogy megnyugodjatok, Ti, a napnak terhét viselő Testek és állatok? Ki fordította fényességre Az éjnek homályát? Ki hozta fel napját az égre, Hogy fusson új pályát? \n2. Te vagy az, ó mindenek Atyja, Mert a te kezednek, Mely az ég seregit forgatja, Nap és hold engednek. Téged hát imádni nem késünk És mihelyt hajnallik, Dícséret-mondó éneklésünk Buzgó szava hallik. \n3. Bézártuk volt, mikor aludtunk, Érzékenységinket; Mi magunkról semmit se tudtunk, De te tudtál minket. Ha felénk kár, vagy veszedelem Közelítni akart, A tenálad lakó kegyelem Oltalma betakart. \n4. A te erőd, ó Mindenható, Légyen nekünk ma is Minden életünk háborgató Gonosz ellen paizs! Légy segítőnk, ha munkálkodunk S igazán keresünk; Vígasztalónk, ha szomorkodunk, Atyánk, ha elesünk. \n5. Adjad, hogy tartsuk fődolgunknak Szent nevedet félni, hasznáért felebarátunknak Semmink sem kímélni. És szívünk szerint elfelejtsük, Ha megbánt valaki; A másoktól vett jót ne ejtsük Elménkből soha ki!"},{"m":499,"r":427,"c":"Megújult testtel és erővel Fölébredvén az álomból, Nyugodt szívvel, fe","b":"1. Megújult testtel és erővel Fölébredvén az álomból, Nyugodt szívvel, felemelt fővel Felkelvén csendes ágyamból, Életnek Ura, hozzád térek, Magasztalom jóvoltodat, Minden jót ismét tőled kérek: Kérem újra áldásodat. \n2. Mint a feljövő nap világa Elűzi az éj homályát: Kegyelmednek világossága Az igazságnak fáklyáját Sötét elmémben jobban gyújtsa, Hogy a jónak ismerete Határit benne meszszebb nyújtsa, S az igazság szeretete. \n3. Engedd, hogy mint a nap futása Soha meg nem állapodik, S bár felhő jő néha útjába, De meg nem homályosodik: Én is az igazság ösvényén Tántorodás nélkül menjek, És a rút testiségnek kényén Soha csak meg se pihenjek. \n4. Minthogy míg e világon élek, E mulandóságnak helyén, Test is vagyok, és nemcsak lélek: Viselj gondot jó idején Mértékletes eledelemről, Hogy életem fenntarthassam, S tisztességes öltözetemről, Hogy testemet ruházhassam. \n5. Ha pedig még többet vehetek Ingyen való jóvoltodból És másokkal is jót tehetek Velem közlött áldásodból: Engedd, hogy legyek hű sáfára Nálam letett javaidnak, Lehessek vigasztalására Velem testvér fiaidnak. \n6. Dolgaimnak követésére Adj testemnek egészséget, A bajoknak meggyőzésére Lelkemnek elevenséget! Indíts szívemben akaratot És készséget minden jóra, Hogy bennem vidám indulatot Leljen az estvéli óra."},{"m":500,"r":430,"c":"Krisztus, ki vagy nap és világ, Minket sötétségben ne hagyj! Igaz vilá","b":"1. Krisztus, ki vagy nap és világ, Minket sötétségben ne hagyj! Igaz világosság te vagy, Kárhozatra mennünk ne hagyj! \n2. Téged kérünk, szent Úr Isten: Oltalmazz minket ez éjen; Nyugodalmunk benned légyen, A mi lelkünk el ne veszszen! \n3. Nehéz álom el ne nyomjon, Az ellenség meg ne csaljon; Testünk hozzá ne hajoljon És haragodba ne hozzon! \n4. Mi szemeink ha alusznak, Szíveink rád vigyázzanak; Te hatalmadnak ereje Légyen híveid őrzője! \n5. Úr Isten, hozzád kiáltunk: Gondviselőnk, légy oltalmunk! Őrizz meg ellenségektől, Lelki, testi ínségektől! \n6. Parancsoljad angyalidnak, Hogy mireánk vigyázzanak; A mi gonosz ellenségünk Meszsze távol járjon tőlünk! \n7. Emlékezzél meg mirólunk: Jól tudod, mily gyarlók vagyunk; Kiket megváltál véreddel: Úr Jézus, kérünk, ne hagyj el! \n8. Dicsőség légyen Atyának, Ő szent Fiának, Krisztusnak, Szentlélekkel egyetemben, Örökkön-örökké! Ámen."},{"m":501,"r":429,"c":"Adjunk hálát az Úrnak, mert érdemli, Mert minden gazdagságát velünk kö","b":"1. Adjunk hálát az Úrnak, mert érdemli, Mert minden gazdagságát velünk közli. \n2. Ő, mint bő irgalmú kegyelmes Atya, Fiait testben, lélekben megáldja. \n3. Énekeljünk néki egy akarattal: Dicsőség, Atya Isten, szent Fiaddal! \n4. Ki ételt adtál alkalmas időben, S felruháztál mezítelenségünkben. \n5. Adjad, hogy tégedet megismerhessünk És szent Fiad által üdvöt nyerhessünk! \n6. Szent Igédet hirdettessed közöttünk, Hogy éhen meg ne haljon a mi lelkünk! \n7. Hálát adunk ezekért mi Atyánknak, Jézus Krisztusnak, mi Közbenjárónknak. \n8. Szentlélek Istennel egyenlőképpen, Ki minket vigasztaljon, mondjuk: Ámen."},{"m":502,"r":null,"c":"Fölkelt immár a szép hold, A csillagezres égbolt Oly tisztán tündököl;","b":"1. Fölkelt immár a szép hold, A csillagezres égbolt Oly tisztán tündököl; Az erdő áll sötéten, S fehér köd künn a réten Csodásan száll a légbe föl. \n2. Mély csend borult a földre, S mit alkony leple föd be, Meghitten integet, Mint nyájas, tiszta hajlék, Hol nappalodnak terhét Kialhatod, feledheted. \n3. Nem látod-é a holdat? Fél arca int, mosolyg csak, Pedig kerek, egész. Van sok, mit itt az ember nem lát jól földi szemmel, És oktalan nevetni kész. \n4. Mint gyenge, földi férgek, Kik bűn útjára tértek, Mi nem sokat tudunk, Sok csalfa képet űzünk, Sok furfangot kifőzünk, S a céltól csak meszszebb jutunk. \n5. Ó, add, üdvöd keressük, Ne a mulandót lessük, Ne kössön fénye meg; Hagyj egyszerűvé válni S előtted élni, járni, Mint vidám, boldog gyermekek. \n6. Ha jő a végső óra, Fordítsd a kínt is jóra. És adj szelíd halált; Ha innen elvezetsz te, Ó, hadd jutunk egedbe, Úr Istenünk és jó Atyánk!"},{"m":503,"r":null,"c":"Már nyugosznak a völgyek, Az erdők s minden földek, Már alszik a világ","b":"1. Már nyugosznak a völgyek, Az erdők s minden földek, Már alszik a világ, De míg eljő az álom, A szívemet kitárom, S az Úrhoz küldök hő imát. \n2. Ó, nap, hová tűnél el, Hová űzött az éjjel, Mely harcban áll veled? Te nem ragyogsz az égen, De más napom van nékem: Betölti Jézus szívemet. \n3. Már rám borul az éjjel, De biztatnak reménynyel Ott fenn a csillagok, Hogy engem is a mennybe Felvisz az Úr kegyelme, Ha a földtől megválhatok. \n4. A test nyugalmat áhít, És leveti ruháit, Halandóság jelit, De Jézusom az égbe’ Öltöztet dicsőségbe, Ha végórám elközelít. \n5. Ti, fáradt tagok, mostan Tegyétek le nyugodtan A napnak terheit. Vigadj, szívem, te is majd Levetheted a bút, bajt S a bűn terhét, mely keserít. \n6. Már álom jő szememre; Ki vigyáz életemre, Ha most elszunynyadok? Izráel őrizője Lesz házamnak védője: Nem érhetnek károk, bajok. \n7. Te légy, Jézus, oltalmam, Nálad lesz jó jutalmam, Hű szárnyaid alatt. Te vigyázz csak, Uram, rám, Nem árt akkor a Sátán: Testem-lelkem békén marad. \n8. Ti is távol s közelben, Akik szerettek engem: Békén pihenjetek; A sötét éjszakába’ Az Úr világossága Őrködjék hűn fölöttetek."},{"m":504,"r":433,"c":"A nap immár elenyészett, Az ég besötétedik, Nyugvóra vált a természet,","b":"1. A nap immár elenyészett, Az ég besötétedik, Nyugvóra vált a természet, És minden csendesedik; Engemet is az álom Megújít, feltalálom Fáradt testemnek nyugvását, Elmémnek megvidulását. \n2. Míg hát fejem lehajtanám A szükséges álomra, Gondjaim elbocsátanám, Menvén nyugodalomra: Gondviselőm, táplálóm! Jóságodat hálálom; Aki ma is úgy szerettél, Hogy sok jóban részeltettél. \n3. Adtál erőt, tehetséget, Adtál ösztönt a jóra, De vajon bennem készséget Talált-e minden óra? Magam is jól érezem, Hogy sokra nem érkezem, A lélek kész, ámde a test Sokszor tehetetlen és rest. \n4. Kegyelmednek köszönhetem E nagy ajándékot is, Hogy a jóra érezhetem Már csak a szándékot is. Amit azért kezdettél, Bennem felélesztettél, Kérlek, hogy félbe ne hagyjad, Sőt gyarapodását adjad. \n5. Bocsássad meg hibáimat, Melyeket ma ejtettem, Szaporítsad javaimat, Melyeket tőled vettem. Engedjed, hogy halálom, melynek a csendes álom Kiábrázoló példája: Légyen idvesség órája."},{"m":505,"r":434,"c":"Adjunk hálát megtartó Istenünknek! Ismét egy napját eltölténk éltünkne","b":"1. Adjunk hálát megtartó Istenünknek! Ismét egy napját eltölténk éltünknek, Melyen ő nékünk békességet adott, Gondviselő oltalmába fogadott; Megadá mindennapi kenyerünket, Megtartá erőnket, egészségünket. \n2. Ajánljuk magunk ismét oltalmába A már bekövetkező éjszakába’, Mert nem lehet annak semmi félelme, Akinek a Mindenható védelme; Az övéinek ő ád nyugodalmat, Akik csak benne keresnek oltalmat. \n3. Köszönjük, Uram, hogy mirajtunk ma is Gondviselésed volt hűséges paizs, Hogy megmentetted veszélytől éltünket, Szánkat panasztól, sírástól szemünket; Munkánkra áldást s elég erőt adtál, És az estére békében juttattál. \n4. Hányan, kik hoszszú életet reméltek Reggel tetőled: még estét sem értek; És egészségért sokan esedeztek, Kiket fájdalmak ágyukba szegeztek; Árvákká lettek sokan s özvegyekké, Vagy gazdagokból váltak szegényekké. \n5. Menynyivel voltunk mi ezeknél jobbak, Hű védelmedre menynyivel méltóbbak? Mégis te minket ím külön választál, Ránk semmi romlást, kárt, veszélyt nem hoztál; Hordozott ingyen nagy kegyelmességed: Áldunk örökké ezért, Uram, téged! \n6. Kérünk, ez éjjel is tartsd meg éltünket, Csendes álommal újíts meg bennünket, Több örvendetes reggelre virrassz fel, Új életre új napoddal támassz fel, Hogy új erővel tégedet szolgáljunk: Az Úrnak éljünk és az Úrnak haljunk."},{"m":506,"r":436,"c":"Jézus Krisztus, szentek reménye, Híveid gondviselője, Benned bízók sze","b":"1. Jézus Krisztus, szentek reménye, Híveid gondviselője, Benned bízók szent Istene! \n2. Áldattassék, Uram, szent neved, Mindenektől istenséged, Mitőlünk is azt érdemled. \n3. Kárhozattól ma is lelkünket, És veszélytől mi testünket, Megtartottad életünket. \n4. Ételünket és italunkat Megadtad, és munkáinkat, Megáldottad dolgainkat. \n5. Ez éjjel is mi életünket, Istenünk, a mi lelkünket, Ajánljuk néked testünket. \n6. Parancsoljad szent angyalidnak, Hogy azok tábort járjanak, Mi mellettünk vigyázzanak. \n7. A setétségnek fejedelme, Lelkünk-testünk ellensége: Ne ártson ördög serege. \n8. Jézus Krisztus, igazság napja: Ez éjszakában csillaga, Légy lelkünk fényes hajnala! \n9. Uram, virrassz fel egészségben, Lelki-testi békességben, Hogy reggel téged örömben\n10. Dícsérhessünk te szent Atyáddal, És a Szentlélek Istennel Tisztelhessünk teljes szívvel."},{"m":507,"r":null,"c":"Néked, menynyei Atyánk, hálát adunk, Szent fiaddal s Szent Lelkeddel i","b":"1. Néked, menynyei Atyánk, hálát adunk, Szent fiaddal s Szent Lelkeddel imádunk, \n2. Hogy minket e napon is megtartottál, Lelki, testi eledellel tápláltál. \n3. Bocsásd meg, kérünk, minden bűneinket, Mikkel ma is megbántottunk tégedet. \n4. Ez éjszakának is sötétségében Védelmezz minket minden gonosz ellen! \n5. Őrizz a Sátán nagy csalárdságától, És minden lelki-testi nyavalyától! \n6. Áldd meg csendességgel nyugodalmunkat: Örömmel érjük felvirradásunkat!\n7. Tarts meg bennünket mindvégig a hitbe', Holtunk után vígy az örök életbe!"},{"m":508,"r":null,"c":"Nagy hálát adunk, kegyes Atyánk, néked, Hogy te ez napon nékünk megeng","b":"1. Nagy hálát adunk, kegyes Atyánk, néked, Hogy te ez napon nékünk megengedted Nagy-szép békével élnünk teelőtted: Dicsőség Néked! \n2. Immár e napnak kimenetelében Néked könyörgünk, Atyánk, Igaz hitben: Segíts meg minket minden szükséginkben, Áldj meg lelkünkben! \n3. Hogy megnyugodjunk a mi munkáinktól, Törődésinktől és fáradságinktól, Néha pediglen mi nagy siralminktól És bánatinktól. \n4. Hogy tiszta szívből áldhassunk tégedet, Szép énekszóval dicsérjük nevedet, Józan elmével imádjunk tégedet Mint Istenünket. \n5. A sötét éjnek reánk jövésében Adjad, hogy lelkünk ne legyen sötétben, Sem pedig hitünk tökéletlenségben És tévelygésben. \n6. Ha a mi testi szemeink alusznak, Lelki szemeink reád vigyázzanak, A mi bűneink mind elaludjanak És meghaljanak. \n7. Tartsd, Atyánk, tisztán testünket, lelkünket, Őrizz meg bűntől álmunkban is minket, Az álnok ördög ne bírjon el minket Erőtleneket. \n8. Adj békességes nyugodalmat nékünk, És tennenmagad vigyázz, Urunk, értünk, Nagy-szép békével légyen felkelésünk, Teljes életünk. \n9. Tégedet kérünk, Istennek szent Fia! Néked könyörgünk, mi Urunknak Atyja! Hogy amit kérünk, Szentlelked megadja: Megkoronázza!"},{"m":509,"r":431,"c":"Ne jöjjön addig szememre álom, Míg Teremtőmnek és Gondviselőmnek, Kitő","b":"1. Ne jöjjön addig szememre álom, Míg Teremtőmnek és Gondviselőmnek, Kitől minden jó adományok jőnek, Jótéteményit meg nem hálálom. \n2. Ha elgondolom, menynyi jót vettem Tetőled, Atyám, méltatlan létemre: Csudálom, mint vigyázol életemre, Ki csak eltűrést sem érdemlettem! \n3. Áldalak, hogy e megrepedezett Nádszálat ma eltörni nem engedted; Gyarló életem híven vezérelted, Melyet sok veszély megkörnyékezett. \n4. Számnak mind étele, mind itala, Az ép elme az egészséges testben, Az öröm és a békesség szívemben: Ingyen való adományod vala. \n5. Kihez menjek több kegyelmet kérni? Szemem és szívem tehozzád emelem, Mert a tenálad lakozó kegyelem Mélységeit nem lehet megmérni. \n6. Bizton hajtom le fejem ez éjjel, Ha te, hű pásztor, tartasz engem szemmel, Így szemem nem lát s nem hallok fülemmel: Nem bánthat senki semmi veszélylyel. \n7. Légy hát őrállóm ez éjszakában! Hogyha tőreit útaimba hányja, Aki vagy vesztem, vagy károm kívánja: Ne menjen elő rossz szándékában. \n8. Adjad, hogy véghezvivén munkáim, Lelkem és testem újra erőt végyen, És nyugodalmam mértékletes légyen, Hogy munkára szánhassam óráim. \n9. Nem bocsátlak el, Atyám, tégedet, Míg meg nem áldasz engemet, fiadat: Dicsőítsd meg hát bennem irgalmadat, És én magasztalom Felségedet."},{"m":510,"r":null,"c":"Ó, lelkem szent napsugara! Ahol te vagy, nincs éjszaka. Bár földi köd","b":"1. Ó, lelkem szent napsugara! Ahol te vagy, nincs éjszaka. Bár földi köd szakadna fel, S látás elől ne fedne el. \n2. Ha csendes est szememre száll S szelíd álomharmat szitál, Gondoljam azt, Egyetlenem: Nyugodni jó a szíveden. \n3. Reggeltől estig légy velem, Nincs nálad nélkül életem; Légy velem, ha az éj leszáll, Nélküled rémít a halál. \n4. Ha egy bolygó, bús gyermeked Gúnyolta szód, mert tévedett, Ne hagyd bűnben, Kegyelmes, őt, Emeld fel azt a vétkezőt. \n5. Virraszd, akit kór súlya nyom, Ki koldus, áldd meg gazdagon; Kit kín szorít, gyász keserít, Légy álma, könynyű és szelíd. \n6. Jöjj és áldj meg, ha ébredünk S világ útján járunk-kelünk, Míg jóságod szent tengerén Majd elmerít az égi fény."},{"m":511,"r":null,"c":"Maradj velem, mert mindjárt este van, Nő a sötét, ó, el ne hagyj, Uram","b":"1. Maradj velem, mert mindjárt este van, Nő a sötét, ó, el ne hagyj, Uram; Nincs senkim és a vigaszt nem lelem, Gyámoltalannal, ó, maradj velem. \n2. Kis életem fut s hervadásba hull, Bú lesz a vígság, fényesség fakul, Csak változást és romlást lát a szem; Változhatatlan, ó, maradj velem. \n3. Minden múló perc Hozzád visz közel, Kegyelmed űzi kísértőmet el, Nincs más vezérem, Nincs más Mesterem, Fényben, borúban, ó, maradj velem. \n4. Ellenség ellen áldásod fedez, A könny nem sós, a kór is könynyű lesz, Sír, halál-fúlánk, hol a győzelem? Győztes leszek, csak légy, Uram, velem. \n5. Hunyó szemembe vésd keresztedet, Ködöt foszlatva láttasd szent eged. Föld árnya fut, menny fénye megjelen: Halálban is Te légy, Uram, velem."},{"m":512,"r":null,"c":"\"Szólj, szólj hozzám, Uram, mert szolgád hallja szó dat!\" Így mondom,","b":"1. \"Szólj, szólj hozzám, Uram, mert szolgád hallja szó dat!\" Így mondom, mert magam rég annak érezem. Hadd járjak utadon, hadd várjam égi jódat Hű szívvel szüntelen, hű szívvel szüntelen. \n2. Adj lelkedből erőt, hogy értsem és szeres sem Elrendelt utamat s minden parancsodat. Egy vágyat hagyj nekem: hogy halljam és kövessem Szent igazságodat, szent igazságodat. \n3. Nincs oly tudós sehol, ki megtanít utad ra, A bölcs nem fejti meg törvényedet sosem; Te fejted meg nekünk, te, hű szíveknek Atyja, Kinek szavát lesem, kinek szavát lesem. \n4. Te nagy csodáidról bár fennszóval beszél nek És fennen hirdetik felséges rendedet, Ha nem te szólsz, Uram, a szó fülig ha érhet, De szívig nem mehet, de szívig nem mehet. \n5. Szólj, szólj, én Istenem! - szól hangodból a jó ság, A lelkem megfeszül s a hallásban segít, És szódban meglelem az örökkévalóság Jó édességeit, jó édességeit. \n6. Szólj és csitítsd a bút, mert bú és kín gyötör nek, Szólj, hogy legyen szavad ír s gyógyító erő; Szólj, dicsőséged úgy még szebben tündökölhet, És mindörökre nő, és mindörökre nő."},{"m":null,"r":null,"c":"Himnusz","b":"1. Isten, áldd meg a magyart Jó kedvvel, bőség gel, Nyújts feléje védő kart, Ha küzd ellenség gel; Bal sors akit régen tép, Hozz rá víg esztendőt, Megbűnhődte már e nép A múltat s jöven dőt!","sp":1},{"m":null,"r":null,"c":"Szózat","b":"1. Hazádnak ren dület lenül Légy híve,  oh  ma gyar; Bölcsőd az s majdan  sí rod  is, Mely á pol s el ta kar. A nagy világon  e  kívül Nincsen szá mod ra  hely; Áldjon vagy verjen sors keze: Itt  él ned,  élned, halnod  kell. Áldjon vagy verjen sors keze: Itt  él ned,  élned, halnod  kell.","sp":1},{"m":null,"r":157,"c":"(Dicséret 157)","b":"Modus VII.","o":1,"g":1},{"m":null,"r":160,"c":"Ez új reggel arra serkent","b":"A 42. zsoltár dallamára: * Mint a szép hives patakra.\n\nEz új reggel arra serkent, Hogy minden istenfélő Így énekeljen: Szent,\nszent, szent, Amaz örökkéélő! Szent Isten, ez órákban, Melyben szentid\nházában, Dicséretet énekelünk, Légyen segítséged velünk!\n\nLengyel József 1770*1821","o":1},{"m":null,"r":161,"c":"(Dicséret 161)","b":"Kálmán Farkas.\n\nFejes István (1838*1923)","o":1,"g":1},{"m":null,"r":162,"c":"Uram, a töredelmes Szívet te szereted","b":"Haszler H. L. 1601.\n\nUram, a töredelmes Szívet te szereted, soha az engedelmes Lelket meg nem\nveted. Ezzel a reménységgel Tehozzád óhajtunk, Kérünk, légy segítséggel,\nKönyörülvén rajtunk.\n\nDiószeghi Sámuel","o":1},{"m":null,"r":165,"c":"Uram, szent segedelmeddel Dolgainkban állj mellénk","b":"A 25. zsoltár dallamára: * Szívemet hozzád emelem.\n\nUram, szent segedelmeddel Dolgainkban állj mellénk, És mennyei\nkegyelmeddel Új kegyelmet önts belénk: Hogy lelkünkkel, testünkkel\nDicsőségedre élhessünk, Minden tehetségünkkel, Uram, tégedet szeressünk.\n\nKovács József 1761*1830.","o":1},{"m":null,"r":166,"c":"Minden teremtett világok Az Úristent áldják","b":"A 205. dicséret dallamára: * Hozzád jövök ó, Mesterem.\n\nMinden teremtett világok Az Úristent áldják, Néki sok ezer angyalok\n„Szent, szent, szent\", azt mondják.\n\nBatthyány-kódex, XVI. század.","o":1},{"m":null,"r":175,"c":"E Húsvét ünnepnapja","b":"Húsvétra\n\nA 152. dicséret dallamára: * Szent Isten, noha néked...\"\n\nE Húsvét ünnepnapja, E Húsvét ünnepnapja Serkentsen dicséretre; Mert\nvallásunk főpapja, Mert vallásunk főpapja Feltámadt az életre.\nMegnyittatának Zárai a halál házának: Engedt a koporsónak Nagy köve,\nTeste a megváltónak Kijöve, Így a halált, mely eltemeté, Lába alá veté.\n\nFöldvári József 1766*1830.\n\nMennybemenetelre a 47. zsoltár 3. verse: Íme az Isten szépen felmegyen","o":1},{"m":null,"r":176,"c":"E pünkösd ünnepében","b":"Pünkösdre\n\nA 152. dicséret dallamára: Szent Isten, noha néked...\n\nE pünkösd ünnepében, E pünkösd ünnepében, Dicsérjük Istent szívvel, Ki\nSzentlelkét szívünkbe, Ki Szentlelkét szívünkbe Osztogatja bőséggel.\nEnnek örül föld, Tenger és a menny víg kedvében. Minden élő állatok, Sok\nrendben; Kik égben-földben vagynak, Sok részben Fák, füvek és minden\nvirágok Újulnak örömben.\n\nÖreg Graduál, 1636.","o":1},{"m":null,"r":180,"c":"Dicséret, dicsőség","b":"Záróének\n\n1. Dicséret, dicsőség, tisztesség és hálaadás, A szentek Urának legyen\nörök magasztalás, Kiben soha nincs megváltozás, Vagy ígérettől\nelhanyatlás, Tőle fejünkre szálljon áldás!","o":1},{"m":null,"r":187,"c":"Úristen, mely sokan vannak","b":"A 35. zsoltár dallamára: * Perelj Uram perlőimmel\n\n1. Úristen, mely sokan vannak, Kik engemet háborgatnak, És mindenkoron\nigyekeznek. Miként engem elveszthessenek. Én pedig egyedül vagyok, Nagy\nnyavalyámban jajgatok, Minden barátim elhagytak, És csak magokra\ngondolnak.\n\n2. Első ellenség a Sátán, Ki mint a sívó oroszlán, Utánam jár nagy\nálnoksággal, Hogy bényelhessen éh torkával. Mindenütt ellenem lest vet.\nMert tud ezer mesterséget, Ha egyikkel hiába jár. A másik által prédát\nvár.\n\n3. Gazdagsággal, dicsőséggel, Világi gyönyörűséggel, Félelemmel is\ngyakran kísért, Így hogy elmémben csaknem megsért. Honnan nehéz\ngondolatba, Lelkem esik nagy bánatba. Noha nem árthat ezzel is, Ugyan\nnem nyughatik mégis.\n\n4. Második e csalárd világ, Ki én szemem előtt villog, Gonosz példával\nés intéssel, Mind csak a gonoszra vezérel. Mosolyog reám édesen, Hogy\nengem hozzá hitessen, És vigyen a széles útra, Mely mégyen a rút\npokolra.\n\n5. Harmad ellenségem rongál, Ki még éjjel is nálam hál, És sokasítja\nnyavalyámat, Gyakran elszakasztja álmomat. Szüntelen int gonoszságra.\nLelkemet készti próbára, Az én gyarló természetem, Akiben én\nszülettettem.\n\n6. Úristen a gyors oroszlánt, Verd hátra e dühös Sátánt, Lelki fegyvert\nadj én kezembe, Ki ellen semmit ne tehessen. Ha álnoksággal vizsgál is,\nNe ártson nékem azzal is, Ne rettentsen erejével, Mellyel dühösködik\nszéjjel.\n\n7. Felséged engem megtartson, E világ, hogy ne árthasson, És ne járjak\na test kedvére, Hanem nézzek szent törvényedre. És ahhoz szabjam\néltemet, Mellyel nyerhessem kedvedet, És használjak feleimnek, Kik velem\ntéged féljenek.\n\nSzenczi Molnár Albert (1574*1634.)","o":1},{"m":null,"r":193,"c":"Vajha már itt bölcsőmben Lett volna koporsóm S esett volna a","b":"Dresden 1694.\n\n2. Vajha már itt bölcsőmben Lett volna koporsóm S esett volna a\nmennyben Kies helyen sorsom. Rút bűnük, Mint török Most nem bántanának,\nNem fojtogatnának.\n\n3. Rejtsetek el, ó hegyek! Ím jön az ítélet; Istenem, hová legyek?\nKárhozattól félek. Bűneim. Vétkeim Veszélybe döntenének, Halált\nérdemlének.\n\n4. Ne légy, szívem, kétséges Isten kegyelméről, Mert Krisztus\nelégséges. Drága érdeméből; Bátorít, Így szólít: Jöjjetek mindnyájan\nHozzám bízva, bátran.\n\n5. Bizonyára titeket Én megvigasztallak, Elveszem terheteket És\nmegnyugosztallak, Hogy könnyű, Gyönyörű Lészen néktek igám És az én\nkeresztfám.\n\n6. Azért én lelkem, örülj, Mert jutsz boldogságra. Jézusom megkönyörül\nS bevisz mennyországba. Nincs ott jaj, Nincs ott baj, Megszűnik a bánat,\nÁldom jó Atyámat!\n\nJ. G. Albinus 1624*1679 után","o":1},{"m":null,"r":194,"c":"Bűneimmel megbántottam","b":"Altdorf 1653.\n\n2. Bűneimmel megbántottam, Mégsem sújt le engemet, Sajnál, megbocsát,\nszeret. Nem sírok már elhagyottan. Átöleli őt karom: Jézusomat nem\nhagyom.\n\n3. Gyakran éltem terhe fáraszt, Sírok a kereszt alatt, Mely lenyomja\nvállamat, De ez tőle el nem választ, Orvosom ő s támaszom: Jézusomat nem\nhagyom.\n\n4. Jól tudom, hogy földi éltünk Árnyék csak s mulandó köd; Melyet a\nhomály beföd, Végre a halál jön értünk. Bár fejem sírba hajtom:\nJézusomat nem hagyom.\n\n5. Nem félek, ha eljön végem, Koporsóba leszállok, E világtól megválok,\nS nyugszom a föld mély ölébe, Jézus lesz fényes napom: Jézusomat nem\nhagyom.\n\n6. Ő kelt fel majd új életre, S bár az utolsó napon eléje kell állanom\nSzámadásra, ítéletre, Akkor is azt sóhajtom: Jézusomat nem hagyom.\n\n7. Kérlek, Jézusom, enyim légy, Míg feljutok az égbe, Mennyei\ndicsőségbe. Fejemre koronát te tégy, Jézus, én boldogságom: Jézusomat\nnem hagyom.\n\nFlittner János 1618*1678","o":1},{"m":null,"r":195,"c":"Kihez folyamodjam Kívüled Krisztusom","b":"1. Kihez folyamodjam Kívüled Krisztusom? Ily beteg voltomban Nincs\nkitől gyógyulnom. Ezer fekély rajtam, ki által tisztuljak? Veszélyes\nveremből Ki ád szabad utat?\n\n2. Gyújtsd meg szövétnekét Áldott szent igédnek, Virraszd fel lelkemben\nNapját kegyelmednek. Igaz ösvényt mutass Szegényednek, nékem, Hogy szent\nFelségednek Járhassak kedvében.\n\n3. Várlak, Uram, várlak Reménykedő szívvel, Miként a vigyázó Virradást\nvár éjjel. Reám is jó reggel Hozd fel szép napodat, Hogy serény elmével\nHoltig szolgáljalak.\n\n4. Szamaritánusként Borral s olajoddal Gyógyítsd sebeimet\nIrgalmasságoddal. Tébolygó juh vagyok, Tégy jót velem, kérlek, S nagy\nhálaadással Örökké dicsérlek.\n\nPécselyi Király Imre  1640 körül.","o":1},{"m":null,"r":197,"c":"Az Úr szent Bárányára leteszem bűnömet","b":"Roy Krisztina\n\n1. Az Úr szent Bárányára leteszem bűnömet, Szent keresztje aljába Nagy\nnyugalmat lelek. A szívem mindenestül az Úr elé viszem, Megtisztul\nminden szennytől a Jézus vériben, a Jézus vériben.\n\n2. Megtörve és üresen Adom magam neki, Hogy újjá Ő teremtsen, Az űrt Ő\ntöltse ki, Minden gondom, keservem Az Úrnak átadom, Ő hordja minden\nterhem, Eltörli bánatom, Eltörli bánatom.\n\n3. Örök kőszálra állva A lelkem megpihen; Nyugszom Atyám házába', Jézus\nkegyelmiben. Az Ő nevét imádom Most mindnek felett, Jézus, az én\nkirályom, Imámra felelet, Imámra felelet.\n\n4. Szeretnék lenni, mint Ő, Alázatos, szelíd, Követni híven, mint Ő,\nAtyám parancsait. Szeretnék lakni nála, Hol mennyei sereg Dicső\nharmóniába', Örök imát rebeg, Örök imát rebeg.\n\nRoy Mária * Halleluja\n\nVargha Gyuláné fordítása.","o":1},{"m":null,"r":200,"c":"Jézus, téged magasztalunk","b":"A 295. dicséret dallamára: * Óártatlanság Báránya.\n\n1. Jézus, téged magasztalunk, Megváltónknak hiszünk, vallunk, Te\nszemélyed csudálatos, Nincs más hozzád hasonlatos.\n\n2. Bírsz emberi természettel, Bűn nélküli valóval, Szenttel, Sőt e\nfelett valóságos Istenséged nyilvánságos.\n\n3. Mint ember, váltságunk végett Te vállalhatsz kezességet;\n\nMint Isten, elégtételed Végetlen becsre emeled.\n\n4. Téged az Atya eleve Mi bölcsességünkké teve, Te vagy nékünk\nigazságunk, Szentségünk, teljes váltságunk.\n\n5. A te hirdetőid voltak, Akik prófétálván szóltak, És a régi\npéldázások Reád való célozások.\n\n6. Jézus, rólad vallást teszünk, Közbenjárónknak béveszünk, Mert\nnincsen másban aidvesség, Csak tied ez\n\nLengyel József 1770*1821.","o":1},{"m":null,"r":202,"c":"Régi angol dallam","b":"Régi angol dallam.\n\n2. Mert boldog az az ember, ki dicsér tégedet, És kóstolgatja mindennap\nszent beszédedet; Hát legeltessed igéddel bolygó nyájadat, És\nterelgessed Lelkeddel juhocskáidat.\n\n3. Szentlelkedet töltsd ránk ki, mint hajnal harmatát, És adj fejünkre\ntőled nyert ékes koronát, Hogy áldozatra felgyúlt, megszentelt életünk\nOltárodon elégjen. Királyunk, Mesterünk.\n\nAlexandriai Kelemen ( 220) éneke után.","o":1},{"m":null,"r":205,"c":"Hozzád jövök","b":"Orüger J. 1656.\n\n1. Hozzád jövök, ó Mesterem, hogy halljam szavaid, és értsem örök\nbeszéded, mely megtart, idvezít\n\n2. Igéd csodás világánál Mutassa meg a hit, Te vagy a váltság egyedül,\nMely megtart, idvezít.\n\n3. A te erőd a halálból Az új életre híd, Hogy hozzád jussak rajta át,\nKi megtart, Idvezít.\n\n4. Hogy utaidon járhassak, Szent kezed megsegít, Csak te vezéreld\nlábamat, Te vagy, ki idvezít.\n\n5. Jól tudom, kinek hittem én S ez engem boldogít; Örökké áldom\nkegyelmed, Mely megtart, idvezít.\n\nKelemen Lídia * Hozsánna","o":1},{"m":null,"r":209,"c":"El ne hagyjuk a Bibliát Az égi szent Igét","b":"Haydn M.\n\n1. El ne hagyjuk a Bibliát Az égi szent Igét, Ez hű vezér az élten át S\na kárhozattól véd. Ez vak sötétben hű napunk, Mert éltet, fényt lövell,\nA Jézus áldott szent szavát Mi sohsem hagyjuk el.\n\n2. El ne hagyjuk a Bibliát, Ha bú vagy öröm ér; Bár gyakran csábít a\nvilág: Nem hagyjuk semmiért! E drága kincset nem veszi Mitőlünk senki\nel: Ez hinni tűrni megtanít És Istenhez emel.\n\n3. El ne hagyjuk a Bibliát! S
