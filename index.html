at.\n\n6. Ne tedd érccé, Úristen, Fejünk felett az eget És kemény vassá lábunk\nalatt a földet, Melyből várunk eledelt.\n\n7. Megszáradtak, Úristen, Mindenféle vetések, Mezők, rétek, vizek,\nmindenféle füvek Elvesztek és megégtek.\n\n8. Ne nézd, kérünk, Úristen, Számtalan bűneinket, Elődbe felhatott sok\ngonoszságinkat, Háládatlanságinkat.\n\n9. Megígérted, Úristen, Hogy meghallgatsz kértünkben, És adsz nékünk\nesőt alkalmas időben, Csak kérjük szükségünkben.\n\n10. Áldj meg minket, Úristen, Lelki és testi jókkal, Hogy élhessünk\nszépen háládatossággal, Drága ajándékiddal.\n\n11. Könyörülő Úristen, Mostani szükségünkben, Hallgass meg kegyesen,\nbuzgó kérésünkben, Adj örömet szívünkben.\n\nEső után","o":1},{"m":null,"r":445,"c":"Uram, ki vagy az eső atyja","b":"A 65. zsoltár dallamára: * A Sionnak hegyén, Úristen.\n\n1. Uram, ki vagy az eső atyja, Szülöd a harmatot, Szívünknek buzgó\nindulatja, Lelki áldozatot Viszen hozzád hálaadással, Hogy\nkönyörgésünket Meghallván, bő esőhullással Áztattad földünket.\n\n2. A mi elalélt határinkon Újult az ábrázat, Sárga mezeinken, fáinkon\nZöld lett a ruházat, Mihelyt jóltevő intésedre Kívánt eső érte. Térjen\náldás, Uram, nevedre És dícséret érte.\n\n3. Vidd előbb, Uram, ez áldásod, Adj másszor is esőt, Bátorítsa ily\nbiztatásod A kenyérkeresőt, Földünket itasd, amint elég, Az ég\nharmatjával, Ne bántsa azt a levegőég Semmi ártalmával.\n\n4. Uram, midőn külső vizeddel Áztatod földünket, Belől is lelki\nkegyelmeddel Nedvesítsd szívünket, Hogy a hit, hűség s szeretetnek\nÓhajtott gyümölcse Nőjön benne, s a szent életnek Mértékét betöltse.\n\nKeresztesi József (1748*1812)\n\nJégveréskor","o":1},{"m":null,"r":446,"c":"Rettenetes az Úrnak búsulása","b":"A 137. zsoltár dallamára: * Hogy a babiloni vizeknél ültünk.\n\n1. Rettenetes az Úrnak búsulása, Jajszót ád szánkba reánk jött csapása,\nOda van a mező ékessége, A szántóvetőnek reménysége Eltűnt, érkezvén\nnagy égi háború, Mely miatt minden szív méltán szomorú.\n\n2. Szélvész, villámlás, lett rettentő dörgés, El nem fordítá sok buzgó\nkönyörgés; A jegek mindent összetörének. Ki állhat ellent az Úr kezének?\nSzent igazságának felvont fegyvere, Bűneinkért keservesen megvere.\n\n3. Így mutogatja az Isten hatalmát: Nem mindig látjuk munkánknak\njutalmát. Az is, ami már vagyon kezünkben, Nem a miénk rövid életünkben.\nKi vagyunk téve a sok változásnak Ura a nagy Isten minden sorsoknak.\n\n4. Taníts meg verő kezedet imádni, Isten, bölcs utaidat megvizsgálni,\nHogy soha vétkes zúgolódásra, Vagy helytelen panaszkodásra Ne fakadjunk,\nsőt szenvedjük békével; Szabad az Úr minden teremtésével.\n\nBalogh Pál (1747*1833)\n\nŐsszel","o":1},{"m":null,"r":447,"c":"Embereknek teremtője","b":"A 102. zsoltár dallamára: * Hallgasd meg, Uram, kérésem.\n\n1. Embereknek teremtője, Hűséges gondviselője, Bölcs és hatalmas\nFelség, Imádandó Istenség! Te teremtettél bennünket, Te táplálod\néletünket gazdag étellel s itallal, Hozzánk illő ruházattal.\n\n2. Az érdemli bölcsességed, Uram, hogy tiszteljünk téged, Magasztaljuk\nnevedet, Áldjuk Istenségedet, Mert bár sok bűnökbe estünk, Mégis úgy\ntáplálod testünk, Hogy kenyérrel megújítod, Szívünk borral vidámítod.\n\n3. Méltatlanságunk ismerjük, De szent Felségedet kérjük, Bírjad arra\nszívünket S úgy igazgass bennünket, Hogy a bőven nyert áldással\nÉlhessünk hálaadással, S amíg jóvoltodból élünk, Szent Atyánk, légy\nmindig velünk.\n\nBacsó János (1764*1830)\n\nTélen","o":1},{"m":null,"r":448,"c":"Elmúlt az ősz","b":"A 77. zsoltár dallamára: * Az Istenhez az én szómat.\n\n1. Elmúlt az ősz, nyár, kikelet: Az Úr elhozta a telet, Melyben vannak\nhidegek, Havaznak a fellegek, Tűz mellé házba szorulunk Uram, hát Hozzád\njárulunk, Kérvén, hogy házainkban Te segíts munkáinkban.\n\n2. Adjad, hogy amit kerestünk, Mértékletes bőségben És házi\ncsendességben; Téli hosszas éjszakákat És az unalmas órákat Ne töltsük\naluvással, Vagy csak hivalkodással.\n\n3. Inkább dicső munkáidról Elmélkedjünk dolgaidról, Szent házad'\ngyakoroljuk, És ezzel azt pótoljuk, Amit mulasztottunk nyárban, Hogy ha\nestünk lelki kárban, Uram, add, hogy szeressünk, Kétszeresen keressünk.\n\n4. A tél földünket készítse, Zsírjával megkövérítse A jövendő termésre\nÉs bő gyümölcsözésre. Majd úgy nyíljon ki kebele, Hogy mindennek eledele\nAbból bőven adassék, Neved magasztaltassék.\n\n5. Uram, ki a mi testünkre Ruhát adsz melegségünkre, Lelkünket is\nmelegítsd Lelkeddel, s jóra segítsd. Szent fiad igazságával Fedezz\nártatlanságával, Hogy ha eljő véletlen, Ne találja fedetlen.\n\n6. Ezt is tegyed, Uram, velünk Hogy ha ez élet oly telünk Lészen, mely\nbánatot oszt, S a földi jóktól megfoszt: Azt is tűrjük el békével\nLelkünknek ily reményével, Hogy örök tavaszt érjünk, Melyben bút nem\nismérünk.\n\nKeresztesi József (1748*1812)\n\nTemplomszenteléskor","o":1},{"m":null,"r":449,"c":"Nagy Isten","b":"A 33. zsoltár dallamára: * Nosza, istenfélő szent hívek.\n\n1. Nagy Isten, téged az egeknek Egei be nem foghatnak, Sem a legélesebb\nszemeknek Látási addig nem hatnak, Nem hogy befoghatna Vagy szállást\nadhatna Ily szűk palota, Melyet a halandó Összeroskadandó Sárból alkota.\n\n2. Építettünk mi is hajlékot, Mert szent szerelmed ösztönzött, Hogy\ndicsőséged lakozzék ott, A megszentelt falak között. Ó, mennyeknek Ura,\nE por és hamura Nézz kegyelmesen, Fogadd el házadnak, Szenteld meg\nmagadnak, Hogy szent lehessen.\n\n3. Világi foglalatosságok E helyhez ne férkőzzenek, Hol a mennyei\nigazságok, Szent szövétneki fénylenek, Ne lakjék e helyben Oly tudomány,\nmelyben Van földi salak, Csak a megfeszített Jézustól vett hitet Hallják\ne falak.\n\n4. Atyánk, ha innen az egekre Könyörgésink emelkednek, Nyisd meg az oly\nzörgetésekre Ajtajait kegyelmednek. Ha jő oly fájdalmas, Ki bánat\nsiralmas Poharát issza, Kevés idő múlva Térjen megvidulva E házból\nvissza.\n\n5. Te adj szólni a hirdetőnek, Hadd szóljanak hatalmason, Hogy szent\nbeszéded a velőknek Megoszlásáig behasson, Melyre felserkenjen És más\nútra menjen A bűnben élő, Éledjen lelkében, Jó reménységében Az\nistenfélő.\n\n6. Midőn ide gyűjti vendégit Ama juhok nagy pásztora, Töltse be\nlelköknek éhségit Az itt adandó vacsora, Midőn csecsemőket,\nKeresztelendőket, Hozunk elődbe: Szent Isten, azokat Mint választottakat\nVedd fel öledbe.\n\n7. Vigyázzatok a te szemeid Ez imádságnak házára, Ne jöjjenek ítéleteid\nEnnek elpusztítására. Kedvezz e templomnak, Hogy sok embernyomnak Még\nunokája, Lelke szükségéhez Képest, amit éhez, Itt megtalálja.\n\nLengyel József (1770*1821)\n\nLelkipásztor beiktatásakor","o":1},{"m":null,"r":450,"c":"Ó, Isten, aki pásztorokat Híveid nyájába","b":"A 65. zsoltár dallamára: * A Sionnak hegyén, Úristen.\n\n1. Ó, Isten, aki pásztorokat Híveid nyájába, Magad rendeltél tanítókat\nAz eklézsiába, Áldattassék Uram, Felséged, Hogy idevességünkről Így\ngondoskodott bölcsességed Örök életünkről.\n\n2. Ím, e mi gyülekezetünk is Áld és dicsér Téged, Mert lelkipásztort\nminékünk is Parancsolt Felséged, Ki szent igéd tiszta tejével Táplálja\nlelkünket, Az igazságnak beszédével Tanítván bennünket.\n\n3. Szenteld meg hát, ó szentek Szentje, Ez egyházi szolgát, Hogy áldott\nlegyen ki s bémente, Úgy igazgasd dolgát. Szenteld meg szívét, nyelvét,\nszáját Tanításaiban, Hogy jól vezérelhesse nyáját Az Úr utaiban.\n\n4. A tudatlanokat tanítsa, Az erőtleneket Erősítse, intse, buzdítsa, A\nlágymelegeket. Kötözgesse bé a sérelmes Szíveknek sebeit, Oszlassa s\nűzze a félelmes Lelkek kétségeit.\n\n5. Áldj meg, Uram, minket is egész Figyelmetességgel, Hogy bévehessük\naz igét kész Engedelmességgel. Ne hagyd, hogy tőlünk visszatérjen\nBeszéded üresen, Sőt inkább szíveinkben mélyen Meggyökerezhessen.\n\nSzakács Mihály (1770*1822)\n\nÚjévkor","o":1},{"m":null,"r":455,"c":"Örökkön örökké élő","b":"A 102. zsoltár dallamára: * Hallgasd meg, Uram, kérésem.\n\n1. Örökkön örökké élő. A változástól nem félő Jehova, mi Istenünk,\nKitől vagyon mindenünk! Nincsenek neked napjaid, Esztendeid s hónapjaid,\nAzért azok nem avulnak, Reád nézve nem újulnak.\n\n2. De a mi földi létünknek, Testi gyarló életünknek, Valamint volt\nkezdete, Úgy lészen végezete. Olyanok vagyunk, mint a pára, Mely eltűnik\nnemsokára. Megemésztjük esztendőnket, Hamar eltöltjük időnket.\n\n3. Ezt mutatja ez esztendő, Nemkülönben a jövendő, Hogy nincsen\nállandóság, Hanem változandóság. Ez esztendő is elfuta, És végső napjára\njuta. Vajha úgy töltöttük volna, Hogy a lelkünk ne vádolna.\n\n4. Jaj, de ha jól elgondoljuk, És valóban megfontoljuk Eltöltött\nélet0nket, És cselekedetinket: Bizony méltó szomorkodnunk, És Isten\nszerint bánkódnunk, Mert visszaéltünk időnkkel, Közelebb ez\nesztendőkkel.\n\n5. Isten, a Jézus véréért, Becses elégtételéért, Bocsásd meg bűneinket,\nÉs minden esetinket. Cselekedd, hogy úgy élhessünk, A bűnöknek véget\nvessünk. Múlt esztendei hibánkat Engedd el, kérünk, Atyánkat.\n\nBátori István (1741*1833)","o":1},{"m":null,"r":458,"c":"Ebben minden változandó","b":"Debrecen 1791.\n\n2. Ebben minden változandó, Ígérete nem állandó, El hát tőle könnyen\nváltam, Azt megnyertem, amit vártam.\n\n3. Vének, ifjak és gyermekek, Mind gazdagok, mind szegények. E világnak\nfényességét, Ne óhajtsátok szépségét.\n\n4. Elmúlik ez, mint a pára, Semmivé lesz utoljára; De boldog az, kinek\nbére Leszen az Úr Jézus vére.\n\n5. Ennek drága érdemére, Minden nézzen erejére: Hogy láthasson\nboldogságot, Holta után mennyországot.\n\nDebrecen 1698.","o":1},{"m":null,"r":459,"c":"Az Isten országa mindig nyitva áll","b":"Debrecen 1791\n\n2. Az Isten országa mindig nyitva áll, A Krisztus szüntelen ott téged\nis vár Vigyázz, hogyha téged szólítani kíván: Légy kész, hogy számot adj\nbármelyik órán.\n\n3. Ne nézd bűneidnek nagy súlyos voltát, Kérjed az Istennek\nirgalmasságát; Minden nap sirasd meg bűnöd rútságát, Úgy majd remélheted\nAtyád irgalmát.\n\n4. Serkentsd fel hát, kérlek, ember, magadat, S hagy el jó idején bűnös\nvoltodat; Ne add dobzódásra ifjúságodat, Vénségedre ne hagyd\nálnokságodat!\n\n5. Hogy mikor a Krisztus jő halálodra, Akkor te lelkedet készen\ntalálja: És ő szent Atyjának azt beajánlja Végtelen örömmel meg\nkoronázza!\n\nDebrecen 1698.","o":1},{"m":null,"r":460,"c":"Eljött időm végórája","b":"A 102. zsoltár dallamára: * Hallgasd meg, Uram, kérésem.\n\n1. Eljött időm végórája, Célt ért futásom pályája, Mind leraktam\nterhemet, A sír nyugtat engemet. Lelkem Istenéhez tére A szenteknek\nörömére, Hűségének koronája Mennyországban vár reája.\n\n2. Ínségnek és fájdalomnak Súlyos terhei nem nyomnak; Ne sírjatok\nérettem, Menny polgárává lettem, Harcom nyert óhajtott véget, Az\nIstennél békességet, Kit a huszonnégy vénekkel Dicsérek angyal-énekkel.\n\n3. Az Úr nevében végtére Szállok sírom éjjelére, Koporsómnak fenekén\nNem soká pihenek én, Mert leszállsz poromba vélem, Édes Jézusom,\nGoélem#, Szent Atyádnál fönt a mennyben Szót emelsz majd én érettem.\n\nPápa 1841.","o":1},{"m":null,"r":462,"c":"Örülj lelkem","b":"A 42. zsoltár dallamára: * Mint a szép híves patakra.\n\n1. Örülj lelkem, teljes szívből, Felejtsd el minden búdat, Mert e\nsiralom völgyéből Krisztus hív és jobb utat Mutat neked örömre, Ama nagy\ndicsőségre, Melyet soha nem hallottál, És szemeiddel nem láttál.\n\n2. Éjjel-nappal fohászkodtam Az én jó Istenemhez, Mivel itten\nnyomorgottam, Hogy már venne kezéhez, Bújdosó mint óhajtja, Hogy véget\nérne útja, Úgy én is életem végét Vártam s lelkem idvességét.\n\n3. Ó, Úr Jézus, fényes csillag, Akire hitem tekint, Ne hagyj most el,\ntéged hívlak, Te szenvedtél értem kint, Segíts, hogy már csendesen\nLelkem hozzád mehessen, Ó, légy utam, légy világom, El ne hagyj, légy\nboldogságom.\n\n4. Érdemedhez folyamodom Halálomnak óráján, Te sebeid által, tudom.\nEljuthatok jó korán Ama paradicsomba, Mennyei országodba, Biztatsz a\nmegtért latorral, Dicsőítesz boldog sorral.\n\n5. Ha szemeim sötétednek, Füleim nem hallanak, Nyelvem nem felel\nbeszédnek, Értelmim megbomlanak: Te vagy utam s világom, Szentségem s\nigazságom, Te, ó, Jézus, fogd kezemet, Végy fel magadhoz engemet.\n\n6. Szent angyalid hadd vigyenek, Mintegy Illés-szekerén, Oltalmamra\nhadd legyenek, Mint Lázárnak, felvivén Szegény lelkem kebleden, Hogy\nnyugodjék örömben, Míg testem életre derül És vele újra egyesül.\n\n7. Örülj, lelkem, teljes szívből, Felejtsd el minden búdat, Mert e\nsiralom völgyéből Krisztus hív és jobb utat Mutat néked örömre, Ama nagy\ndicsőségre; Ott örökké örvendezhetsz, Angyalokkal zengedezhetsz.\n\nDebrecen 1698.\n\nGyermek felett","o":1},{"m":null,"r":463,"c":"A 459. ének dallamára","b":"A 459. ének dallamára: * Vigyázz halálodra halandó ember.\n\n1. Mint a rózsa, melyet sért a meleg szél, Hirtelen elhervad és tovább\nnem él: Úgy a halál e szép kertnek virágát Meghervasztván, ím eloltá\nvilágát.\n\n2. De az Úrnak az volt bölcs rendelése, Hogy lelkének lenne hozzá\nmenése: Ne bújdosna e siralom völgyében, Sőt venne részt a menny\ndicsőségében.\n\n3. Hát az Úr tetszésén megnyugodjatok, Keseredett szülők! ne\nbánkódjatok: Az Úr adta néktek őtet, tudjátok, Azért ajándékát\nvisszaadjátok!\n\n4. A nagy Istent hogyha szívből félitek, Áldását tőle újra elveszitek;\nSzent orcáját ti reátok fordítja: Kegyelmével házatok megújítja.\n\nDebrecen 1791.\n\nIfjú felett","o":1},{"m":null,"r":465,"c":"A fájdalmak éles nyilai Leverék az én erőmet","b":"A 33. zsoltár dallamára: * Nosza istenfélő szent hívek.\n\n1. A fájdalmak éles nyilai Leverék az én erőmet; Elfogytak már éltem\nnapjai, Nem számlálom többé őket. Lehunytak szemeim, Minden tetemeim\nMegmerevedtek, Testemnek erei, Nyelvem kerekei Lekötöztettek.\n\n2. Ó, életemnek s halálomnak Szabados Ura, Istenem, Hogy már én is\nsötét síromnak Fenekére letétettem: Ebben megismérem, Örökké dicsérem\nGondviselésed; Így látta ezt jónak, Hasznomra valónak Te szent Felséged.\n\n3. Már lelkem dicső széked körül A megboldogult lelkekkel Szent színed\nlátásának örül, És dicséretet énekel; Bánat, keserűség, Vagy másféle\nínség, Többé nem éri, A váltság bérének, Jézusom vérének Hasznait érzi.\n\n4. Hiszem, hogy egy napon poromat Újra megeleveníti; Lelkemmel testi\nsátoromat Az Úr ismét egyesíti. No hát bocsássatok, Ne szomorkodjatok,\nKik szerettetek: Majdan idő múlva Ismét megújulva Megölelhettek.\n\n5. Vigyázzatok, élő halandók, Készítsétek magatoka,t Látjátok, napjaink\nmulandók, töltsétek hát jól azokat, Az egy megfeszített Jézustól vett\nhitet Híven valljátok: Így ha majd a halál Elkész0lve talál, Lesztek\nboldogok.\n\nDebrecen 1819.","o":1},{"m":null,"r":466,"c":"Adj Uram, csendességet Sokat szenvedett testemnek","b":"Pápa 1841.\n\n2. Adj Uram, csendességet Sokat szenvedett testemnek, Adj örök\nüdvösséget Tebenned bízó lelkemnek, Testemet pedig majd végre Állítsd\nlelkemmel elédbe.\n\n3. Ilyen jó reménységgel Hajtom fejem nyugalomra, Jól tudom, hogy az\négben Rátalálok Jézusomra. Megfutottam már pályámat, Add meg, Uram,\nkoronámat.\n\nPápa 1841.","o":1},{"m":null,"r":468,"c":"Végső órám már elértem","b":"A 42. zsoltár dallamára: * Mint a szép híves patakra.\n\n1. Végső órám már elértem, Koporsómba neszálltam, Nyugodalmamba\nmegtértem, Minden gondtól megváltam. Elhagyom e világot, S minden\nviszontagságot; Több változást nem esmérek, Már csendes révpartot érek.\n\n2. Boldogságom abban leltem, Szent Isten, ez életben, Néked híven\nénekeltem, E szent gyülekezetben. Új, mennyei hazámban, Új éneket adj\nszámba, Hol a huszonnégy vénekkel Zengjek szép dicséretekkel.\n\n3. Itt rebegő volt énnekem, S teljes fogyatkozással, De te légy\nirgalmas nékem, Nézz rám szánakozással! Ott a Bárány nevében Bízván és\nérdemében, Dicsérlek szent buzgósággal, Erővel, hathatósággal.\n\n4. Erre méltóztatol, hiszen, Szent Fiad érdeméért, Énnekem elődbe\nviszem Jézusomnak kedvéért. S ha eddig szomorú volt És nagy keserveket\nszólt: Változik örvendetesre, Vígra és dicsőségesre.\n\nDebrecen 1819.\n\nÚti énekek","o":1},{"m":null,"r":470,"c":"Ó, boldog, ki jó órába' Juthat Isten országába","b":"A 84. zsoltár dallamára: * Ó, seregeknek Istene.\n\n1. Ó, boldog, ki jó órába' Juthat Isten országába, Oda, hova már mily\nsok szentek Száz esztendők után mentek, S gondjaiktól lettek mentek:\nSiessünk mi is, amíg várnak, Mert ha késünk, majd kizárnak, S okai\nleszünk e kárnak.\n\nDebrecen 1819.","o":1},{"m":null,"r":475,"c":"Hát mégis hogy vagyon","b":"Crüger J. (1653.)\n\n2. Hát mégis hogy vagyon, Ember, hogy ily nagyon Világba merül? Hogy\ngyűjtsön jószágot, Kincset, méltóságot, Fut, fárad, kerül. Minden dolgát\nahhoz szabja, Hogy világnak légyen rabja.\n\n3. Ó, ha meggondolná, Ember megfontolná Éltének végét! És minden\ndolgában Forgatná magában Nagy rövidségét: Bizony, e világ szépségét,\nMegútálná ékességét!\n\n4. Nézd el: a virágok, Tavaszi újságok, Mint illatoznak! De ha ősznek\ndere Megüti, végtére Mind elváltoznak, Kórók lesznek, megavulnak,\nHirtelenséggel elmúlnak.\n\n5. Embernek is élte, Mint virág szépsége, Hamar elromlik; Rövid az\nideje: Tíz, húsz esztendeje S azzal elmúlik: Akár gazda, akár szolga,\nMenni kell, ha üt az óra.\n\n6. Nohát ezt felvégyed És szívedre tégyed: Rövid az élet! Légy\nmindenkor készen, Amíg meg nem lészen A nagy ítélet, Ne szabd magad e\nvilághoz, Földi, veszendő jószághoz!\n\n7. Mert bizony múlandó, Dolga nem állandó Földi világnak, Mint zöld\nlevelétől, Virágos színétől Megkopott ágnak, Ha ma színes ábrázatja,\nHolnap homály borítja.\n\n8. Míg hát tart ittléted, Ezt eszedbe végyed S bölcsen forgassad, A\nbűnt gyökerestől, Szívedből tövestől, Hogy kiszaggassad, Hogy juthass a\nboldogságra, A romolhatatlanságra.\n\nDebrecen 1698.","o":1},{"m":null,"r":476,"c":"Búcsút vennem el kell mennem e földről nékem","b":"Debrecen 1791.\n\n1. Búcsút vennem el kell mennem e földről nékem: Fényességben,\ndicsőségben lesz ülőszékem, Jézusom kebelébe, Rejtezem szent ölébe,\nFájdalmidtól, siralmidtól szűnj meg hát lelkem!\n\n2. Ott vígságom, boldogságom végnélkül leszen, Angyalokkal, boldogokkal\nörömöt veszen; Én lelkem lesz vígságban, Mert ő ártatlanságban,\nJézusának, Főurának már szolgál készen.\n\n3. Sátoromat, hajlékomat sírba helyezem, Szép pálmámat, koronámat,\nfejemre teszem; Amiért könyörögtem, Azt örömmel elvettem: Mennyországba,\nboldogságba, mert felvitettem.\n\n4. Hát kedvesim, szerelmesim már ne sírjatok! A válásban, búcsúzásban\nmegnyugodjatok! Tőlem ugyan elváltok, De míg utánam juttok: Az Úr lelke\nés kegyelme legyen rajtatok!\n\nDebrecen 1791.","o":1},{"m":null,"r":480,"c":"Zokog a keserves szüle","b":"A 42. zsoltár dallamára: * Mint a szép híves patakra.\n\n1. Zokog a keserves szüle, Elalél bánatjában, Mikor kisdede, kit szüle,\nSzáll a földnek gyomrába, A sírba lehajolva, Kezét összekulcsolva,\nKönnyözönét úgy árasztja, Szívét csaknem elolvasztja.\n\n2. Ó, bánat miatt elbágyadt Szülő a nyílt sír felett, Nézd ezt úgy,\nmint vetett ágyat, Mint anyai kebelet, Melyben, aki elalél, Csendes\nmegpihenést lél, Ott találja meg a helyét, Ahová lehajtsa fejét.\n\n3. Légy hát úgy elcsendesedve, Mint mikor életében Édesdeden\nszenderedve Aludt a bölcsőjében, Ha akkor ébredését Vártad és\nfelkelését: Várd itt is, mert a meghalás Nem más, hanem mély elalvás.\n\n4. Majd mikor a sír fölébe Áll az a Jézus, aki Gyermeket vévén ölébe,\nAzt nyilatkoztatta ki: Ilyenek a mennyei Haza örökösei, Felveszi őtet\nkezére, Szíved teljes örömére.\n\n5. Ó, föld, amelynek kebele Az ily ártatlanoknak, Sok ezreivel van\ntele, Viseld gondját azoknak! Míg ama dicső reggel Az angyalok sereggel\nMegjelenvén, számon kérik, S az égbe hazakísérik.\n\nDebrecen 1819.","o":1},{"m":null,"r":481,"c":"A 475. ének dallamára","b":"A 475. ének dallamára: * E világ mióta.\n\n1. Immár gyarló testem, Mint magot elvetem, A sírba szállok; Mit félsz\nide menni, Ótest, s porrá lenni? Tört az út, látod. E sötétben nem magad\nvagy, Itt van úr, szolga, kicsiny s nagy.\n\n2. A koporsó s a sír, Mely már testemmel bír, Az Úr ágya volt; Szent e\nsötét sírbolt, Jézus is benne volt, De feltámadott; E hely csak útjokba\nesik, Kik a jobb hazát keresik.\n\n3. Nem marad későre, A rendelt időre Fogságom lejár; Jézusom hatalma,\nFényes diadalma Megtör, ó halál, Testem újra megépíti, Porból\nmegeleveníti.\n\nDebrecen 1790.","o":1},{"m":null,"r":483,"c":"Már oda térek","b":"A 23. zsoltár dallamára: * Az Úr énnékem őriző pásztorom.\n\n1. Már oda térek, honnan testem vettem. Porrá kell lennem, mivel porból\nlettem, Azért testemet a porba tegyétek, Habár tetemim, férgek,\nmegegyétek, De hiszem, hogy ha eljö amaz óra, Feltámad testem vég\ntrombitaszóra.\n\n2. Ezen testemben akkoron megállok, Azért örömest a sírba leszállok,\nBátran elmegyek az élőknek útján, Semmit nem félvén haláltól ezután,\nSemmi veszélytől magamat nem féltem, Melyben forgottam, míg e földön\néltem.\n\n3. Nyugodj hát, testem, ítélet napjáig, Eljő a Krisztus, nem késik\nsokáig; Akkor a porból testemet felveszi, Dicső testéhez hasonlóvá\nteszi; Te, lelkem, térj be az Úr örömébe, Hol Ábrahámnak nyugodj\nkebelében.\n\nDebrecen 1791.","o":1},{"m":null,"r":486,"c":"Rettentő lesz az ítélet","b":"Debrecen 1791.\n\n2. Rettentő lesz az ítélet, Ó, bírám, ha megítéled Szigorúan mind a\nnépet.\n\n3. Tompán pattan sírok zára, S az ítélet trombitája Trón elé hajt,\nnépek nyája.\n\n4. Természet s halál remegnek, A halottak amint kelnek, S a kérdésre\nmind felelnek.\n\n5. Immár a könyv tárva-nyitva, ahol nyilván föl van írva Minden ember\nszíve titka.\n\n6. Ami itt volt elrejtetten, Kiviláglik akkor rendben, Nem marad bűn\nbüntetlen.\n\n7. Én szegény, ott szót hogy ejtek? Kárhozattól ott ki ment meg, Hol a\njók is úgy reszketnek?\n\n8. Mennynek, földnek szent Fölsége, Népek örök üdvössége, Rejts\nirgalmad tengerében!\n\n9. Uram Jézus emlékezzél, Hogy érettem földre jöttél Ne vess el, Kit\nmegmentettél.\n\n10. Bűnöm súlya ím, alányom, Elpirulva mélyen bánom, Légy kegyelmes, én\nkirályom!\n\n11. Töredelmes szívvel kérlek, Porba hullva: ó, segélj meg, El ne\nvesszek, hanem éljek!\n\n12. Állas engem juhok felől És válassz el gödölyéktől Hogy láthass jobb\nkezed felől.\n\n13. Ó, nap, napja siralomnak, Nyílik zára sírhalomnak, Föltámadnak mind\na holtak.\n\n14. Akkor Isten, tégy irgalmat! Kegyes Jézus, nyújts oltalmat És adj\nörök nyugodalmat!\n\nCelano Tamás latin himnuszából\n\nXIII. század\n\nDebreceni halottas könyv 32.","o":1},{"m":null,"r":488,"c":"Isten velünk","b":"1. Isten velünk, viszontlátásra! Boldog útjain kegyesen, Hű kezével Ő\nvezessen, Isten velünk, viszontlátásra! Hogyha már itt a földön nem, de\ntalálkozunk odafenn. Isten velünk viszont látásra! Isten velünk! Viszont\nlátásra!\n\n2. Isten velünk! Viszontlátásra! Halálon győztes Jézusom Feltámaszt\nmajd a végnapon. Isten velünk! Viszontlátásra! Ebben van minden\nvigaszom: Véle vár rám az irgalom. Isten velünk! Viszontlátásra! Isten\nvelünk! Viszontlátásra!\n\nDallam és az 1. vers: Árokháty Béla, a 2. vers: Osváth Viktor\nszerzeménye.\n\nTemetés után","o":1},{"m":null,"r":489,"c":"Maradj velünk","b":"A 430. dicséret dallamára: * Krisztus, ki vagy nap és világ.\n\n1. Maradj velünk, mi Krisztusunk, Feltámadott fényes napunk, Mert már a\nnap ím alkonyul S az éjszaka reánk borul.\n\n2. Méltatlanul, ha szenvedünk, Ha siralom az életünk, Ha a halál\nhozzánk közel, Te légy velünk, Jézus, jövel!\n\n3. Nincs elhagyva, ki búban él, Bár örömet már nem remél, Mert teveled\nvigaszt talál, Ott, hol nincs éj és nincs halál.\n\n4. Már a halál nem lesz örök, Diadalma már megtörött, A sírban is lesz\nvirradat, Mert a Jézus velünk marad.\n\n5. Ha az éjjel reánk borul, Földi napunk, lealkonyul: Maradj velünk, mi\nKrisztusunk, Te légy mindig fényes napunk!\n\nKolozsvár (1928)","o":1},{"m":null,"r":490,"c":"Velem vándorol utamon Jézus","b":"1. Velem vándorol utamon Jézus, Gond és félelem el nem ér. Elvisz,\nelsegít engem a célhoz, Ő, a győzelmes, hű vezér, Ő, a győzelmes, hű\nvezér.\n\n2. Velem vándorol utamon Jézus, Bár az út néha oly sötét, Sohasincs\nokom félni a bajtól, Amíg irgalmas karja véd. Amíg irgalmas karja véd.\n\n3. Velem vándorol utamon Jézus, Ez a vigaszom baj ha jő, Bármily\nsúlyosak rajtam a terhek, segít hordani, ott van Ő. Segít hordani, ott\nvan Ő.\n\n4. Velem vándorol utamon Jézus, Túl a sír sötét éjjelén, S fenn a\nmennyei angyali karban, Nevét végtelen áldom én. Nevét végtelen áldom\nén.","o":1},{"m":null,"r":491,"c":"*1.* Búsan zúgnak a harangok","b":"*1.* Búsan zúgnak a harangok, Mintha velünk sírna hangjok; Óh, mert\nvégső harcát vívja Szent vallás felkent bajnoka.\n\n2. Aki teljes istenséggel Megharcol a sötétséggel: Már keresztet vesz\nvállára, S halni megy a Golgotára.","o":1},{"m":null,"r":492,"c":"Óh Úr Jézus mennyi bánat","b":"1.Óh Úr Jézus mennyi bánat, Mennyi sóhaj száll utánad, Az örök gyász e\nnapján, Míg ott függesz a keresztfán! Keresztedre búsan nézünk, Érted,\nveled mi is vérzünk, Mert miattunk omlott véred, Bűneinkért lett ily\nvéged.\n\n2. Sírva nézzük gyötrődésed, Sírva halljuk könyörgésed, Mely Atyádhoz\nértünk szállott, Fájt a lelked, mégis áldott! Átvert tested még\nvonaglott, Ajkadon bocsánat hangzott, És a népre átok helyett Áldást\nesdett nagy szerelmed.\n\n3. Te, ki Isten Fia voltál, Életeddel így áldoztál; Hirdetted a\nbékességet, A halálra vitt az téged! **Ó,** Úr Jézus, kik itt állunk. És\nbiztató szódra várunk, Nézd bánatos szíveinket, Keresztednél áldj meg\nminket!\n\n4. Szent hőse a Golgotának, Add, hogy menjünk teutánad! Kövessük azt a\nszent utat, Mely Istenhez mennybe juttat; Vegyük fel mi is kereszted,\nBar alatta szívünk reszket, Mert szenvedés visz az égbe, Föl az örök\ndicsőségbe.","o":1},{"m":null,"r":493,"c":"Te vagy napvilágom","b":"1. Te vagy napvilágom, te vagy énekem, Téged várlak, Jézus, kínos\néjeken. Oszlasd el a homályt, űzd el a bánatot, Ragyogjon fel rajtam\nszép fényes napod.\n\n2. Égő várakozás él minden szívben, Bárha nem is tudja, téged var\nminden. Titkon epedőknek jelenjél meg nyilván, Találj meg mindenkit, ki\nélni kíván!\n\n3. Találj meg mindenkit, aki elveszett, S vigye dicsőségre hatalmas\nkezed; Hogy amikor eljössz az ég felhőiben, Örömmel lásson meg minden\nföldi szem\n\n## \n\n##","o":1}];

function normalize(str) {
  return (str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

SONGS.forEach(s => { s._s = normalize(s.c + ' ' + s.b); });

const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
const hintEl = document.getElementById('hint');
const clearBtn = document.getElementById('clearBtn');
const detailEl = document.getElementById('detail');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function primaryNumber(s) {
  // Elsődlegesen az MRE számot mutatjuk (ez egyezik a kántorgép fájlnevekkel),
  // ha nincs MRE szám (csak-RKE bejegyzés), akkor az RKE számot.
  return s.m != null ? s.m : s.r;
}

function renderList(items, query) {
  if (!items.length) {
    listEl.innerHTML = '<div class="empty-state">Nincs találat erre: „' + (query || '') + '”</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  items.forEach(s => {
    const row = document.createElement('div');
    row.className = 'row';
    const num = primaryNumber(s);
    const tileClass = s.o ? 'rke-only' : '';
    let badge = '';
    if (s.m != null && s.r != null && s.m !== s.r) {
      badge = '<span class="row-badge">RKE ' + s.r + '</span>';
    } else if (s.o) {
      badge = '<span class="row-badge orphan">csak RKE, MRE ismeretlen</span>';
    }
    const kindText = s.sp ? 'ÉNEK' : (s.o ? 'RKE ' + s.r : 'MRE ' + s.m);
    row.innerHTML =
      '<div class="num-tile ' + tileClass + '">' + (num != null ? num : '—') + '</div>' +
      '<div class="row-text">' +
        '<div class="row-title">' + escapeHtml(s.c) + (s.g ? '<span class="row-flag" title="Egy vagy több versszak (jellemzően az 1.) az eredeti könyvben csak kottaképként szerepel">⚠</span>' : '') + '</div>' +
        '<div class="row-kind">' + kindText + badge + '</div>' +
      '</div>';
    row.addEventListener('click', () => openDetail(s));
    frag.appendChild(row);
  });
  listEl.innerHTML = '';
  listEl.appendChild(frag);
}

function formatLyrics(body) {
  const escaped = escapeHtml(body);
  return escaped.replace(/^(\d+)\.(?=\s)/gm, '<span class="verse-num">$1.</span>');
}

function openDetail(s) {
  const parts = [];
  if (s.m != null) parts.push('MRE ' + s.m);
  if (s.r != null) parts.push('RKE ' + s.r);
  document.getElementById('detailNum').textContent = s.m != null ? s.m : s.r;
  document.getElementById('detailKind').textContent = parts.join(' · ') || 'Ének';
  document.getElementById('detailTitle').textContent = s.c;

  let warnings = '';
  if (s.o) {
    warnings += '<div class="detail-warning">Ehhez az énekhez (RKE ' + s.r + ') egyelőre nincs megerősített MRE-szám a párosító táblázatban — a szöveg a régi énekeskönyv-forrásból származik.</div>';
  }
  if (s.g) {
    warnings += '<div class="detail-warning">Egy vagy több versszak (jellemzően az 1.) az eredeti könyvben csak kottaképként szerepel, ide nem került be szövegesen.</div>';
  }
  document.getElementById('detailWarning').innerHTML = warnings;
  document.getElementById('detailLyrics').innerHTML = formatLyrics(s.b);
  detailEl.classList.add('open');
  document.querySelector('.detail-body').scrollTop = 0;
}

document.getElementById('backBtn').addEventListener('click', () => {
  detailEl.classList.remove('open');
});

function doSearch() {
  const raw = searchEl.value.trim();
  clearBtn.classList.toggle('visible', raw.length > 0);

  if (!raw) {
    hintEl.textContent = SONGS.length + ' ének (MRE- és RKE-számozással)';
    renderList(SONGS, '');
    return;
  }

  if (/^\d+$/.test(raw)) {
    const n = parseInt(raw, 10);
    const exact = SONGS.filter(s => s.m === n || s.r === n);
    const prefix = SONGS.filter(s => !(s.m === n || s.r === n) &&
      ((s.m != null && String(s.m).startsWith(raw)) || (s.r != null && String(s.r).startsWith(raw))));
    const results = exact.concat(prefix);
    hintEl.textContent = 'Szám szerinti keresés: ' + results.length + ' találat';
    renderList(results, raw);
    return;
  }

  const q = normalize(raw);
  const results = SONGS.filter(s => s._s.includes(q));
  results.sort((a, b) => {
    const ai = normalize(a.c).includes(q) ? 0 : 1;
    const bi = normalize(b.c).includes(q) ? 0 : 1;
    return ai - bi || (primaryNumber(a) || 0) - (primaryNumber(b) || 0);
  });
  hintEl.textContent = 'Szöveg szerinti keresés: ' + results.length + ' találat';
  renderList(results, raw);
}

searchEl.addEventListener('input', doSearch);
clearBtn.addEventListener('click', () => {
  searchEl.value = '';
  searchEl.focus();
  doSearch();
});

doSearch();
</script>
</body>
