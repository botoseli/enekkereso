 hadd hallja minden nép Az Úrnak hívó\nszózatát, A Jézus szent nevét! Ha áldó lelke ránk talál S a menny felé\nemel: Ez ingyen kegynek zálogát Mi soh'- sem hagyjuk el!\n\nWhittemore - Hozsánna\n\nRévészné Váró Margit átdolgozása.","o":1},{"m":null,"r":211,"c":"Apostoli hitnek formája","b":"Apostoli hitnek formája\n\nA 19. zsoltár dallamára: * Az egek beszélik.\n\n1. Hiszek egy Istenben, Hatalmas Atyában, Mindent teremtőben, És Jézus\nKrisztusban, Atya egy Fiában, Mi Urunk nevében, Aki fogantaték\nSzentlélek Istentől, Máriától születék, Szenvede s kínzatott Poncius\nPilátus Tiszttartósága alatt.\n\n2. Meg is feszítették, Azután meghala És eltemetteték, Szálla a\npoklokra, Harmadnap támada, Mennybe emelteték, Ül a mindenható Atya\nIsten jobbján, Onnan lész eljövendő Az eleveneket Ítélni s holtakat.\nHiszek a Szentlélekben.\n\n3. Hiszek egy keresztyén Anyaszentegyházat, Szentek egyességét, Bűnünk\nbocsánatját, Test feltámadását És örökéletet. A szent prófétákkal És\napostolokkal Mi mindezt hisszük s valljuk, Ez hittel, vallással, És\nszent tudománnyal Magunkat bátorítjuk.\n\nSzenczi Molnár Albert\n\nPsalterium-ának (1608) függelékéből.","o":1},{"m":null,"r":213,"c":"Te hozzád szól énekem","b":"Kováts Lajos\n\n1. Te hozzád szól énekem, Én jó magyar népem, Aki nehéz harcokban,\nVérzel réges régen. Fogadjad meg tanácsom És írjad szívedben, Melyet\nnéked szólok most Igaz szeretetben.\n\n2. Szabadságért küszködöl, Vágyol boldogságra, Sok könnyedet hullatod,\nDe ugyan hiába, Mert igazi megrontód, A te bűnöd néked, S ettől meg nem\nszabadít Emberfia téged.\n\n3. Mégis e nagy bajodnak Vagyon orvossága, Édes Atyád a mennyben\nKészíté számodra. Halljad meg hát magyarom Ez igaz beszédet, A szerető\nAtyának Izenetjét néked.\n\n4. Immár Urunk elibe Mindnyájan elmenjünk, Elfelejtett Mesternek\nLábához leüljünk, Egy szükséges dologról Drága igét halljunk, Értünk\nmegholt Krisztusnak Hűséget fogadjunk.\n\nKováts Lajos\n\nHallelujah.","o":1},{"m":null,"r":214,"c":"Ó, láthatatlan mennyei felség","b":"Az 55. dicséret dallamára: * Szent vagy örökké.\n\n1. Ó, láthatatlan mennyei felség! Egeknek királya! A te létedet a föld\nés az ég Nyilván prédikálja.\n\n2. Te vagy egyedül, kitől mindenek Vagynak és függenek; Természetedben\negy lévén, hozzád Hasonlók nincsenek.\n\n3. Ily nagy titokra tanít meg minket Igédnek világa, Hogy egy voltodban\nhárom személynek Vagyon valósága.\n\n4. Véges elmémmel ily nagy mélységet Méregetni félek, Egy Istenségben,\nHiszem, van Atya, Fiú és Szentlélek.\n\n5. Ó, örök Atya, áldott Fiaddal, És a Szentlélekkel, Én te előtted\nmeghajtom térdem A kerestyénekkel.\n\nLengyel József (1770*1821)","o":1},{"m":null,"r":218,"c":"Mind, ami csak dicsérhet","b":"Eredeti dallam: Bécs 1774\n\n2. Mind, ami csak dicsérhet, Mind, kerubok és szeráfok Néked zengenek\néneket; Magasztaló angyalkarok Énekelik szüntelen: Szent, szent, szent a\nnagy Isten.\n\n3. Szent vagy, Urunk Istenünk, Szent vagy, seregeknek Ura! Bajban hű\nsegítségünk; Ég és föld a tenger árja Teljes dicsőségeddel: Mind Urának\nénekel.\n\n4. Mind e földkerekségen Nagy és kicsiny mind dicsérnek. Néked, szent\nAtyaisten, Énekelnek minden szentek, S teljes szívből hódolnak\nEgyszülött szent Fiadnak.\n\n5. Tisztelik a Szentlelket, Hogy ő szent tanításával Gazdagon táplál\nminket És mindenkor megvigasztal. Téged, örök Háromság Dicsér, áld meg e\nvilág.\n\nAmbrosius (340*397) nyomán németből\n\nAz Atya Istenről.\n\nH. K. 26. 27. 28.","o":1},{"m":null,"r":221,"c":"Isten, a roppant egeknek Bölcs","b":"A 42. zsoltár dallamára: * Mint a szép híves patakra.\n\n1. Isten, a roppant egeknek Bölcs, erős alkotója, A lételnek és\nletteknek Hatalmas fenntartója, Te képzelhetetlen nagy, Örök és végtelen\nvagy, Együtt mélység és magasság, Tiszta, fénylő világosság.\n\n4. Világosítsd hát lelkünket, Világosságnak atyja, Érdekeljen úgy\nbennünket Világod sugárzatja, Hogy értsük lételedet, És tudjuk\nfelségedet, Jól s értelmesen tisztelni, Okos ünnepet szentelni!\n\n5. Örvend lelkünk, mikor téged Nyilván Istenének vall, S dicsőíti\nIstenséged Több kezed munkáival, Az égi seregekkel Egyező zengésekkel,\nÉrtelmes dicséretekben, Imád a gyülekezetben.\n\n6. Jó vagy te, jóknak szerzője, Minden teremtésidnek, De jó vagy,\nidvezítője Választott híveidnek. Szent vagy és bűnt gyűlölő, De nagyon\nkönyörülő, Mint erőd megmérhetetlen, Úgy irgalmad véghetetlen.\n\n7. Ezzel az erős hitellel Imádjuk felségedet, Ily biztos\nvallástétellel, Dicsőítünk Tégedet, Mi por, de te míveid, Bűnösök, de\nhíveid, Alkotmánya hatalmadnak, Tárgya örök jóságodnak.\n\n8. Közöld velünk fiaiddal Atyai jóságodat, Együtt örök hatalmaddal\nÉreztesd irgalmadat. Azzal éleszd hitünket, Élesítsd értelmünket, Tégy\nméltókká, por létünkre, Mennyei eredetünkre.\n\nPálóczi Horváth Ádám (1760*1820)","o":1},{"m":null,"r":223,"c":"Kezdőlap \\| pest.metodista.hu","b":"2. Nagy vagy te, Isten, Nagy a bölcsességed, Mindent mi szépen s\nbölcsen alkotál! A földi embert tetted gyermekeddé, Lelkedből lelket ő\nneki adtál. Kicsiny fűszálban, óriási tölgyben, Dicső kezed nyomát\nszemlélteted: Szívem kitárva, hódolással áldom, Csudálatos, nagy\nbölcsességedet.\n\n3. Nagy vagy, Uram és mily nagy a szerelmed, Fiadban mit velem\néreztetél, A pislogó kis mécset el nem oltád, S a megtört nádnak\nmegkegyelmezél. Mikor hevertem bűnben, megkötözve, Felém kinyújtád\nirgalmas kezed: Örömkönnyekkel térdre hullva áldom, Te idvezítő, nagy\nszerelmedet!\n\nKováts Lajos","o":1},{"m":null,"r":228,"c":"Ki dolgát csak az Úrra hagyja És benne remél szüntelen","b":"Neumark G. (1657)\n\n1. Ki dolgát csak az Úrra hagyja És benne remél szüntelen, Azt Ő\ncsudaképen megtartja Minden nagy bajban, ínségben. Ki magát bízza\nIstenre, Nem épít az a fövenyre.\n\n2. Mit használ mi sok nehéz gondunk, Mit használ nékünk jajszavunk,\nMinden reggel, sok sóhajtásunk, Hogy rosszul megy a mi sorunk? Mert\nkeresztünk és bánatunk Csak nagyobbítja sírásunk.\n\n3. Legyünk hát csak jó csendességben, S magunkban megelégedjünk, Várjuk\nIstentől békességben Azt, amit rendelt felőlünk. Isten, kitől\nválasztattunk, Tudja, ha szükséget látunk.\n\n4. Dicsérd Istent s járj útjaiban, Végezd híven te dolgodat, Bízzál az\nÚr áldásaiban Megújítja te sorsodat. Ki bízik az Úristenben, Nem\nmaradhat az szégyenben.\n\n5. Te benned bízom, én Istenem, Kérlek, ne hagyj el engemet! Kegyelmes\nszemmel nézd ínségem, Te tudod jól szükségemet! Noha súlyos gyakran\nsorsom, Reményem mégis Krisztusom.\n\n6. Midőn elvégzem életemet E siralomnak völgyében, Küldd el szent\nangyal-seregedet, Hogy vezessen fel az égbe, Hogy lássam színedet szépen\nVálasztottid seregében.\n\n7. Ott légyek örök boldogságban, Szent dicsőséged hadd zengjem, A\nSzent, szent, szent égi karában Angyaliddal egyetemben. Add meg hamar ó,\nKrisztusom, Hogy örömöm el ne múljon.\n\nNeumark G. (1621*1681)","o":1},{"m":null,"r":232,"c":"Hogyha bánat árja szemeimre zúdul","b":"Tinódi Sebestyén (1505*1556)\n\n2. Hogyha bánat árja szemeimre zúdul: Szívem fájdalmára balzsamot ád az\nÚr, S felszárad a könny, a seb begyógyul.\n\n3. Kínok hogyha gyötrik lelkemet halálra: Sóhajom akkor is Istenemet\náldja, Hiszen föltámaszt egy szebb világra.","o":1},{"m":null,"r":233,"c":"Az Úr csodásan működik","b":"Maár Margit\n\n1. Az Úr csodásan működik, De útja rejtve van, tenger takarja lábnyomát\nSzelek szárnyán suhan. Mint titkos bánya mélyiben Formálja terveit, De\nbiztos kézzel hozza föl Mi most még rejtve itt.\n\n2. Bölcs terveit megérleli, Rügyet fakaszt az ág, S bár mit sem ígér\nbimbója, Pompás lesz a virág. Ki kétkedőn boncolja őt, Annak választ nem\nád, De a hivő előtt az Úr Megfejti önmagát.\n\n3. Ne félj tehát te kis csapat, Ha rád felleg borul, Kegyelmet rejt s\nbelőle majd Áldás esője hull. Bízzál az Úrban, Rólad ő Meg nem\nfelejtkezik, Sorsod sötétlő árnya közt Szent arca rejtezik.","o":1},{"m":null,"r":234,"c":"Dicsértessék","b":"A 167. dicséret dallamára: * Semmit ne bánkódjál.\n\n1. Dicsértessék, Uram, Örökké szent neved, Hogy ez ideiglen Gondomat\nviselted. Méltatlanságomat, Úristen, nem nézted, Hogy eddig megtartál,\nHála legyen néked.\n\n6. Benned bíztam, Uram, Mindenkor csak benned, Csak tetőled vártam\nErőt, segedelmet, Teljes életemben Tebenned reméltem, Boldogulást,\náldást Fölségedtől kértem.\n\n7. Tekints reám azért Kegyelmességedben, Viselj gondot rólam Én nagy\nszükségemben. Ne nézd bűneimet, Én édes Istenem, Mutasd meg, hogy te\nvagy Gondviselőm nekem.\n\n8. Bűneimet pedig Bocsássad meg nékem, Melyekkel megbántlak Naponként\nIstenem. A földi gyarlóság Bűnbe viszi lelkem, De Te szent nevedért Légy\nkegyelmes nekem.\n\n9. E földön míg élek, Adj jó egészséget, Alázatos szívet, Lelki\ncsendességet, Áldj meg én munkámban Kívánt jó sikerrel S végre koronázz\nmeg Örök üdvösséggel!\n\nRégi magyar ének. Írták Diósgyőrben 1550 táján","o":1},{"m":null,"r":236,"c":"Elbágyadt lelkeknek","b":"A 196. dicséret dallamára: * Eltévedtem, mint juh\n\n1. Elbágyadt lelkeknek, Szomorú szíveknek. Ki vagy vigasztalója,\nGyámoltalanoknak, Ügyefogyottaknak Erős oltalmazója, Mennybéli Istenség,\nUralkodó felség, Üdvösség megadója!\n\n2. Sok felől ostromol S ugyan reám omol A keresztnek zápora, Nincs\nkihez fordulnom, Segedelmet várnom, Mert Felséged ostora Reám eresztett,\nSzívemre vettetett Hitemnek próbájára.\n\n3. Tehozzád kiáltok, Ki férgecskéd vagyok, Figyelmezz kérésemre! Látod\ngyötrelmimet, Fájdalmas szívemet, Tekints szívem sebére, Irgalmas\nszemeddel, Hatalmas kezeddel Jöjj el segítségemre!\n\n4. Én gyarlóságomat, Erőtlen voltomat ÓÚristen, jól látod, Hogy bánatim\nterhét, Ostromló erejét Nem bírhatom, te tudod. Segedelmed nélkül\nReménységem meghűl, Uram, ha nem táplálod.\n\n5. Ha pedig tovább is Ez öldöklő tövis Sebez akaratodból, Vigasztald\nszívemet, Én nádszálhitemet Erősítsd jóvoltodból. Ha holtig is érzem\nOstorodat, vészem Jó szívvel, mint Atyámtól.\n\n6. Csak Jóbnak tűrését, Ábrahámnak hitét Oltsad az én szívembe; Én\nreménységemet S erőtlenségemet Fogadd szent kegyelmedbe, Ellened ne\nvétsek, Csak teneked éljek, Bízzam ígéretedben.\n\nPetrőczi Kata Szidónia (1658*1708)","o":1},{"m":null,"r":237,"c":"Édes teremtő jó Uram","b":"Régi kuruc dallam (1700 körül)\n\n2. Édes teremtő jó Uram, Ím lásd meg mire jutottam, Az ég alatt, a föld\nszínén Nincsen olyan árva, mint én.\n\n3. Szegény fejem hozzád hajtom, Minden dolgom reád hagyom, Légy az én\nédes gyámolom, Előttem járó csillagom!\n\n4. Igaz, teremtő jó Atya, Minden szegénynek támasza, Nincs, akihez\nfolyamodnám, Kérlek viselj gondot reám.\n\nRégi magyar ének (1700)","o":1},{"m":null,"r":239,"c":"Nincs elég erő és jó sincs bennünk","b":"Croft W.\n\n2. Nincs elég erő és jó sincs bennünk, Az Üdvözítő lett erőnk nekünk;\nDe van jó vigaszod, s ez elég neked, Mert biztat az Írás: Az Úr van\nveled!\n\nNewton J. * Hozsánna.\n\nDr. Szabó Aladár fordítása.","o":1},{"m":null,"r":240,"c":"Az Írás rólad","b":"Kolozsvár, 1744.\n\n2. Az Írás rólad, Felséges Isten, bizonnyal azt mondja, Hogy valakinek\nte benned vagyon szíve nyugodalma, Az olyan ember meg nem szégyenül,\nmert te vagy oltalma.\n\n3. Gyermekségemtől fogva, Úr Isten, mind ez ideiglen Téged hívtalak én\nsegítségül minden szükségemben, Mostan is nincsen több bizodalmam sem\nföldön, sem mennyen.\n\n4. Nincsen szívemnek több bizodalma, Úr Isten, náladnál, Valamíg\ngyötresz, szabad légy velem, csak ne haragudjál, Mint kegyes Atya,\nfiadat dorgálj, csak hogy meg ne útálj.\n\n5. Csak te egyedül voltál, Istenem, énnékem gyámolom, Nagy fájdalmimban\nés romlásimban az én vigasztalóm; Ne hagyj elesnem, s megszégyenülnöm,\nkegyes oltalmazóm!\n\n6. Mely nagy örömem és bizodalmam vagyon nékem ebben: Hogy ígéreted,\nmint drága zálog, itt van én szívemben; Krisztus Jézusért engem\nmeghallgatsz, tudom, kérésemben.\n\n7. Jelentsd meg hozzám, felséges Isten, kegyelmességedet És\nvéghetetlen, kegyes, atyai te nagy szerelmedet, Hogy teljesítsd be\nkönyörgésemre szent ígéretedet.\n\n8. Add meg, Úr Isten, te szent nevedért, amit tőled kérek, Szent Fiad\náltal, teljes szívemből melyért most könyörgök, Mert csak te benned\nbízom, Úr Isten, míg e testben élek.\n\nNagybánkai Mátyás, 1570 előtt.","o":1},{"m":null,"r":241,"c":"Mindig velem","b":"Mason L.\n\n1. Mindig velem, Uram, Mindig velem, Amikor nem is lát Gyarló szemem.\nAzért csak ezt zengem: Vélem van Istenem, Vélem van Istenem, Mindig\nvelem!\n\n2. Te szent ígéreted Jézusom, ez, Hogy világ végéig Velünk leszesz? Én\nbenned, Te bennem, Velem vagy Istenem, Velem vagy Istenem, Mindig velem!\n\n3. Mit nekem ígértél, Meg nem szeged, Hogy soha nem hagysz el, Te\nengemet. Így Uram, Istenem, Velem léssz szüntelen, Velem léssz szüntelen\nMindig velem.\n\n4. Járjak bár a halál Sötét völgyén, Te ott is velem vagy, Mit féljek\nén? Vessződ megvéd engem, Velem vagy Istenem, Velem vagy Istenem, Mindig\nvelem.\n\n5. S ha végre majd otthon Megláthatlak, Ahol bűn és halál Nem\nárthatnak, Ezt zengem szüntelen: Jelen az Úr velem, Jelen az Úr velem\nMindig velem.\n\nHozsánna\n\nKecskeméti Ferencz fordítása","o":1},{"m":null,"r":243,"c":"Az Úr szeretete által jó lesz minden","b":"Langham J.\n\n1. Az Úr szeretete által jó lesz minden, ha övé vagy szólj így bátran,\njól lesz minden! Drága vér mely megtisztított, a kegyelem biztosított,\nerős kéz lett a paizsod: Jól lesz minden!\n\n2. Oly sokat kell bár szenvednünk, Jól lesz minden; Nagy üdv, mit Jézus\nad nekünk, Jól lesz minden. Boldog, ki Istenben bízik, Az nem hiába\ndolgozik, A lélek szárnyai viszik, Jól lesz minden.\n\n3. Lesz még dicsőbb jövőnk nekünk, Jól lesz minden; Felhőkön fényt lát\nszemünk, Jól lesz minden. Bízva Atyánk irgalmában, Jézusunknak\noltalmában, Az életben, a halálban: Jól lesz minden.\n\nPeters M. * Halleluja\n\nAngolból Dr. Szabó Aladár","o":1},{"m":null,"r":246,"c":"felröpít, hűn gondot viselve rólunk","b":"felröpít, hűn gondot viselve rólunk! Minket e kar Ápolva, védve takar,\nIly nagy jót el sem gondoltunk.\n\n3. Dicsérd, ki alkotá művészi kézzel a lényed, Épségben tart, vezet -\njókedvvel, reménnyel éltet! Nagy bajtól véd, Mely gyakran törne feléd -\nJósága titkon föd téged.\n\n4. Dicsérd, ki tégedet ellátva, híven vezérel! Rád gondol szüntelen,\nbuzdít, hogy célodhoz érj el. Mindenható, S hozzád oly végtelen jó,\nEláraszt szeretetével.\n\n5. Áldjuk hát szent nevét, Őt zengve dicsérje minden. Ki itt lenn él,\nlehel - úgy mint a mennyekben ott fenn, Lelkünknek Nap, Melytől hő\nfénysugárt kap, Dicsérjük mindvégig: Ámen!\n\nNeander J. (1650*1680)","o":1},{"m":null,"r":249,"c":"Jézus, örömet érzek szívemben","b":"A 248. dicséret dallamára: * Jer, dicsérjük az Istennek fiát.\n\n1. Jézus, örömet érzek szívemben, Drága neved midőn jut eszembe. Az\nAtyától Te így neveztettél, Mivel nekünk szabadítónk lettél.\n\n2. Midőn homály fogná el szemünket, Megvilágosítottál bennünket, És\nhalálunk amidőn rettente, Félelminkből beszéded megmente.\n\n3. Hogy magunkat adósokká tettük, Váltságunkat teáltalad vettük, Utolsó\nfillérig megfizettél, Mert halálig engedelmes lettél.\n\n4. Minden vétkem, Jézus, eltörölted, Nem keresek hát mást kívülötted,\nKitől várhatnám idvességemet, Te tarthatsz meg egyedül engemet.\n\n5. Ha mint gyarló, esem még vétekbe, Légy szószólóm nékem az egekbe,\nLégy én oltalmam, légy én gyámolóm, Mert magam hittel hozzád kapcsolom.\n\nLengyel József (1770*1821)","o":1},{"m":null,"r":251,"c":"Régi magyar","b":"Régi magyar\n\n2. Jézus, hát téged én szívem várjon, Téged, örömöm kútfejét, áldjon,\nBenned örvendjen csupán én lelkem, Akiben békét, nyugalmat leltem.\n\n3. Ha ellenségnek volnék torkában, Ha a halálnak volnék markában,\nSemmit nem félnék, mert ott is nékem Te volnál, Jézus, hű menedékem.\n\n4. Akkor is lelkem veled biztatnám. Keservem véled vigasztalgatnám;\nÖrömben, búban, éljek vagy halljak, Üdvözítőmnek csak téged vallak.\n\nÁts Mihály után 1646*1708.","o":1},{"m":null,"r":252,"c":"Krisztus, felkent fejedelem","b":"A 330. dicséret dallamára: * Jövel Szentlélek Úristen\n\n1. Krisztus, felkent fejedelem, Hármas tiszted énekelem. Főprófétám\nhogy bölcs legyek, Tudományért hozzád megyek, Jelentsd ki, miként\nkedvezett Nékünk és miket végezett, Idvességünknek dolgában Az Atya\ntitkos tanácsában: Mert mihozzánk azért jöttél.\n\n2. Krisztus, a te személyed szent, Mert az Atya főpappá kent, És Te\náldozván érettünk, Mi bűnbocsánatot vettünk. Esedezz hát hathatósan,\nHogy az Atya az adóson Könyörülvén, engedelmes Légyen mi hozzánk és\nkegyelmes: Mert főpapunk azért lettél!\n\n3. Krisztus, te királyi székben Ülsz és uralkodsz az égben, Kérünk\nigazgass igéddel, Bírj a jóra Szentlelkeddel! Mi terólad neveztetünk, Ó,\nvidd végbe, hogy életünk Keresztyéni módon teljen, És szép nevünknek\nmegfeleljen: Mert királyunk azért lettél!\n\nLengyel József (1770*1812)","o":1},{"m":null,"r":253,"c":"A te árnyékodban Nyugszom bátorságban Félelmim ellen","b":"Crüger H, 1653.\n\n2. A te árnyékodban Nyugszom bátorságban Félelmim ellen. A föld\nmegindulhat, Szikla leomolhat, Csak te légy velem. Bűn, halál törjön\nreám, Hatalmával meg nem ejthet, Megtart hív szerelmed.\n\n3. Ha rettent a törvény, És bűnöm, mint örvény Elborítni kész, Ha jön\naz ítélet, Én akkor sem félek, Szemem terád néz. Kinyújtod felém kezed,\nTe vagy győzhetetlen pajzsom, Üdvöm, bátorságom.\n\n4. Vessz el mulandó kincs, Jézus, kívüled nincs Gyönyörűségem. Világi\nméltóság, Távozz el te hívság, Nem kellesz nékem, Tőled Jézus én szívem,\nA keresztnek gyalázatja, El nem szakaszthatja.\n\n5. Vessz el bűn, rút méreg, Lélekkínzó féreg, Szívem megútált! Átok\nkövet téged, Tetszetős szépséged Kínt rejt és halált. Kevélység,\nnagyravágyás, Sötét vétkek, távozzatok! Lemondtam rólatok.\n\n6. Ne légy hát, lelkem, bús, Megváltód a Jézus, Közel van hozzád! Omló\nkönnyeidbe, Keserűségidbe Édes mézet ád. Ha járok tövisek közt, Csak ő\nöröme szívemnek: Jézus életemnek.\n\nFranck J. (1618*1677)","o":1},{"m":null,"r":255,"c":"Atyaistennek egy Fia","b":"A 273. dicséret dallamára: * Az Istennek szent angyala.\n\n1. Atyaistennek egy Fia, E világnak alkotója, Krisztus Jézus,\nmegváltója, Árváknak vigasztalója.\n\n2. Atyánknak nagy bölcsessége, Ábrázatja, fényessége, Minden szentek\ndicsősége, Bűnösöknek reménysége.\n\n3. Leszálltál magas mennyekből, Szent Atyánknak kebeléből, Emberi\ntestet vettél föl, Hogy megments minket a bűntől.\n\n4. Ezt sem a mi érdemünkből, Nem mi cselekedetinkből, De műveléd\nkegyelmedből, Hozzánk való szerelmedből.\n\n5. Te minékünk váltságunkra Keresztfát vevél válladra, Azzal mentél\nGolgothára Így lettél e világ ára.\n\n6. Mi azért tisztességedre, Néked nagy dicsőségedre, Térdet hajtunk\nszent nevedre És imádunk örvendezve.\n\n7. Teljes vagy felséges jókkal, Minket is azért azokkal Részeltess,\nhogy nagy kínokkal Ne gyötressünk gonoszokkal.\n\n8. Adj nékünk csendes időket, Adj állandó békességet, Atyafiő\nszeretetét, Benned való igaz hitet.\n\n9. Hogy látván így jóvoltodat, Reánk való nagy gondodat, Magasztaljunk\nmi Urunkat, Hatalmas szabadítónkat.\n\nDebrezen (1778.)","o":1},{"m":null,"r":258,"c":"Mikor leszáll az est","b":"3. Mikor leszáll az est, Sötétje bánt, ijeszt Az éjszakában is tudom,\nHogy megvéd Jézusom.\n\nHalleluja.","o":1},{"m":null,"r":259,"c":"Régi magyar ének","b":"Régi magyar ének.\n\n2. Szegény, bűnös embereknek Egyetlen reménysége, És minden igaz\nhíveknek Öröme, üdvössége! Jövel, jövel hozzánk, kérünk, Mindenkoron\nlégy mivélünk; Te vagy a mi Krisztusunk, Mi kegyelmes Jézusunk.\n\n3. Reád bízzuk mi magunkat Itt ez árnyékvilágban, Könyörgünk, viseld\ngondunkat, Hogy legyünk bátorságban. Légy vezérünk, oltalmazónk,\nTanítónk és vigasztalónk, Te vagy áldott Jézusunk, Üdvözítő Krisztusunk.\n\n4. Nincs e siralom völgyében Maradandó városunk: Itt élünk jó\nreménységben, Jövendőt óhajtozunk. Ott a dicsőült lelkeddel Téged áldunk\na szentekkel, Te vagy áldott Jézusunk, Üdvözítő Krisztusunk.\n\nÁts Mihály: Zengedező Mennyei Kar.\n\nKészítsétek az Úrnak útját\n\nAdvent","o":1},{"m":null,"r":260,"c":"Ó Isten bölcsességének Mélységes gazdagsága","b":"A 42. zsoltár dallamára: * Mint a szép híves patakra.\n\n1. Ó Isten bölcsességének Mélységes gazdagsága! Kegyelmes ígéretének\nVáltozhatatlansága! Amit a titok fogva Tartott öröktől fogva, Azt az\nidők rendi szépen Kinyilatkoztatták épen.\n\n2. A setét éjnek homálya Hajnali fénnyé leve; Amit az igazság szája\nMegígért volt eleve Maga frigyes népének, Hívei seregének, Amaz\nasszonynak magváról, Bizonyságokat tett arról.\n\n3. Ezek által élesztette A szíveknek reményét, Homályból felderítette\nAz idvesség napfényét, A bűnösnek váltságot, A rabnak szabadságot Hirdet\naz Úr kegyessége, Így lesz öröm a jaj vége.\n\n4. Ez örömet a világnak Az Úr Jézus szerzette, Ki terhét a gonoszságnak\nVállaira felvette. Testbe öltözvén értünk, Benne mindent elértünk,\nBölcsességünk, igazságunk, Lett szentségünk és váltságunk.\n\n5. Ó Jézus, ha így szerettél S kedvellettél bennünket, Ha idvezítőnkké\nlettél, Segéld gyengeségünket, Hogy mi is szerethessünk Tégedet s\nkövethessünk. Te általad lelkünk végre Menjen fel a dicsőségre.\n\nKérészi Ábrahám, ( 1852.)","o":1},{"m":null,"r":268,"c":"Áldott az élet Istene","b":"A 273. dicséret dallamára: * Az Istennek szent angyala\n\n1. Áldott az élet Istene, Hogy bár vétkeztünk ellene, Mégis adott\nboldogítót, Bűneinkből szabadítót.\n\n2. Kegyelmesen tekintett ránk, Szent Fiát küldötte hozzánk, Hogy\noktassa értelmünket, És megszentelje szívünket.\n\n3. Ó, véghetetlen bölcsesség, Ó, nagy szeretet s kegyesség! Ki tud\neléggé csudálni, Méltóképpen meghálálni?\n\n4. Jézus a világ javára Mily nagy terhet vesz vállára! Romlásunkban Ő\nnyújt kezet, Szabadulásra Ő vezet.\n\n5. Mik vagyunk mi, hogy érettünk Ennyit tesz, holott vétettünk?\nIstennek nincs szüksége ránk, Mégis Fiát küldé hozzánk.\n\n6. Boldog, ki Jézust szereti, Jaj annak, aki megveti! Mert kívüle nincs\nboldogság, Nincs békesség, világosság.\n\n7. Lelkem, nagy örömmel fogadd, Örökre néki add magad; Ha szent\ntörvényét követed, Boldog lesz teljes életed.\n\n8. Mennyei Atyánk áldassék, Mindenütt magasztaltassék. Jézus, dicsérjük\nnevedet, Hogy megváltottad népedet.\n\nA husziták énekeskönyvéből.","o":1},{"m":null,"r":270,"c":"MÁRIA ÉNEKE LUKÁCS ev","b":"MÁRIA ÉNEKE LUKÁCS ev. 1:46*56.\n\nA 146. zsoltár dallamára: * Áldjad én lelkem az Urat.\n\n1. Magasztalja az én szívem Az Urat mind éltiglen, És örvendez az én\nlelkem Megtartó Istenemben, Hirdetem kegyességét És nagy jótéteményét.\n\n2. Mert kegyesen megtekinté Ő szolgáló leányát, Jóvoltából meg nem veté\nHív, alázatos voltát, Mert íme minden nemzet Boldognak mond engemet.\n\n3. Mert én velem nagy dolgokat, Tőn a hatalmas Isten, Midőn együgyű\nvoltomat Felemelé kegyesen, Szent azért az Ő neve, Áldandó dicsősége.\n\n4. És az Ő irgalma vagyon Nemzetségről nemzetre, Örökké néz irgalmason\nMinden őket félőkre, Hatalmas dolgot szerze Ő karjának ereje.\n\n5. A kevély gondolatúknak Mentem eszeket veszté Dühös szándékát azoknak\nA jókra nem ereszté, Engem is nagy irgalma Megtarta, nagy hatalma.\n\n6. A hatalmas gonoszokat Ő székökből levoná, És az alázatosokat Híven\nfelmagasztalá, Mert szeret együgyűket És gyűlöl kevélyeket.\n\n7. A nyomorult éhezőket Minden jókkal betölté, A gazdasággal töltetek\nÜresen elereszté, Mert Őtőle mindenek Bölcsen vezéreltetnek.\n\n8. Izraelt, az ő szolgáját Híven hozzá fogadá, Említvén irgalmasságát\nNépét meglátogatá, Rájok nyújtván kegyelmét, Betölté ígéretét.\n\n9. Amiképpen szólott vala Mi első atyáinknak, Ábrahámnak mit megmonda\nÉs ő maradékinak, Ím mind megteljesíté, Ezért áldjuk örökké.\n\nSzenczi Molnár Albert (1574*1634)","o":1},{"m":null,"r":271,"c":"Az áldott orvos közeleg","b":"Stockton J. H.\n\n1. Az áldott orvos közeleg, A drága főpap, Jézus. Hogy szívünket\nenyhítse meg, Mi drága üdvünk Jézus. Halld, mint zeng az égi kar Édes\nvisszhangjaival! Szívemben is zeng e dal: Jézus, Jézus, Jézus!\n\n2. Ki minden vétket megbocsát, Eltörli vétkünk: Jézus, Megnyitja a\nmenny kapuját És jár előttünk: Jézus. Halld, mint zeng az égi kar, Édes\nvisszhangjaival, Szívemben is zeng e dal: Jézus, Jézus, Jézus!\n\n3. Ti gyermekek, kicsik, nagyok. A tietek is Jézus. Csak az ő útján\njárjatok És véletek lesz Jézus. Halld, mint zeng az égi kar, Édes\nvisszhangjaival, Szívemben is zeng e dal: Jézus, Jézus, Jézus!\n\nHunter W. * Halleluja\n\nSzász B. fordítása.","o":1},{"m":null,"r":280,"c":"Szicílai dallam","b":"Szicílai dallam\n\n2. Boldog idő, áldott idő, Kegyelmet hozó karácsony! Krisztus földre\nszállott, Bűnünktől megváltott, Örvend, kerestyén, ez áldáson.\n\n3. Boldog idő, áldott idő, Kegyelmet hozó karácsony! Dicső nagy\nKirályunk, Tisztelünk s imádunk! Örvend, kerestyén, ez áldáson.\n\nHozsánna","o":1},{"m":null,"r":288,"c":"Ó, te felséges dicsőség királya","b":"A 274. dicséret dallamára: * Krisztus Urunknak\n\n1. Ó, te felséges dicsőség királya, Született Jézus, Noé, szent\nbárkája, Szegény bűnösök váltságának ára, Lelkünk világa!\n\n2. Mit adjunk Néked ily kegyességedért, Hogy e világra jöttél\nbűnösökért, Adósságunkért fizettél méltó bért, Ontál drága vért.\n\n3. Nem tudunk ezért semmit sem fizetni, Csak igyekezünk szívből hálát\nadni, Akarjuk Neked szívünket megnyitni, Neked szentelni.\n\n4. Üdvözlégy azért, szerelmes Jézusunk, Szent jászlod körül mind arcra\nborulunk, Szegénységedért téged el nem hagyunk, Inkább imádunk.\n\n5. Üdvözlégy, Bálám ragyogó csillagja, Áron vesszeje, virágzó bimbója,\nJákóbtól látott egek lajtorjája, Mennyek ajtaja.\n\n6. Üdvözlégy, Szűznek szerelmes magzatja, Gedeon nedves szép harmatos\ngyapja, Jesse törzsöke, megújult virágja, Szent Dávid raja.\n\n7. Tenéked azért zengedező verssel, Jézus, éneklünk repeső víg szívvel.\nA pásztorokkal s mennyei sereggel, Buzgó lélekkel.\n\n8. Imé, szívünknek ajtaját megnyitjuk, Szállásul néked lelkünket\nkitárjuk, Ne vess meg minket, szerelmes Jézusunk, Térj hozzánk, Urunk!\n\n9. Szent születésed drága érdeméért, Az Atya Isten áldott szerelméért,\nEklézsiádban kívánt csendességet, Adj békességet.\n\nZengedező mennyei kar 1770.\n\nJer, lássuk az Úr keresztjét!\n\nH. K. 37. 38. 39. 40. 41. 42. 43. 44.","o":1},{"m":null,"r":291,"c":"Minden népek","b":"A 42. zsoltár dallamára: * Mint a szép híves patakra.\n\n1. Minden népek, hirdessétek Az Istennek jóságát, Hálaadással\ndicsérjétek Az ő irgalmasságát, Mert ő minket szeretett, Idvességre\nvezetett, Szent fiát elbocsátotta, Ki lelkünket megváltotta.\n\n2. Az Istennek igazságát Ez kielégítette. A bűnösök adósságát Egészen\nkifizette, Mind kegyes életével, Mind sok szenvedésével, Ami több,\nértünk meghala, Noha ártatlanság vala.\n\n3. Ó, bárcsak meghálálhatnánk Ezt az áldott kegyelmet, Bárcsak annyira\njuthatnánk, Hogy nyervén segedelmet, Meghalhatnánk bűnünknek, Élhetnénk\nIstenünknek, Magunkat jól viselhletnénk, A Megváltót követhetnénk.\n\n4. Atyánk, bírj erre bennünket, Adj erőt szándékunkra, Segítsd\nigyekezetünket, Vezess feltett célunkra, Kegyelmeddel légy velünk, Hogy\nmíg e testben élünk, Csak az új életben járjunk, És boldogságot úgy\nvárjunk.\n\nSzilágyi Mihály  1817","o":1},{"m":null,"r":292,"c":"Jézus Krisztus","b":"A 295. dicséret dallamára: * Ó, ártatlanság Báránya.\n\n1. Jézus Krisztus, Isten fia, Híveidnek Atyjokfia! Te nemcsak testbe\nöltöztél Értünk, hanem kínt szenvedtél.\n\n6. Ó, Jézus, ki vért ontottál Értünk s drágán megváltottál, Ne hagyj\nmár minket elveszni, Kárhozatba visszaesni.\n\n7. Kifolyt vérednek érdeme Tegye, hogy szent Atyád szeme Minket\nkegyelmesen nézzen, Törvénybe már ne idézzen.\n\n8. Kössed bűnünk egy csomóba, Mellyel vétkeztünk valóban, Ott van a\nkereszted fája, Egészen vessed alája.\n\n9. Gerjessz bennünk tiszteletet Hozzád és oly szeretetet, Mely tőled el\nne szakadjon, Hanem végig megmaradjon.\n\n10. Végre, ha közelít végünk, Édesítsd keserűségünk, Uram, te légy\nmenedékünk, Adj helyt az egekben nékünk.\n\nKeresztesi József (1748*1812)","o":1},{"m":null,"r":298,"c":"Ó, vérző, drága","b":"A 162. dicséret dallamára: * Uram, a töredelmes...\n\n1. Ó, vérző, drága, szent fej, Gyalázatba borult! Hordod kínzó sebekkel\nA töviskoszorút. Dicsőség illet téged, Ékesség, hatalom. Megalázott\nfenséged Áldván, magasztalom.\n\n4. Uram, amit vétettem, Mind te szenvedted el. Mit én el nem viseltem,\nRádzúdult a teher. Elítélve s kifosztva Várom kegyelmedet. Vesd rám\nirgalmat osztva Könyörülő szemed!\n\n5. Jó Pásztorom, ismerj meg, Fogadj be, jótevőm! Hányszor óvott\nkegyelmed, Áldón, védelmezőn! Igéd édes tejével Tápláltál engemet,\nMennyország örömével Éltetted lelkemet.\n\n6. Uram, melletted állok, Ó, meg ne vesd híved. Tetőled el nem válok,\nMíg megtörik szíved, Ha tested holtra dermed, Ajkad végsőt lehel, Én\nmagamhoz ölellek És nem eresztlek el.\n\n8. Jézus, leghűbb barátom, Hálát adok neked, Hogy lelki szemmel látom\nNagy szenvedésedet. Hadd legyek hű halálig, Míg magadhoz veszel, S ha\ntestem holtra válik, Benned pihenjek el.\n\n9. Ha egykor el kell válnom, Te ne válj tőlem el. Ha majd lesújt\nhalálom, Szent kezed fölemel. A félelmek királya Mikor szíven szorít,\nFélelmed s kínod árja Elém jő s bátorít.\n\n10. Ó, tündökölj elébem, Ha eljön az idő, Őriző pajzsképpen, Keresztfán\nszenvedő! Hitemmel átölellek, Lelkem hozzád suhan. Kit így visz át\nkegyelmed, Az hal meg boldogan.\n\nGerhardt P. 1607*1676.","o":1},{"m":null,"r":299,"c":"Buzdulj szívem","b":"Victor János\n\n2. Buzdulj szívem, szeretetre, Jézus iránt hálára, Mert ő nagy jót tett\nteveled, Magát adta halálra! Íme, ez a szeretet, Mellyel Jézus\nszeretett, Önmagát adá halálra, Hogy lelkedet megváltsa.\n\n3. Buzdulj szívem, szeretetre, És szeresd a Szentlelket, Mert ő\nkijelenté néked, Hogy az Isten szeretet, Atya, Fiú, Szentlélek, Adj\nteljes szeretetet, Hogy úgy szeresselek Téged, Mint te szeretsz engemet!\n\nHozsánna\n\nSzalay József (1862*1917)","o":1},{"m":null,"r":300,"c":"Ó, Úr Jézus","b":"A 135. zsoltár dallamára: * Áldjátok az Úr nevét.\n\n1. Ó, Úr Jézus, Áldással A te nagy szerelmedért, És felmagasztaltassál\nÁldott segedelmedért, Hogy midőn eltévedtünk, Testben jöttél érettünk.\n\n2. Sőt egész életedben, Kivált, midőn a halál Körülvett, szent\ntestedben Kínt szenvedni kész valál, S bűnünknek rettentését, Hordozád\nbüntetését.\n\n3. Hisszük, hogy szenvedésed Váltság álnokságinkért, Vérrel lett\nfizetésed Elég adósságinkért, Félelmünket elvetted, Istent Atyánkká\ntetted.\n\n4. Átkozott keresztfára, Midőn felfeszíttettél, Törvény átkos szájára\nÖrökös zárt vetettél, S mikor magadra tevéd, Bűnünk terhét elvevéd.\n\n5. Úr Jézus táplálj minket Szenvedésid hasznával Töröld el bűneinket\nTested áldozatával, Vidámíts gyötrelmiddel, Gyógyíts meg sérelmiddel.\n\nKeresztesi József (1748*1812)","o":1},{"m":null,"r":301,"c":"Viselted sebző töviskoronádat","b":"Crüger F. 1640.\n\n2. Viselted sebző töviskoronádat, Arcodat érte verés és gyalázat. Epét\ns ecetet adtak innod aztán Fenn a keresztfán.\n\n3. Ily tenger kínnak nagy oka mi lehet? Jaj az én bűnöm sújtott így\ntégedet. Büntetést, átkot csak én érdemeltem S te tűrsz helyettem.\n\n4. Mily csodálatos ím ez az ítélet: A pásztor tűr a nyájért vereséget.\nA bűntelen Úr az adós szolgáért Fizet váltságbért.\n\n5. Meghal a jó, ki élt tisztán s igazul, Él a gonosz, ki Istent bántott\ngazul. Ember rohan a halál verme felé S az Úr hull belé.\n\n6. Ó, mérhetetlen, csodanagy szeretet, Vértanúságra ez juttat tégedet.\nÉn könnyelműen e világnak éltem S te szenvedsz értem.\n\n7. Ó, minden idők hatalmas királya, Ily nagy hűséged lelkem mint\nimádja? Embernek szíve soha föl nem érte, Mit tettél érte.\n\n8. Irgalmad mással össze nem mérhetem, Föl sem foghatja a véges\nértelem. Hogy háláljam meg felséges művedet, Örök szeretet?\n\n9. Nem tehetek mást, hogy kedvedet leljem, Mint küzdeni a test gyönyöre\nellen, Hogy a szívemet régi bűnök vágya Ne gyújtsa lángra.\n\n10. Mivel magamban elég erőm nincsen, Hogy vágyaimat keresztre\nfeszítsem, Küldd el Szentlelked, hogy engem vezessen, S a jót kövessem.\n\n11. Szemlélvén, Uram, kegyelmes jóságod, Megvetem érted a bűnös\nvilágot. Hogy teljesítsem folyvást akaratod, Abban fáradok.\n\n12. Dicsőségedre bátorságban élek, Kereszttől, gúnytól, kínoktól se\nfélek. Üldözzenek bár halálos gyötrelmek, Szívem nem retteg.\n\n13. Bár minden munkám előtted csekélység, Te nem veted meg híved\ntörekvését, Megszégyenülni, jól tudom, nem enged Örök kegyelmed.\n\n14. Uram Jézus, ha egykor hozzád szállok, Trónusod előtt otthonra\ntalálok, Koronás fővel zengek ott teneked Hálaéneket.\n\nJohann Herrman (1585*1647)","o":1},{"m":null,"r":304,"c":"Ó, Úr Jézus","b":"A 68. zsoltár dallamára: * Hogyha felindul az Isten\n\n1. Ó, Úr Jézus, első gondunk Ez ünnepen az, hogy mondunk Tenéked\ndicséretet, Aki amint haláloddal, Koporsóba szállásoddal Nekünk adtál\néletet, Úgy azzal, hogy feltámadtál, Épen megbizonyíttattál Isten fiának\nlenni, És a mi váltságunk felől Így lehete minket erről Bizonyosokká\ntenni.\n\n2. Azért, Uram, benned hiszünk, Elődbe oly szívet viszünk, Mely Tenéked\nörvendez, A fő élvén, a tagok is Élnek, s azzal boldogok is, Természeti\njó rend ez. Üres sírod bizonysága, Hogy az Isten igazsága Magának eleget\ntett, Az Úr haragja már megszűnt, Amely ostorozta a bűnt, Így\nszabadulásunk lett.\n\n3. Ó, Uram, föltámadásod Legyen rajtunk oly áldásod, Hogy mi is\nfölkelhessünk A bűnnek koporsójából, És Szentlelked jóvoltából Új életet\nélhessünk. Az által a kísérteten, Világi szenvedéseken Adj győzelmet\nvennünk, Tőled el ne vonjon semmi, Úgy hogy éljünk többé nem mi, Hanem\nTe élj mibennünk.\n\n4. Uram, amidőn halálunk Eljő, s a sírba leszállunk, Biztasd azzal\nhitünket, Hogy a te feltámadásod Ereje s édes szólásod Felkölti holt\ntestünket. És amely boldog életre Te jutottál végezetre, Mi is arra\njuthatunk. Ó, Jézus, lelkünk reménye, Te légy ott is napunk fénye: Így\nörökké láthatunk.\n\nKeresztesi József (1748*1812)","o":1},{"m":null,"r":306,"c":"Légyen dicsőség mindenek előtt Néked","b":"HÄNDEL\n\n1. Légyen dicsőség mindenek előtt Néked, mert Te győztél a halál\nfölött. Fénylő arcú angyal őrzi sírodat, Ő hirdeti nekünk diadalmadat.\nLégyen dicsősség mindenek előtt Néked, mert Te győztél a halál fölött.\n\n2. Itt van már Jézus hívei között, Jertek mind, Ő népe: köszöntsétek\nŐt! Töltsön el a hála most mindeneket, Győzelmével szerzett nékünk\néletet. Légyen dicsőség mindenek előtt Néked, mert Te győztél a halál\nfölött.\n\n3. Nincs semmi kétség győzelme felett, Velünk az Úr Jézus, ki tovább\nvezet. Készen vár a hajlék, ha megérkezünk, Üdvösségben Ő lesz örökké\nvelünk. Légyen dicsőség mindenek előtt Néked, mert Te győztél a halál\nfölött.\n\nNybergdart (1721*1792)\n\nFord. Tóth Péter","o":1},{"m":null,"r":313,"c":"Mely nagy vidámsággal Tölti be Isten szívünket","b":"A 34. zsoltár dallamára * Mindenkoron áldom\n\n1. Mely nagy vidámsággal Tölti be Isten szívünket, Midőn biztatja\nhitünket A feltámadással. Tudjuk, ha meghalunk, Bár testünk sírba\ntétetik, De lelkünk mennybe vitetik, Felderül hajnalunk.\n\n2. Majd megnyílik sírunk, Por testünk abból felkelvén, És lelkünkkel\negyesülvén, Új életet bírunk, Melynek soha vége, Baja s unalma nem\nlészen, Kimondhatatlan egészen Annak dicsősége.\n\n3. Ó, Isten, e hitben Erősíts bölcs reménységgel, Hogy ékesüljünk\nszentséggel E földi életben. Így majd halálunkat E reménység\nkönnyebbítse, S felkeléssel édesítse Elaluvásunkat.\n\n4. Mikor ezt elérjük, Megdicsőítvén testünket, Azzal egyesült lelkünket\nVidd magadhoz, kérjük. És akik szeretnek Téged, színed látására. Ó,\njuttasd el bírására Az örök életnek.\n\nKeresztesi József (1748*1812)","o":1},{"m":null,"r":316,"c":"A Krisztus élet nékem","b":"A 315. dicséret dallamára: * Ó, maradj kegyelmeddel\n\n1. A Krisztus élet nékem, Rábízom magamat, A halál nyereségem: Így\nnézem síromat.\n\n2. Nagy békén hozzá térek, Mint jótestvéremhez, Mindvégig véle élek S\nígy békém örök lesz.\n\n3. Meggyőzöm véle éltem Sok kínját, keresztjét, Mert sebeiben nyertem\nAz Úrnak kegyelmét.\n\n4. Ó, Jézus, erőm ha fogy És szívem végsőt ver, S ha többé nem\nszólhatok, Sóhajom fogadd el!\n\n5. Ha egyszer gyarló éltem Mint mécses, ellobban, És eljő földi végem,\nÚgy élek mindjobban.\n\n6. Mert csendes nyugalomban, Mint édes álomban Megnyugszom én Uramban,\nJézus Krisztusomban.\n\n7. Víg énekre buzdulok: Szent, szent, szent, ezt zengem, Szent színe\nelé hullok, Ki megváltott engem.\n\n8. Ott fényes dicsőségben Meglátom üdvömet, És áldom békességben Én jó\nTeremtőmet!\n\nIsmeretlen német szerzőtől a XVI. századból","o":1},{"m":null,"r":317,"c":"mély seb, s tested égve lehajol","b":"mély seb, s tested égve lehajol. Jézusodhoz hazatérve; Földi bú, baj\nelenyész, bízva nézz szíve sebére: üdvöd útja vele kész.\n\n3. Felfelé repül a lélek, égre törve, keresőn, Jézus adta örök élet\nfény hónába repesőn. Angyalének dala zendül harsonával odafent, lelkem\néled az örömtől s mindörökre vele zeng.\n\nHozsánna * Révészné Váró Margit átdolgozása.\n\n## Felméne mennyekbe\n\nMennybemenetel\n\nH. K. 46. 47. 48. 49. 50. 51.","o":1},{"m":null,"r":325,"c":"Ó, te édes Jézus","b":"A 266. dicséret dallamára: * Küldé az Úristen...\n\n1. Ó, te édes Jézus, Ki értünk születtél, Te dicsőségedből E világra\njöttél, Minket idvezítél:\n\n2. Szenteld meg szívünket, Hogy benned bízhassunk És Szabadítónknak\nCsak téged vallhassunk, Felmagasztalhassunk.\n\n3. És mikor jövéndesz Hozzánk halálunkra, És amaz utolsó Félelmetes\nnapra, Ne jussunk gonoszra.\n\n4. Hanem te jobb kezed Felől állíttasunk, Atyánk áldottival\nMennyországra jussunk: Megkoronáztassunk!\n\nZengedező Mennyei Kar 1770.","o":1},{"m":null,"r":327,"c":"Fenn a kéklő ég felett","b":"Mozart A. W.\n\n1. Fenn a kéklő ég felett, Halleluja! Ámen! Boldog lelkek zengenek:\nHalleluja! Ámen! Ki itt lent elfáradott, Kire bú, baj áradott, Azt a\nbéke várja ott, Halleluja! Ámen!\n\n2. Ott a boldog örvendők, Halleluja! Ámen! Dicsérik a Teremtőt:\nHalleluja! Ámen! Onnét száll a földre le Szentléleknek ereje, Hogy\nszívünket töltse be: Halleluja! Ámen!\n\n3. Én is zengek éneket: Halleluja! Ámen! Istennek dicséretet Halleluja!\nÁmen! Légyen áldva Krisztusom Zengni én csak azt tudom, Itt s előtted\negykoron: Halleluja! Ámen!\n\nHozsánna","o":1},{"m":null,"r":329,"c":"A Sion hint tenéked Zöld pálmaágakat","b":"Leipzig 1615.\n\n2. A Sion hint tenéked Zöld pálmaágakat, De én dicsérlek Téged, Zengvén\nzsoltárokat. Én szívem mindenkoron Örvendjen tenéked, Magasztalja nagy\nbuzgón, Én Istenem, neved.\n\n3. Ó, mit nem cselekedtél, Uram, nékem jómra, Hogy én testem lelkemmel\nJutott örök jajra, Hogy áldott országodból Méltán kiűzettem, De ismét\nirgalmadból Azt ingyen megnyertem.\n\n4. Voltam én bús fogságban, Te megszabadítál, Hevertem gyalázatban. Te\nfelmagasztaltál, Végtelen dicsőségre Engemet emeltél, Elfogyhatatlan\nkincsre Kegyesen segítél.\n\n5. Nincs, nincs semmi, tégedet Mi lehozott volna, Csak a teljes\nszeretet, Mellyel szánod vala E nyomorult világot Ezer ínségbe, Adván\nnéki vígságot Bú, bánat helyébe.\n\n6. Ó, vésd szívedbe mélyen Te árva, bús sereg, Ki bújdosol az éjben S\nszemedből könny pereg: Most jő lelked királya, Itt áll ajtód előtt,\nVigasztalás van nála, Hittel fogadd el Őt!\n\n7. Az ellenség hatalma Minket már nem riaszt, Erős az Úrnak karja,\nMenten legyőzi azt. Jön a menny s föld királya, Nagy az Ő ereje,\nVilágnak gonoszsága Nem bírhat meg vele.\n\n8. Eljön, hogy megítéljen Élőket, holtakat, Ki hozzá hű, ne féljen,\nMert annak üdvöt ad, Jövel, fényes világunk, Jövel, mi szép napunk, Igaz\nszívből óhajtunk, Míg csak hozzád jutunk.\n\nGerhardt P. (1607*1676.)\n\nÁts M. Zengedező Mennyei Kar.\n\n## A Szentlélek Istenről\n\nPünkösd\n\nH. K. 53.","o":1},{"m":null,"r":331,"c":"Tenéked mondunk dicséretet","b":"A 33. zsoltár dallamára: * Nosza, istenfélő szent hívek.\n\n1. Tenéked mondunk dicséretet, Ó, könyörülő Istenünk, Ki testi és lelki\néletet Adtál, s Tőled van mindenünk, Mert Egyszülötted, Ama felkentedet,\nMennybe felvivén, Szentlelkét azonnal Nagy lelki haszonnal Elküldé\nhíven.\n\n2. Ó, mi Istenünk, jó Atyánk is, Légy azért örök áldásban, Hogy e\ntudományt mihozzánk is Elküldötted bő forrásban! Még ma is hitünket És\nreménységünket Lelked tüzével Sokképpen éleszted, A jóra gerjeszted Nagy\nerejével.\n\n3. Éreztesd, Uram, jobban, jobban Velünk Szentlelked munkáját, Sötét\nelménkben mind újabban Emeld fel az ő fáklyáját! Általa segítsed, Meg is\nkönnyebbítsed A mi terhünket, Általa hevítsed, Föl is melegítsed\nHidegségünket!\n\n4. Ez a lélek gyönyörködtessen Minket a kegyes életben, Hogy soha ne\nlegyünk restesen Mi a jó cselekedetben. Ez idvességünkről, Mint\nörökségünkről Légyen zálogunk, Míg mi is az égre, Azon örökségre Eljutni\nfogunk!\n\nKeresztesi József (1748*1812)","o":1},{"m":null,"r":333,"c":"Ó, áldott Szentlélek","b":"A 180. dicséret dallamára: * Dicséret, dicsőség.\n\n1. Ó, áldott Szentlélek, ki az ég dicsőségével Leszállván a földre zúgó\nszél és tűz jelével. A tanítványok gyűlésekbe, Úgy munkálkodtál, hogy\nlelkökben Csoda erőkkel teltenek be.\n\n2. Hatalmas erőddel őket egy szempillantásban Megvilágosítád, s hoztad\noly nagy változásba, Hogy az nap, melyen előálltak, És a népeknek\nprédikáltak, Anyaszentegyházat fundáltak.\n\n3. Jövel mihozzánk is, részeltess ajándékidban. Lakozzál mibennünk,\nmint élő templomaidban! Adj hitet, adj jó reménységet, Adj szentid\nközött egyezséget, Békességet és idvességet.\n\n4. Oszlasd el homályos elménknek tudatlanságát, Enyhítsd meg elepedt\nszívünket szomorúságát, Éreztessed még ittlétünkben Az örömöt a mi\nlelkünkben, Melyet adsz örök életünkben!\n\nNagy István (1770*1831)","o":1},{"m":null,"r":335,"c":"Jövel, megnyomorultaknak Nemes vigasztalója","b":"Modus I.\n\n2. Jövel, megnyomorultaknak Nemes vigasztalója, Árváknak édesatyja!\nTöltsd bé siralmas szívünket Mennyei nagy örömmel. Jövel, mi lelkünknek\nÉdes vendége!\n\n3. Távoztasd el mi szívünknek Hitetlen sötétségét, Világosíts meg\nminket, Hogy az Istennek igéjét Hallgassuk és érthessük! Jövel, és\ntaníts meg Az igaz hitre!\n\n4. Jövel, gerjeszd fel szívünkben Szent szerelmednek tüzét, Rontsd el a\ngyűlölséget, Hogy mi egyesek lehessünk Isteni szerelmedben, Jövel, mi\nlelkünknek Nagy vigassága!\n\n5. Te vagy bizony örök Isten, Ki Atyától s Fiútól Mindörökké származol.\nTe vagy mi Urunk Krisztusnak Áldott szent ígérete, Te vagy mi lelkünknek\nMegszentelője.\n\n6. Te vagy, ki a prófétáknak Általa régen szóltál, Krisztust nekünk\nígéréd, Te a szent apostoloknak Szívöket bátorítád, Te vagy erőssége\nMinden szenteknek.\n\n7. Te vagy a nagy Úristennek Mennyei ajándéka, Igazságnak mestere,\nTaníts minket a Krisztusnak Igaz ismeretire! Te vagy mi lelkünknek Bölcs\ntanítója.\n\n8. Világosítsd meg elménket, Hogy hihessük a Krisztust Egy idvességnek\nlenni, És az áldott Atya Isten Kegyes atyánknak lenni, Téged\nismerhessünk Vigasztalónknak.\n\n9. Adjad szent ajándékodat, Bátorítsad lelkünket, Hogy vallhassuk a\nKrisztust! Adjad, hogy mi meggyőzhessük A bűnnek csalárdságát! Te vagy\nmi biztatónk, Minden oltalmunk.\n\n10. Biztasd félelmes szívünket, Hogy kétségbe ne essünk Halálunknak\nidején, De nagy bátorsággal vígan A világból kimúljunk! Jövel,\nvigasztaló Szentlélek Isten!\n\nBatizi András éneke 1569.","o":1},{"m":null,"r":336,"c":"Krisztus, ki híveidnek Küldtél mennyből Szentlelket","b":"2. Krisztus, ki híveidnek Küldtél mennyből Szentlelket, Kiket Atyád\ntebenned Választott és eljegyzett, Öntsd ki Lelked reánk is, Buzgón\nkönyörgünk néked, Hogy általa igédben Ismerhessünk meg téged.\n\n3. Vigasztaló Szentlélek, Légy mi kedves vendégünk, Ki sok kinccsel\ngazdag vagy, Lakozzál együtt vélünk. Szólásra készíts nyelvet, Adj\ntanulásra kedvet, Hajts fület a hallásra, Gyújts szívet megtartásra.\n\nRimay János (1573*1631.)","o":1},{"m":null,"r":343,"c":"Megállnak lábunk","b":"Régi magyar dallam. Debreceni Ék. 1778\n\n2. Megállnak lábunk, örök Úristen. A te templomodban, És tiszta szívvel\ndicsérünk Tégedet.\n\n3. Áldd meg, Úristen, a te népedet, Kik téged szeretnek, Tartsd meg\nközöttünk a gyülekezetet!\n\n4. Légyen békesség, felséges Isten, Anyaszentegyházban, Oltalmazz\nminket minden háborúnkban!\n\n5. Dicséret néked, Atya Úristen, A te szent fiaddal, És Szentlélekkel,\nmi vigasztalónkkal!\n\nA 122. zsoltár alapján írta Szgedi Gergely (1569)","o":1},{"m":null,"r":346,"c":"Maradj velünk","b":"A 430. dicséret dallamára: * Krisztus, ki vagy nap és világ...\n\n1. Maradj velünk, mi Krisztusunk, Mert már este felé vagyunk, Szent\nigéd világoskodjék, Mi szívünkben munkálkodjék.\n\n2. E mi tévelygő időnkben Adj bátorságot szívünkben, Hogy szent igéd és\nszentségid Tisztán maradjon közöttünk.\n\n3. Jézus, óvd meg egyházadat, Nevelj neki hű fiakat, Akik igédet\nszeretik, S bőven termik gyümölcseit.\n\n4. Szent igéddel állj őrt magadnak, Hogy sátán s bűn ne ártsanak,\nHíveidnek adj kegyelmet, Hitet, békét és türelmet.\n\n5. A földön itt sok a bajunk, Nincsen sehol nyugodalmunk, Bűn,\ntévelygés és szakadás Terjed, miként vízáradás.\n\n6. Alázd meg a kevélyeket, Kik fennen hordván fejöket, Csak a mulandót\nkeresik, És szent igédet megvetik.\n\n7. Az ügy, melyért harcra kelénk, A te ügyed, nem a miénk, Azért Uram,\nlégy gyámolunk, Mi benned bízva harcolunk.\n\n8. Igéd szívünk erőssége, Egyházadat igéd védje, Ez egy kincset hagyd\nmeg nekünk, Mi akkor mást nem keresünk.\n\n9. Igédben élünk és halunk, Míg hozzád mennybe juthatunk, Panasz, sírás\nott nem lesz már, Ránk ott örök boldogság vár.\n\nSelnecker N. (1530*1592.)","o":1},{"m":null,"r":347,"c":"Ó, minden jóknak kútfeje","b":"A 24. zsoltár dallamára: * Az Úr bír ez egész földdel.\n\n1. Ó, minden jóknak kútfeje, Mi életünknek ereje, Kegyelmes Atyánk és\nIstenünk! A több hívek seregével, Szíveinknek örömével Szent színed\nelőtt megjelenünk.\n\n2. Hogy a főigazságokat Tanulván, értsük azokat, Amelyek tartoznak a\nhitre, S vezéreljenek is ezek, Mint leghűségesebb kezek, Mindnyájukat a\nszent életre.\n\n3. De mivel, mint földi testek Vagyunk mi a jóra restek, Tudatlanok a\nlelkiekben, Ó, Uram, tégedet kérünk, Hogy te magad légy vezérünk, És\nerősítsd jobban ezekben.\n\n4. A te Szentlelked munkája Setétségünknek fáklyája Legyen, amely ezt\nfelélessze; Szívünkben világosságát, Az igének igazságát Foganatosan\nkiterjessze.\n\n5. Hogy szent beszéded szépségét, Ígéretidnek szentségét Világosabban\nmegláthassuk, Ehhez egész életünket Gondolatink s beszédinket Mint\nzsinórmértékhez szabhassuk.\n\n6. Isteni tiszteletünket, Énekünk s könyörgésünket, Mennyei Atyánk,\nvedd kedvesen! Amelyeket ma halottunk, Tanultunk, s jónak vallottunk,\nPlántáld szívünkbe gyökeresen!\n\nKeresztesi József (1748*1812)","o":1},{"m":null,"r":353,"c":"Jézus Krisztus áldása a gyülekezetre","b":"Jézus Krisztus áldása a gyülekezetre\n\nIgehirdetés és Úrvacsora után\n\nDebrecen 1778.\n\n2. Már titeket elbocsátlak, Mint szerelmes vendégeimet, Házatokhoz nagy\nbékével, Kik viselitek zászlómat: Mindenkoron és mindenütt Dicséretem és\njótétem Forogjon ti szájatokban!\n\n3. Áldásom tirajtatok, Légyen szent nevem köztetek, Én szerelmes, jó\nhíveim, Atyámnál kedves vitézim, Kik igémnek becsülői, Tisztességemnek\nőrzői, Vagytok nevemnek félői.\n\n4. Kinyújtom kezem reátok, Gondot viselek rólatok, Ételt, italt,\nruházatot, E földön adok sok jókat, És várvallástól titeket, Mindenféle\nbúbánattól Bizonnyal megszabadítlak.\n\n5. Az életből másra viszlek, Keserűségből kivészlek, Bánat helyett\nvigasságot, Jószágtok helyett jószágot, Adok nagy szép örökséget, Melyet\ne világ nem adhat: Néktek adom koronámat.\n\n6. A helyet, melyet készítettem, Néktek Atyámtól kinyertem, Megmutatom\nés béviszlek, S szent Atyámnak béajánlak, Hol bánat és keserűség Nem\nkörnyékez meg titeket, Boldogult örömben lésztek.\n\nDebreceni Énekeskönyv, 1778.","o":1},{"m":null,"r":354,"c":"Jézus Krisztus","b":"A 247. dicséret dallamára: * Mely igen jó az Úristent dicsérni.\n\n1. Jézus Krisztus, mi kegyelmes jó Urunk, Könyörgéssel te elődbe\njárulunk: Ínségében nyájadat el ne hagyjad, Tőled várunk segítséget\noltalmat.\n\n2. Elmerültünk a sok nyomorúságban, Éjjel-nappal vagyunk szomorúságban,\nSzámtalan sok a mi szívünk siralma, Nagy mirajtunk az ellenség hatalma.\n\n3. Reád hagyjuk anyaszentegyházunkat Hisszük, hogy jó látod mi\nbajainkat. Ne hagyd elmerülni kicsiny hajódat, Parancsolj és csendesítsd\na habokat.\n\n4. Ébredj, Uram, mert majdnem elmerülünk, Veszedelmes habokban\nelsüllyedünk. Szükségünkben tehozzád esedezünk: Jézus Krisztus, hallgass\nmeg, Téged kérünk!\n\n5. Kérünk, Uram, maradj velünk szálláson, Hogy semmi vész hű népednek\nne ártson, Látod, immár napunk aláhanyatlik, Ó, ne hagyj el, maradj\nvelünk virradtig!\n\n6. Védelmezzed a te kicsiny bárkádat, Benned bízik a te küzdő egyházad,\nMelyért a te szent véredet ontottad, Elmerülni mostan azért ne hagyjad!\n\n7. Sőt légy erős kőfala te népednek, Szaporítsad számát a hű seregnek;\nVezérinek adjad te Szentlelkedet, Hogy hirdessék áldással szent igédet!\n\n8. Szent az Atya, mindenek megtartója, Szent a Fiú, mindenek\nmegváltója, Szent a Lélek, vigasztalónk, vezérünk, * Szentháromság,\nhálás szívvel dicsérünk.\n\nGönczi énekeskönyv 1592.","o":1},{"m":null,"r":360,"c":"Öröködbe, Uram","b":"A 79. zsoltár dallamára: * Öröködbe Uram pogányok jöttek\n\n1. Öröködbe, Uram, pogányok jöttek, Meggyalázták kövét szent\nküszöbödnek. Kezök a város falára vetették, Utcáink sorát siralommá\ntették. Szolgáidnak testek, Akik megölettek, Temetetlen maradtak, Vagy,\nakik megölték, Ételül vetették a Mezei vadaknak.\n\n2. Hogy folyt a vér ottan, * a szent, a drága, Kövér patakokban, mint\na víz árja, Kővé dermedtünk a nagy öldöklésre S nem maradt szívünk méltó\ntemetésre. És porig alázva, Részvétet a gyászba Nem találtunk senkinél,\nSőt gúnnyal tetézte, Kárörömmel nézte Vesztünket mind, aki él.\n\n3. Meddig haragszol még, Uram, népedre? Ha fog könnyebbülni haragod\nterhe? Szent gerjedelmed láttasd meg azokkal, Kik megtagadtak, mind a\npogányokkal! Kik sohasem ismernek Istent, se kegyelmet, Vedd el az ő\nerejük... Kik megettek minket, A mi sebeinket Fordítsd vissza ellenük!\n\n4. Ellened jártunk bár sok nagy bűnünkkel, Irgalmadat Uram, ó, hamar\nküldd el! Több segítségünk Tekívüled nincsen, Adj szabadulást, szabadító\nIsten! Ó, jer, örök váltság, Hogy ránk ne kiáltsák: „Lám, Isten is\nelhagyta\"... Régi dicsőséged Mutasd meg e népnek, Vedd számon a vért\nrajta!\n\n5. Halld meg a foglyoknak fohászkodását, Csak tőled várja mind\nszabadulását. S kik nem átalltak gyászunkra nevetni: Fizess meg nékik,\nki amint érdemli! Hogy mink, a te nyájad A szabadításnak Énekeit\nzenghessük, S hálát hozva néked, Neved, dicsőséged Mindörökké hirdessük.\n\nA 79. zsoltár Szabolcska Mihály feldolgozásában.","o":1},{"m":null,"r":361,"c":"Ó, seregeknek Istene","b":"A 84. zsoltár dallamára: * Ó, seregeknek Istene.\n\n1. Ó, seregeknek Istene, Mely kedves gyönyörűsége A te szerelmes\nhajlékidnak! Az én lelkem fohászkodik, Tornácodba kívánkozik, Ó, Istene\na magasságnak, Áhítozik testem, lelkem, Hajlékidba, én Istenem.\n\n2. Itt megpihen a madár is, Fészket rak a fecskepár is, Ó, Zebaóth, ó,\nén királyom, Mely szépek a te oltárid! Boldog, ki nyugtot talál itt,\nHogy tégedet szívvel szolgáljon, Boldog hajlék, boldog élet Egy hajlékba\nlakni véled!\n\n3. Boldog, aki ide juthat, Kinek útja a te utad, Mert járjanak bár\nkietlenben, De lábuknál forrás fakad, Erőtől árad a patak; Újult erővel\nnagy örömben Mennek a Sionra kelve, Víg zengéssel énekelve.\n\n4. Gondviselő édes Atyám, Kegyelemmel tekints reám. Atyai szódat várom\nén is! Jobb egy napot élni veled, Mint tőled távol ezeret. A te házadnak\nküszöbén is Jobb, mint akik vigadoznak Házokban a gonoszoknak.\n\n5. Ő minékünk fényes napunk, Diadalmunk és pajzsunk, Szent kegyelméből\nszeret minket. Azokhoz kegyelmes lészen, Kik járnak a jó ösvényen; Sok\njavaival áldja őket. Ó, seregeknek Istene, Lelkünk kőszála, mindene!\n\nA 84. zsoltár Baksay Sándor feldolgozásában.","o":1},{"m":null,"r":362,"c":"Erős vár a mi Istenünk","b":"(Luther M. ?) Wittenberg 1528.\n\n1. Erős várunk nékünk az Isten, És fegyverünk ellenség ellen,\nMegszabadít veszedelemtől, Kik ránk tőrnek most minden felől. A mi régi\nellenségünk Háborog velünk Erővel, fegyverrel És sok csalárdsággal, És\nminden nagy hatalmassággal.\n\n2. Nincsen nékünk semmi hatalmunk, Mellyel néki ellene álljunk.\nViaskodik az Úr érettünk, Kit az Isten bocsátott nékünk. Ha kérded, hogy\nki legyen az? Jézus Krisztus az. Seregeknek Ura, Kinél nincs több Isten,\nNála vagyon a győzedelem.\n\n3. Ha e világ mind ördög volna, És elnyelni minket akarna, Mégis tőle\nsemmit ne féljünk, Csak Krisztus oltalmába higgyünk! Dühös tüzét bármint\nhányja, A föld bálványa. Vége lesz és elvesz, Ledől megalázva Az ítélő\nKrisztus szavára.\n\n4. Megáll az Istennek Igéje, És nem állhat senki ellene. A nagy Isten\nvagyon mivelünk, És Szentlelke lakozik bennünk. Ha testünk nékünk el is\nvész, Vagyonunk elvész, Hírünk, nevünk s éltünk, Nőnk s minden\ngyermekünk: A mennyország megmarad nekünk.\n\nLuther M. éneke a 46. zsoltár alapján,\n\nford.: Skaricza Máté\n\n(Szegedi G. Ékv. 1569.)","o":1},{"m":null,"r":369,"c":"Ó, örök Isten","b":"A 104. dicséret dallamára: * Krisztus Urunk áldott születésén.\n\n1. Ó, örök Isten, ki atyánk vagy nékünk, Ím, leborulva, esedezve\nkérünk: Ez újszülöttnek földi, egész éltét Karjaid védjék!\n\n2. Te is, Ó, Jézus, Isten egyszülöttje, Nézz le a mennyből e földi\nszülöttre! Légy te őneki út, igazság, élet, S legyen ő híved!\n\n3. Isteni lélek, te örök fényesség, Általad teljes az igaz keresztség,\nBűnt, halált a te kicsinyedtől űzz el Mennyei tűzzel!\n\n4. Az Atya, Fiú és Szentlélek Isten Téged, te kisded, mindig úgy\nsegítsen, Hogy hited által lelked üdvöt nyerjen Földön és mennyben!\n\nF. Varga Lajos.\n\n## KONFIRMÁCIÓKOR","o":1},{"m":null,"r":370,"c":"Uram, áldjuk szent nevedet","b":"A 68. zsoltár dallamára: * Hogyha felindul az Isten...\n\n1. Uram, áldjuk szent nevedet, Hogy atyai jókedvedet Reánk\nkiterjesztetted. Midőn lábaidnál ültünk, Szent igédre figyelmeztünk,\nVelünk volt segítséged. Erőtelen gyermekidet Erősítetted, növelted Atyai\njóvoltodból, Íme, amit szívünk kére, Eljutánk munkánk végére Szent\nirgalmasságodból.\n\n2. Legyen életünk nevednek Szentelve és Szentlelkednek Töltse bé\nteljessége! Amaz Ige, mely testté lett, Bűneinkért eleget tett, Legyen\nfődicsősége. Ó, pásztorok fejedelme! Jobb kezed legyen védelme Véren\nváltott nyájadnak, Isteni erőd hatalma Légyen oszlopa s oltalma\nAnyaszentegyházadnak.\n\n3. Tudományod tiszta teje, Az élővíznek kútfeje, Táplálja lelkeinket. A\nsákramentomi jelek, Midőn élni fogunk velek, Győzzék meg, szíveinket:\nHogy szent tested kifolyt vére, Lett a mi váltságunk bére, S halálod\nlett életünk. Lelkünket ez vigasztalja, Jóvoltodat magasztalja Minden\ncselekedetünk.\n\n4. Tartsd meg e gyülekezetnek, Melyet törvényid vezetnek, Nagyjait s\nkicsinyeit: Igazgassad tanítóit, Hűséges elöljáróit, Felsőbb s alsóbb\nrendeit. Adjad, hogy szívvel, lélekkel Dicsérhess0nk a szentekkel, S\ncsak téged tisztelhessünk, És ha eljő amaz óra, Melyben szállunk\nkoporsóba, mennybe hozzád mehessünk.\n\nBöszörményi Pál után (1757*1825)\n\n## AZ ÚRVACSORÁRÓL\n\nH. K. 75. 76. 77. 78. 79. 80. 81. 82. 83. 84. 85.","o":1},{"m":null,"r":372,"c":"Hallgasd meg","b":"Az 50. zsoltár dallamára: Az erős Isten Uraknak ura.\n\n1. Hallgasd meg, Úristen, kérésemet, És világosítsd meg én szívemet,\nHogy szüntelen reád figyelmezzen, Lelkem szerelmedre gerjedezzen, És\nszent fiadat veled egyetemben Féljem és tartsam mindenütt elmémben.\n\n2. Úr Krisztus, mennyből értem leszállál, A keresztfán bűnömért\nmeghalál, Te szent véreddel értem áldozál, A halál tőriből kioldozál,\nAdósságomnak, bűnömnek sokaságát Megengedéd, eltörölvén rútságát.\n\n3. Azért vagyok már Atyád kedvében, Szent országának örökségében,\nÉrdemem kívül ki velem így tőn, Nagy jóvoltodból kegyelmébe vőn, Szent\nszerelmével úgy megkörnyékeze, Bűnt és ördögöt tőlem távol űze.\n\n4. Ezt és annyival inkább hihetem, Mivel általad erősíttetem Kenyérrel,\nborral szent vacsorádban, Mellyel a hívek élnek hazádban, Ezek jegyei a\nte jó kedvednek, Melyeket tőled hálaadással veszek.\n\n5. Velem, Úristen, azt cselekedjed, Hogy én eggyé lehessek teveled,\nSzentlelked engem úgy erősítsen, Hogy semmi tőled el ne térítsen, Sem\njó, sem gonosz, félelem, sem jószág Ne árthasson, de kelljen csak\nmennyország.\n\n6. Minden gondomat néked ajánlom, A halálban is vagy vigasztalóm, Az\néletre nékem ajtót nyittatsz, Országodban boldogságra juttatsz. Az\nítéletre lelkem felruházod E testtel, és örömre koronázod.\n\nSzenczi Molnár Albert 1608.","o":1},{"m":null,"r":374,"c":"Ó, én lelkem","b":"A 8. zsoltár dallamára: * Ófelséges Úr, mi kegyes Istenünk.\n\n1. Ó, én lelkem, dicsérjed Istenedet, Aki ily jól táplálja életedet,\nMint a hű atya szerelmes fiát, Ezért örömmel néki adj hálát.\n\n2. És e földön te magad úgy viseljed, Isten országát, hogy te is\nterjesszed, Arra szüntelen nagy gondod légyen, Ezzel tartozik minden\nkeresztyén.\n\n3. Mint a kenyért sok búza magból sütik, És a bort is sok szőlőszemből\nszűrik: Így lélek szerint e vacsorában Egy testté-vérré leszünk\nmindnyájan.\n\n4. Szeresd hát, ember, a te feleidet, Gyakran jelentvén jótéteményidet,\nGyűlölség, harag benned ne légyen, Melyet erősen megtilt az Isten.\n\n5. Az ő szent Igéjében gyönyörködjél, Ki téged viszont megáld bőséggel,\nSzentlelke által gerjeszt tebenned Buzgó szerelmet és kedvel téged.\n\n6. Végre tégedet ez árnyékvilágból, Felviszen a mennyégbe innét alól,\nAhol az ő választott szentivel Örök boldogságban élsz örömmel.\n\n7. Lelkem, szüntelen oda igyekezzél, Ki felől immár szent zálogot\nvettél, Ha ezzel magad gyakran biztatod, Boldogul lészen életed és\nholtod.\n\nSzenczi Molnár Albert 1608.","o":1},{"m":null,"r":382,"c":"(Dicséret 382)","b":"Maróthy György (1714*1744)","o":1,"g":1},{"m":null,"r":384,"c":"Uram, Téged tisztellek","b":"A 135. zsoltár dallamára: * Áldjátok az Úr nevét.\n\n1. Uram, Téged tisztellek, Méltó hálaadással, Áldom neved, míg élek\nSzép dícséret-mondással, És hirdetem mindennek, Nagy voltát\nkegyelmednek.\n\n2. Mert Te voltál Istenem Anyám méhétől fogva. Felkölt a bűn ellenem,\nHogy tőrbe ejtsen fogva, De lelked engem megszánt, Rólam minden tőrt\nelhányt.\n\n3. Igazságod palástját Reám kiterjesztetted, Szentlelkednek áldását\nBennem felgerjesztetted, Hogy megújulást vegyek: Hozzád hasonló legyek.\n\n4. Hát vajon hogy lehetne, Ó, Jézus, egy drága kincs, Hogy lelkem ne\nszeretne, Holott nálad főbb jó nincs. Csak te vagy a valóság, Út, élet\nés igazság.\n\n5. Szeretlek is bizonnyal, Lelkem hozzád kiterjed. Bár halnék meg\nazonnal, Ha szívem rád nem gerjed: Mert halál és ítélet Nálad nélkül az\nélet.\n\n6. Szívem vallástételét Jó lelkiismerettel Megtartom, s adom jelét\nKegyes és szent élettel, Hogy életem folyása Legyen másnak lámpása.\n\n7. Szent lábaidnál ülök, Hallgatok törvényedre, Bűnt útálok, kerülök,\nHogy lehessek kedvedre: S megmutassam valóban, Örül szívem a jóban.\n\n8. Mert tudom, akik járnak A romlott testnek útján, Tőled hiába várnak\nÁldást halálok után. Jaj lesz vége dolguknak, El kell veszni azoknak.\n\n9. De nékem reménységem Vagyon az én Uramban, Hiszen lesz idvességem,\nCsak járjak jó utamban: Ha követem világát, Meglátom szent országát.\n\n10. De mivel, Uram, e test, Melyben lelkem sátoroz, Gyakran csügged s\nigen rest, A sátán is jár s oroz: Kérlek, oktass Lelkeddel, Végy körül\nkegyelmeddel.\n\nLosonczi István (1709*1780)","o":1},{"m":null,"r":386,"c":"Testvér bátran állj a sorba","b":"Sullivan A. S. (1842*1900)\n\n1. Testvér bátran állj a sorba, vár a helyed, foglald el. Nézz előre\nKrisztusodra S tedd meg, amit tenni kell! Fel a szívvel, fel a fejjel,\nÚtad vége nincs közel, Nézz előre Krisztusodra, Istened Hűn szeresd S\ntedd meg, amit tenni kell!\n\n2. Görbe utak, rút ravaszság Ne szédítse szíved el, Bármi lesz, egy az\nigazság, Tedd meg, amit tenni kell. Földi érdek, földi ember Meg ne\nejtsen tőrivel: Nézz előre Krisztusodra, Istened, Hűn szeresd S tedd\nmeg, amit tenni kell!\n\n3. Fényes csillag, forrás víz ez, Szíved erő tölti el Hűn vezérlú jó\nszabály ez: Tedd meg, amit tenni kell. Testvér, bátran állj a sorba, Vár\na helyed, foglald el, Nézz előre Krisztusodra, Istened, Hűn szeresd S\ntedd meg, amit tenni kell!","o":1},{"m":null,"r":389,"c":"Szólít a Jézus","b":"Root G. F. (1820*1895)\n\n1. Szólít a Jézus, Bízd rá magad, Halld meg a hangját, úgy hívogat!\nÁldó Kezével lásd, int neked, add át az életed! És ha gyúl a mennyei\nsugár, boldogságnak örök hona vár: Nyújtja majd Jézus Kezét neked,\nIstenhez elvezet.\n\n2. Jöjj Jézusodhoz, én gyermekem, Hív oly szelíden, oly édesen! Kínt,\nbajt eloszlat, gyógyít sebet, Vállalja terhedet! És ha gyúl a mennyei\nsugár S boldogságnak örök hona vár: Nyújtja majd Jézus kezét neked,\nIstenhez elvezet!\n\n3. Higgy és ne félj! Ő nyugalmat ad, Jó Pásztorunkra bízd rá magad.\nElmossa vére rút vétkedet, Megmenti lelkedet. És ha gyúl a mennyei sugár\nS boldogságnak örök hona vár: Nyújtja majd Jézus kezét neked, Istenhez\nelvezet!\n\nRoot F. G. (1820*1895)\n\nR. Váró Margit átdolgozása.","o":1},{"m":null,"r":390,"c":"Az Úr szava hangzott felém","b":"Dycks J. B.\n\n2. Az Úr szava hangzott felém: Mondd, kell-e napsugár? Csak rám tekints\nés égi fény Gyúl fel az éj után! S én meghallám, Jézus, szavad, Te\nlettél szép napom, Mely éjjel is fényt, lángot ad És vezet utamon.\n\nBonar Horatius * Hozsánna\n\nDr. Szabó Aladár fordítása.","o":1},{"m":null,"r":391,"c":"Hadd menjek, Istenem","b":"Lowell M.\n\n1. Megyek már, ó, Uram, megyek feléd, Fájdalmas szent úton mindig\nfeléd. Ó, sok keserve van, de ez az én utam, Hisz hozzád visz, Uram,\nmindig feléd.\n\n2. Ha este száll reám s csendes helyen Álomra hajtanám fáradt fejem:\nNem lesz, hol nyughatom, Kő lesz a vánkosom, De álomszárnyakon Szállok\nfeléd!\n\n3. Szívemtől * trónodig, mily szent csoda, Mennyei lépcsőknek fényes\nsora S dicső angyalsereg Mind nékem integet, Ó, Uram, hadd megyek Én is\nfeléd!\n\n4. Álomlátás után hajnal ha kél, Kínos kővánkosom megáldom én,\nTemplommá szentelem, Hogy fájdalmas szívem, Uram, hozzád vigyem, Mindig\nfeléd!\n\n5. Csillagvilágokat elhagyva már Elfáradt lelkem is hazatalál. Ha majd\nhozzád jutok, Lábadhoz roskadok, Ottan megnyughatok Örökre én!\n\nSarah F. Adams:\n\nBenkő István fordítása\n\nA süllyedő Titanic fedélzetén 1912. április 15-e hajnalán a hajó\nzenekara ezt az éneket fújta 2418 hullámsírba készülő ember\nindulójaként.","o":1},{"m":null,"r":394,"c":"Fel, mert eljő az éjjel","b":"Lowell M.\n\n2. Fel, mert eljő az éjjel, Fel, mert a dél is itt; Minden erőd az\nÚrnak Munkájába vidd! A hű igaz munkásra Szent felelősség vár, Fel, mert\neljő az éjjel S nem dolgozhatsz már!\n\n3. Fel, mert eljő az éjjel, Fel, mert az est beáll, S int a növekvő\nárnyék, Hogy a nap leszáll. Fel, az utolsó percig, Mert az idő eljár,\nFel, mert eljő az éjjel S nem dolgozhatsz már!\n\nWalker A. L. * Hozsánna","o":1},{"m":null,"r":396,"c":"Én szívemet kegyelmed Takarja bé","b":"Silcher F. (1789*1860)\n\n2. Én szívemet kegyelmed Takarja bé, Bús gyászban és örömben Tedd\ncsöndessé Hadd pihenjen lábadnál Te gyermeked, Ki behunyva két szemét\nVakon követ.\n\n3. És bár kezed hatalmát Nem érezem: A célt, mégis, Te véled Elérhetem.\nTe vezess, Jézus, engem, Te fogd kezem, Amíg boldog végemre Elérkezem!\n\nHausmann Júlia\n\nHozsánna.","o":1},{"m":null,"r":400,"c":"„Keressetek szorgalmasan s találtok","b":"Tinódi Sebestyén 1546.\n\n2. „Keressetek szorgalmasan s találtok!\" Keresünk is, jó Atyánk, hogy\nbűn s átok Ránk ne törjön, meg ne fogjon, légy nekünk Égi utunk,\nigazságunk, életünk.\n\n3. „Zörgessetek buzgón Isten ajtaján!\" Elfáradtunk a világnak nagy\nzaján, Nyisd meg, Urunk, az üdvösség hazáját, Ott zengjük majd örök\nhálánk imáját.\n\nDömötör Ilona átdolgozása.","o":1},{"m":null,"r":401,"c":"Két kezünket össze téve","b":"Victor János.\n\n1. Két kezünket össze téve, Imádkozzunk szépen: Hisz' van aki\nmeghallgatja, Van Isten az égben!\n\n2. Ami csak fáj, ami búsít, Mondjuk azt el néki; Keservünket,\nbánatunkat Jó Atyánk megérti!\n\n3. Megvigasztal az imádság, Megtisztul a lelkünk, A jó Isten közelében\nOtthonunkra leltünk!\n\nHozsánna * Miklós Elemér","o":1},{"m":null,"r":406,"c":"Mi Atyánk, ki vagy mennyekben","b":"A 405. dicséret dallamára: * Mennybéli felséges Isten.\n\n1. Mi Atyánk, ki vagy mennyekben, Hozzád sietünk lélekben, miként magad\nparancsolád, Imádkozunk, mint egy család. Add, fohászunk ne az ajkon, De\nszívünk mélyén fakadjon.\n\n2. Szenteltessék meg te neved! Tanuljuk szent beszédedet És míg a sír\nránk nem borul, Éljünk mint hívek, jámborul. Tévelygéstől óvd nyájadat,\nHű pásztorunk te légy magad.\n\n3. Jöjjön el a te országod, Terjeszd a fényt, igazságot; Vezérünk\nSzentlelked legyen, Hogy néped el ne tévedjen. Törd meg a sátán erejét,\nEgyházadat te áldd, te védd.\n\n4. Te szent akaratod legyen E földön, miként mennyekben. Ha szenvedünk,\ntürelmet adj, Jó s balsorsban velünk maradj. Irtsd ki a rossz indulatot,\nMely megszegi akaratod.\n\n5. Add meg a mi kenyerünket, Tárházadból táplálj minket. Munkánk\nsikerrel koronázd, Távoztass tőlünk bajt s viszályt, Hogy csendes béke,\nszeretet Örvendeztesse népedet.\n\n6. És bocsásd meg bűneinket, Hogy ne terheljék lelkünket; Miként mi is\nmegbocsátunk, Ha vétett felebarátunk. Szelídség és jó indulat Így\negyesíti nyájadat.\n\n7. Minket kísértetbe ne vígy; A Sátán gonosz és irígy. Tőrébe csal, de\nadj erőt, Hogy bátran visszaverjük őt. Fegyvert kezünkbe Lelked ád S\nnyerünk győzelmi koronát.\n\n8. Gonosztól szabadíts, Atyánk, Nehéz napok virradtak ránk. Ha ránk\nborul a síri éj, Végső ínségünkben segélj. Test0nknek boldog kimúlást,\nLelkünknek adj mennyben lakást.\n\n9. Tied ma és mindenkoron Az ország és a hatalom, Ami jót kérünk,\nmegadod, Imádságunk meghallgatod. Dicsőség itt és oda fenn, Nevednek,\nIstenünk, Ámen.\n\nLuther Márton (1483*1546)","o":1},{"m":null,"r":407,"c":"Régi magyar ének","b":"Régi magyar ének.\n\n1. Zengjen hálaének, Minden ajkon zengjen! Isten szent nevének Hő imát\nrebegjen Mindaz, aki tudja, Hogy az Úr kegyelme Minden bánatunkban\nGyógyírt hoz sebünkre!\n\n2. Isten szent szerelmét Jézus hozta hozzánk. Hogyne zengne mindig Róla\ncsak szívünk, szánk? Ó, mi nagy dicsőség, Jézus a mi éltünk! Ó, csudálja\nföld s ég: Isten szenved értünk!\n\nHozsánna.","o":1},{"m":null,"r":408,"c":"Ó, mennyire vágytál utánam","b":"Bortnianski D.\n\n2. Ó, mennyire vágytál utánam, Magadhoz vontál szelíden. Feléd fordul\nmár minden vágyam, Szíveden nyugszik a szívem. Örökké égő szeretetben\nÉlek és benned és te bennem.\n\n3. Nem pótol semmi adományod. Lelkem csak tégedet keres. Nyugalmat csak\nbennem találok, Élnem csak érted érdemes. Szent vonzásod követve híven,\nTenálad békél meg a szívem.\n\n4. Legyen Jézusnak nagy dicsőség! Nevéből szent forrás ered, Ott árad\nszomjat oltó bőség, Meríthet a boldog sereg, Mely szüntelen e forrást\náldja, Kezét kulcsolva imádságra.\n\n5. Mélyen bevésve éljen bennünk Drága Jézus, áldott neved. Alakítsa át\nszent szerelmünk A szíveket s értelmeket. Lényünk, szavunk és minden\ntettünk Csak Jézust áldja folyvást bennünk.\n\nTersteegen G. (1697*1769)\n\nDömötör Ilona fordítása.","o":1},{"m":null,"r":410,"c":"Az Úristen adja E világi életünkben A lelki-testi jót Mi min","b":"Crüger J. 1647.\n\n2. Az Úristen adja E világi életünkben A lelki-testi jót Mi minden\nszükségünkben. Ő tartson mindvégig Mi igaz hitünkben, Hogy megértsük s\nlegyünk Szent nagy kegyelmében.\n\n3. Az Atya, Fiúnak, És Szentlélek Istennek, A Szentháromságnak, Mi\nkegyes éltetőnknek Dicséret, dicsőség És felmagasztalás, Most és\nmindenkoron Örök hálaadás!\n\nRinckart M. (1586*1649)","o":1},{"m":null,"r":413,"c":"Uram szekerünkre szállj","b":"Zwingli Ulrik 1529.\n\n1. Uram szekerünkre szállj, Mert rossz útra térhetünk S örven akkor\nellenünk, Ki galádul megvet téged.\n\n2. Isten, győzd le a gonoszt, Dicsőítsd meg szent neved, Ébreszd\nszóddal népedet, Amely szeret tiszta szívből.\n\n3. Segíts meg, hogy hűségünk Visszatérvén, újuljon, Minden keserv\nelmúljon S magasztaljunk mindörökké!\n\nDömötör Ilona fordítása.","o":1},{"m":null,"r":415,"c":"Nem tűnő sóhajt","b":"Maunder J. H.\n\n1. Nem tűnő sóhajt, elhaló szót, Nem szélsodorta levelet. De szép\nvirágot, dús gyümölcsöt Hadd adjak, Uram, én neked. Szép ifjúságom izzó\nhevét, Két munkás, tettre kész kezem, És öreg korom halk derűjét Tenéked\nadom, Istenem\n\n2. Én teljes szívem, teljes elmém. Egész erőm, minden javam, Elédbe\nhintve, mint virágot, Te néked viszem boldogan. Szép ifjúságom Izzó\nhevét, Két munkás, tettre-kész kezem És öreg korom halk derűjét Tenéked\nadom, Istenem.\n\nFalchi M. Innario Christiano 1935.\n\nWaldens énekeskönyvéből.\n\nDömötör Ilona fordítása.","o":1},{"m":null,"r":416,"c":"Bár zordonnak látszik utam itt alant","b":"A 8. zsoltár dallamára: * Ó, felséges Úr, mi kegyes Istenünk.\n\n1. Bár zordonnak látszik utam itt alant, Mégis van sok, csendes, boldog\npillanat, Mikor, Atyám, imádom felséged, Érzi lelkem áldott közelséged.\n\n2. Ha imára összeteszem két kezem, Trónod előtt magamat úgy érezem, Nem\nvagyok más, csak egy gyarló féreg, Aki csupán kegyelmedből élek.\n\n3. Imádkozom, legyek bármily méltatlan, De irgalmad hozzám\nelfogyhatatlan. Tudom, figyelsz könyörgő szavamra. Meg is adod, mi\nszolgál javamra.\n\n4. Taníts, Uram, imádkozni buzgóbban, Hogy előtted porba essem mind\njobban. Végre hozzád oly közel juthassak: Égi gondolattá tisztulhassak!\n\nBorkó Juliánna.\n\n## Alkalmi énekek\n\nReggel","o":1},{"m":null,"r":417,"c":"Elmúlt az éjnek homálya","b":"A 84. zsoltár dallamára: * Ó, seregeknek Istene.\n\n1. Elmúlt az éjnek homálya, Meggyúlt a napnak fáklyája, Minden teremtés\nmegéledett, Ti is hát, ó, mi lelkeink, Ébredjetek fel s nyelveink\nMondjatok annak dicséretet, Ki a napot rendes útján Visszahozza az éj\nután.\n\n2. Isten, jóságod háláljuk, És bölcsességed csodáljuk, Mellyel teljes e\nföld határa, Hogy napoddal megújítasz És előttünk világítasz, Hogy vígan\nmenjünk a munkára, Fényével érzékeinket Felköltöd s erősítsz minket.\n\n3. Munkáidban bölcsességed Csodáljuk és kérünk téged, Ma is igazgassad\nhasznunkra, Világosíts meg fényével, Erőt, áldást erejével Önts reánk és\nminden dolgunkra, Mint az, téged úgy szolgáljunk, Mint az, másoknak\nhasználjunk.\n\n4. De kivált az igazságnak, Mennyei világosságnak Napját éreztesd\nszíveinkkel! Világosítsd meg lelkünket, Gyümölcsöztessed hitünket Szent\nés jó cselekedeteinkkel, Hogy így fénylvén e világban, Fényljünk majd a\nmennyországban.\n\nKovács József (1761*1830.)","o":1},{"m":null,"r":426,"c":"ÓIsten, ki e reggellel Napodat visszaadtad","b":"A 25. zsoltár dallamára: * Szívedet hozzád emelem.\n\n1. ÓIsten, ki e reggellel Napodat visszaadtad, Jóságod egy újabb jellel\nIrántunk megmutattad, Azért el nem mulasztjuk Mi is kötelességünket, Ím,\nnéked bemutatjuk Reggeli tiszteletünket.\n\n2. Mi, Uram, bölcsességednek Vagyunk remekmunkái, És hív\ngondviselésednek Mindennapi példái, Hogy téged ismerhetnénk, Belénk okos\nlelket adtál, Hogy mint főjót szeretnénk, Érzékeny szívvel formáltál.\n\n3. Mely méltó hát, hogy ezekkel Azt, aki adta őket, E drága\ntehetségekkel, Áldjuk teremtőjüket, Hogy legyen lelkünk, testünk Élő\ntemploma az Úrnak, Szívünk elménk, és nyelvünk Hirdetője jóságának.\n\n4. Tisztességes jó dolgokra Igazgassad kezeink. Ne hagyd hiábavalókra,\nHogy nézzenek szemeink, Szívünknek gondolati Legyenek épületesek,\nSzájunknak szózatai Mindenekelőtt kedvesek.\n\n5. Uram szent segedelmeddel Dolgainkban állj mellénk, És mennyei\nkegyelmeddel Új kegyelmet önts belénk, Hogy lelkünkkel, testünkkel\nDicsőségedre élhessünk, Minden tehetségünkkel, Uram, tégedet szeressünk.\n\nKováts József (1761*1830)","o":1},{"m":null,"r":428,"c":"Mennyben lakó én Istenem","b":"Kecskés Ernő\n\n1. Mennyben lakó én Istenem, Vedd füledbe dicséretem, Téged dicsér\negész világ, Néked köszön a kis virág, Erős vihar, kis gyenge szél,\nTenger, patak rólad beszél. Az ég s a föld telve veled, Legyen áldott a\nTe Neved!\n\n2. Mennyben lakó én Istenem! Könyörgök légy mindig velem! Ha kél a fény\nnapkeleten: A te szemed rajtam legyen! És ha leszáll napnyugaton: Te\nlégy, Atyám, az oltalom! Terjeszd ki rám áldó kezed: Legyen áldott a te\nneved!\n\nPósa Lajos (1850*1914)","o":1},{"m":null,"r":432,"c":"Maradj velem","b":"Monk W. H.\n\n1. Maradj velem, az alkony már leszáll, Ne hagyj Uram, körülfog a\nhomály, Nincsen segély s gyötör a félelem, Védtelenek őre, maradj velem!\n\n2. Hullám gyanánt tűnik a röpke lét, Gond veszi át a vidám zaj helyét,\nCsak változás és romlás mindenen, Te, ki nem változol, maradj velem!\n\n3. Ne csak tekints, ne csak szólj, ó Uram, Hanem esdek, lakjál itt\nuntalan. Ne mint vendég, ki percre megjelen: Örök barátomként maradj\nvelem!\n\n4. Ne mint király, ki számadásra von, Ó, jöjj keggyel, gyógyírral\nszárnyadon, Szüntesd a bút, enyhíts keservemen, Szabadítóm jövel s\nmaradj velem!\n\n5. Szerettél már, mint kicsiny gyermeket, Bár én sokszor lázadtam\nellened. A hűtelen csak én voltam, Te nem, Óhűséges Uram, maradj velem!\n\n6. Nálad nélkül percig sem élhetek, Ki győzné le a kísértéseket? Hű\nvezetőm ki lenne, ha Te nem? Fényben és árnyban, Ó, maradj velem!\n\n7. Nem rettegek, áldott vagyok veled, Könnyeimet letörli szent kezed.\nMi a halál? árt-e a sírverem? Győztes leszek, csak Te maradj velem!\n\n8. Jövel Uram, lezárt szemem elé, Tekints reám s mutass az ég felé,\nHajnal ragyog az oszló fellegen, Éltemben, holtomban, maradj velem!\n\n9. S midőn lelkem, mint szabadult madár, Az üdvösség fényes honába\nszáll, Ómily dicső, Uram, mit érezek, Mindörökké ottan veled leszek!\n\nLyte H. F. * Hozsánna\n\nDömötör Ilona átdolgozása","o":1},{"m":null,"r":435,"c":"Dallama: Vallásos népdal","b":"Dallama: Vallásos népdal\n\n1. Fáradt vagyok, lenyugszom, álmos szemem bezárom, a Te szemed jó\nAtyám, vigyázzon az éjjel rám!\n\n2. A mi bűnt elkövettem, Ne tekintsd, én Istenem! Jézus vére s\nkegyelmed Tegye jóvá vétkemet!\n\n3. Minden kedves rokonom Oltalmadban maradjon, Mindenkit ez éjjelen\nSzereteted megvédjen.\n\n4. Betegeket gyógyíts meg, Szárítsd le a könnyeket, Őrizz engem, jó\nAtyám, Ezen sötét éjszakán!","o":1},{"m":null,"r":437,"c":"Reám borul az éjjel","b":"Nürnberg 1536.\n\n2. Reám borul az éjjel, De biztatnak reménnyel Ott fenn a csillago,\nHogy engem is a mennybe Felvisz az Úr kegyelme, Ha a földtől\nmegválhatok.\n\n3. A test nyugodalmat áhít, Leveti ő ruháit, Halandóság jelit. De\nJézusom az égbe' Öltöztet dicsőségbe, Ha végórám elközelít.\n\n4. Fáradt tagjaim mostan Tegyétek le nyugodtan A napnak terheit,\nVigadj, szívem, te is majd Levetheted a bút, bajt S a bűn terhét, majd\nkeserít.\n\n5. Álom jő már szememre, Ki vigyáz életemre, Ha most elszunnyadok?\nIzrael őrizője Lesz házamnak védője, Nem érhetnek károk, bajok.\n\n6. Jézus, Te légy oltalmam, Nálad lesz jó nyugalmam Hű szárnyaid alatt.\nUram, csak Te vigyázz rám, Akkor nem árt a Sátán, S testem, lelkem békén\nmarad.\n\n7. Ti is távol s közelben, Akik szerettek engem, Békén pihenjetek, A\nsötét éjszakába' Az Úr világossága Őrködjék hűn fölöttetek.\n\nGerhardt Pál (1607*1676)\n\nTavasszal","o":1},{"m":null,"r":438,"c":"Örvendezzünk a nagy Istennek","b":"A 65. zsoltár dallamára: A Sionnak hegyén Úristen.\n\n1. Örvendezzünk a nagy Istennek, Kies tavaszt értünk, Egy hatalmas\nszavára ennek Meglett, amit kértünk, Megújult az egész természet, Elmúlt\nkomor tele, Mind napkelet, mind az enyészet Örömmel van tele.\n\n2. A feltámadás és az élet Látszik minden részen, Ó, Isten, szívünk\nBenned éled, Elhisszük egészen, Hogy az a jóltevő hatalom Porunkat\nfelkölti, Majd ha a hosszas nyugodalom Idejét kitölti.\n\n3. Jó vagy, Uram, tégy jól népeddel, Szánd meg bűneinket, Vétkeinket\nkegyesen vedd el, Szentelj is meg minket, Hogy az utolsó számadásra\nHittel elkészüljünk, Így a trombita harsogásra Felkelvén, örüljünk.\n\nGál András \\<187\\> 1828.","o":1},{"m":null,"r":439,"c":"Az Úrnak szavára a hidegek már eltűnnek Egy fuvallására téli","b":"A 180. dicséret dallamára: * Dicséret, dicsőség, tisztesség.\n\n1. Az Úrnak szavára a hidegek már eltűnnek Egy fuvallására téli jegek\nlenni szűnnek, 'A dél újító szellőt lehel, A víg természet szül és\nnevel, Szép a tavasz szüleményivel.\n\n2. Ó, Isten, földednek ha itt ilyen a szépsége, Hát ott fenn egednek\nmilyen lehet fényessége? Hol a békesség virágozik, Örök kedvesség\nillatozik, Ó, az idvesség ott lakozik.\n\n3. Uram, kérünk Téged, esedezvén, hogy helyünket, Adja ott Felséged,\nhogy végezvén életünket, Mi is színedet megláthassuk, Bölcsességedet\ncsodálhassuk, Örökségedet ott birhassuk.\n\n4. E végre lelkednek irgalmával élessz minket, Újítsd kegyelmednek\ntavaszával szíveinket, Hogy míg vég leszek futásunkban, Éljünk egészen\nJézusunkban, Ki általteszen tavaszunkba.\n\nKeresztesi József (1748*1812)\n\nÁrvíz idején","o":1},{"m":null,"r":440,"c":"Haragodnak nagy voltában","b":"A 38. zsoltár dallamára: * Haragodnak nagy voltában.\n\n1. Haragodnak nagy voltában, Búsultában Ne eméssz meg, Istenünk,\nKártevő árvizeidet, Özönidet, Ne bocsássad ellenünk.\n\n2. Ne vedd el szemünk láttára A munkára Megmutatott bérünket, Házunk\nnépe szükségére, Élelmére Kiszabott kenyerünket.\n\n3. Rétjeinknek ékességét Dicsőségét Iszappal bé ne borítsd, Barmainkat\nígy szükségre És éhségre, Bűneinkért ne szorítsd.\n\n4. Azt ugyan nem tagadhatjuk, Sőt megvalljuk, Hogy ellened vétettünk,\nMelyre nézve Felségedtől, Szentségedtől, Büntetést érdemlettünk.\n\n5. De bár megharagítottunk, Bosszantottunk, Te teremtésid vagyunk,\nSemminemű szükségünkben, Ínségünkben Tégedet el nem hagyunk.\n\n6. Atyai irgalmasságod, Igazságod, Ó, Isten, mérsékelje, Hogy\njóvoltodnak látása, Kóstolása Reménységünk nevelje.\n\nJuhász András (\\<187\\> 1829)","o":1},{"m":null,"r":441,"c":"Jó Isten, könyörülő Atyánk","b":"A 80. zsoltár dallamára: Hallgasd meg, Izrael pásztora.\n\n1. Jó Isten, könyörülő Atyánk, Dicséretedre nyílik meg szánk, Mert a\nbűnöst soká várod, Karod feléje kitárod, Kérésit meg ne utálod, Sőt\nkegyelmeddel kínálod.\n\n2. Áldásiddal a megtérésre Hívod a szentség követésre. Fenyegeted, míg\nbüntetnéd, Míg orcád elől elvetnéd. Ha nem hallgat édes szódra, Úgy\nbánsz vele bíró módra.\n\n3. Megvertél, de gyenge ostorral, Áradást szerző bő záporral, Érdemesek\ntöbbre volnánk, Hazudnánk, ha így nem szólnánk:\n\nElvetted eledelünket, De megtartottad éltünket.\n\n4. Uram, sírunk, hogy kárt vallottunk, De inkább mert hogy\nmegbántottunk, Bánjuk a sok balgaságot, Gyógyítsd meg e romlottságot,\nRád néző bánattal törd meg Szívünk s bűneink bocsásd meg.\n\n5. Barmunk, búzánk a víz elvette, A nagy áradás elseprette, Alig maradt\nruházatunk, Könnyel teljes ábrázatunk, De kérünk, hogy jobb részünket,\nNe hagyd éhezni lelkünket.\n\n6. Adj tűrő szívet is minékünk, Tudván, az ég örökös székünk. Azt tűz,\nsem víz el nem rontja, Békességünk fel nem bontja, Örökkévaló lészen az,\nMelyhez képest e föld csak gaz.\n\n7. Isten, légy irgalmas, kegyelmes, Légy kéréseinkre figyelmes. Tekints\na mi Jézusunkra, Ki jobbodon ül javunkra, Szólj örömet örömünkre, És\nmondj áment énekünkre.\n\nPálóczai Pál.\n\nMikor az árvizek megtérnek","o":1},{"m":null,"r":442,"c":"Az Úr meghallgata bennünket Nagy kegyességéből","b":"A 65. zsoltár dallamára: * A Sionnak hegyén, Úristen.\n\n1. Az Úr meghallgata bennünket Nagy kegyességéből: Elhárította\nfélelmünket Ingyen jó kedvéből. Áldozzunk hát hálaadással Az egek\nUrának, Hogy szent kezei pusztulással Nem ostoroznának.\n\n2. Mit adjunk, Atyánk, jóvoltodért? Lelkünket, testünket Néked ajánljuk\njóságodért Éltünk s mindenünket. Készek leszünk tiszteletedre, Valamíg\ncsak élünk, Csak Te méltóztass kegyelmedre S lelked legyen vélünk.\n\n3. Bár az áldozat tökéletlen, Amelyet ígértünk, Ne legyen előtted\nkelletlen, Téged arra kérünk. Sőt lelked úgy bírjon bennünket, Hogy\nszentül élhessünk, Szolgáljunk téged, Istenünket, Tenéked tetszhessünk.\n\nNádaskai József (1771*1821)\n\nAratáskor","o":1},{"m":null,"r":444,"c":"Tekints reánk","b":"A 184. dicséret dallamára: * Ne szállj perbe énvelem.\n\n1. Tekints reánk, Úristen, Nagy kegyelmességedből, Könyörülj rajtunk\natyai jóvoltodból, A magas mennyországból.\n\n2. Sok szükségink, Úristen, Jóllehet vannak nékünk, Melyeket elménkkel\nel nem gondolhatunk, Elő sem számlálhatunk.\n\n3. De ezek közt, Úristen, Mostani kérésünkben Hallgasd meg kegyesen mi\nkívánságunkat, Mert kérünk, mint Atyánkat.\n\n4. Adj minékünk, Úristen, Kellemetes esőket, Földet megújító égi\nharmatokat, Hasznos nedvességeket.\n\n5. Nyisd meg nékünk, Úristen, A te kincses házadat, Ahonnan szállítod\njó adományidat, És minden áldásid
