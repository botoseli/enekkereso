agot hintik keseregve, De a jó kévéket aztán Béhordják nagy vigasságban."},{"m":127,"r":127,"c":"Hogyha ember házat épít Isten segedelme nélkül, Ott a munka hiába kél.","b":"1. Hogyha ember házat épít Isten segedelme nélkül, Ott a munka hiába kél. Ha Isten nem őrzi népét És a várost meg nem óvja, Az őrzőknek semmi haszna. \n2. Hiába keltek fel reggel, Nagy későn feküdni menvén, Alig esztek a kenyérben, Mit kerestek verejtékkel, Holott kit az Isten szeret, Annak könynyen ád eleget. \n3. Akinek gyermeki vannak, Szép ajándékkal láttatik, Mely az Istentől adatik. Kedves áldása az Úrnak: Láthatja ő magzatait, Önnön méhének gyümölcsit. \n4. Ó, mely drága adományok, Hogy az ily apró gyermekek Ékesen felnevelkednek, És ők szintén olyaténok, Mint nyilak a jó kézívben, Az erős vitéz kezében."},{"m":128,"r":128,"c":"Boldog az ember nyilván, Ki az Istent féli, Ő útaiban járván, Ösvényit","b":"1. Boldog az ember nyilván, Ki az Istent féli, Ő útaiban járván, Ösvényit kedveli. Mert magadat táplálod Kezed munkájával, Isten megáldja dolgod, Lát jó állapottal. \n2. Házadban feleséged, Mint a szőlőveszsző, Szép gyümölcsöt hoz néked, Ha eljő az idő. Meglátod gyermekidet Te asztalod körül, Renddel, mint olajveszszőt, Kikben szíved örül. \n3. Ez igen szép ajándék, Mit az Isten enged Az őbenne hívőknek, Akiket ő szeret. És végre te meglátod Fiadnak fiait, A Sionnak csudálod Nagy szép békességit."},{"m":129,"r":129,"c":"Én ifjúságomtól fogva engem Sanyargattak, mondhatja az Izráel, Régtől","b":"1. Én ifjúságomtól fogva engem Sanyargattak, mondhatja az Izráel, Régtől fogván sok bút tettek nékem, Mégsem fogyathattak el teljességgel. \n2. Széjjel-keresztül az én hátamat Megszántották és megszaggatták szörnyen, Vontanak rajtam nagy barázdákat, Úgy hogy testemben semmi ép tag nincsen. \n3. De az igazságnak jó Istene Elszaggatá az ellenség kötelét; Kik irigykednek Sion hegyére, Nagy szégyenség térítse hátra őket! \n4. Mint a hitvány fű, olyak legyenek, Amely szokott nőni az eszterhákon, Elszáradnak, mielőtt kinőnek, Amelyben nincsen sehol semmi haszon. \n5. Min az arató nem talál anynyit, Hogy egy marokkal valót arathatna, Nemhogy köthetne valami kévét, Amit az ember ölébe szorítna. \n6. És aki itt elmégyen, ne mondja: „A kegyes Isten áldjon meg titeket, Ti aratástok légyen szapora, Az Úr nevében áldunk benneteket!”"},{"m":130,"r":130,"c":"Tehozzád teljes szívből Kiáltok szüntelen: E siralmas mélységből Hallg","b":"1. Tehozzád teljes szívből Kiáltok szüntelen: E siralmas mélységből Hallgass meg, Úr Isten! Nyisd meg te füleidet, Midőn téged hívlak, Tekintsd meg én ügyemet, Mert régen óhajtlak. \n2. Ha, Uram, bűnünk szerint Minket büntetnél meg: Uram, e világ szerint Ki állhatna úgy meg? De a te irgalmad nagy A téged félőkön, És te engedelmes vagy, Hogy dicsérjen minden. \n3. Énnékem reménységem Vagyon csak Istenben, És bízik az én szívem Ő szent igéjében. Én lelkem erős hittel Az Urat óhajtja, Mint a virrasztó éjjel A virradtát várja. \n4. Izráel, az Istenben Vesd reménységedet, Mert szent irgalma bőven Nagy meszsze kiterjedt. Megsegít ő mindenben, Hívein könyörül, Az Izráelt kegyesen Kimenti bűnébül."},{"m":131,"r":131,"c":"Uram, nem űz nagyra szívem, Szemem nem hányom magasan; Nem leledzem ol","b":"1. Uram, nem űz nagyra szívem, Szemem nem hányom magasan; Nem leledzem oly dolgokban, Mik felülhaladnak engem. \n2. De kivetettem szívemből Mindennemű kevélységet, Mint midőn a kisgyermeket Elfogják anyja tejétül. \n3. Hogyha olyanná nem lettem, Mint az együgyű kis gyermek, Kit a csecs mellől elvesznek, Meg se kegyelmezz énnékem. \n4. Izráel, az Úr Istenben Vessed minden reménységed! Megtartódnak őtet higygyed Mostan és minden időben!"},{"m":132,"r":132,"c":"Emlékezzél meg, Úr Isten, Dávidról és ínségéről, Ki néked megesküdt sz","b":"1. Emlékezzél meg, Úr Isten, Dávidról és ínségéről, Ki néked megesküdt szívből, És fogadást tett hűségben Az Úrnak, kit Jákób tisztöl. \n2. Ezt, úgymond, én fölfogadom, Hogy nem megyek be házamba, Se le nem fekszem ágyamba, Szemeimet be sem hunyom, Szempillámat le sem zárva; \n3. Nyugalmam addig nem lészen, Míglen helyet nem keresek A Jákób nagy Istenének, Holott sátort szerzek szépen, Hol dicsősége lakozzék. \n4. Mert e Siont az Úr Isten Választá lakóhelyének, Mondván: e hely kell kedvemnek, Itt lakom minden időben; Ez helye jótetszésemnek. \n5. Én őket megelégítem, Kenyért adok a szegénynek, Ruhájába üdvösségnek Papjait felöltöztetem; Örömük lesz a híveknek."},{"m":133,"r":133,"c":"Ímé, mily jó és mily nagy gyönyörűség Az atyafiak közt az egyenesség,","b":"1. Ímé, mily jó és mily nagy gyönyörűség Az atyafiak közt az egyenesség, Ha békével együtt laknak. Mint a balzsamolaj, ők olyanok! Megáldja az Úr az ilyeneket, Nékik ád hoszszú életet."},{"m":134,"r":134,"c":"Úrnak szolgái mindnyájan, Áldjátok az Urat vígan, Kik az ő házában éjj","b":"1. Úrnak szolgái mindnyájan, Áldjátok az Urat vígan, Kik az ő házában éjjel Vigyázván, vagytok hűséggel. \n2. Felemelvén kezeteket, Dicsérjétek Istenteket, Szívből néki hálát adván, Őt áldjátok minduntalan! \n3. Megáldjon téged az Isten A Sionról kegyelmesen, Ki teremtette az eget, A földet és mindeneket!"},{"m":135,"r":135,"c":"Áldjátok az Úr nevét, Akik néki szolgáltok! Magasztaljátok őtet, Kik h","b":"1. Áldjátok az Úr nevét, Akik néki szolgáltok! Magasztaljátok őtet, Kik hív szolgái vagytok, Kik állotok házában És jártok tornáciban. \n2. Dicsérjétek, mert jó ő, Áldjátok ő szent nevét, Mert ő igen jókedvű! Jákóbot, mint ő népét, Izráelt elválasztá, Örökévé foglalá. \n3. Mert tudom, hogy ez Isten Erősb más isteneknél, Hatalma nagy mindenen; Isteni beszédével, Amit akar az égen, Megtészi földön, vízen. \n4. Megáll örökké neve És szent emlékezete. Ítéli hatalmában, Népét igazságában; Szolgáinak az Isten Megkegyelmez kegyesen. \n5. Kik az Urat félitek, Szent nevét dicsérjétek! A Sionról áldjátok És őt magasztaljátok Az ő lakóhelyében, A szent Jeruzsálemben!"},{"m":136,"r":136,"c":"Dicsérjétek az Urat, Mert ő jókedvet mutat, És az ő kegyessége Megmara","b":"1. Dicsérjétek az Urat, Mert ő jókedvet mutat, És az ő kegyessége Megmarad mindörökre. \n2. Áldjátok Istenteket, Isteneknek Istenét, Mert az ő kegyessége Megmarad mindörökre. \n3. Dicsérje őtet minden, Mert nagy csudákat tészen, És az ő kegyessége Megmarad mindörökre. \n4. Minden őt magasztalja, Mert ő Uraknak Ura, És az ő kegyessége Megmarad mindörökre. \n5. Ki a menynyet teremté És bölcsen ékesíté, Mert az ő kegyessége Megmarad mindörökre. \n6. Aki a széles földet Szerzette a víz felett, És az ő kegyessége Megmarad mindörökre. \n7. Ki nagy szép lámpásokat Fenn az égen alkotott, És az ő kegyessége Megmarad mindörökre. \n8. Nappal vezérlésére A napfényt teremtette, És az ő kegyessége Megmarad mindörökre. \n9. Ellenségünk kezéből Megmente jókedvéből, És az ő kegyessége Megmarad mindörökre. \n10. E földön minden testet Táplál és bőven éltet, És az ő kegyessége Megmarad mindörökre. \n11. Áldjátok az Úr Istent Minden népek naponként, Mert az ő kegyessége Megmarad mindörökre."},{"m":137,"r":137,"c":"Hogy a babiloni vizeknél ültünk, Ott mi nagy siralomban keseregtünk, A","b":"1. Hogy a babiloni vizeknél ültünk, Ott mi nagy siralomban keseregtünk, A szent Sionról megemlékezvén, Melynél gyönyörűségesb hely nincsen. A nagy búnak és bánatnak miatta Hegedűnket függesztettük fűzfákra. \n2. Akik minket fogva tartottak, kértek, Hogy valamit hegedülnénk nékiek, És mondanánk sioni éneket. Felelvén mondtuk: Miképpen lehet? Hogy dicsérhetnénk az Úr Istent vígan, Énekelvén ez idegen országban? \n3. Íme, neked én azt nyilván felelem, Hogy hegedülésemet elfelejtem Előbb, hogynem a Jeruzsálemet. Míg e fogságban tartnak engemet, Inkább ínyemhez ragadjon én nyelvem, Ha Jeruzsálemre nem óhajt szívem! \n4. Az Édom fiairól emlékezzél, És nékiek azt, Uram, ne engedd el, Amit ők akkoron kiáltottak, Midőn Jeruzsálemet rontották: „Foszszad, foszszad Jeruzsálemnek népét, Földig lerontsad minden épületjét!” \n5. Te, Babilonnak leánya, meghigygyed, Hogy végre még por-hamuvá kell lenned! Boldog, aki tenéked e dolgot, Megfizeti e méltatlanságot, Ki öledből gyermekidet kirántja, És az erős kősziklához paskolja!"},{"m":138,"r":138,"c":"Dicsér téged teljes szívem, Én Istenem, Hirdetem neved. Dicsérlek iste","b":"1. Dicsér téged teljes szívem, Én Istenem, Hirdetem neved. Dicsérlek istenek felett Én tégedet, Mert azt érdemled. És a te szentegyházadban Imádkozván, Neved tiszte lem, Áldásodra én kész vagyok, Hálát adok Neked, Istenem. \n2. Öregbül nagy dicsőséged, Mert megtészed, Amit megmondasz. Ha könyörgök ínségemben, Engem menten Megszabadítasz. Téged minden földön lakók, Nagy királyok, Uram, dicsér nek, Mert szent igéd tiszta voltát, Igazságát Eszükbe vették. \n3. Ez Urat, ki felségesen Csudát teszen, Felmagasztalják. Mondván: nagy ő dicsősége És ereje, Őt azért áldják. Mert noha ül nagy magasan, De lát nyilván Alatt való kat; Magas dolgokat is könynyen, Lát élesen, Mind fent, mind alatt. \n4. Mindennemű szükségemben, Ínségemben Megerősítesz; Láttukra ellenségimnek, Kik gyűlölnek, Engem megmentesz. Amit az Úr egyszer végez, Az jó véghez megyen minde nütt. Jókedved megáll: ne hagyd el, Sőt végezd el Kezed munkáit!"},{"m":139,"r":139,"c":"Uram, te megvizsgálsz engem, Megismersz mindent énbennem, Vagy állok,","b":"1. Uram, te megvizsgálsz engem, Megismersz mindent énbennem, Vagy állok, ülök, vagy megyek, Mind tudod, amit művelek; Valamit gondolok szívemben, Te azt mind jól érted meszszünnen. \n2. Vagy járok-kelek, vagy fekszem, Te mindenütt vagy körülem. Jól látod minden utamat, Érted minden dolgaimat; Egy szó sem jő az én nyelvemre, Mit előbb ne tudtál volna te. \n3. Körös-körül rajtam minden Tőled vagyon teremtetvén, Reám bocsátád kezedet, Felülmúlja értelmemet. Bölcseséged meg nem foghatom, Dolgaidon csak álmélkodom. \n4. Lelked előtt hová mennék, Holott elrejtve lehetnék? Előtted hova szaladjak? Égbe menjek? Ott talállak! Ágyamat ha vetném pokolban, Ott látnálak téged legottan. \n5. Ha a hajnal szárnyát venném, És az égre emelkedném, És elrepülnék nagy meszsze, A külső tenger szélire, Ott is meglelnél, Uram, engem, Kezedet el nem kerülhetem. \n6. Mondék: talán setétséggel Bétakarózhatom éjjel. Az sem lenne használatos, Mert még az éj is világos, Mely körülem anynyira fénylik, Hogy nékem fényes napnak látszik. \n7. Nálad ismeretes voltam Előbb, hogynem formáltattam, Hogy még nem voltam, ismertél, És napjaimra szemléltél, Mik könyvedben voltak felírva, Midőn még nem voltak formálva. \n8. Mily drágák a te tanácsid, Ha megnézem gondolatid, Számtalan soknak találom, Ha kimondani akarom; Többnek lelem én a fövénynél, Mely sok a tengerparton széjjel. \n9. Vizsgálj meg és jól próbálj meg, Szívemet valóban nézd meg, És lásd meg, minémű vagyok! Ha gonosz ösvényen járok, És ha olyannak találsz engem, Vezess a jó útra, Istenem!"},{"m":140,"r":140,"c":"Szabadíts meg engem, Úr Isten, A gonosz csalárd embertől; Őrizz erősza","b":"1. Szabadíts meg engem, Úr Isten, A gonosz csalárd embertől; Őrizz erőszaktevők ellen, Ments meg a vakmerő néptől! \n2. Kik csak hamisságot gondolnak Mindenkor az ő szívükben, És hogy hadakat indítsanak, Azon vannak mindenképpen. \n3. Ments meg a gonoszok kezébül, Akik erőszakot tesznek, És igyekeznek szüntelenül, Hogy engemet megejtsenek. \n4. Uram, segítség vagy te nékem Mindennémű ínségemben, Azért védelmezd meg én fejem A hadakozó időben! \n5. Ne engedd a hitetleneknek, Hogy elővigyék dolgukat! Hogy inkább ne kevélykedjenek, Rontsd meg gonosz szándékukat! \n6. Tudom, hogy Isten a szegénynek Felfogja ügyét kegyesen, Megkegyelmez az erőtlennek, Ő igazságát jelentvén. \n7. Az igazak szép énekekkel Dicsérik te szent nevedet, És örökké jó reménységgel Megmaradnak színed előtt!"},{"m":141,"r":141,"c":"Tehozzád kiáltok, Úr Isten, Siess énhozzám, ne késsél, Mert téged óhaj","b":"1. Tehozzád kiáltok, Úr Isten, Siess énhozzám, ne késsél, Mert téged óhajtlak szívvel, Azért hallgass meg kegyelmesen! \n2. Könyörgésem elődbe menjen, Mint jó illat füstölgése, Kezeim felemelése Estvéli áldozatul légyen! \n3. Őrizettel tartsd meg én szájam, Amely gondot tartson arra; Závárt szerezz ajakimra, Hogy tőlük ne légyen nyavalyám! \n4. Ne bocsássad szívem gonoszra, Hogy a hamisan élőkkel Soha ne ereszkedjem el, Az ő nyájas kívánságokra. \n5. A hív ember megfeddjen engem, És feddése kedves légyen, Mint balzsamolaj fejemen; Még verése sem árt énnékem! \n6. Mert én elhiszem s mondom nyilván, Hogy még a hitetlenekért, Imádkozom mentségekért, Nyavalyájukon szánakozván. \n7. Szemeim reád néznek, Uram, Reménységem vagyon benned, Lelkemet hát el ne vessed, Mert te vagy minden bizodalmam!"},{"m":142,"r":142,"c":"Én az Úrhoz felkiálték, Kiáltván néki könyörgék, Jelentvén én panaszim","b":"1. Én az Úrhoz felkiálték, Kiáltván néki könyörgék, Jelentvén én panaszimat, Megbeszélém nyavalyámat. \n2. Ha szorongattatik lelkem, Te utat mutatsz énnekem, Módot találsz, amely által Megszabadulok jó móddal. \n3. Utamra tőrt mernek hányni, Amelyen szoktam én járni. Tekintek széjjel mellőlem, De senki nem ismer engem. \n4. Bezárattak utak, ajtók, Egy felé sem szaladhatok, És ez ilyen ínségemben Senki nincsen, ki segítsen. \n5. Tehozzád kiálték, Uram, Mondván: te vagy bizodalmam, És egyedül reménységem E földön csak te vagy nékem. \n6. Halld meg az én imádságom, Mert igen sanyargattatom! Ments meg ellenségim ellen, Mert erősbek, hogynem mint én! \n7. Vedd ki fogságból lelkemet, Hogy dicsérjem szent nevedet, Hogy jól téssz velem, a hívek Ottan engem körülvesznek."},{"m":143,"r":143,"c":"Hallgasd meg, Uram, kérésemet, Vedd füledbe könyörgésemet A te ígérete","b":"1. Hallgasd meg, Uram, kérésemet, Vedd füledbe könyörgésemet A te ígéreted szerint! Hallgass meg és tarts meg engemet Te szent igazságod szerint! \n2. Az ellenség kerget engemet, A földhöz verte életemet, Helyheztetett a setétbe. Setétségben engem elrejtett, Mint halottat sír mélyébe. \n3. Ez ilyen nagy ínségim között Említem a régi időket, Nézvén sok csuda dolgodat, Melyeket kezed cselekedett, Mikkel biztatom magamat. \n4. Tehozzád, én Uram, Istenem, Nagy siralommal felemelem És kinyújtom kezeimet. Tégedet úgy óhajt én lelkem, Mint a száraz föld a vizet. \n5. Ne késsél, hallgasd meg kérésem, Mert elfogy bennem az én lelkem! Színed tőlem el ne térjen, Mert immár olyanná kell lennem, Mint aki száll sír mélyében! \n6. Uram, engemet erősíts meg, Te szent nevedért vigasztalj meg, És a te kegyességedből Az én életem szabadítsd meg Mindennémű ínségekből!"},{"m":144,"r":144,"c":"Áldott az Úr, ki kezemet tanítja, És ujjaimat a hadakozásra, Áldott le","b":"1. Áldott az Úr, ki kezemet tanítja, És ujjaimat a hadakozásra, Áldott legyen az én jó Istenem, Aki mindenkor megőriz engem! Ő az én kőváram és szabadítóm, Ő én paizsom és én oltalmazóm. Tebenned vetem reménységemet, Mert alám vetéd az én népemet. \n2. De micsoda az ember életében, Hogy őreá gondot tartasz ekképpen? Micsodák az emberek fiai, Hogy felséged őket így kedveli? Az emberek dolgát ha megtekinted, Legottan őket csak semminek leled; Az ő napjai hamar elfogynak, És mint az árnyék, ottan elmúlnak."},{"m":145,"r":145,"c":"Magasztallak téged, én Istenem, Ó, én királyom, neved tisztelem! Minde","b":"1. Magasztallak téged, én Istenem, Ó, én királyom, neved tisztelem! Mindennap hirdetem dicséreted, És örökké áldom te szent neved! Igen dicséretes és nagy az Isten, Megfoghatatlan ő dicsőségében. Nemzetről nemzetre te dolgaidat, Mindenkor hirdetik nagy hatalmadat. \n2. Éneklem a te dicsőségedet, A te felséges dicséretedet! Csudatétidet minden népeknél Én kibeszélem mindenütt széjjel, Hogy hatalmadat mindenek hirdessék, Melyet dolgaidban eszükbe vesznek. Dicsőségedet én el nem hallgatom, De mindeneknek jól előszámlálom. \n3. Megáll örökké a te országod, És mindenkor tart uralkodásod. Az Úr megtartja az eldűlőket, És felemeli az elesteket. Mert mindeneknek szemei rád néznek, Idején eledelt adsz őnekiek, Midőn felnyitod áldott kezeidet, Bőven megelégítesz mindeneket. \n4. Az Úr igaz minden útaiban, És szentséges minden dolgaiban. Közel vagyon ő azokhoz nyilván, Akik hozzá kiáltnak valóban. És amit az istenfélők kívánnak, Őnékik nagy bőségben megadatnak; Nagy kegyelmesen őket meghallgatja, És üdvösségét nékik megmutatja."},{"m":146,"r":146,"c":"Áldjad, én lelkem, az Urat, Hirdessed dicséretét! Az Istennek adok hál","b":"1. Áldjad, én lelkem, az Urat, Hirdessed dicséretét! Az Istennek adok hálát, Valamíg engem éltet. Én az Úrnak éneklek, Mindaddig, míglen élek. \n2. Ki a menynyet és a földet És a tengert teremté, És ezekben mindeneket Nagy hatalmával szerze, Igazsága, hűsége megmarad mindörökre. \n3. Akik méltatlan szenvednek, Megmenti a jó Isten, A nyomorult éhezőknek Ő ád eledelt bőven, A foglyokat kihozza, Rabságból kioldozza. \n4. És a világtalanoknak Megnyitja ő szemöket; Akik dűlőfélben vannak, Meggyámolítja őket, Mert az igazat híven Szereti az Úr Isten. \n5. Veszedelmében megmenti A nyavalyás jövevényt; Az árvákat megsegíti, Rájuk kegyesen tekint; A sérelmes özvegyek Tőle megenyhíttetnek. \n6. A hitleneket megrontja, Ösvényüket elvesztve, De megáll az ő országa Most és minden időbe’. Ó, Sion, a te Urad Mindörökké megmarad!"},{"m":147,"r":147,"c":"Az Urat dicsérjétek, mert jó, És az Istent dicsérni méltó; Kedves dolo","b":"1. Az Urat dicsérjétek, mert jó, És az Istent dicsérni méltó; Kedves dolog az Úr Istennél, Hogy őtet dicsérjék egy szívvel, Mert Jeruzsálemet az Isten Megépíti nagy kegyelmesen, Ismét az Izráel nemzetjét, Öszszegyűjti eloszlott népét. \n2. Töredelmes szívet meggyógyít, Sérelmes lelket ő megenyhít, Békötözi az ő sebüket, megkönynyebbíti sérelmüket. A csillagokat megszámlálja, És azoknak számát jól tudja, És mindeniket úgy ismeri, Hogy tulajdon nevén nevezi. \n3. Nagy a mi Urunk, az Úr Isten, Akinél nagyobb semmi nincsen; Erőssége kimondhatatlan, Bölcsessége számlálhatatlan. Az együgyűket felemeli, A szelídeket erősíti, Megalázza a hitleneket, A földre lealázza őket. \n4. Inkább azokban gyönyörködik, Kik igazán csak őtet félik, Kik teljes szívből kegyes voltát, Reménylik mindenkor irgalmát. Dicsérd, Jeruzsálem, az Urat, Felmagasztaljad nagy hatalmát, E kegyes Urat, ó, szent Sion, Te is dicsérd áhítatoson! \n5. Jákóbnak adá szent igéjét, Hogy ahhoz szabják életüket; Törvényit adá Izráelnek, Hogy ők azok szerint éljenek. Nem tőn így semmi pogány néppel, Nem látá őket ily szentséggel, Szent szerzésit ők nem ismerték, Ezért Alleluja mondassék!"},{"m":148,"r":148,"c":"No, dicsérjétek mindnyájan Az Urat a mennyországban! Őt dicsérjétek az","b":"1. No, dicsérjétek mindnyájan Az Urat a mennyországban! Őt dicsérjétek az égben, Az ő felséges székében! Minden angyalok őt dicsérjék, És minden menynyei seregek, A nap és hold őt dicsérje Minden csillagokkal egybe'! \n2. Az Urat ti magas egek, Dicsérjétek minden vizek, Mik fenn az égben lebegtek, Az Úr nevét dicsérjétek! Mert mindeneket igéjével, Ő teremte nagy erejével, Mindent úgy megerősíte, Hogy megálljon mindörökre. \n3. Ifjak, leányok és vének, Az Úr Istent dicsérjétek, Mert nevének dicső volta menynyet-földet felülmúlja! Arcát felemeli népének, Minden szentek, őt dicsérjétek! Izráel választott népe Az Úrnak nevét dicsérje!"},{"m":149,"r":149,"c":"Az Úrnak, no, énekeljetek Új éneket szent felségének! A szentek gyülek","b":"1. Az Úrnak, no, énekeljetek Új éneket szent felségének! A szentek gyülekezetében Dicsérje Őtet minden! Az Izráel örvendezzen Ő teremtő Istenében, Királyuknak örüljenek A Sionbéliek! \n2. Az Úr nevét síppal és dobbal, Dicsérjétek lanttal, kobozzal, Légyen hegedűknek zengése Neve dicséretére! Mert az Isten az ő népit, Igen szereti híveit, A szegényeket megmenti, Sok jókkal szereti. \n3. Szent hívei az Úr Istennek Nagy tisztességet tőle nyernek; Örülnek ő hálóházukba’, Az Urat magasztalva. Dicséretét az Istennek Az ő szájukban viseljék, És kétélű fegyver lészen Nékiek kezükben!"},{"m":150,"r":150,"c":"Dicsérjétek az Urat! Áldjátok ő szent voltát! Dicsérjétek menynyekben,","b":"1. Dicsérjétek az Urat! Áldjátok ő szent voltát! Dicsérjétek menynyekben, Hol országol kegyesen Az ő nagy dicsőségébe'! Dicsérjétek hatalmát, Melyből dicső nagy voltát Minden veheti eszébe! \n2. Dicsérjétek őt kürtben, Ékes éneklésekben; Hegedűkben, lantokban És hangos citerákban Az Úrnak zengedezzetek! Sípokban, orgonákban És más szép muzsikákban Örvendjetek az Istennek! \n3. Az Urat cimbalmokban És egyéb szerszámokban Mindnyájan dicsérjétek, Citerát pengessetek, Az Úr szent nevét dicsérvén! Minden lelkes állatok, Istent magasztaljátok: Dicsőség Istennek! Ámen."},{"m":151,"r":151,"c":"Uram Isten, siess Minket megsegíteni Ily nagy szükségünkben, Krisztus","b":"1. Uram Isten, siess Minket megsegíteni Ily nagy szükségünkben, Krisztus Jézusért, Mi Urunkért És Megváltónkért."},{"m":152,"r":152,"c":"Szent Isten, noha néked Az egek ülő széked, Ott dicsérnek tégedet, Biz","b":"1. Szent Isten, noha néked Az egek ülő széked, Ott dicsérnek tégedet, Biztat szent ígéreted, Hogy azért meg nem veted Földön lakó népedet. Együtt vagy vélek, Kikben alázatos a lélek, Mi is hát térdet hajtunk, Hogy rajtunk Könyörülj, kegyelmeddel Fogadd el, Mikor tehozzád emel kezet Ez a gyülekezet."},{"m":153,"r":153,"c":"Ó, mely boldog ember az, Ki téged, élő, igaz, Egy Istent megismerhet,","b":"1. Ó, mely boldog ember az, Ki téged, élő, igaz, Egy Istent megismerhet, És te szent hajlékodban Lélekben, Igazságban Dicsérhet és tisztelhet. Ó, mi Istenünk, Adtad e boldogságot nekünk; Adjad, hogy ismerhessünk Még jobban, Naponként dicsérhessünk Buzgóbban! Szent Lelkedet hozzánk e végre Küldd el segítségre!"},{"m":154,"r":154,"c":"Úr Jézus, mely igen drága A te igédnek világa, Mely bölcscsé tévén az","b":"1. Úr Jézus, mely igen drága A te igédnek világa, Mely bölcscsé tévén az elmét, Szüli az Úrnak félelmét. Gerjeszd fel most indulatunk, Hogy míg igédre hallgatunk, Végyen bennünk épületet A hit, reménység és szeretet: Tégy bölcsekké, tégy szentekké!"},{"m":155,"r":155,"c":"Ó, Úr Isten, légy közöttünk, Kik imádásodra jöttünk, Szívünk egyedül r","b":"1. Ó, Úr Isten, légy közöttünk, Kik imádásodra jöttünk, Szívünk egyedül rád hallgasson, Hogy igédnek áldott szava, Melytől függ lelkünknek java, Minket minden jóra bírhasson: Szent e hely, légyenek szentek, Kik e házban megjelentek."},{"m":156,"r":159,"c":"Úr Isten, mi sok szükséget Érezvén körülöttünk, Segedelemkérés végett","b":"1. Úr Isten, mi sok szükséget Érezvén körülöttünk, Segedelemkérés végett E szent helyre feljöttünk. Uram, a könyörgőnek Illesd meg szívét és száját, A téged tisztelőnek Áldd és szenteld meg munkáját."},{"m":157,"r":158,"c":"Könyörülj rajtunk Úr Isten! És hallgasd meg A mi imádságinkat!","b":"1. Könyörülj rajtunk Úr Isten! És hallgasd meg A mi imádságinkat!"},{"m":158,"r":null,"c":"Ha te meg nem tartasz, Uram Isten, Hiába vigyáznak A mi szemeink.","b":"1. Ha te meg nem tartasz, Uram Isten, Hiába vigyáznak A mi szemeink."},{"m":159,"r":null,"c":"Atya, Fiú, Szentlélek, Teljes Szentháromság, Egy és örök Istenség, Men","b":"1. Atya, Fiú, Szentlélek, Teljes Szentháromság, Egy és örök Istenség, Mennybéli uraság; Igaz, erős, kegyelmes, Jó, hív, irgalmasság: Téged áld ég, föld s tenger: Áldott Szentháromság!"},{"m":160,"r":null,"c":"Minden teremtett állatok Az Úr Istent áldják, Néki sok ezer angyalok >","b":"1. Minden teremtett állatok Az Úr Istent áldják, Néki sok ezer angyalok >szent, szent, szent< azt mondják."},{"m":161,"r":204,"c":"Siess, keresztyén, lelki jót hallani, Régi törvényből harcolni tanulni","b":"1. Siess, keresztyén, lelki jót hallani, Régi törvényből harcolni tanulni, Az igaz hit mellett mint kell bajt vívni, Krisztusban bízni. \n2. Mert nem hiába ezt az ó törvénybe, Próféták írták Biblia könyvébe; Szép tanulság ez most az új törvénybe', Mi eleinkbe'. \n3. Jól tudja földön ezt minden keresztyén: Nem csak fegyverrel oltalmaz az Isten. Ezt minden népnek tudására adom: Istenünk vagyon! \n4. Fejedelemség vagyon csak Istenben, Minden hatalom vagyon ő kezében; Kiket ő akar, föld kerekségében: Emeli égben. \n5. Ne ess kétségbe ő nagy jóvoltában, Az igaz hitben erős légy magadban, Mint Dávid, úgy jársz párviadalodban, Hitvallásodban. \n6. Dávidot Isten hagyá királyságban, Ő ellenségit veté gyalázatban. Dicsérjük Istent nagy hálaadásban, Énekmondásban."},{"m":162,"r":342,"c":"Ím, béjöttünk nagy örömben, Felséges Isten, A te szentidnek gyülekezet","b":"1. Ím, béjöttünk nagy örömben, Felséges Isten, A te szentidnek gyülekezetébe, A te templomodba, Felséges Atya Isten. \n2. Itt megállunk teelőtted, Felséges Isten! És igaz hitből áldozunk előtted, Vallást teszünk rólad, Felséges Atya Isten! \n3. Vágyik lelkünk szent Igédhez, Felséges Isten! Mint a szomjúhozó szarvas a vízhez, A hideg kútfőhöz, Felséges Atya Isten! \n4. Örvendezünk mi szívünkben, Felséges Isten! Mert bejutottunk immár teelődbe, A te templomodba, Felséges Atya Isten! \n5. Csak ez nékünk vigasságunk, Felséges Isten! Hogy lakozik a te neved közöttünk, Dicsértetel tőlünk, Felséges Atya Isten! \n6. Tartsd meg azért békességben, Felséges Isten, E kicsiny seregecskét igaz hitben, Te tiszteletedben, Felséges Atya Isten! \n7. Prédikáltasd szent igédet, Felséges Isten! Ne hagyd szomjúhozni a mi lelkünket, Áldd meg életünket, Felséges Atya Isten! \n8. Zengedeznek mi ajakink, Felséges Isten! Örvendetes szókban, dicséretekben, Ékes énekekben, Felséges Atya Isten! \n9. Áldott vagy te magas mennyben, Felséges Isten! Kit illet dicséret a szent templomban, Anyaszentegyházban, Felséges Atya Isten!"},{"m":163,"r":null,"c":"Örvend mi szívünk, Mikor ezt halljuk: A templomba mégyünk, Hol Úr Iste","b":"1. Örvend mi szívünk, Mikor ezt halljuk: A templomba mégyünk, Hol Úr Istennek Szent Igéjét halljuk. \n2. Megállunk hittel, Örök Úr Isten, A te templomodban, És tiszta szívvel Dicsérünk mi téged. \n3. Áldd meg, Úr Isten, A te népedet, Kik téged szeretnek, Tartsd meg közöttünk A gyülekezetet. \n4. Légyen békesség, Felséges Isten, Anyaszentegyházban, Oltalmazz minket Minden háborúnkban. \n5. Dicséret neked, Atya Úr Isten, A te szent Fiaddal, És Szentlélekkel, Mi vigasztalónkkal!"},{"m":164,"r":207,"c":"Kegyes Jézus,  itt va gyunk Te szent Í géd hallására, Gyúljon fel kí v","b":"1. Kegyes Jézus,  itt va gyunk Te szent Í géd hallására, Gyúljon fel kí vánsá gunk Idvesség  tanulására, Hogy a földtől elsza kadjunk, Csak tehozzád ragaszkodjunk. \n2. Elménket, ér telmün ket Lelki sö tétség fogta bé, De szent Lelked  szívün ket Tiszta fény nyel úgy töltse bé, Hogy jót gondoljunk és  szóljunk, Mert csak tőled kell azt várnunk. \n3. Dicsőségnek  napfé nye, Istentől  jött világosság! Indítsd lelkünk  készség re, Nyisd meg fü lünk, szívünk és szánk! Hitvallásunk, könyör gésünk, Urunk Jézus, halld meg, kérünk!"},{"m":165,"r":348,"c":"Itt van Isten köztünk, Jertek őt imádni, Hódolattal elé állni, Itt van","b":"1. Itt van Isten köztünk, Jertek őt imádni, Hódolattal elé állni, Itt van a középen, minden csendre térve Őelőtte hulljon térdre. Az, aki Hirdeti S hallja itt az Ígét: Adja néki szívét! \n2. Itt van Isten köztünk: Ő, kit éjjel-nappal Angyalsereg áld s magasztal. Szent, szent, szent az Isten! Néki énekelnek A menynyei fényes lelkek. Halld, Urunk, Szózatunk, Ha mi, semmiségek Áldozunk Tenéked! \n3. Csodálatos Felség, Hadd dicsérlek Téged: Hadd szolgáljon lelkem Néked! Angyaloknak módján Színed előtt állván, bárcsak mindig orcád látnám! Add nékem Mindenben Te kedvedben járnom, Istenem, Királyom! \n4. Általjársz Te mindent; Rám ragyogni engedd Életadó, áldott Lelked! Mint a kis virág is Magától kibomlik, Rá ha csöndes fényed omlik: Hagyj, Uram, Vidáman Fényességed látnom S országod munkálnom! \n5. Egyszerűvé formálj Belső, lelkiképpen, békességben, csöndességben. Tisztogasd meg szívem: Tisztaságod lássam Lélekben és igazságban. Szívemmel Mindig fel- Szállhassak sasszárnyon: Csak Te légy világom! \n6. Jöjj és lakozz bennem: Hadd legyen már itt lenn Templomoddá szívem-lelkem! Mindig közellévő: jelentsd Magad nékem, Ne lakhasson más e szívben; Már itt lenn Mindenben Csakis Téged lásson, Leborulva áldjon!"},{"m":166,"r":350,"c":"Urunk Jézus, fordulj hozzánk, Szent Lelkedet ma töltsd ki ránk, Kegyel","b":"1. Urunk Jézus, fordulj hozzánk, Szent Lelkedet ma töltsd ki ránk, Kegyelmeddel minket segélj, Az egy Igazságra vezérlj. \n2. Nyisd meg szánkat hál’adásra, Készítsd szívünk buzgóságra, Hitünk s értelmünk neveljed, Neved velünk ismertessed. \n3. Míglen éneklünk mennyégben: Szent, szent, szent az erős Isten, És színről színre láthatunk, A fényességben vigadunk. \n4. Dicsőség Atya Istennek, Fiúnak és Szentléleknek: A dicső Szentháromságnak Mindenek áldást mondjanak!"},{"m":167,"r":null,"c":"Jöjj, mondjunk hálaszót Hű szájjal és hű szívvel, Mert rajtunk itt az","b":"1. Jöjj, mondjunk hálaszót Hű szájjal és hű szívvel, Mert rajtunk itt az Úr Nagy csoda dolgot mível. Már anyaölben is Volt mindig gondja ránk. A sok jót, melylyel áld, Ki sem mondhatja szánk. \n2. Dús kincséből az Úr Jó békességet adjon, Hogy szívünkben a kedv Víg és derűs maradjon. Ne hagyja híveit Bú-bajban sohasem; A rossztól óvja meg Itt s túl ez életen. \n3. Az Atyát és Fiút És a Szentlelket áldom; A menny Urát, kiben Szent egybe forrt a három; Aki úgy szól ma is, Ahogy régente szólt, Nem változik: Az Ő, És az lesz, aki volt."},{"m":168,"r":null,"c":"Ó, Atya Isten, irgalmas nagy Úr, Bűnbánó szívvel ím eléd borul Hű népe","b":"1. Ó, Atya Isten, irgalmas nagy Úr, Bűnbánó szívvel ím eléd borul Hű néped, áldva felséges neved, Hogy esdve kérje nagy kegyelmedet. \n2. Gondolsz ránk, híven oltalmaz kezed, Rólunk egy percre azt le nem veszed, Irgalmasságod mindig oly közel, És erős karod minket átölel. \n3. Nagy jóságodra méltók nem vagyunk, Rossz útra térve gyakran elhagyunk; Áhítjuk mégis szent igéd szavát, Megtérő gyermekid fogadd be hát. \n4. Kérünk, Úr Isten, Krisztus-Jézusért, Vérrel pecsételt szent szerelmedért: Irgalmasságod közöld mivelünk, És tárd ki szíved, végy be, Istenünk!"},{"m":169,"r":163,"c":"Úr Isten, téged Szívünkből dícsérünk; Végye Felséged Most hát kedvesen","b":"1. Úr Isten, téged Szívünkből dícsérünk; Végye Felséged Most hát kedvesen, Midőn szívesen Imádunk és kérünk."},{"m":170,"r":164,"c":"Jövel, ó, áldott Szentlélek! Gerjeszd fel híveidet, És szent munkájokb","b":"1. Jövel, ó, áldott Szentlélek! Gerjeszd fel híveidet, És szent munkájokban vélek Közöld kegyelmeidet, Hogy szívünk egyenesen Az Úrra függesztessen."},{"m":171,"r":170,"c":"Megáll az Istennek Igéje, És nem állhat senki ellene, A nagy Isten vag","b":"1. Megáll az Istennek Igéje, És nem állhat senki ellene, A nagy Isten vagyon mivelünk, És Szentlelke lakozik bennünk."},{"m":172,"r":167,"c":"Szűkölkö dünk Nagymértékben Segedelem nélkül, Reményke dünk, Örök Iste","b":"1. Szűkölkö dünk Nagymértékben Segedelem nélkül, Reményke dünk, Örök Isten, Te légy segítségül. Dicsérhessünk és lehessünk Jézus szava hallgató i, Igaz megtar tói."},{"m":173,"r":156,"c":"Nem vagyunk mi magunkéi, De Jézus vére bére; Lelkünk, testünk Istenéi","b":"1. Nem vagyunk mi magunkéi, De Jézus vére bére; Lelkünk, testünk Istenéi Az ő tiszteletére. Urunk Jézus, jöjj most el, Lelked által segíts fel! Dicsőítünk mi testünkben, Magasztalunk mi lelkünkben!"},{"m":174,"r":null,"c":"Atya, Fiú, Szentlélek, Készíts szent Igédre, Jézus érdemét ruházd Áldo","b":"1. Atya, Fiú, Szentlélek, Készíts szent Igédre, Jézus érdemét ruházd Áldott híveidre."},{"m":175,"r":null,"c":"Gyűjtsünk oly kincset, melyet a tűz koha, Hév forrósága nem emészt meg","b":"1. Gyűjtsünk oly kincset, melyet a tűz koha, Hév forrósága nem emészt meg soha. Tűzben megpróbált arany ez a kincs, Melyhez semmi veszélynek jussa nincs. A koporsónak sincs rajta hatalma, Elvesze reá nézve diadalma; Elkísér lételünknek céljára, A Teremtő színe látására."},{"m":176,"r":null,"c":"Szent, szent, szent a Seregeknek Ura! Teljes mind a széles föld az ő d","b":"1. Szent, szent, szent a Seregeknek Ura! Teljes mind a széles föld az ő dicsőségével! Á    men."},{"m":177,"r":null,"c":"U runk, irgalmazz  nékünk! Krisztus, irgalmazz nékünk! U runk, irgalma","b":"1. U runk, irgalmazz  nékünk! Krisztus, irgalmazz nékünk! U runk, irgalmazz  nékünk!"},{"m":178,"r":null,"c":"Dicsőség az Atyának, A Fiúnak és Szentlélek Istennek, Valamint volt ke","b":"1. Dicsőség az Atyának, A Fiúnak és Szentlélek Istennek, Valamint volt kezdetben, Azonképpen most és mindörökké, Ámen, Á men."},{"m":179,"r":169,"c":"A bűnből hozzád sietek, Mert szomjazom kegyelmedet, Te nyugtass meg, é","b":"1. A bűnből hozzád sietek, Mert szomjazom kegyelmedet, Te nyugtass meg, én Jézusom, Ím néked szívem átadom."},{"m":180,"r":null,"c":"A töredelmes szívet, Te, Uram, szereted, Az engedelmes lelket Soha meg","b":"1. A töredelmes szívet, Te, Uram, szereted, Az engedelmes lelket Soha meg nem veted. Ezzel a reménységgel Tehozzád óhajtunk, Légy, kérünk, segítséggel És könyörülj rajtunk."},{"m":181,"r":171,"c":"Jer, áldott vendég, várunk tégedet, Tisztítjuk a te útadat, Egyengetjü","b":"1. Jer, áldott vendég, várunk tégedet, Tisztítjuk a te útadat, Egyengetjük a te ösvényedet: Mutasd meg nálunk magadat! Erős hittel szívünkbe fogadunk, Állandó szállást ott adunk."},{"m":182,"r":172,"c":"Karácsony ünnepében, Karácsony ünnepében Örvendezünk szívünkben: Mert","b":"1. Karácsony ünnepében, Karácsony ünnepében Örvendezünk szívünkben: Mert Isten ő szent Fiát, Mert Isten ő szent Fiát Adta meg nékünk testben, Ki az ő népét Megszabadítá a bűnöktől, És a régi kígyótól Megmenté, Nékünk a dicsőséget Megnyeré: Légyen dicsőség Királyunknak Most és mindörökké!"},{"m":183,"r":null,"c":"Istennek Báránya, Ki bűnünket elveszed: Irgalmazz nékünk! Istennek Bár","b":"1. Istennek Báránya, Ki bűnünket elveszed: Irgalmazz nékünk! Istennek Báránya, Ki bűnünket elveszed: Irgalmazz nékünk! Istennek Báránya, Ki bűnünket elveszed: Add ránk békességed! Á-   men, Á-    men."},{"m":184,"r":null,"c":"Krisztus, ártatlan Bárány, Ki miértünk meg holtál, A keresztfa oltárán","b":"1. Krisztus, ártatlan Bárány, Ki miértünk meg holtál, A keresztfa oltárán Nagy engedelmes  voltál. Hordozván bűnein ket, Te váltottál meg minket: Irgalmazz nékünk, ó,  Jézus!"},{"m":185,"r":173,"c":"Krisztus feltámadott, Kit halál el ragadott; Örvendezzünk, vigadjunk,","b":"1. Krisztus feltámadott, Kit halál el ragadott; Örvendezzünk, vigadjunk, Krisztus lett a vigaszunk, Alleluja! Ha ő fel nem támad, Nincs többé bűnbocsánat, De él, ezért szent nevét, Zengjük ő dicséretét, Alleluja Alle lu ja, Alle lu ja! Alle lu ja! Örvendezzünk, vigadjunk, Krisztus lett a vigaszunk. Alleluja!"},{"m":186,"r":null,"c":"E húsvét ünnepében, E húsvét ünnepében Dicsérjük Istent szívvel, Ki ér","b":"1. E húsvét ünnepében, E húsvét ünnepében Dicsérjük Istent szívvel, Ki értünk megholt Fiát, Ki értünk megholt Fiát Feltámasztotta testben. Ennek örül föld, Tenger és a menny víg kedvében; Minden élő állatok Sok rendben, Mik égben, földön vannak, Sok részben, Fák, füvek és minden virágok Újulnak örömben."},{"m":187,"r":174,"c":"E húsvét ünnepében, E húsvét ünnepében Örvendjünk, keresztyének! Szívü","b":"1. E húsvét ünnepében, E húsvét ünnepében Örvendjünk, keresztyének! Szívünk teljességében, Szívünk teljességében Illik szánkba víg ének. A feltámadott Jézus nékünk zálogot adott, Hogy bár a föld gyomrába Tétetünk, Megújul valójába' Életünk; E hittel midőn ünnepelünk, Te légy, Jézus, velünk!"},{"m":188,"r":null,"c":"E pünkösd ünnepében, e pünkösd ünnepében Dícsérjük Istent szívvel, Ki","b":"1. E pünkösd ünnepében, e pünkösd ünnepében Dícsérjük Istent szívvel, Ki Szentlelkét szívünkben Osztogatja bőséggel. Ennek örül föld, Tenger és a menny víg kedvében; Minden élő állatok Sok rendben, Mik égben, földön vannak Sok részben, Fák, füvek és minden virágok Újulnak örömben."},{"m":189,"r":177,"c":"E pünkösd ünnepében, E pünkösd ünnepében Zeng nyelvünk dicséreti, Mert","b":"1. E pünkösd ünnepében, E pünkösd ünnepében Zeng nyelvünk dicséreti, Mert az Úr Szentlelkében, Mert Az Úr Szentlelkében Híveit részelteti: Melynek ereje Minden ismeretnek kútfeje; Világosságot ő gyújt Szívünkben, E rőt, bátorságot nyújt Éltünkben, Áldott Lélek, te légy mellettünk, S újjá születtetünk."},{"m":190,"r":178,"c":"Ez esztendőt megáldjad, Ez esztendőt megáldjad Kegyelmedből, Úr Isten!","b":"1. Ez esztendőt megáldjad, Ez esztendőt megáldjad Kegyelmedből, Úr Isten! Bőséggel ékesítsed, Bőséggel ékesítsed, Te szent Jehova Isten! Tégedet áldnak, Kik lakoznak e földnek színén; És a puszta helyek is Bőséggel, Halmok áhítozódnak Víg kedvvel; Boldog, kit magadnak választál, Sionnak királya!"},{"m":191,"r":179,"c":"Ez esztendőt áldással, Ez esztendőt áldással, Koronázd meg, Úr Isten,","b":"1. Ez esztendőt áldással, Ez esztendőt áldással, Koronázd meg, Úr Isten, Hogy víg hálaadással, Hogy víg hálaadással Dicsérje neved minden. Tetőled jőnek Kedves napjai az időnek; Nyújts hát, kérünk, bőséget Kezeddel, Tőlünk a békességet Ne vedd el; De midőn megtartod testünket, Ne hagyd el lelkünket!"},{"m":192,"r":null,"c":"Adj békességet, Úr Isten, A mi időnkben a földön, Mert nincsen nékünk","b":"1. Adj békességet, Úr Isten, A mi időnkben a földön, Mert nincsen nékünk több senki Bajvívónk és hadakozónk, Hanem csak te, Úr Isten."},{"m":193,"r":181,"c":"Az Úr Jézus Krisztusnak kegyelme, És Atyánknak, Istennek szerelme, Sze","b":"1. Az Úr Jézus Krisztusnak kegyelme, És Atyánknak, Istennek szerelme, Szentlélekkel áldott közösségben Légyen mindig mindnyájunkkal. Ámen."},{"m":194,"r":null,"c":"Tartsd meg e gyülekezetnek, Melyet törvényid vezetnek, Nagyjait, kicsi","b":"1. Tartsd meg e gyülekezetnek, Melyet törvényid vezetnek, Nagyjait, kicsinyeit; Igazgassad tanítóit, Hűséges elöljáróit, Felsőbb és köz rendeit. Adjad, hogy szívvel-lélekkel Dícsérhessünk a szentekkel, S csak téged tisztelhessünk. És ha eljő amaz óra, Melyben szállunk koporsóba: Mennybe hozzád mehessünk!"},{"m":195,"r":null,"c":"Áldjuk Istent végével Isteni tiszteletünknek, Mondjunk immár örömmel D","b":"1. Áldjuk Istent végével Isteni tiszteletünknek, Mondjunk immár örömmel Dicséretet szent nevének! Mi Istenünk legyen áldott, Hogy lelkünkben gazdagított. \n2. Immár Isten áldása Kimondatott mindnyájunkra, Menjünk örömmel haza Tisztünkre és dolgainkra. Ő Szentlelke erősítsen, Minket tovább is vezessen. \n3. Áldja meg kimentünket, Áldja bemenetelünket, Áldja meg kenyerünket, Szentelje meg életünket; Áldjon meg boldog halállal, Végre örök boldogsággal."},{"m":196,"r":352,"c":"Mondjatok dicséretet, Keresztyének, az Úr Istennek, Szentséges tisztel","b":"1. Mondjatok dicséretet, Keresztyének, az Úr Istennek, Szentséges tiszteletet Adjatok ő nevének. \n2. Örvendjetek őneki Igaz isteni buzgóságban, Mert köztetek lakozik Az Anyaszentegyházban. \n3. És ő megelégíti Lelketeket lelki kenyérrel; Biztat ő igéjével Édes ígéretivel. \n4. Szent, Uram, a te neved, Szent vagy te a magas menynyekben, Szent vagy és rettenetes Minden nemzetségekben. \n5. Tégedet illet, Uram, Mi tiszteletünk, háladásunk, A mi gyülekezetünk, Ünnepet szentelésünk. \n6. Hála légyen tenéked, Hogy megjelentéd te magadat, Hogy megértettük, Uram, A te akaratodat. \n7. Dicséret és dicsőség Légyen tenéked magasságban, Dicséret és tisztesség Az Anyaszentegyházban."},{"m":197,"r":null,"c":"Hálaadásunkban rólad emlékezünk, Kegyelmes Istenünk, tégedet tisztelün","b":"1. Hálaadásunkban rólad emlékezünk, Kegyelmes Istenünk, tégedet tisztelünk Te nagy jóvoltodért, és felmagasztalunk, Haszontalan szolgák, mert ezzel tartozunk. \n2. Hajtsd le füleidet, értsd meg kérésünket, Mi édes Istenünk, ne nézd bűneinket; Tiszta szívből kérünk, mi könyörgésünket Vedd hozzád, Úr Isten, esedezésünket. \n3. Gerjeszd fel igédnek szerelmét lelkünkben, Szentlélek Istennek szentségét szívünkben; Adj igaz értelmet bőséggel elménkben, Téged szolgálhassunk e földön éltünkben. \n4. Tanúságra erőt csak te tőled kérünk, Hogy szent istenséged dicsértessék tőlünk: Ha először a te országod keressük, Semmiben nem lészen fogyatkozás nékünk. \n5. Azért gyorsaságot elkezdett dolgunkban, Végig megmaradást mi hivatalunkban, Szorgalmatosságot s hűséget tisztünkben, Egymás-szeretetet plántálj életünkben. \n6. Engedd meg ezeket, Szent Atyánk, Krisztusért, Mi Idvezítőnkért, kegyes táplálónkért, Ki egy hatalomban Szentlélek Istennel Élsz és uralkodol mindörökké, Ámen."},{"m":198,"r":null,"c":"Ti keresztyének, dicsérjétek Istent, Kik Úr Jézusnak e földön szolgált","b":"1. Ti keresztyének, dicsérjétek Istent, Kik Úr Jézusnak e földön szolgáltok És mindenkoron a szent helyen vagytok: Dicsérjétek Istent! \n2. Imádkozzatok az Atya Istennek, Jézus nevében hozzá siessetek, És tiszta szívet hozzá emeljetek: Dicsérjétek Istent! \n3. Áldjon meg minket az Atya Úr Isten, Megigazítson a Fiú Úr Isten, És megszenteljen a Szentlélek Isten Mindenkoron! Ámen."},{"m":199,"r":null,"c":"Adjunk hálákat az Atya Istennek, Mennynek és földnek szent teremtőjéne","b":"1. Adjunk hálákat az Atya Istennek, Mennynek és földnek szent teremtőjének, És embereknek gondviselőjének, Éltetőjének. \n2. Mert ő mihozzánk atyai szerelmét, Kijelentette drága szent igéjét, melylyel táplálja híveinek lelkét, Nyújtja kegyelmét. \n3. És ő megáldja benne reménylőket, Erősít minden erőtelenséget, Világosítja homályos szívünket, Setét elménket. \n4. Atya Istennek mindezekért légyen Dicséret és nagy dicsőség mennyégben, Fiával s Szentlelkével egyetemben, Örökké! Ámen."},{"m":200,"r":315,"c":"Ó, maradj kegyelmeddel Mivelünk, Jézusunk, Hogy a bűnös világnak Tőrib","b":"1. Ó, maradj kegyelmeddel Mivelünk, Jézusunk, Hogy a bűnös világnak Tőribe ne jussunk. \n2. Ó, maradj szent igéddel Mivelünk, Megváltónk, E földi vándorlásban Te légy útmutatónk. \n3. Ó, maradj, világosság, Mivelünk fényeddel, Te vezess a sötétben, Hogy ne tévedjünk el. \n4. Ó, maradj áldásoddal Mivelünk, Úr Isten, Szent kegyelmed áraszd ránk Minden szükséginkben. \n5. Ó, maradj oltalmaddal Mivelünk, Hű pajzsunk, Hogy e világ diadalt Ne vehessen rajtunk. \n6. Ó, maradj hűségeddel Mivelünk, szent Isten, Adj erőt, hogy megálljunk Mindvégig a hitben."},{"m":201,"r":182,"c":"Uram, kegyes indulatomban Ím, teszem vallásom: Ez életemben, halálomba","b":"1. Uram, kegyes indulatomban Ím, teszem vallásom: Ez életemben, halálomban Fő vigasztalásom: Hogy én az Úr Jézus Krisztusnak Tulajdona vagyok, Rajtam irgalmas szent voltának Kegyelmei nagyok. \n2. Ki, midőn voltam halál révén, Teljes bűn mérgével, Megváltott, ügyemet felvévén, Drága szent vérével. Az ördög terhes fogságából Híven feloldozott, A bűnnek kemény igájából Szabadságra hozott. \n3. Ezután sem hágy el végképen Kívánt segedelme, Sőt, mint fiát, engem akképen Takargat védelme. Gondot visel én életemre Hatalmas szent karja, Semmi gonosz nem száll fejemre, Ő ha nem akarja: \n4. Ha midőn atyai veszszejét Felvonja ellenem, S bölcs dorgálásának erejét Kelletik szenvednem: Akkor is lankadott szívemet Szentlelke biztatja, Hogy rajtam lévő veszélyimet Javamra fordítja. \n5. Reménységem neveli bennem S bizonyossá tészen, Hogy végre jutalmam énnékem Örök élet lészen, Melyre is készíti lelkemet És hívja magához, Hogy szabjam egész életemet Szent akaratjához. \n6. Uram, taníts gyarló éltemnek Nagy bűnös voltára, Ó vezess én árva fejemnek Szabadítójára: Magamat néki hadd adhassam Lelki ajánlással, Drága jóvoltát felválthassam Méltó hál'adással."},{"m":202,"r":183,"c":"Fő boldogságom tartom én ebben, Hogy az Úr Jézus tudományát vallom, Em","b":"1. Fő boldogságom tartom én ebben, Hogy az Úr Jézus tudományát vallom, Ember nem szólott soha bölcsebben, Azért beszédit nagy örömmel hallom. Ezek éltemnek vezéri lévén, Megvigasztalnak a halálnak révén. \n2. Ha bűnöm kárhozattal fenyeget, E hitben vetem teljes reménységem, Hogy Megváltóm tett értem eleget; Nem árthat nékem semmi ellenségem. Ő visel gondot úgy életemről, Hogy egy hajszál sem esik le fejemről. \n3. Megfoghatatlan nagy szerelmével Jézusom úgy vont kebelére engem, Hogy lelkem-testem tehetségével őneki örök tulajdona lettem. Szent akaratját örömest, készen Teljesíteni legfőbb gondom lészen. \n4. Add Uram, kérlek, tudomásomra, Hogy nyavalyámnak okát hol keressem, Hogy óhajtott szabadulásomra Segedelmeddel hadd törekedhessem. Jótéteményed mily csudálatos! Oktass, hogy légyek hozzád háládatos."},{"m":203,"r":null,"c":"Mennybéli Úr Isten, hallgass meg engemet az én könyörgésemben, Ne hagy","b":"1. Mennybéli Úr Isten, hallgass meg engemet az én könyörgésemben, Ne hagyj el engemet ily nagy nyavalyámban, tekints meg szükségemben; A nagy bánat miatt már adj vígasságot az én nagy bús szívemben, A te Szentlelkeddel vígasztalj meg kérlek, én keserűségemben. \n2. Jól tudom, micsoda nagy okai vannak én nyomorúságomnak: Mert az álnok világ hízelkedésinek, hittem csalárdságának; Az ő szép szavának, sok ajándékának, nékem bút hozának, Engemet mindenben ez világ kedvébe: jaj, ím mibe hajtának! \n3. Jaj nékem, bűnösnek és gyarló embernek, ha rajtam nem könyörűlsz, Azén nagy bűnömért, hatalmas Istenem, nékem meg nem kegyelmezsz; Soha nem lehet így nékem vígasságom, hogyha bűnöm szerint versz, Már minek örüljek, felséges Úr Isten, ha velem jól nem tészesz? \n4. Hová legyek Uram, ha elhagysz engemet, kihez hajtsam fejemet? Föld kerekségében sehol nem találom, kire bízzam lelkemet; Nincsen itt e földön, ki elvenné rólam az én nagy sok bűnömet, De nagy félelemmel te hozzád kiáltok: hallgasd meg kérésemet. \n5. Hová legyek immár, hatalmas Istenem, ily fogyott életemmel? Mert lám, Uram, hozzád sokszor felkiálték keserves beszédemmel; Miért nyomorítál, én édes Istenem, most ez keserűséggel? Mit használok immár itt ez világ szerint bujdosó életemmel? \n6. Ó miért te, Uram, enynyi sok ideig a te szent személyedet, Reám nem fordítád kegyelmessé Uram, a te kegyességedet? Én siralmim elől elfordítád, Uram, a te szent füleidet; De ha meghallgatnál, megvigasztalhatnád az én nagy bús szívemet. \n7. Ne útálj meg, Uram, én sok bűneimért, számtalan esetimért, Mert méltónak vallom magamat mindenkor az én undokságimért A megbüntetésre és felserkentésre az én kényességimért; De nem vetsz el, Uram, szent szemeid elől az én érdemem szerént. \n8. Ezen kérlek téged, mennynek-földnek Ura, királyoknak Királya, Hogy míg e világban éltemet kívánod, azt csak Szentlelked bírja, Minden dolgaimat és én útaimat szüntelen igazgassa, Hogy te szent nevedet hozzám jóvoltodért én lelkem magasztalja. \n9. Ne bánkódjál lelkem, ne hagyd el magadat nagy keserűségedben, ó én édes szívem, mit keseregsz bennem ily igen életedben? Hagyd el a bánatot, végy nagy vígasságot a hatalmas Istenben: A nagy bánat helyett ő ád jó örömet a Szentlélek Istenben.\n10. Dicsőség tenéked, magasságban, Isten, királyoknak Királya! Dicséret mondassék néked, Krisztus Jézus, minden uraknak Ura! Velük egyetemben Szentlélek Úr Isten, mi lelkünknek világa: Teljes Szentháromság, egy bizony Istenség, lelkemnek boldogsága!"},{"m":204,"r":null,"c":"Boldogok, akik lelki szegények, Szívből könyörögnek, Mert a mennyorszá","b":"1. Boldogok, akik lelki szegények, Szívből könyörögnek, Mert a mennyország adatik nékiek. \n2. Boldogok, akik sírván bánkódnak, És károkat vallnak, Mert Istentől ők megvigasztaltatnak. \n3. Boldogok azok, akik szelídek És nem háborognak, Mert ők e földön örökséget bírnak. \n4. Boldogok, akik az igazságot Éhezik, szomjazzák, Mert Istentől ők megelégíttetnek. \n5. Boldogok azok, kik irgalmasok, Máson könyörülnek, Irgalmasságot mert Istentől nyernek. \n6. Boldogok, akik tiszta szívűek, Hitből megtisztultak, Mert megismervén az Istent, meglátják. \n7. Boldogok, akik békességszerzők, Mert ők hívattatnak Az igaz hitben Isten fiainak. \n8. Boldogok, akik az igazságért Üldözést szenvednek, Mert a mennyország adatik ezeknek. \n9. Boldogok lesztek, mikor Krisztusért Emberek gyűlölnek, Megszidalmaznak s gonoszul üldöznek. \n10. Akkor azért hát örvendezzetek és vigadozzatok, Mert mennyben lészen ti nagy jutalmatok."},{"m":205,"r":184,"c":"Ne szállj perbe énvelem, Ó, én édes Istenem! Mert meg nem igazul teelő","b":"1. Ne szállj perbe énvelem, Ó, én édes Istenem! Mert meg nem igazul teelőtted lelkem, Elkárhoztathatsz engem. \n2. Mert én anyám méhében Fogantattam vétekben, E világra lettem eredendő bűnben, Kárhozatos esetben. \n3. Néked bűnöm megvallom, Mert én azzal tartozom; Te bocsáthatod meg, bizonynyal jól tudom: Segítségedet várom. \n4. Bűneimnek tőréből, Az ördögnek kezéből, Ments ki megérdemlett nagy veszedelmemből: Tekints reám az égből! \n5. Szent Fiad haláláért, Keserves nagy kínjáért, Áldott szent vérének el-kifolyásáért: Kegyelmezz meg mindezért! \n6. Az ő tisztaságáért És ártatlanságáért, Szent kezein való sebeknek helyéért, töviskoronájáért! \n7. Én fertelmességemet És oly nagy sok vétkemet, Mikkel megfertőztem undokul lelkemet, Rútítottam testemet: \n8. Bocsásd meg, ó, Úr Isten! Ó, áldott Atya Isten! Kegyelemmel bőves, irgalmas jó Isten! Nagy türelmű szent Isten! \n9. A te áldott Szentlelked, Kérlek, tőlem el ne vedd, Sőt újítsd meg bennem, hogy dicsérjem neved, Szolgálhassak tenéked. \n10. Reád bíztam magamat, Te viseljed gondomat, Igazgasd jó útra az én lábaimat És minden szándékimat. \n11. Vigasztald meg szívemet, Búban epedt lelkemet; Ne hányd szemeimre undok vétkeimet És cselekedetimet. \n12. Csak tégedet dicsérlek, Míg e világon élek, Mert tudom, nyugalmat csak tenálad lelek, Mikor innét kikelek. \n13. Mindörökké áldassál És felmagasztaltassál, Áldott Atya Isten, a te szent Fiaddal, Szentlélek áldásával!"},{"m":206,"r":185,"c":"Én Istenem! Sok nagy bűnöm Lelkemet szorongatják; Itten nincsen, Ki se","b":"1. Én Istenem! Sok nagy bűnöm Lelkemet szorongatják; Itten nincsen, Ki segítsen, Hát kihez folyamodjam? \n2. E világon Minden úton Akármerre indulok: Súlyos terhem, betegségem Ki elvegye, nem látok. \n3. Hozzád térek, Végy be, kérlek, Jó Atyám, s haragodban Meg ne büntess, Légy kegyelmes Hozzám te szent Fiadban. \n4. Ha terhelnem, Kell szenvednem Az igaz ítélettől: Bár itt büntess, Csak ott kedvezz: Ne veszszek el örökűl. \n5. Ha kereszted Reám veted, Adj engedelmes szívet, Hogy tűréssel És reménynyel Várjam üdvösségemet! \n6. Nyújtsd kegyelmed És Szentlelked, Hogy engem vezéreljen; Bűn, ellenség S hitetlenség Kárhozatra ne vigyen! \n7. Mint kis madár, Ha szélvész jár Az égi csattogásban, Rejtez fákban És odúkban, Hol megmaradhat bátran: \n8. Így a bűnök, Halál s ördög Engemet ha rettentnek: Rejtekhelye Vagy, reménye, Ó, Krisztus, én lelkemnek. \n9. Sebeidben Rejts el engem, Hol bízvást megmaradok; Bár kínt valljak, Vagy meghaljak, Jól tudom: hozzád jutok. \n10. Te énnékem Ellenségem Haláloddal meggyőzted, Boldog helyem, Idvességem A mennyben megszerezted. \n11. Áldott Isten Egy felségben, Tebenned szívem örül, Mert te szavad Áll s megmarad: Aki hiszen, idvezül."},{"m":207,"r":null,"c":"Seregeknek hatalmas nagy királya, Könyörgésem székedet megtalálja, Mer","b":"1. Seregeknek hatalmas nagy királya, Könyörgésem székedet megtalálja, Mert szívemet sok bú állja, Olyan bűntől, mint megterhelt gá lya. \n2. Ím, előtted megaláztam magamat, Földre hajtván szomorodott orcámat; Halld meg, Atyám, csendes szómat, Add meg szívből kívánt lelki jó mat. \n3. Ne vess el hát az én sok bűneimért, Ne is büntess háládatlanságomért, De sőt inkább szent Fiadért, Kegyelmezz meg érdemes kínjá ért. \n4. Kihez hajtsam búba merült fejemet? Ki tölti bé megsebhedett szívemet? Ha te is elhagysz engemet, Elveszek, ha nem szánod lelke met. \n5. Az én lelkem reszket előtted állván, Mint a gyenge levél nyárfának ágán, Ellened tett bűnöm látván, Gyászban járván sír s kegyelmet kí ván. \n6. Gyakran szívből folyamodom elődbe, Könyörgésem hasson fel az egekbe; Uram, hadd jusson elődbe, Vétkeimet temesd a tenger be. \n7. Örök Isten, felette irgalmas vagy, Megtérőkhöz kegyelmed is igen nagy; Engem, talpig bűnöst ne hagyj, Vigasztalást inkább szívemnek  adj. \n8. Engem bűnöst hiszen földből formáltál, Töredelmes cserép helyre állattál, Sokszor sok bűnért sujtoltál, Addig vertél, míg hozzád hajtot tál. \n9. Reám vigyázz a szép felvont egekből, Dicsőséges királyi szent székedből; Halld meg, mert könyörgök szívből, Mosogass meg undok vétkeim ből. \n10. Gyarló szívem magasztalja nevedet, Hogy pokolra nem eresztéd lelkemet; Megbocsátád vétkeimet, Melyért áldlak, édes Istene met."},{"m":208,"r":186,"c":"Uram, bűneink soksága, Undoksága Érdemli haragodat, Méltók vagyunk, ho","b":"1. Uram, bűneink soksága, Undoksága Érdemli haragodat, Méltók vagyunk, hogy ellenünk, Szent Istenünk, Felemeld ostorodat. \n2. De tudjuk, hogy ki megvallja És megbánja Bűneit s hozzád megtér, Azt nem hajtod el előled, Sőt tetőled Bűnbocsánatot az nyér. \n3. Azért hát mi is járulunk És borulunk Elődbe fájdalmasan, Bűnös lelkünknek kegyelmet, engedelmet Kérvén alázatosan. \n4. Szánj meg, Uram, ily ügyünkben S megtértünkben Függeszd fel ostorodat. Ó, hajtson hozzánk békére Fiad vére, S felejtsd el haragodat. \n5. Szólj hozzánk, Uram, csendesen És édesen; Félelmünk mindjárt széled, És lelkünk is e szózattól, Mint harmattól A hervadt virág, éled. \n6. Uram, végy minket kedvedbe, Szerelmedbe, S vigasztald meg szívünket. Tőlünk soha ne maradj el, Se ne hagyj el, Hanem fogjad kezünket."},{"m":209,"r":188,"c":"Tökéletes volt minden tekintetben, Mind, amit Uram, teremtél kezdetben","b":"1. Tökéletes volt minden tekintetben, Mind, amit Uram, teremtél kezdetben. Az ember testét te alkotád szépen, És lelkét épen. \n2. Tenmagad képét adtad ő reája, Szent ártatlanság volt ékes ruhája, bölcscsé is tetted, hogy téged ismerne S élvén dícsérne. \n3. Első szüleink de félre térének, A kísértőnek mikor engedének, Már mi mindnyájan, kik tőlük eredtünk, Bűnben születtünk. \n4. Tagjaink mind, és bennünk minden részek Restek a jóra, a gonoszra készek, Nincs erőnk s a jót, noha jónak hiszszük, Véghez nem viszszük. \n5. Fertőbe estünk, Uram végy ki onnan, Szűlvén minket Szentlelkeddel újonnan; Újítsd meg rajtunk, hogy legyünk te néped, Isteni képed."},{"m":210,"r":471,"c":"Ó, áldandó Szentháromság! Nyögésemre figyelmezz. Jövel, siess, Főboldo","b":"1. Ó, áldandó Szentháromság! Nyögésemre figyelmezz. Jövel, siess, Főboldogság, Én Istenem, kegyelmezz! Ó, Uram, Uram, ne hagyj! Mert reménységem te vagy. \n2. Ím, körülvett már az ínség, Minden bűnöm rám tódult, Szorongat a végső szükség, Fetrengek, mint egy bódult. Ó, szerelmes szent Atyám! Légy nékem erős bástyám. \n3. Ölelgess szent szerelmeddel, Örök szövetségedből, Takargass be védelmeddel, Adj részt örökségedből: Nézz régi irgalmadra S egyetlenegy Fiadra. \n4. Ó, egyetlenegy segítőm, Uram Jézus, irgalmazz! Légy vélem, én Idvezítőm, A gonosztól oltalmazz! Hiszen te értem jöttél, S értem is vért öntöttél. \n5. Gyógyítsd lelkem betegségét Véres verejtékeddel, A halálnak édességét Újítsd drága véreddel, Mert csak az lelkem bére, Más érdem álljon félre. \n6. Ó, Isten Báránya, kedvezz, Mert most vagyon az óra; Mondd lelkemnek: Légyen idvez, Dolga forduljon jóra. Ó, Úr Jézus, könyörülj, Könyvedből ki ne törülj! \n7. Ó, vigasztaló Szentlélek, Jövel segítségemre, És míg itt mozgok és élek, Készíts idvességemre. Tartsd meg bennem a hitet, Mit kegyelmed készített. \n8. Bátoríts a halál ellen, És ha már elaluszom, Hogy a Sátán el ne nyeljen, Te légy, Jézus, végső szóm. Maradj velem mindvégig: kísértess bé az égig. \n9. Ó, Úr Jézus, légy Jézusom: Légy irgalmas lelkemnek! Ó, vedd hozzád egy orvosom, Míg megadod testemnek, Ó, Jézus, tőlem ne fuss! Ó, jövel, Uram Jézus!"},{"m":211,"r":189,"c":"Meghagytad nékünk, Úr Is ten, Hogy járjunk törvényedben És téged tiszt","b":"1. Meghagytad nékünk, Úr Is ten, Hogy járjunk törvényedben És téged tiszteljünk Teljes szívvel, lélekkel És minden mi erőnkkel Tégedet szeressünk. \n2. A mi felebarátin kat Szeressük, mint magunkat, Haragot elhagyván; Senkinek kárt ne tégyünk, Mindenhez hívek légyünk És éljünk igazán. \n3. De jaj, mily gyarló éle tem, Mert Ádámtól születtem: Bűnre vagyok hajló. Elmémnek gondolatja, Szívemnek indulatja Te ellened járó. \n4. Szent igédet nem köve tem, Sőt gyakran elfelejtem, Jókra tunya szívem; Feleimet gyűlöli, Vagy csak színnel szereti: Mily nehéz énnékem. \n5. Méltán ezért harago dat, Érdemlem ostorodat, De jó reménységgel Nézek fel szent Fiadra, Mint kegyes szószólómra, Kiért hozzám tértél. \n6. Mert én csak őbenne bí zom, Nem hányom méltóságom, Mely semmire kellő. Ő engem megigazít, Gonosztól megszabadít, Oly igen jó kedvű."},{"m":212,"r":190,"c":"Én nem perlek, És nem merlek, Igaz bírám, vádolni, Ha elkezded Ítélete","b":"1. Én nem perlek, És nem merlek, Igaz bírám, vádolni, Ha elkezded Ítéleted Énrajtam gyakorolni. \n2. Enyhén bántál, Nem kívántál Semmit sem erőm felett; Az izgató Csalogató Mégis engem bűnre vett. \n3. Megvettetést, Nagy büntetést Ezért előre látok; Szörnyű dolog Lesz, ha megfog A törvényben írt átok. \n4. Sokszor hallom: Az irgalom Nálad éri az eget; De ismétlen Véghetetlen Igazságod fenyeget. \n5. E kettő közt Olyan eszközt Találnom lehetetlen, Hogy jó maradj És mégse hagyj Egy bűnt sem büntetetlen. \n6. De midőn én Kételkedvén E két mélység közt állok: Útmutatást, Megtartatást Szent igédben találok."},{"m":213,"r":192,"c":"Mindenható Úr Isten, Mi, bűnös emberek, Gyónást és vallást teszünk Min","b":"1. Mindenható Úr Isten, Mi, bűnös emberek, Gyónást és vallást teszünk Mint töredelmesek. \n2. Mert mi igen vétkeztünk Istenséged ellen, Mint teremtő, megváltó És szent Atyánk ellen. \n3. Életünknek rendiben Igen megbántottunk, Mi nagy sok bűneinkkel Téged boszszantottunk. \n4. Gonosz szóval, szándékkal, Látással, hallással, Irigységgel, mordsággal, Rágalmazásokkal. \n5. Szitkos, átkos voltunkkal, Haragtartásunkkal, Hamisan mi hitünket Gyakran mondásunkkal; \n6. Isteni káromlással És hitetlenséggel, Mi nyomorúságinkban Békételenséggel. \n7. Istennek szent igéjét Noha gyakran halljuk, De mibennünk majd semmi Gyümölcsét nem látjuk. \n8. Az isteni és atya-fiúi szeretet Nincsen bennünk, de vagyon Éktelen, rút élet. \n9. Bujaság és torkosság, Megfojt a kevélység; Telhetetlen s átkozott, Izgat a fösvénység. \n10. Mint tengernek fövénye Megszámlálhatatlan: Azonképpen mi bűnünk Nálunk tudhatatlan. \n11. Azért mi is magunkat Istenséged előtt, Bűnösöknek vádoljuk Mind e világ előtt. \n12. Ne nézd mi bűneinket És gonoszságinkat, De tekintsd kegyelmesen Irgalmasságodat. \n13. És el ne feledkezzél Te ígéretedről, A bűnösökhöz való Kegyelmességedről. \n14. Azért néked könyörgünk, Felséges Úr Isten: Ne állj boszszút szertelen Mi gonosz bűnünkön. \n15. De minékünk megbocsáss Te szent Fiad által, Hogy mi idvezülhessünk Ő irgalma által. \n16. hiszszük, hogy meghallgattál Mi könyörgésünkben, Azért lelki örömmel Mi ezt mondjuk: Ámen."},{"m":214,"r":null,"c":"Sok nyavalyánkban Atyánkhoz kiáltunk, Mert segedelmet sehol sem találu","b":"1. Sok nyavalyánkban Atyánkhoz kiáltunk, Mert segedelmet sehol sem találunk, Csak ő minékünk Atyánk és gyámolunk, Minden oltalmunk. \n2. Tégedet azért alázatos szívvel Kérünk: oltalmazz, Atyánk, jobbkezeddel, És táplálj minket a te szent Igéddel: Lelki étellel. \n3. Itt e világon míglen mi nyomorgunk, Csak segedelmed alá folyamodtunk, Mert igen kegyes Atyánk vagy minékünk: Minden életünk. \n4. Pokol ajtaja bűnért reánk nyíla, Hogy az Istennek haragja indúla, Minden nyavalya ottan reánk szálla: Bűnnek jutalma. \n5. Ha bűneinket számlálod, Úr Isten, Senki közülünk nem mehet elődben, Mert mi fetrengünk számtalan sok bűnben, Undok életben. \n6. Azért könyörgünk: ne nézd bűneinket, De tekints kegyes szemeiddel minket, A te Fiadért szeress ingyen minket, Szabadíts minket!\n7. Ne tégy mi vélünk a mi bűnünk szerint, De tekints minket kegyességed szerint, A Krisztus Jézus kedves volta szerint, Érdeme szerint. \n8. Végy el mi rólunk enynyi sok ínséget, Adj nékünk, kérünk, immár csendességet; Ne fogyatkozzunk el sok ínségink közt: Adj nékünk erőt! \n9. Sok háborgásink lecsendesedjenek, Hogy hatalmasok tégedet féljenek, És mindenkoron téged ismerjenek Örök Istennek. \n10. Dícséret légyen az Atyának mennyben, Ő szent Fiának örök dicsőségben, És Szentléleknek velük egyetemben, Örökké, Ámen."},{"m":215,"r":196,"c":"Eltévedtem, mint juh, Eltévedtem, mint juh, A bűnösök útjára, Ó, segít","b":"1. Eltévedtem, mint juh, Eltévedtem, mint juh, A bűnösök útjára, Ó, segíts, Jézusom, Őriző pásztorom, Hogy ne jussak romlásra. Te ontál drága vért Elveszett juhokért, Viselj gondot a nyájra. \n2. Én is juhod vagyok, Én is juhod vagyok, Nyájadnak legkisebbje, Kit te megtéríthetsz, Bűnből kivezethetsz A szép kies helyekre. Kérlek azért hitből, Töredelmes szívből, Fogadj, végy kegyelmedbe. \n3. Ím előtted állok, Ím előtted állok, Ajtód előtt zörgetek; Bár titkos bűnökkel És nyilván lévőkkel Vétkeztem te ellened: Kérlek mindazáltal, Nagy irgalmassággal Fogadd viszsza gyermeked. \n4. Bár a hit szívemben, Bár a hit szívemben Oly kicsiny, mint mustármag, Mégis, bármi gyenge. Szentlelked nevelje, Nevelje fel nagy fának, Hogy terjedjen ága És legyen virága Kedves néked, Urának. \n5. Míg porsátoromban, Míg porsátoromban Tartasz, mint egy tömlöcben, Nevelj igaz hitben, Munkás szeretetben, Hogy élhessek itt bölcsen És kimúlásomig. Utolsó órámig Tisztemet hűn betöltsem."},{"m":216,"r":414,"c":"Végtelen irgalmú Isten, hozzád kiáltok. E nagy mélységekből szabadulás","b":"1. Végtelen irgalmú Isten, hozzád kiáltok. E nagy mélységekből szabadulást kívánok; Értsd meg kérésimet, Érjék füleidet enynyi sok zokogások. \n2. Igazságod szerint ha cselekedel vélünk, Ha mind számon tartod, amit ellened vétünk: Senki nem állhatja Súlyos kezed miatt, Tőled ha büntettetünk. \n3. Fölötte bőséges nálad a kegyelmesség Atyai kegyesség, szelíd engedelmesség, Néked hát szentektől S földi emberektől Adassék nagy tisztesség. \n4. Az Urat óhajtom, várja lelkem az Urat Szívem szomjúhozván, hogy mutassa jóvoltát; Igéjéből értem, Melyben reménységem: Nem vonja meg irgalmát. \n5. Lelkem az Úr Istent buzgósággal óhajtja. Mint éjjeli strázsa napköltét alig várja, Reggelről-reggelre, Estéről-estére Szívem Istent úgy várja. \n6. Valakik az Úrnak választott szenti vagytok, Egyedül csak benne légyen bizodalmatok, Mert ő nála váltság, Vagyon irgalmasság, Ő lesz néktek Atyátok. \n7. Izráelt megváltja, és a keresztyénséget, Hívek seregének megbocsátja vétküket. Minden nyavalyából, Az örök halálból Kimenti ő lelküket."},{"m":217,"r":198,"c":"Bűnösök, hozzád kiáltunk: Úr Isten, könyörülj rajtunk! Nyisd meg a te","b":"1. Bűnösök, hozzád kiáltunk: Úr Isten, könyörülj rajtunk! Nyisd meg a te füleidet, Hallgasd meg könyörgésünket! Mert ha te mind megí téled, Amit vétettünk el lened, Mind elkárhozunk előtted. \n2. Nagy a te irgalmasságod, A bűnt Te megbocsáthatod; Nincs nékünk semmi érdemünk, Már semmi ártatlanságunk. Nincs ki kérkedjék e lőtted, Félünk mindnyájan Té gedet, És könyörgünk mi Tenéked. \n3. Bízzunk azért az Istenben, És nem a mi érdemünkben, Nyugodjék Őbenne lelkünk, Ő légyen mi reménységünk; Lám, nékünk nyilván í géré, Hogy akar oltalmunk  lenni, Azért higygyünk csak Őnéki. \n4. Erősek legyünk hitünkben, Bízzunk csak az Úr Istenben; Ne essünk Benne kétségben, Ne szomorkodjunk lelkünkben. Minden keresztyén hív  légyen, Ki megújult Szentlé lekben és bízik csak az Istenben. \n5. Ha minékünk sok bűnünk van, Istennek több kegyelme van, Ő irgalmának nincs vége, bár sok az emberek vétke. Ő nékünk kegyes pász torunk, Ki őriz minket po koltól És megment a kárhozattól."},{"m":218,"r":null,"c":"Életünknek rendiben  Körülvesz a ha lál; Segedelmet, kegyelmet  Lelkün","b":"1. Életünknek rendiben  Körülvesz a ha lál; Segedelmet, kegyelmet  Lelkünk már hol ta lál? Csak nálad, Urunk, Is ten! Mert bánjuk bűnünk, mely miatt  Haragvásod felgyúladt. Szent, igaz Úr Isten, Szent, erős Úr Isten, Szent irgalmas megváltó U runk, te nagy, örök Úr: A keserű halálban Ne hagyj immár elvesznünk! Irgalmazz nekünk! \n2. Pokol dühe támad ránk  Halálnak képé ben; Szabadítást ki nyujthat  Ilyen nagy ínség ben? Csak te, mi Urunk, Is ten. Felindítja nagy irgalmad  enynyi bűn és ily bánat. Szent, igaz Úr Isten, Szent, erős Úr Isten, Szent irgalmas megváltó U runk, te nagy, örök Úr: A mély pokol lángjától Ne hagyj kétségbe esnünk! Irgalmazz nekünk! \n3. Pokol rettentésébe  Kerget minket bű nünk; Kihez máshoz mehetnénk,  Hol megmenekü lünk? Csak hozzád Urunk, Krisz tus! Kiontád drága véredet,  Bűnért tévén eleget. Szent, igaz Úr Isten, Szent, erős Úr Isten, Szent irgalmas megváltó U runk, te nagy, örök Úr: Vigasztaló hitünktől Ne hagyj minket elesnünk! Irgalmazz nekünk!"},{"m":219,"r":null,"c":"Atya Úr Isten, könyörülj rajtam te nagy jóvoltodért, Sok bűneimet bocs","b":"1. Atya Úr Isten, könyörülj rajtam te nagy jóvoltodért, Sok bűneimet bocsásd meg nékem irgalmasságodért; Ne hagyj, Úr Isten, kérlek, elvesznem, a te szent nevedért. \n2. Imé, Úr Isten, mind talpig vagyok a bűnben előtted, Mint merő vérben befertőztetett, úgy állok előtted: Mint a nyár-levél, úgy reszketek én féltemben tetőled. \n3. Anyám mikoron az ő méhében engemet fogada, Nagy siralommal és fájdalommal e világra hoza: Bűnben fogada, róla reám is a bűn elárada. \n4. Nincs hová lennem, nincs hová fognom elveszett fejemet, Féli, rettegi elbúsult lelkem igaz Istenemet: Vajjon mikoron mossa el rólam az én bűneimet? \n5. Ím te elődbe támasztom, Uram, az én bűneimet: Lássad te magad, irgalmas Atyám, halálos sebemet; Kössed be nékem orvosságoddal keserves szívemet.\n6. Mely igen tiszta lennék, Úr Isten, ha megmosogatnál, Bizony, a napnál, holdnál, csillagnál: szebb lennék a hónál; Senki fehérebb nálam nem lenne, ha megtisztítanál. \n7. Hallgasd meg azért fohászkodását a te híveidnek, Kik most énvelem sírván-óhajtván, együtt könyörögnek: Hatalmat venni ne hagyj mi rajtunk a mi bűneinknek."},{"m":220,"r":null,"c":"Bocsásd meg, Úr Isten, ifjúságomnak vétkét, Sok hitetlenségét, undok f","b":"1. Bocsásd meg, Úr Isten, ifjúságomnak vétkét, Sok hitetlenségét, undok fertelmességét, Töröld el rútságát, minden álnokságát, Könynyebbítsd lelkem terhét. \n2. Az én búsult lelkem én nyavalyás testemben Tétova bujdosik, mint madár a szélvészben; Tőled elijedett, Tudván, hogy vétkezett, Akar esni kétségben. \n3. Akarna gyakorta hozzád ismét megtérni, De bűnei miatt nem mer elődbe menni, Tőled oly igen fél. Reád nézni sem mér, Színed igen rettegi. \n4. Semmije sincs pedig, mivel elődbe menjen, Mivel jóvoltodért viszont téged tiszteljen, Nagy alázatosan, Méltó haragodban Tégedet engeszteljen. \n5. Bátorítsad, Uram, azért biztató szóddal! Mit használsz szegénynek örök kárhozatjával? Inkább hadd dicsérjen E földön éltében Szép magasztalásokkal. \n6. Térj azért, én lelkem, kegyelmes Istenedhez, Szép könyörgésekkel béküljél szent kezéhez, Mert lám, hozzá fogad, Csak reá hagyd magad: Igen irgalmas Úr ez. \n7. Higygyünk mindörökké egyedül csak őbenne, Őrizkedjünk bűntől, ne távozzunk őtőle. Áldott az ő neve Örökké menynyekbe’, Ki már megkegyelmeze."},{"m":221,"r":null,"c":"Légy irgalmas, Úr Isten, minékünk, Mert ellened álnokúl vétkeztünk, Mé","b":"1. Légy irgalmas, Úr Isten, minékünk, Mert ellened álnokúl vétkeztünk, Mégis benned vagyon reménységünk, Bár bűnünkkel téged ingerlettünk. \n2. Vedd el rólunk méltó haragvásod, És mutassad nagy irgalmasságod, Hogy ismerjük meg ebből jóvoltod: Vedd el rólunk ezenképen átkod. \n3. Csak bűn a mi gyarló természetünk, Álnokságban, vétekben születtünk, Veszedelmes a mi földi éltünk, Elkárhozunk, hogyha meg nem térünk. \n4. Voltaképen ellened vétkeztünk, Látásodra gonoszt cselekedtünk, Igaz vagy te, nem kell kételkednünk, Győzedelmes, ha megítéltetünk. \n5. Derékképen tisztítsál meg minket, Mosd el rólunk Fiadért bűnünket, És elvesztett szép öltözetünket Ránk feladván, fogadd el lelkünket. \n6. Siess belénk új szíveket adni, Szentlelkeddel lelkünk megújítni, Tiszta hittel megajándékozni: Add örökké szent színedet látni."},{"m":222,"r":199,"c":"Ő menynyeknek fényessége, És szenteknek dicsősége, Bűnösöknek reménysé","b":"1. Ő menynyeknek fényessége, És szenteknek dicsősége, Bűnösöknek reménysége, Egyetlen egy segítsége!\n2. Te előtted vallást teszünk, Hogy mi mindnyájan vétkeztünk, Méltó haragodba estünk, És örök halált érdemlünk. \n3. Mert ímé már a mi bűnünk Hatalmasan regnál bennünk, Melyért a mi ellenségünk Követeli jussát bennünk. \n4. Nincs szívünkben reménységünk, Nincs lelkünkben csendességünk; Magunkban megfogyatkoztunk, Halál miatt nyomorodtunk. \n5. Már könyörülj meg mirajtunk, Úr Isten, mert magunk vagyunk; Szent Fiadért esedezünk: Szánj meg és ne hagyj elvesznünk!\n6. Vessed reánk szemeidet, Vedd el rólunk bűneinket, Igazíts meg bűnből minket, Vígasztald meg szíveinket. \n7. Dicsőítünk, szent Atyánkat, Véled együtt Megváltónkat. És a mi Vígasztalónkat: A dicső Szentháromságot."},{"m":223,"r":null,"c":"Istenem, én nagy bűnös ember, Szent színed elé járulok, Vétkem oly mél","b":"1. Istenem, én nagy bűnös ember, Szent színed elé járulok, Vétkem oly mély már, mint a tenger, Mentségért hozzád fordulok. Én Istenem, én Istenem, Irgalmazz, kérlek, énnekem! \n2. Szívem szerint ím elkesergem Gonosz és sok bűneimet: Hogy tőled én eltévelyedtem, Elhagytalak, Teremtőmet. Én Istenem, én Istenem, Irgalmazz, kérlek, énnekem! \n3. Hallgasd meg én fohászkodásim Atyai nagy szerelmedből, Bocsásd meg minden rút bűneim, Mentsd ki szívem ez ínségből. Én Istenem, én Istenem, Irgalmazz, kérlek, énnekem! \n4. Ne büntess úgy, mint érdemlettem Tőled én undok bűnömmel, Mert akkor nyilván el kell vesznem: Térj hozzám hát jó kedveddel. Én Istenem, én Istenem, Irgalmazz, kérlek, énnekem! \n5. Csak egy szót mondj, hogy újjá légyek, mondd ezt énnékem, bűnösnek: ”megengedtem, menj el békével, Meglásd, többé ne vétkezzél.” Én Istenem, én Istenem, Irgalmazz, kérlek, énnekem! \n6. Nincs kétségem, megvigasztaltál, Erősítéd én szívemet, Könyörgésemben meghallgattál, Érzem már szent kegyelmedet. Én Istenem, én Istenem, Irgalmazz, kérlek, énnekem!"},{"m":224,"r":null,"c":"Kegyelmezz meg nékünk, nagy Úr Isten, Ne hagyj minket elvesznünk bűnün","b":"1. Kegyelmezz meg nékünk, nagy Úr Isten, Ne hagyj minket elvesznünk bűnünkben, Kik mindenkor bízunk szent nevedben: Bűnünk szerint ne büntess tömlöcben! \n2. A te néped tenger vétkét vedd el, És fedezgesd bűnét kegyelmeddel, Mert szent Fiad megválta vérével, Nem akart ő elvetni bűnünkkel. \n3. Idvezítő Isten, kérünk téged: Jelenjék meg rajtunk kegyességed, Távozzék el rólunk ítéleted, Légyen vélünk te szent istenséged. \n4. Vajjon egyéb náladnál ki volna, Hogy fogságból kiszabadítana? Hanem csak te, Istennek szent Fia, Ki magadat adád nagy fogságra. \n5. Mutasd ki már irgalmasságodat, Kegyes Isten, és nagy jóvoltodat: Add ismernünk a te szent Fiadat, Ő kedvéért jelentsd meg magadat!\n6. Hallgathassuk a te szent igédet, És hihessük te ígéretedet: Adjad nékünk a jó békességet, Szabadítsd ki a fogságból néped!\n7. Közel vagyon hívekhez az Isten, Mert nem múlóképen jő közénkben, De örökké lakozik szívünkben: Nem hágy vesznünk a hitetlenségben. \n8. Higyjünk azért a Jézus Krisztusban, Ne maradjunk bálványimádásban: Nem hágy minket az Isten fogságban, És nem adja népét nagy rabságban."},{"m":225,"r":null,"c":"Nagy hálát adjunk az Atya Istennek, Mennynek és földnek szent teremtőj","b":"1. Nagy hálát adjunk az Atya Istennek, Mennynek és földnek szent teremtőjének, Oltalmazónknak, kegyes éltetőnknek, Gondviselőnknek. \n2. Hála tenéked, mennybéli nagy Isten, Hogy szent igédet adtad mi elménkben, És hogy ezáltal véssz ismeretedben, Te kegyelmedben. \n3. A romlás után nem hagyál bűnünkben, Sőt te Fiadat ígéréd igédben, Hogy elbocsátod őtet miközénkben, Emberi testben. \n4. Felséges Isten, tenéked könyörgünk, Hogy mutassad meg szent Fiadat nékünk, Hogy őtet látván, benne remélhessünk, Idvezülhessünk. \n5. Adjad, hogy lássuk a világosságot, Te szent igédet, az egy igazságot, A Krisztus Jézust: örök vigasságot, És boldogságot. \n6. És ne ismerjünk többet a Krisztusnál, Ne szerethessünk egyebet Jézusnál; Maradhassunk meg a te szent Fiaddal, Krisztus Urunkkal. \n7. Adj igaz hitet a te szent Fiadban, És jó életet minden útainkban; És Szentlelkeddel vigy be hajlékodba, A boldogságba. \n8. Dicsőség néked mennyben, Örök Isten, Ki dicsértetel a te szent igédben, Krisztus Jézusban, mi Idvezítőnkben, És Szentlélekben."},{"m":226,"r":null,"c":"Krisztusom, kívüled nincs kihez járulnom, Ily beteg voltomban nincs ki","b":"1. Krisztusom, kívüled nincs kihez járulnom, Ily beteg voltomban nincs kitől gyógyulnom. Nincs ily fekélyemből ki által tisztulnom, Veszélyes vermemből és felszabadulnom. \n2. Gyújtsd meg szövétnekét áldott szent igédnek És bennem virraszd fel napját kegyelmednek; Igaz utat mutass nékem, szegényednek, Járhassak kedvére te szent Felségednek. \n3. Várlak, Uram, azért reménykedő szívvel, Miként a vigyázó virradást vár éjjel; Hozd fel szép napodat nékem is jó reggel, Hogy szolgálhassalak serényebb elmével. \n4. Dicsértessél. Atya Isten, magasságban, Mi Urunk Krisztussal mind egy méltóságban, És a Szentlélekkel mind egy hatalomban: Háromság egy Isten, áldj meg dolgainkban."},{"m":227,"r":null,"c":"A mi szívünk csak tehozzád, Jézus, Isten Báránya, Óhajtozik, híveidnek","b":"1. A mi szívünk csak tehozzád, Jézus, Isten Báránya, Óhajtozik, híveidnek Drága fényes aranya, Mert halálunk megrontója, Örök életnek adója Vagy egyedül, Krisztusunk, Idvezítő Jézusunk. \n2. Csudálkozván nézi elménk Atyádnak nagy szerelmét, Álmélkodván is szemléli Hozzánk való jó kedvét, Melyet abban megmutatott, Hogy minékünk téged adott; Azért, édes Krisztusunk, Vagy szerelmes Jézusunk. \n3. Szegény bűnös embereknek Idvességes reménye, Benned hívőknek öröme, Boldogsága, szépsége: Jövel, jövel hozzánk, kérünk, Mindenkoron légy mivélünk, Mert csak te vagy Krisztusunk És kegyelmes Jézusunk. \n4. Reád bízzuk mi magunkat Itt ez árnyék világban, Idvezítő szerelmedből Könyörülj fiaidon. Légy vezérünk, oltalmazónk, Kegyes mesterünk, tanítónk, Édes Atyánk, Krisztusunk, Gondviselő Jézusunk. \n5. Erősítsd bennünk hitünket, Idvességünk eszközét, Vesd tengerbe bűneinket, Kerüljük pokol tüzét. Így mi halálunk óráján, Életünknek végső táján, Lelkünket, ó, Krisztusunk, Vedd kezedbe Jézusunk. \n6. Nincsen nékünk itt e földön Maradandó városunk, Hanem repeső elmével Jövendőt óhajtozunk, Ott sok ezer angyalokkal, Téged áldunk szent Atyáddal: Méltó vagy, ó, Krisztusunk, Erre, édes Jézusunk. \n7. Hozzád hajtjuk csak fejünket, Ó, mi édes Megváltónk, Koporsónkba ha beszállunk, Ott is léssz gyámolítónk. Benned édesen aluszunk, Eljöveteledig nyugszunk, És örökké, Krisztusunk, Véled élünk, Jézusunk. \n8. Zörgetőknek megnyittatik Kegyelemnek ajtaja; Megígérte az Úr Jézus, Hogy kérésünk megadja. Jövel, Jézus, és ne késsél, Már mellőlünk el ne térjél: Idvezíts, ó, Krisztusunk, Mi kegyelmes Jézusunk!"},{"m":228,"r":201,"c":"Jehova, csak néked éneklek, Ki volna más tehozzád fogható? Dícséretet","b":"1. Jehova, csak néked éneklek, Ki volna más tehozzád fogható? Dícséretet csak néked zengek, Csak téged áldlak, ó Mindenható! Jővel, segíts, én édes Jézusom, Hogy könyörgésem mennybe eljusson! \n2. Ó vonj, Atyám, Fiadhoz engem, Hogy szent Fiad is hozzád elvigyen; S míg jóvoltodat áldva zengem, Keblem Szentlelked hajléka legyen; Add békességed ízét érzeni És dícséreted vígan zengeni! \n3. Ha semmi mást nem kérek tőled, Csak amit lelked által kérhetek, Te szükségim beteljesíted, Mert Jézus hozzád útat készített, Ki gyötrelmével értem áldozott, És üdvösséget jussomúl hozott. \n4. Jó tudnom azt, hogy közbenjáróm Hű Jézusom, ki jobbod felől ül; Ő általa, ha hitből várom, Kérésem nálad bizton teljesül; Jó nékem, hogy míg tart ez életem, Szent neved vígan, áldva zenghetem!"},{"m":229,"r":null,"c":"Hű pásztorunk, vezesd  a te  árva nyájadat, E  földi útvesz tőben te m","b":"1. Hű pásztorunk, vezesd  a te  árva nyájadat, E  földi útvesz tőben te mutass jó utat; Szent  nyomdokodba  lépve, a menny felé megyünk, Ó, halhatatlan I ge, ve zérünk, Mesterünk. \n2. Mert boldog az az em ber, ki  dicsér tégedet, És  kóstolgatja  mindennap szent beszédedet; Hát  legeltessed  igéddel bolygó nyájadat, És terelgessed Lel keddel  juhocskáidat. \n3. Szentlelkedet töltsd ránk  ki mint  hajnal harmatát, És  adj fejünkre  tőled nyert ékes koronát, Hogy  áldozatra  felgyúlt, megszentelt életünk Oltárodon elég jen, Ki rályunk, Mesterünk!"},{"m":230,"r":203,"c":"Áll a Krisztus szent  ke resztje Elmúlás és rom  fe lett, Krisztus ban","b":"1. Áll a Krisztus szent  ke resztje Elmúlás és rom  fe lett, Krisztus ban beteljesedve Látom üdvös ségemet. \n2. Bánt a sok gond, űz  a  bánat, Tört remény, vagy fé le lem: Ő nem  hágy el, biztatást ad: Békesség van  én velem. \n3. Boldogságnak nap ja  süt rám; Jóság, fény jár ú ta mon: A ke resztfa ragyogásán Fényesebb lesz  szép napom. \n4. Áldássá lesz ott  az  átok, Megbékéltet a  ke reszt; El nem  múló boldogságod, Békességed  ott keresd! \n5. Áll a Krisztus szent  ke resztje Elmúlás és rom  fe lett, Krisztus ban beteljesedve Látom üdvös ségemet."},{"m":231,"r":208,"c":"Uram, a te igéd nekem A sötétben szövétnekem; Mind igazak és ámenek, A","b":"1. Uram, a te igéd nekem A sötétben szövétnekem; Mind igazak és ámenek, Amik szádból kijöttenek, Azért amit nem látok szemmel, Béveszem szavadra hitemmel. \n2. Bízom hozzád erős hittel, Hogy te mindent megcselekszel, Amit szent igédben ígérsz: Hogy kegyelmesen hozzám térsz, És megbocsátván bűneimet, Megadod örök életemet. \n3. E nagy jót neked köszönöm, Mely nekem arra ösztönöm, Hogy a Jézust, kiért velem Közöltetik a kegyelem, Tartsam lelkem megtartójának, Szeressem, engedvén szavának. \n4. Igazgass, Uram, engemet, Hogy megőrizzem hitemet; Ha von magához e világ, Én mint Krisztusba oltott ág, Tőle vegyem tápláltatásom, Míg az élők közt lesz lakásom."},{"m":232,"r":null,"c":"Hiszek a mennybéli egy Istenben, Mindenható és kegyelmes Atyában, Menn","b":"1. Hiszek a mennybéli egy Istenben, Mindenható és kegyelmes Atyában, Mennynek és földnek teremtő Urában, Ki mindent tart hű gondviselésben. \n2. És az ő egyszülött szent Fiában, Jézus Krisztusban, a mi egy Urunkban, Aki a Szentlélektől fogantaték S Szűz Máriától tisztán születék. \n3. Szenvede Pilátusnak alatta, Felfeszíttetvén keresztre, meghala; Eltemettetvén poklokra leszálla, Harmadnap halálból feltámada. \n4. Felméne mennybe, üle jobbjára A mindenható Atya Úr Istennek: Ítéletükre onnan az élőknek És holtaknak eljő bizonyára. \n5. Hiszek a szentelő Szentlélekben És egy keresztyén Anyaszentegyházat, Egyességét a szenteknek mindenben, És a bűnöknek megbocsánatát. \n6. Hiszem a testnek feltámadását És idvességgel az örök életet, Melylyet az Isten híveknek megszerzett: Lelkem e hittel bíztatja magát."},{"m":233,"r":null,"c":"Úr Isten, te tarts meg minket, És szent igédben hitünket; Rontsd meg m","b":"1. Úr Isten, te tarts meg minket, És szent igédben hitünket; Rontsd meg mi ellenségünket És minden kegyetleneket. \n2. Kik a Krisztust háborgatni És szent székiből levetni Akarják, őtet rontani, Ő híveiben kergetni. \n3. Krisztus, ki vagy urak Ura És királyoknak Királya: Jelentsed istenségedet És törd meg ellenségidet. \n4. Tartsd meg minden híveidet, Te szegény keresztyénidet, Hogy dicsérhessünk tégedet, Tartsd egyességben népedet. \n5. Ó, áldott Szentlélek Isten, Vigasztalj minket e földön, Légy jelen mi szükségünkben, Minden keserűséginkben. \n6. Nevelj minket igaz hitben, Krisztusnak ismeretiben; Végy minket szent szerelmedbe És holtunk után örömbe."},{"m":234,"r":206,"c":"Jer, kérjük Isten áldott Szentlelkét Legfőképpen az igaz hitért, Hogyh","b":"1. Jer, kérjük Isten áldott Szentlelkét Legfőképpen az igaz hitért, Hogyha jő a végóra, mellénk álljon, Hazatérésre készen találjon, Könyörüljön. \n2. Jer, Világosság, ragyogj fel nekünk, Hogy csak Krisztus légyen mesterünk, El ne hagyjuk őt, mi hű Megváltónkat, Aki népének örökséget ad. Könyörüljél. \n3. Ó, Szeretet, áraszd ránk meleged, Hadd kóstoljuk édességedet; Tiszta szívből mindenkit hadd szeressünk, Egyességben és békében éljünk. Könyörüljél. \n4. Ínségeinkben fő Vigasztalónk, Halál ellen megbátorítónk, öszsze ne hagyj esni, ha ellenségünk Reánk jő s romlást készít már nékünk. Könyörüljél."},{"m":235,"r":null,"c":"Hallgass meg minket, nagy Úr Isten, E mostani nagy szükségünkben, És t","b":"1. Hallgass meg minket, nagy Úr Isten, E mostani nagy szükségünkben, És tekints meg minket mi életünkben, Hogy ne essünk e földön hitetlenségbe, Ördög kezébe. \n2. Mert csak te vagy a világosság, Életünkben te vagy igazság, Mi setét szívünkben nagy világosság, És szomorú lelkünkben te vagy vigasság, Örök boldogság. \n3. Távoztass tőlünk hamisságot, Add szívünkbe az igazságot, és a mi lelkünkbe nagy bátorságot, Hogy nyilván elhihessük a boldogságot: Örök országot. \n4. Adj Szentlelket a tanítóknak, Egyetemben a hallgatóknak, Hogy mind
