<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Énekkereső — RKE Énekeskönyv</title>
<style>
  :root {
    --paper: #f2ead6;
    --paper-deep: #e8dec4;
    --ink: #2b241c;
    --ink-soft: #5a5040;
    --wine: #7a2e2e;
    --wine-deep: #5c2020;
    --brass: #a9863f;
    --brass-light: #cbaa66;
    --line: #cdbf9a;
    --shadow: rgba(43, 36, 28, 0.18);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
  }

  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(169,134,63,0.08), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(122,46,46,0.06), transparent 60%);
  }

  .app { display: flex; flex-direction: column; height: 100dvh; }

  /* ---------- Fejléc / kereső ---------- */
  header {
    flex: 0 0 auto;
    padding: env(safe-area-inset-top, 0) 0 0 0;
    background: linear-gradient(180deg, var(--paper) 0%, var(--paper) 70%, transparent 100%);
    border-bottom: 1px solid var(--line);
  }

  .header-inner { padding: 0.9rem 1rem 0.8rem; }

  .brand {
    display: flex; align-items: baseline; gap: 0.55rem;
    margin-bottom: 0.65rem;
  }
  .brand-mark {
    font-family: Georgia, serif;
    font-weight: 700; font-size: 1.05rem; letter-spacing: 0.06em;
    color: var(--wine-deep);
    border: 1.5px solid var(--wine-deep);
    padding: 0.08rem 0.4rem;
    border-radius: 3px;
  }
  .brand-title {
    font-size: 0.98rem; color: var(--ink-soft); letter-spacing: 0.03em;
    font-variant: small-caps;
  }

  .search-wrap { position: relative; }
  #search {
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    font-size: 1.15rem;
    padding: 0.75rem 2.6rem 0.75rem 1rem;
    border: 1.5px solid var(--brass);
    border-radius: 10px;
    background: #fffcf4;
    color: var(--ink);
    outline: none;
  }
  #search:focus { border-color: var(--wine); box-shadow: 0 0 0 3px rgba(122,46,46,0.12); }
  #search::placeholder { color: #a89a7c; }
  .search-clear {
    position: absolute; right: 0.55rem; top: 50%; transform: translateY(-50%);
    width: 1.9rem; height: 1.9rem; border-radius: 50%;
    border: none; background: var(--paper-deep); color: var(--ink-soft);
    font-size: 1rem; line-height: 1; display: none; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .search-clear.visible { display: flex; }

  .mode-hint {
    margin-top: 0.5rem; font-size: 0.8rem; color: var(--ink-soft);
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    min-height: 1.1rem;
  }

  /* ---------- Lista ---------- */
  main { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #list { padding: 0.3rem 0 3rem; }

  .empty-state {
    text-align: center; color: var(--ink-soft);
    padding: 3rem 1.5rem; font-size: 1.05rem;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  .row {
    display: flex; align-items: center; gap: 0.85rem;
    padding: 0.7rem 1rem;
    border-bottom: 1px solid rgba(205,191,154,0.6);
    cursor: pointer;
  }
  .row:active { background: rgba(169,134,63,0.12); }

  .num-tile {
    flex: 0 0 auto;
    min-width: 3rem; text-align: center;
    font-family: Georgia, serif; font-weight: 700; font-size: 1.15rem;
    color: #fdf8ea;
    background: var(--wine);
    border: 1px solid var(--wine-deep);
    border-radius: 6px;
    padding: 0.35rem 0.3rem;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 1px 2px var(--shadow);
  }
  .num-tile.zsoltar { background: var(--brass); border-color: #8a6a2e; color: #322508; }

  .row-text { flex: 1 1 auto; min-width: 0; }
  .row-title {
    font-size: 1.06rem; color: var(--ink);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .row-kind {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 0.72rem; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--ink-soft); margin-top: 0.12rem;
  }
  .row-flag { color: var(--wine); font-size: 0.95rem; margin-left: 0.3rem; }
  .row-badge {
    display: inline-block; margin-left: 0.4rem;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 0.68rem; letter-spacing: 0.02em;
    color: var(--ink-soft); background: rgba(169,134,63,0.16);
    border-radius: 4px; padding: 0.05rem 0.35rem;
  }
  .row-badge.orphan { color: var(--wine-deep); background: rgba(122,46,46,0.12); }
  .num-tile.rke-only { background: #8a8070; border-color: #5f574a; color: #f2ead6; }

  /* ---------- Részlet-nézet ---------- */
  #detail {
    position: fixed; inset: 0; background: var(--paper);
    transform: translateX(100%); transition: transform 0.22s ease-out;
    display: flex; flex-direction: column; z-index: 20;
  }
  #detail.open { transform: translateX(0); }

  .detail-header {
    flex: 0 0 auto;
    padding: calc(env(safe-area-inset-top, 0px) + 0.6rem) 1rem 0.7rem;
    display: flex; align-items: center; gap: 0.7rem;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .back-btn {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    border: none; background: var(--paper-deep); color: var(--wine-deep);
    font-size: 1rem; padding: 0.5rem 0.85rem; border-radius: 8px;
    cursor: pointer;
  }
  .back-btn:active { background: var(--line); }
  .detail-num {
    font-family: Georgia, serif; font-weight: 700; font-size: 1.3rem;
    color: var(--wine-deep);
  }
  .detail-kind {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 0.75rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em;
  }

  .detail-body { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1.3rem 1.3rem 4rem; }
  .detail-title {
    font-size: 1.5rem; line-height: 1.3; color: var(--ink);
    margin: 0 0 0.9rem; font-weight: 700;
  }
  .detail-warning {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 0.85rem; color: var(--wine-deep); background: rgba(122,46,46,0.08);
    border-left: 3px solid var(--wine); padding: 0.55rem 0.75rem; border-radius: 4px;
    margin-bottom: 1.1rem;
  }
  .lyrics {
    font-size: 1.18rem; line-height: 1.72; color: var(--ink);
    white-space: pre-wrap;
  }
  .lyrics .verse-num {
    color: var(--wine); font-weight: 700;
  }

  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark">MRE · RKE</span>
        <span class="brand-title">Énekeskönyv kereső</span>
      </div>
      <div class="search-wrap">
        <input type="text" id="search" placeholder="MRE vagy RKE szám, vagy szöveg…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="search-clear" id="clearBtn" aria-label="Törlés">✕</button>
      </div>
      <div class="mode-hint" id="hint"></div>
    </div>
  </header>
  <main>
    <div id="list"></div>
  </main>
</div>

<div id="detail">
  <div class="detail-header">
    <button class="back-btn" id="backBtn">‹ Vissza</button>
    <div>
      <div class="detail-num" id="detailNum"></div>
      <div class="detail-kind" id="detailKind"></div>
    </div>
  </div>
  <div class="detail-body">
    <div class="detail-title" id="detailTitle"></div>
    <div id="detailWarning"></div>
    <div class="lyrics" id="detailLyrics"></div>
  </div>
</div>

<script>
const SONGS = 
[{"m":1,"r":1,"c":"Aki nem jár hitlenek tanácsán, És meg nem áll a bűnösök útán, A csúfol","b":"1. Aki nem jár hitlenek tanácsán, És meg nem áll a bűnösök útán, A csúfolóknak nem ül ő székében, De gyönyörködik az Úr törvényében, És arra gondja mind éjjel, nappal: Ez ily ember nagy boldog bizonynyal.\n2. Mert ő olyan, mint a jó termőfa, Mely a víz mellett vagyon plántálva, Ő idejében meghozza gyümölcsét, És el nem szokta hullatni levelét; Ekképpen amit ez ember végez, Minden dolgában megyen jó véghez.\n3. De nem ígyen vannak a gonoszak; Hanem mint az apró por és polyvák, Melyek a széltől széjjelragadtatnak: Így az ítéletben meg nem állhatnak A gonoszok és kik bűnben élnek, Az igazak közt helyet nem lelnek.\n4. Mert az Isten ismeri útukat, Az igazaknak érti dolgukat; Azért mindörökké ők megmaradnak; De akik csak a gonoszságban járnak, Azoknak nyilván mind elvész útuk: Mert Istennek nem kell az ő dolguk."},{"m":2,"r":2,"c":"Miért zúgolódnak a pogányok? Mit forgatnak ő bolond elméjükben? A föld","b":"1. Miért zúgolódnak a pogányok? Mit forgatnak ő bolond elméjükben? A földi népeknek mi szándékok? Csak hiába valót űznek szívük ben. E világi királyok egybegyűlnek, A fejedelmek tanácsot tartnak, Az Isten ellen erős kötést tesznek, És az ő Krisztusára támadnak. \n2. Nagy fennen mondják: mit késünk ezzel? Jer, szaggasuk el ezeknek kötelét, És minden igájukat rontsuk el, Ne viseljünk többé rajtunk effé lét! De az Úr Isten a magas menynyekben Csak neveti dolgukat azoknak, Csúfolja őket, ülvén szent székében, Kinek ezek semmit nem árthatnak. \n3. Szolgáljatok e hatalmas Úrnak Jámbor élettel, igaz félelemmel, Örvendezzetek ő nagy voltának, De ezek is légyenek rettegés sel: Csókoljátok e néktek küldött fiat, Hogy erősen meg ne haragudjék; El ne mulaszszátok parancsolatját, Mert szörnyűképpen el kell vesznetek!"},{"m":3,"r":3,"c":"Ó, mely sokan vannak, Akik háborgatnak Engemet, én Istenem! Nagy sok e","b":"1. Ó, mely sokan vannak, Akik háborgatnak Engemet, én Istenem! Nagy sok ellenségim És sok gyűlölőim Tusakodnak ellenem. Sokan azt állítják, Lelkemről azt mondják: Elveszett ennek dolga, Segítsége nincsen, Mert elhagyta Isten, Így szólnak bolond módra. \n2. Mert te, én Istenem, Paizsom vagy nekem, Ki életem megmented, És nagy tisztességre, Fejem dicsőségre Idővel fölemeled. Tehozzád, Úr Isten, Kiáltok szüntelen, És te megvidámítasz; Meghallgatsz kedvedből, Sion szent hegyéről Nagy segedelmet nyújtasz. \n3. Ha ágyamban nyugszom, Csendesen aluszom, nincsen semmi félelmem. Midőn felserkenek, Semmit sem kesergek, Mert Isten őriz engem. Ha százezer népek Mind körülvennének Jobb és bal kezem felől, Ha rám ütnének is, Nem rettegnék mégis Semmi veszedelemtől. \n4. Kelj föl, Uram, tarts meg, Ellenségim vond meg, Megtörvén ő fogokat! Mind öszszepaskolod És arcul csapdosod Az Isten-utálókat. Csak te vagy az Isten, Ki minden szükségben Meg tudsz szabadítani, Ki a te sereged Megtartod, szereted, És meg szoktad áldani."},{"m":4,"r":4,"c":"Én igazságomnak Istene, Hallgasd meg én kiáltásom! Szánj meg és tekint","b":"1. Én igazságomnak Istene, Hallgasd meg én kiáltásom! Szánj meg és tekints ínségemre, Te vigy engemet tágas helyre, Midőn itt szorongattatom! Ti nagy urak, míglen gyaláztok Engemet tisztességemben? És ily hívságban míg maradtok? Hazudozásra mit vágyódtok? Mit gyönyörködtök ezekben? \n2. De vegyétek jól eszetekbe, Hogy az Úr Isten engemet Bévett kedvébe, kegyelmébe, Csuda mód megmentett engemet, És meghallja kérésemet! Rettegjetek hát és lássátok, Hogy ellene ne vétsetek; Magatokat meggondoljátok, Az ágyasházban ha nyugosztok, Hogy lehessen csendességtek! \n3. Az igazak áldozatjával Áldozzatok az Istennek; Jó élettel és igazsággal, És az Istenben bátorsággal Bízzatok és örvendjetek! De sokan mondják azt minékünk: Ki vezérl minket a jóra? Azért téged, Úr Isten, kérünk, Mutasd kegyes orcádat nékünk, Jöjjön el az áldott óra! \n4. Melylyel inkább vigasztalsz engem És örvendeztetsz szívemben, Hogynem kiknek sok mustjok terem, Búzájokkal rakva sok verem, Mikkel élnek bőségesen. Azért élek jó békességben, Fekszem, aluszom kedvemre, Uralkodván lakom földemben Bátorságos örvendezésben, Mert az Úr vigyáz éltemre."},{"m":5,"r":5,"c":"Úr Isten, az én imádságom, Kérlek, vegyed füleidbe És hallgass meg kér","b":"1. Úr Isten, az én imádságom, Kérlek, vegyed füleidbe És hallgass meg kérésembe'! Én Istenem és én királyom, Értsd meg mondásom. \n2. Tekintsed meg esedezésem, És halld meg kiáltásomat, Midőn hívlak, királyomat! Meghallgatod én könyörgésem, bizonynyal hiszem. \n3. Jó reggel meghallgatsz engemet, Uram, még virradta előtt, Idején a nap hogy feljött; Elődbe számlálom ügyemet, Várván kegyelmet. \n4. Mert egyedül te vagy oly Isten, Kinek a gonoszság nem kell; És aki gonosz bűnben él, Nem mehet hozzád semmiképpen, Míg él vétekben. \n5. Én pedig nagy jó reménységgel Bémegyek szent templomodba, És imádlak szent házadba’; Nagy jóvoltodért félelemmel Szolgállak szívvel. \n6. Uram, vezérelj igazságban Ellenségimnek láttokra, Kik igyekeznek káromra; Oktass, hogy a te útaidban Járhassak jobban. \n7. És hogy azok mind örüljenek, Akik bíznak csak tebenned, Szívből szeretik szent neved: Engedd, hogy vígan Felségednek Énekeljenek. \n8. Az igazat mert te megáldod, Te nagy irgalmasságoddal Körülveszed, mint paizszsal; A gonosz ellen őt megtartod És oltalmazod."},{"m":6,"r":6,"c":"Uram, te nagy haragod ban, Mely miatt vagyok búban, Engemet ne feddj m","b":"1. Uram, te nagy haragod ban, Mely miatt vagyok búban, Engemet ne feddj meg! És haragodnak tüze, Szűnjék meg sebessége, Melyben ne büntess meg! \n2. Nékem, Uram, légy irgal mas, Mert vagyok nagy fájdalmas. Ne hagyj, Uram, kérlek! Gyógyítsd meg sérelmimet, Elrettent tetemimet Újítsd meg, hogy éljek! \n3. Térj, Uram, kegyesen hoz zám, Mert, jaj, elfogyatkozám! Te nagy irgalmadból Szánj meg nagy nyavalyámban És keserves kínomban: Ments meg a haláltól! \n4. Én szomorúságim mi att Én két szemem elsorvadt És elhomályosult; Ezt szerzik ellenségim, Vigadnak gyűlölőim, Min szívem elbúsult. \n5. Azért minden ellensé gim És én háborgatóim, Pironkodjatok el! Már mind hátra térjetek, És megszégyenüljetek Nagy hirtelenséggel!"},{"m":7,"r":7,"c":"Ó, én Uram és én Istenem, Tebenned vagyon reménységem, Én oltalmamra l","b":"1. Ó, én Uram és én Istenem, Tebenned vagyon reménységem, Én oltalmamra légy jelen, Tarts meg ellenségem ellen, Hogy engemet el ne ragadjon, Mint éh oroszlán, meg ne rágjon, Amidőn nincs segítségem, Aki megmentene engem. \n2. Hogyha én ezt tettem, Úr Isten, Avagy hamisság van kezemben; Hogyha gonoszt tettem ennek, Ki örült békességemnek; Hogyha valaki abban megért, Hogy gonoszt fizettem a jóért; Sőt, ha jól nem tettem azzal, Ki nekem volt boszszúsággal: \n3. Ámbár kergessen ellenségem, És bátor megragadjon engem, Életemet földhöz verje, Dicsőségem porrá tegye! Kelj föl azért nagy haragodban, Ellenségem ellen támadván; Add meg az előbbi tisztem, Kit rendeltél, Uram, nekem! \n4. Verd meg az istenteleneket, És védelmezd meg híveidet, Mert mindeneknek titkait, Látod, Uram, szívit-lelkit. Te vagy paizsom, igaz Isten, És nem hagysz el veszedelmemben, Ki a híveket megtartod, A gonosztól takargatod."},{"m":8,"r":8,"c":"Ó, felséges Úr, mi kegyes Istenünk, Mely csudálatos a te neved nékünk!","b":"1. Ó, felséges Úr, mi kegyes Istenünk, Mely csudálatos a te neved nékünk! Nagy dicsőséged ez egész földre Kiterjed és felhat az egekre. \n2. Dicsérnek téged még a csecsszopók is, Szájukban viselik nevedet ők is, Kik által ellenséget megejtesz, És boszszúállót megszégyenítesz. \n3. Nagy voltát ha megnézem dolgaidnak, Melyeket a te kezeid formáltak, Az eget, holdat, a fényes napot, És szép renddel a sok csillagokot: \n4. Csudálván mondom: micsoda az ember, Ki tőled enynyi sok dicsőséget nyer? De micsoda az embernek fia, Kiről Felségednek van ily gondja? \n5. Az angyaloknál noha egy kevéssé Kisebbé tőd, de nagy dicsőségessé Teremtéd őtet és magasztalád, Nagy dicsőségre felkoronázád. \n6. Kezed munkáin őtet úrrá tevéd, Hogy azokkal bírna, néki engedéd, Valamit e világra teremtél, Mindeneket lába alá vetél. \n7. Ó, felséges Úr, mi kegyelmes Urunk, Mely csudálatos a te neved nálunk! Felségednek mely nagy dicsősége, melylyel teljes e föld kereksége."},{"m":9,"r":9,"c":"Dicsérlek téged, Úr Isten, És áldlak teljes szívemben, És a te csudaté","b":"1. Dicsérlek téged, Úr Isten, És áldlak teljes szívemben, És a te csudatételidet, Hirdetem jótéteményidet. \n2. Tebenned, Uram, vigadok, Nagy örömömben tombolok, És a te felséges nevednek Szép dicséreteket éneklek. \n3. Mert az én ellenségimet Veréd, megtérítéd őket, Kik rettegvén, hátra esének, Szent színed elől elveszének. \n4. Én ügyemet megtekintéd, És kegyelmesen felvevéd; Ülvén a törvénytevő székben, Megmentél igaz ítéletben. \n5. Énekeljetek az Úrnak, A Sion hegyén lakónak! Sokságát cselekedetinek Hirdessétek el minden népnek. \n6. Aki nyilván megkeresi, Az igaz vért nem felejti, A szegény népet ő nem hagyja, Akiknek kiáltását hallja. \n7. Én Uram és én Istenem, Tekintsed meg nagy ínségem: Életemet a gonosz gyötri; A halál kapuiból végy ki! \n8. Kelj fel, Uram, és légy jelen, Hogy ember erőt ne vegyen; A pogányokat hívd elődbe, Ítéld meg erős törvényedbe’! \n9. Szívökben, Uram, rettentsd meg, Hogy magukat gondolják meg, És ismerjék a pogány népek, Hogy ők is halandó emberek."},{"m":10,"r":10,"c":"Mire távozol tőlünk, Úr Isten, Ily meszsze, és magad mit rejted el? E","b":"1. Mire távozol tőlünk, Úr Isten, Ily meszsze, és magad mit rejted el? E sok ideig való ínségben, Miért hogy minket így felejtesz el? Ím, az istentelen kevélységgel Kergeti a szegényt és nyomorgatja: Hálója essék az önnön nyaká ba! \n2. Mert az istentelen dicsekedik, És gyönyörködik kívánságában. Dicséri a fösvényt, hízelkedik, Istent káromol felfuvalkodván, Akit megutál nagy hívságában, Sőt kevélységében így gondolkodik: Hogy nincsen Isten, azzal csúfoló dik. \n3. Ő bolondságában úgy elmégyen, Erős ítéletedet nem féli. És kevélységében szól nagy fennen, Ellenségit is semminek véli. könynyen elfúhatja, azt ítéli, Végre mond: bátran lakom és csendesen, Soha nem esem szerencsétlenség ben. \n4. Átokkal, szitokkal rakva szája, Szól az ő nyelve csak álnokságot, E nyelvet szoktatta csalárdságra, melylyel szerez sok bút és bánatot. Tolvajok módján megáll barlangot, Leshelyből a szegényre ólálkodik, Hogy megfoghassa, csak azon forgó dik. \n5. Uram, tekintsd meg a nyomorultat, A szelídeket kegyesen tartsd meg; Vedd füledbe ő kiáltásukat, Erősítsd szívüket, vigasztald meg. A szegény árvákat védelmezd meg, Zabolázd meg az erőszaktevőket: E földön óvd a gonoszoktól né ped."},{"m":11,"r":11,"c":"Az Istenben bízom jó reménységgel, Miért szóltok hát így én lelkemnek,","b":"1. Az Istenben bízom jó reménységgel, Miért szóltok hát így én lelkemnek, Hogy én a ti hegyetekre fussak el, És mint egy madár meszsze repüljek? Mert a kegyetlenek ívüket szegzik, Hogy a tiszta szívűket meglőjék, Már a nyilakat az idegbe tették. \n2. Mert igaz ő, és igazságot szeret, És kedves orcát mutat azoknak, Kik igazságban rendelik éltüket. Az Istennek temploma menynyekben, Ott fenn vagyon szent széke, melyből széjjel Szemei mindent néznek élesen, Földi népet is megnézell és szemlél."},{"m":12,"r":12,"c":"Szabadíts meg és tarts meg, Uram Isten, Mert szentid elfogytak, nincs","b":"1. Szabadíts meg és tarts meg, Uram Isten, Mert szentid elfogytak, nincs jól tévő, És a földön már sok a tökéletlen, Nincs emberek közt igaz beszédű. \n2. Ezek egymásnak szólnak csak hívságot, Dolgukat festik szép beszédekkel; Hízelkedvén, mutatnak nyájasságot, De nyelvük nem egyez ő szívükkel. \n3. És ezt mondják: jer, tegyük azt nyelvünkkel, Hogy minket minden nagyra becsüljön; Ajkunkkal, szánkkal elbírunk ezekkel, És senki sincs, ki velünk pöröljön. \n4. Azért mond Isten: ímé, a szegények Elhagyatnak, öletnek, pusztulnak; Azért őket megszánom és felkelek, És kezükből kimentem azoknak. \n5. Az Istennek mondási oly igazak, Mint a drága ezüst, kit a tűzben Az ötvösök kohókban tisztítottak, És hétszer megeresztettek szépen. \n6. Tartsd meg azért népedet kegyelmesen, Kérünk, jóvoltodból reánk tekints! Őrizz meg örökké e nemzet ellen, Hozzánk mindenkor jókedvet jelents!"},{"m":13,"r":13,"c":"Míglen felejtesz el, Uram, Míg nem emlékezel rólam? A te orcádat énelő","b":"1. Míglen felejtesz el, Uram, Míg nem emlékezel rólam? A te orcádat énelőlem, Örökké elrejted e tő lem? Mire nem könyörülsz rajtam? \n2. Tekints reám, kegyes Uram! Szánjad meg az én nyavalyám! Szemeimet világosítsd meg, Hogy életemben viduljak  meg, Halálban el ne aludjam. \n3. Mert én bízom jókedvedben, Ki megvigasztalsz szívemben. Örvendez azért az én lelkem, Hogy Isten az én segedel mem, Melyért dicsérem énekben."},{"m":14,"r":14,"c":"A bolond így szól az ő szívében: \"nincs Isten\", azért nagy gonoszságba","b":"1. A bolond így szól az ő szívében: \"nincs Isten\", azért nagy gonoszságban él; Utálatos bűnt teszen, semmit nem fél. Ez egész földön aki jót tegyen, Senki nincsen. \n2. Az Úr az égből alátekinte E földön az emberek fiaira, Hogy meglássa, ha kinek esze volna, Ha valaki az Istent keresné És tisztelné. \n3. De azt jól látja dicsőségében, Hogy a jó útról eltértek mindenek, Mindnyájan fertelmes bűnben hevernek; Aki az Istent tisztelné híven, Csak egy sincsen. \n4. A Sionról vajon ki jövend el, Ki a szent Izráelt megszabadítja? Ha Isten fogságból népét kihozza, Örvend a Jákób és az Izráel Teljes szívvel."},{"m":15,"r":15,"c":"Uram, ki lészen lakója A te felséged sátorának? Jelentsd meg és add tu","b":"1. Uram, ki lészen lakója A te felséged sátorának? Jelentsd meg és add tudtomra, Ki lészen ö rök lakosa Szent hegyednek és hajlékodnak? \n2. Aki jár igaz életben, Szól és szolgáltat igazságot, Forgódik híven mindenben, És hűséges ő szívében, És szereti a jámborságot. \n3. Ki az ő felebarátját Ő nyelvével nem rágalmazza, Kárral nem bántja szomszédját, Nem rútolja atyjafiát, És tisztességét nem gyalázza. \n4. Az istentelent utálja, Az istenfélőt megbecsüli, Őt nagy tisztességben tartja, Esküvését meggondolja, Ha kárt is vall, azt meg nem szegi. \n5. Aki pénzével él híven, Kölcsön ád, de nem kér uzsorát; Az ártatlan ember ellen Ajándékot ő nem veszen: Aki így tészen, az megállhat."},{"m":16,"r":16,"c":"Tarts meg engemet, ó, én Istenem, Mert reménységem vetem csak tebenned","b":"1. Tarts meg engemet, ó, én Istenem, Mert reménységem vetem csak tebenned! Azért az Úrnak mondjad ezt, lelkem: Én Uram vagy te, örvendek tenéked! E kívül nem kérkedhetem semmivel, Hogy néked használhatnék jótétemmel. \n2. Az Úr Isten az én örökségem, Mely nekem kiváltképpen részeltetett, És ő megtartja híven azt nékem. Az én sorsom a legjobb részre esett; Hogy az örökség zsinórral osztatott, Azzal a legszebbik rész nekem jutott. \n3. Dicséreteket mondok az Úrnak, Ki tanácsával engem jól vezérel; Még veséim is erre tanítnak, És az ágyban is megintenek éjjel. Az Urat szüntelen előttem tartom: Mert jobbom felől van, nem ingadozom. \n4. Öröme vagyon szívemnek ezen, Örvendez lelkem és megnyugszik testem: Noha a sírban fekvése leszen, De azt szívemben nyilván én elhiszem: A koporsóban nem hagyod szentedet, De rothadás ellen megmented őtet. \n5. Az életre nekem utat mutatsz, Mely életben van az örök boldogság, Hol szent színednek gyönyörű voltát Láttatod, mely nagy öröm és vigasság. Nagy dicsőséged, jobbod erőssége Örökké megmarad, soha nincs vége."},{"m":17,"r":17,"c":"Hallgasd meg igazságomat, Én kiáltásom, Uram, értsd meg! Hozzám figyel","b":"1. Hallgasd meg igazságomat, Én kiáltásom, Uram, értsd meg! Hozzám figyelmezz és tekintsd meg Szívbéli imádságomat! Ítéletet tetőled várok, Nézd meg ügyem, láttass törvényt: Ítélj meg igazság szerint, Mert én álnoksággal nem járok. \n2. Szívem éjjel megpróbáltad, És megvizsgáltad teljességgel, Láttad, hogy egyez én nyelvemmel: Csalárdság nélkül találtad. Amit ember szól, avagy művel, Én ajakid beszédire, Gondot tartok szent Igédre, Nem járok a gonosztevővel. \n3. Vezérljed én járásomat, És tarts meg a te ösvényiden, Máshova senki ne térítsen; Erősítsed lábaimat! Téged hívlak én segítségre, Uram, láss meg szükségembe’, Kérésem vedd füleidbe, És légy figyelmes beszédemre. \n4. Te vagy bizonyos oltalmok, Akik tebenned reménylenek; Jóvoltod mutasd meg ezeknek, Hogy lássák a rád támadók: Mint a te szemeidnek fényét, Úgy őrizz meg, Uram, engem, Szárnyad árnyékában fejem Takargasd, őrizvén ösvényét."},{"m":18,"r":18,"c":"Ó, én Uram, ki erőt adsz énnékem, Szeretlek téged, míg leszen életem.","b":"1. Ó, én Uram, ki erőt adsz énnékem, Szeretlek téged, míg leszen életem. Én magas kőszálam, ó, én Uram, Erős bástyám és erős kőváram! Én erős Istenem és bizodalmam, Idvességemnek bizonysága, pajzsom! Midőn az Urat dicsérvén kérem, Ellenségimtől ő megtart engem. Halál fájdalmi hogy körülvennének, Béliál folyói rettegtetnének, Pokol kötele vala körülem, Csaknem a halál tőribe esém. \n2. Térhelyre hoza s kimente engemet, És mutata énhozzám nagy szerelmet, Megfizete az igazság szerint, Kezeimnek tisztasága szerint. Mert az Úrnak útától nem tértem el, Az én Istenemtől nem szakadtam el, Ítéletire szüntelen néztem, És szent törvényét meg nem vetettem. De mindenkor híven előtte jártam, Gonosztételtől magamat megóvtam: Megfizete az igazság szerint, Kezeimnek tisztasága szerint. \n3. Szent vagy és jóltevő a jóltevőkkel, És igazat téssz igazán élőkkel, Tiszta vagy azokhoz, akik tiszták, Elfordulsz tőlük, akik gonoszak. Nyomorult szegényeket megsegíted, A kevély szeműket megszégyeníted; Nékem, Uram, szövétneket gyújtasz, És a setétben világot nyújtasz. Teáltalad ellenségim seregin Általfutok, átszököm kerítésin. Mely tökéletes az Isten úta, Tiszta és próbált az ő mondása."},{"m":19,"r":19,"c":"Az egek beszélik És nyilván hirdetik Az Úrnak erejit. Az ég menynyezet","b":"1. Az egek beszélik És nyilván hirdetik Az Úrnak erejit. Az ég menynyezeti Szépen kijelenti Kezének munkáit. A napok egymásnak Tudományt mutatnak Az ő bölcseségéről, Egy éj a más éjnek Beszél az Istennek Ő nagy dicsőségéről. \n2. Nincs szó, sem tartomány, Holott e tudomány Nem prédikáltatnék; Mindenfelé mégyen E földkerekségen Beszédük ezeknek. Írásuk kimégyen Mind e világ végén, Holott a fényes napnak Hajlékot az Isten Helyheztetett szépen Ő lakó szállásának. \n3. Melyben mint vőlegény Reggel felkél szépen Ő ágyasházából, És ugyan örvendez, Mint az erős vitéz, Ha futásra indul. Az égnek egy végén Felkél és elmégyen Gyorsan a más végére; Sehol semmi nincsen Ő hévsége ellen, Ki magát elrejthesse. \n4. Az Isten törvénye Tiszta, ő beszéde Lelkeket megtérít, Hűség bizonysága, Kisdedeket abba’ Bölcsességre tanít. Ő parancsolati, Igazak mondási, Mik szívet vigasztalnak. Minden ő törvényi, Tiszták szent beszédi, Szemet világosítnak. \n5. Az Isten félelme Tiszta, mindörökké Megmarad és megáll. Az ő ítélete Igaz mindenekbe’, Teljes nagy jósággal. Aranynál, ezüstnél És drágaköveknél Sokkal becsületesebb; Ő szerelmessége És gyönyörűsége A méznél is édesebb. \n6. Aki szolgál néked, Tanul, Uram, tőled Nagy jó tanulságot. És ha azt megtartja, Jól lészen ő dolga, Mert veszen jutalmat. Ki tudná bűninek, Számát esetinek, És ki gondolhatná meg? Én sok bűneimet, Titkos vétkeimet, Uram, nékem bocsásd meg! \n7. Szolgádat őrizd meg, Kevélységtől tartsd meg: Ne essék e bűnbe, És én tiszta lészek, Semmi bűnt nem tészek, Járván te kedvedbe’. Szájamnak szólása, Szívem gondolatja Kedves legyen tenéked! Adjad, ó, én Uram, Kősziklám, megváltóm, Hogy ne vétsek ellened."},{"m":20,"r":20,"c":"Az Úr tégedet meghallgasson Te nagy ínségedben, A Já kób Istene megtar","b":"1. Az Úr tégedet meghallgasson Te nagy ínségedben, A Já kób Istene megtartson Te veszedelmedben! Küldjön tenéked segedelmet Az Úr ő szent házából, Tereád fordítsa kegyelmét, Tartson meg a Sionból! \n2. Áldozatidat megtekintse, Mikkel őt tiszteled, Égő áldozatodat tüze Égesse meg neked. Amit a te szíved kívánhat, Adja meg ő tenéked, Hogy mindennemű szándékodat Te jó véghez vihessed. \n3. Adjad, Uram, hogy te nevedben A mi zászlóinkat Felemeljük nagy örömünkben És adjunk hálákat, Mondván: Az Úr Isten megőrzi Fölkentjét kegyelmével, A mennyből őtet erősíti Jobb keze erejével. \n4. Némelyek az ő szekerükben, És bíznak lovukban; De mi a nagy Isten nevében Bízunk mint Urunkban. Azért ők keményen megesnek, Mi pediglen megállunk; Ők mind a földhöz verettetnek, De mi épen maradunk."},{"m":21,"r":21,"c":"Örvendez, Uram, a király A te nagy hatalmadban És szabadításodban; És","b":"1. Örvendez, Uram, a király A te nagy hatalmadban És szabadításodban; És vigad nagy buzgósággal, Hogy őt megsegítéd, Ínségből kimentéd. \n2. Úgy viseled néki gondját, Hogy amit tőled kérend, Mindeneket megnyerend. Mihelyt felnyitja ő száját, Szól alig egy igét: Már hallod kérését. \n3. Elébb, hogynem könyörgene, Meghallgatod, meglátod, Irgalmaddal megáldod, És feltéssz az ő fejére Sárarany koronát Mint királyi pompát. \n4. Őt felvőd nagy dicsőségre A te segedelmeddel, Örök üdvösségeddel. E nagy királyi felségre Tőled emelteték És ékesítteték. \n5. Szereted őt minden jókkal, És a te szent áldásod Néki örökké nyújtod. Örvendetes vígságokkal Őt gyönyörködteted, Színedre nézeted. \n6. E király mindenkor bízik Csak az ő Istenében, És nem fél veszélyében. A Magasságosnak nyugszik Irgalmasságában És megmarad abban. \n7. Megtalálja kezed őket, Akik reád támadnak, boszszúságodra járnak. És a te gyűlölőidet Kezeidből senki Soha ki nem menti. \n8. Mint a hév tüzes kemence, Haragod körülveszi És őket mind ellepi. Haragos orcádnak színe Őket megemészti, Mint a láng, elnyeli. \n9. Mert gonoszra igyekeztek, Szándékoztak ellened, Hogy boszszantsanak téged. Sok csalárdságot terveztek, De hogy véghez menjen, Erejükben nincsen. \n10. Azért, Uram, már támadj föl: Mutasd meg hatalmadat, Lássuk erős voltodat, Hogy dicsőséges erődről Vígan énekeljünk, És benned örvendjünk."},{"m":22,"r":22,"c":"Én Istenem, én erős Istenem! Miért hagyál el enynyire engem? Kiáltásom","b":"1. Én Istenem, én erős Istenem! Miért hagyál el enynyire engem? Kiáltásomtól a segedelem Nagy távol vagyon. Én kiáltok tehozzád egész napon, De mégsem felelsz meg, nincs ki megtartson; Még éjjel sem hallgatok semmi módon Ez ínségben. \n2. De te szent vagy és az Izráelben Te szentséged megmarad mindenben: Dicsértetel e gyülekezetben Szívvel, lélekkel. A mi régi atyáink teljességgel Tebenned bíztanak jó reménységgel, Szükségükben őket segedelmeddel Megtartottad. \n3. Ha ők szívből kiáltottak hozzád, Mindjárt őket megszabadítottad; Benned bíztak és őket nem hagytad Esni szégyenben. Én nem vagyok ember, de féreg lévén, Minden népeknél vagyok nevetségben: Csúfolnak, utálnak és megvet minden És keserget. \n4. Aki lát, minden csúfol engemet, Száját elvonszsza, szól merő mérget, Fejét rázza, hunyorgatja szemét, Reám néz szörnyen, Mondván: ez ember bízott az Istenben, Szabadítsa meg azért őtet innen; Ha szereti az Isten, néki légyen Segítségül. \n5. Hogy te engemet anyám méhéből Kihozál, ottan segedelmem lől, Csecsemő koromban is egyedül Csak benned bíztam. Sőt, mihelyt anyám méhéből származtam, Istenem voltál, reád támaszkodtam, Bátorsággal tehozzád ragaszkodtam, Én Istenem! \n6. Ne távozzál azért meszsze tőlem, Ne hagyj el, mert nagy az én gyötrelmem! Nincs segítőm, és az én sérelmem Nem fáj senkinek. Sok erős bikák engem körülvettek, A básáni nagy ökrök reám törnek, Megölni, megtaposni igyekeznek Nagy méltatlan. \n7. Az ő szájukat énreám tátván, Mint ragadozó, sívó oroszlán, Agyarkodnak, hogy engem torkukban Béfalhassanak. Könnyhullatásim, mint a vizek, folynak, Én csontjaim helyükből kimozdulnak. Szívem, mint viasz, olvad, bélim fájnak Sebek miatt. \n8. Mint cserép, minden erőm elszáradt, Száraz nyelvem az ínyemhez ragadt; Porba vetél engem, érzem kínját Halál mérgének. Mert engemet sok ebek körülvettek, Gonosz népek ellenem öszszegyűltek, Kezeimet és lábaimat ezek Általszúrták. \n9. Én csontjaimat megolvashatnák, Szörnyű szemeket reám fordítnak. Kínomban nem szánnak, de gúnyolnak, Űznek csúfságot. Elosztották egymás közt én ruhámat, És öltözetemre vetettek sorsot, Hogy abból ne metélnének foltokat, Osztván részre. \n10. Azért tőlem, Uram, ne légy meszsze, Ne késsél, életemnek ereje! Kérlek, siess, tekints ínségemre: Légy segedelmül! Mentsd meg életem az éles fegyvertül, Védelmezz meg e sok dühös ebektül, Egyedül-voltomat mentsd meg ezektül, Jóvoltodbul! \n11. Tarts meg az éh oroszlán torkátul, És az egyszarvú fenevadaktul, Mik mostan körülvettek nagy mordul, Ó, tarts meg engem! Melyért nevedet híven hadd dicsérem, Az én atyámfiainak hirdetem, És a szent gyülekezetben tisztelem Felségedet. \n12. Istenfélők, dicsérjétek őtet, Jákób fiai, áldjátok nevét; Izráel népe, féld e Felséget Mint Istenedet! Mert nem utálja a szegénynek ügyét, És tőle el nem fordítja szent színét, De ha kiált, meghallgatja kérését Nagy kegyesen. \n13. Azért dicséretem rólad leszen Minden előtt a gyülekezetben, És én fogadásim semmiképpen Meg nem töretnek. A szegények esznek, megelégesznek, Téged az Istent keresők dicsérnek, Él az ő lelkük, és benned örvendnek Mindörökké. \n14. E földi népnek minden serege Az Úrhoz gyűl ez emlékezetre. És a pogányoknak nemzetsége Néki hajt fejet. Mert egyedül az Úr bír mindeneket, Övé az ország, és a pogány népet Bírja, rajtuk megmutatván erejét Kezeinek. \n15. A kövérek, kik megelégedtek, És kik már porrá lenni készültek, Dicsérnek téged minden szegények És nyomorultak, És maradéki mindnyájan azoknak Néked szolgálván, térdet-fejet hajtnak És firól fira téged ők uralnak, Ó, nagy Isten!"},{"m":23,"r":23,"c":"Az Úr énnékem őriző pásztorom, Azért semmiben meg nem fogyatkozom. Gyö","b":"1. Az Úr énnékem őriző pásztorom, Azért semmiben meg nem fogyatkozom. Gyönyörű szép mezőn engemet éltet, És szép kies folyóvízre legeltet; Lelkemet megnyugtatja szent nevében, És vezérl engem igaz ösvényében. \n2. Ha a halál árnyékában járnék is, De nem félnék még ő sötét völgyén is, Mert mindenütt te jelen vagy énvelem, veszsződ és botod megvigasztal engem, És nekem az én ellenségim ellen Asztalt készítesz, eledelt adsz bőven. \n3. Az én fejemet megkened olajjal, És engemet itatsz teljes pohárral; Jóvoltod, kegyességed körülvészen És követ engem egész életemben. Az Úr énnékem megengedi nyilván, Hogy mind éltiglen lakjam ő házában."},{"m":24,"r":24,"c":"Az Úr bír ez egész földdel És minden benne élőkkel; Övé a földnek kere","b":"1. Az Úr bír ez egész földdel És minden benne élőkkel; Övé a földnek kereksége, Mit a tengeren épített, Folyóvizekkel körülvett, Melyben meglátszik bölcsesége. \n2. Ki mégyen fel a szent helyre, Az Úrnak ő szent hegyére? És vajon kitől tiszteltetik? Akinek tiszta ő szíve, És ártatlan az ő keze, Aki hamisan nem esküszik. \n3. Ezt az Úr megáldja szépen, És az idvezítő Isten Adja igazságát őnéki. Az pedig a boldog nemzet, Mely, nézve az ő szent színét, Jákóbnak Istenét keresi. \n4. Ti szent kapuk, kinyíljatok, Fejeteket feltartsátok: E dicső király hadd térjen be! Micsoda dicső király ez? A seregek Istene ez, Nagy ennek hadi erőssége. \n5. Ti kapuk, emelkedjetek, Fejeteket felvessétek, Hogy e király belétek térjen! Kicsoda e nagy királyság? Ez a Zebaoth uraság! Mely nagy az ő dicsőségében!"},{"m":25,"r":25,"c":"Szívemet hozzád emelem, És benned bízom, Uram; És meg nem szégyeníttet","b":"1. Szívemet hozzád emelem, És benned bízom, Uram; És meg nem szégyeníttetem, Nem nevet senki rajtam, Mert szégyent nem vallanak, Akik hozzád esedeznek, Azok pironkodjanak, Akik hitetlenül élnek. \n2. Útaid, Uram, mutasd meg, Hogy el ne tévelyedjem; Te ösvényidre taníts meg, Miken intézd menésem. És vezérelj engemet A te szent igaz Igédben; Oltalmazd életemet, Mert benned bízom, Úr Isten. \n3. Emlékezzél jóvoltodból Nagy kegyelmességedre, Emlékezzél irgalmadról, Mely megmarad örökre. Ifjúságomnak vétkét, Kérlek, hogy meg ne említsed. Sőt nagy kegyességedet, Én Istenem, megtekintsed. \n4. Jó és igaz az Úr Isten Mind örökkön-örökké, A bűnösöket térítvén Ő igaz ösvényire; És a nyomorultakat Életükben igazgatja, Nagy kegyesen azokat Az ő útában megtartja. \n5. Az Istennek minden úta Kegyesség és nagy hűség Azoknak, kik mondására Gondot tartnak mindvégig. Énnékem kegyelmezz meg, Uram, a te szent nevedért. És bűnömet bocsásd meg, Ne ostorozz nagy voltáért! \n6. Aki az Úr Istent féli És tiszteli szívében, Azt ő nagy híven vezérli Igaz ösvényeiben. Nagy békességben annak Minden jó bőven adatik, És ő maradékinak Gazdag örökség hagyatik. \n7. Az igaz istenfélőknek Megjelenti titkait, És az őbenne hívőknek Megmutatja kötésit. Istenhez szemeimet Felemelem szüntelenül, Ő megőriz engemet, Lábam kivonszsza a tőrbül. \n8. Térj azért hozzám, Istenem, Tekints reám kegyesen, És kegyelmezz meg énnékem, Mert élek szegénységben. Nyavalyája szívemnek Napról napra mind öregbül; Uram, add végét ennek, Végy ki engem ez ínségbül!"},{"m":26,"r":26,"c":"Légy ítélőm, Uram, Mert hűséggel jártam És éltem nagy ártatlanul! Azér","b":"1. Légy ítélőm, Uram, Mert hűséggel jártam És éltem nagy ártatlanul! Azért hiszem az Istent, Hogy ő engemet megment Minden háborúságomtól. \n2. Próbálj és kísérts meg, Ügyemet jól nézd meg: Meglátod tisztaságomat! Vizsgáld meg veséimet, És próbáld meg szívemet, Hogy értsed indulatomat. \n3. Látom szemem előtt Kegyelmességedet, És azon vagyok szüntelen, Hogy minden dolgaimban Járjak igazságodban, Ne vétsek Felséged ellen. \n4. A hazug emberek Nálam nem kedvesek; A tettető csalárdokat Szívem szerint gyűlölöm, És nagy távol kerülöm Az álnoksággal járókat. \n5. A gonosztevőknek És hamis népeknek Társaságukat gyűlölöm. Ő gyülekezetükben Nem ülök semmiképpen, Sőt előttem sem szenvedem. \n6. Belső tisztaságban És ártatlanságban Én kezeimet megmosom; Tisztán téged dicsérlek, Áldozván Felségednek, Oltárod körül forgódom. \n7. Éneki felszóval És víg hangossággal Magasztalom Felségedet; Néked adván hálákat, Hirdetvén csodáidat, Mindenütt áldlak tégedet. \n8. Uram, hajlékodat, Szeretem házadat, Holott lakol dicsőséggel, Szent helyedet kedvelem, És azt feljebb becsülöm Minden e világi kincsnél. \n9. Ostorodat, Uram, Fordítsd el énrólam, Ne büntess a bűnösökkel! Vélük ne verd lelkemet, Ne vedd el életemet A vérontó emberekkel! \n10. Az én lábam megáll, Tágas helyet talál, És megmarad ösvényiben: Azért, Uram, dicsérlek, És örömmel tisztellek A hívek szent seregiben."},{"m":27,"r":27,"c":"Az Úr Isten az én világosságom, És idvességem, hát kitől félnék? Ő éle","b":"1. Az Úr Isten az én világosságom, És idvességem, hát kitől félnék? Ő életemnek ereje, jól tudom: Ki volna hát, akitől rettegnék? Midőn a kegyetlen gonosztévők, Mint ellenségim, énreám törnek, Hogy engemet ugyan megégyenek: Megbotolnak és mind elesnek ők. \n2. Hogyha táborral körülvennének is, De mégsem félne semmit én szívem; Ha szintén az ellenség közt volnék is: Őbenne vetném mégis reményem. Egy dolgot kívántam én az Úrtól, Melyet még most is kérek nagy bízván: Hogy lakhassam az Úrnak házában, Míg e földön élek jóvoltából. \n3. Melyet én azért kérek, hogy meglássam Az Úrnak felséges dicsőségét, És ő szent templomát látogathassam, Mely tisztességére építtetett. Mert engem hajlékába takarít Én háborúságimnak idein, És elrejt engem rejtekhelyein, Magas kősziklára felemelít. \n4. Mert mind én atyám s anyám elhagy engem, De az Úr kegyesen hozzá vészen. Mutasd meg, Uram, te utadat nékem, Ellenség ellen tarts ösvényedben! Kívánságukra ellenségimnek Ne adj engemet, mert sokan vannak, Kik ellenem hamisságot szólnak, Hazudnak és erőszakot tesznek. \n5. Ha nem hittem volna, hogy még éltemben Jóvoltát az Úrnak meglátandom Az élőknek földén: hát immár régen Odalett volna minden én dolgom. Várjad azért bizonynyal az Urat, Légy víg és bátorságos szívedben, Mert téged megtart a nagy Úr Isten, Csak tőle várjad hát oltalmadat."},{"m":28,"r":28,"c":"Hozzád kiáltok, kegyes Uram, Én segítségem és kőváram! Hallgass meg ke","b":"1. Hozzád kiáltok, kegyes Uram, Én segítségem és kőváram! Hallgass meg kegyelmesen engem! Ne hallgass el, mert el kell vesznem! Azokhoz hasonló lészek, Kiknek a koporsó helyek! \n2. Midőn tehozzád esedezem, És kezeimet felemelem A te szentséges templomodban: Hallgass meg én imádságomban! Ne büntess a hitlenekkel, Ne verj a gonosztevőkkel! \n3. Áldott légyen a nagy Úr Isten, Ki meghallgata kérésemben! Az Úr énnékem erősségem, Én paizsom és segedelmem; Örvend szívem és énekben Dicsérem őtet szüntelen. \n4. Az Úr én népemnek ereje, A Krisztusnak nagy erőssége. Tartsd meg azért a te népedet, És áldjad meg örökségedet: Legeltessed és vigasztald, És örökké felmagasztald!"},{"m":29,"r":29,"c":"Mostan, ti hatalmasak, Tekintetes nagy urak, Adjatok az Istennek, Dics","b":"1. Mostan, ti hatalmasak, Tekintetes nagy urak, Adjatok az Istennek, Dicsőséget nevének! Mint hatalmas Istenteket; Féljétek, tisztelvén őtet! Szent templomában áldjátok, És térdet, fejet hajtsatok! \n2. Az Úr szava megzendül, A vizeken megdördül; Mennydörgő dicsősége Elhat a nagy tengerre. Az Úrnak rettentő szava Nagy hatalmát megmutatja. Az Úrnak dördülő szaván Nagy volta meglátszik nyilván. \n3. De az ő templomában Ő hívei mindnyájan Hirdetik nagy erejét, Beszélik dicsőségét. Az Úr ült az özönvizen, Mint bíró ítélőszéken; Az Úrnak ő királysága, Örökké megáll országa."},{"m":30,"r":30,"c":"Dicsérlek, Uram, tégedet, Mert te megtartál engemet, És kegyesen felem","b":"1. Dicsérlek, Uram, tégedet, Mert te megtartál engemet, És kegyesen felemelél, Ellenségimtől megmentél, És meg nem engedéd azoknak, Hogy nyavalyámon vigadjanak. \n2. Hogy felkiálték tehozzád, Nyavalyámat meggyógyítád, És hogy én csaknem a sírba, Esném a halál torkába: Ismét feltámasztál engemet, Pokoltól megmentéd lelkemet. \n3. Istenes hívek és szentek, Az Úrnak énekeljetek, Áldjátok őtet mindvégig, Mert nem haragszik sokáig, Az ember alig gondolhatja, Mily hamar elmúlik haragja. \n4. De az ő kegyelmessége Rajtunk megmarad örökre. Néha oly dolgom érkezik, Min este szívem bánkódik, De reggel, mihelyen felkelek, Azonnal víg örömet lelek."},{"m":31,"r":31,"c":"Uram, én csak tebenned bíztam, Őrizz meg kegyesen, Ne essem szégyenben","b":"1. Uram, én csak tebenned bíztam, Őrizz meg kegyesen, Ne essem szégyenben! Te igazságod fordítsd hozzám, És tarts meg jóvoltodból, Ments ki nagy nyavalyámból! \n2. Hajtsd énhozzám, Uram, füledet, Ó, én idvességem! Siess, tarts meg engem! Mutasd meg nagy erősségedet, Légy én erős kőváram, Melyben bátran lakhassam! \n3. Te vagy kősziklám, erősségem: Szent nevedért kérlek, Vezérelj, hogy éljek! Szabadíts ki a tőrből engem, Melyet énnékem vetnek, Mert megtartómnak hiszlek! \n4. Lelkemet kezedbe ajánlom, Mert nagy ínségemben Megtartál, Úr Isten. Szívemet azoktól megvonszom, Akik élnek hívságban; És csak bízom Uramban. \n5. Örvendezek nagy vigasságban, Vigadok szívembe’, Irgalmadra nézve. Ha megtekintesz nyavalyámban, Szívemet megismered, Sérelmit megtekinted. \n6. Dicsőség adassék az Úrnak, Ki tart oltalmában, Mint egy szép városban, Melynek erős bástyái vannak, Hogy aki abban lakik, Senkitől nem bántatik. \n7. Félelmes futásomban mondék: Tőled elvetettél, Rám nem nézsz szemeddel; De tenálad kegyelmet lelék, Meghallád könyörgésem, Megadád, amit kértem. \n8. Az Urat szeressétek, szentek, Ki megtart híveket, Büntet kevélyeket! Ő legyen néktek reménységtek! higygyétek szívetekben: Megvigasztal az Isten."},{"m":32,"r":32,"c":"Ó, mely boldog az oly ember éltébe', Akit az Isten bevett kegyelmébe,","b":"1. Ó, mely boldog az oly ember éltébe', Akit az Isten bevett kegyelmébe, És megbocsátá az ő vétkeit, És befedezte minden bűneit. Boldog, akinek ő nagy hamissága Istentől néki nincs tulajdonítva, És csalárdság nincsen ő szivében, Tettetés nélkül jár életében. \n2. Hogy bűnömet el akarám hallgatni, És neked meg nem akarám vallani, Csontjaim ottan elszáradának Soksága miatt én siralmimnak, Mert éjjel-nappal kezed nehéz volta Nagy bűneimért rajtam fekszik vala, Elfogya bennem minden erősség, Mint nyári hévségben a nedvesség. \n3. De hogy bűnömet előtted megvallám, Nagy vétkeimet el nem hallgathatám, De híven előbeszélém neked: Ott bocsánatot nyerék tetőled. Azért az Úr Istennek minden hívek Könyörögjenek, míg vagyon idejek, Mert ha nagy árvizek jönnének is, De nem árthatna ezeknek mégis! \n4. Te vagy oltalmam, őrizz meg engemet, Minden gonosz ellen tartsd meg lelkemet, Vigasztalj meg, hogy örvendezhessek, És vígan néked énekelhessek! Tanítlak téged, úgy mond az Úr Isten, És vezérellek az igaz ösvényen, Szememmel mindig reád vigyázok, És igazgatlak, rád gondot tartok."},{"m":33,"r":33,"c":"Nosza, istenfélő szent hívek, Örvendezzetek az Úrnak, Mert illik, hogy","b":"1. Nosza, istenfélő szent hívek, Örvendezzetek az Úrnak, Mert illik, hogy őtet dicsérjék, Kik örülnek igazságnak! Áldjátok azértan Hangos citerákban! Az Úr áldassék! Lantban, hegedűben, Cimbalmi zengésben Magasztaltassék. \n2. Énekeljetek néki vígan Gyönyörű szép új éneket! Szép hangicsáló szerszámokban Mondjatok ékes verseket! Igaz ő mondása, Állhatatos dolga: Amit az Úr szól, Megáll igazságban, Minden dolgaiban Cselekeszik jól. \n3. Ő szereti az igazságot, Az ítélet nála kedves, Dolgában tart irgalmasságot, melylyel mind e világ teljes. Az Úrnak Igéje Egeket teremte, Melyeket ott fenn Szájának lelkével Nagy szép seregekkel Szerze ékesen. \n4. Mert mihelyt ő csak egy igét szól, Azonnal megleszen minden, És valamit ő megparancsol, Nagy hamarsággal meglészen. Pogányok tanácsát És minden szándékát Az Úr megtöri, Magukban a népek Amit elvégeznek, Semmivé tészi. \n5. De az Úr Istennek tanácsa Megmaradánd mindörökké, És megáll minden gondolatja, Kiterjed minden időkre. Boldog az a nemzet, Ki ily Urat szeret, Mint ő Istenét; Boldog a nemzetség, Kit kedvel e Felség Mint örökségét. \n6. Gondot tart rájuk s a haláltól Megtartja őket éltükben, Szükségtől és éhenhalástól Őrzi a drága időben. Lelkünk azért várja, Szüntelen óhajtja Az Úr oltalmát, Ki paizsul végre Eljő segítségre, Ád diadalmat. \n7. Őbenne azért a mi szívünk Igen örvendez szüntelen, Mert ő minékünk reménységünk, És bízunk ő szent nevében. Nagy kegyelmességed Mirajtunk bővítsed, Légy mi gyámolunk! Ne hagyj szükségünkben, Segíts meg éltünkben, Mert téged várunk!"},{"m":34,"r":34,"c":"Mindenkoron áldom Az Urat, míg engem éltet, És az ő szent dicséretét S","b":"1. Mindenkoron áldom Az Urat, míg engem éltet, És az ő szent dicséretét Szájamban hordozom. Dicsekedvén áldja Lelkem jó voltát az Úrnak, Mit a szegények hallanak, És örülnek rajta. \n2. Magasztaljuk vígan Az Úrnak áldott szent nevét, És véghetetlen kegyelmét Dicsérjük mindnyájan! Mert midőn keresém És kérém az én Uramat, Meghallgatá nagy felszómat, És megtarta engem. \n3. Az Úrra kik néznek, Tőle megvigasztaltatnak, Soha orcáik azoknak Meg nem szégyenülnek. A szegény kiálta, És meghallgatá az Isten, El nem hagyá ínségében, De megszabadítá. \n4. Az Isten angyali Hívek körül tábort járnak, Istenfélőket megtartnak Mint Isten követi. Jó voltát az Úrnak Kóstoljátok és lássátok, Mert bizony azok boldogok, Őbenne kik bíznak. \n5. Az Isten szemei Látják a gonosztévőket, És ő emlékezetöket A földről eltörli. A jókat nem hagyja; Kik hozzá tiszta szívükből Kiáltnak nagy ínségükből: Mind megszabadítja. \n6. Közel az Úr Isten A töredelmes szívekhez, És a sérelmes lelkekhez Lészen segítséggel. Az igaznak itten Ő nyavalyája sokasul, De nyomorúságaibul Kimenti az Isten."},{"m":35,"r":35,"c":"Perelj, Uram, perlőimmel, Harcolj én ellenségimmel, Te paizsodat ragad","b":"1. Perelj, Uram, perlőimmel, Harcolj én ellenségimmel, Te paizsodat ragadd elő! Én segedelmemre állj elő! Dárdádat nyújtsd ki kezeddel, Ellenségimet kergesd el! Mondjad ezt az én lelkemnek: Tégedet én megsegítlek! \n2. Gyászban jártam lehorgadva, Mint ki az anyját siratja, De ők szomorú esetemen Örülnek, és gyűlnek seregben. Hátmögül a gonosz népek Engemet szörnyen nevetnek; Ártatlan lévén, nem szánnak, Sőt csúfolnak és szaggatnak. \n3. A képmutató galibák Fogukat rám csikorgatják; És rajtam nagy csúfságot űznek, Kik csak zabálódást keresnek. Uram, míg nézed ezeket? Jövel, tartsd meg én lelkemet! Egyedül voltom tekintsd meg, Ez oroszlánoktól ments meg! \n4. Dicsérlek téged szüntelen Nagy sűrű gyülekezetben, És nagy roppant sereg nép előtt Téged dicsérlek minden fölött. Ne engedd, hogy örüljenek, Akik ok nélkül gyűlölnek; Ellenségimet fordítsd el, Ne gúnyoljanak szemükkel. \n5. Már azok énekeljenek, Kik igazamnak örülnek, Mondván: hála legyen az Úrnak, Ki nyugalmat ád szolgájának! Én nyelvem igazságodat, Hirdeti nagy jóvoltodat; Dicséretedet nagy híven Éneklem minden időben."},{"m":36,"r":36,"c":"A gonosztévőknek dolgán Eszembe veszem azt nyilván, Hogy Istenre nincs","b":"1. A gonosztévőknek dolgán Eszembe veszem azt nyilván, Hogy Istenre nincs gondja. Magában felfuvalkodik, Bűneitől meg nem szűnik, A híveket utálja. Hamis és hazug beszéde, Jó tanúsághoz nincs kedve, És nem jár igazsággal; Hívságot gondol ágyában, Foglalatos gonosz útban, Semmi bűnt ő nem utál. \n2. Uram, a te nagy hűséged Égig ér, kegyelmességed Mind a felhőkig felhat. Mint a hegy, te igazságod, Törvényed mélység, megtartod Az embert és a barmot. Te kegyességed mily drága! Azért a te szárnyad alá Emberek folyamodnak, Kik jól megelégíttetnek, Mint bő vízzel, legeltetnek Javaival házadnak. \n3. Nálad az élet kútfeje, Világodnak nagy ő fénye, Mely nekünk szépen fénylik. Bővítsd rajtuk kegyességed, Akik jól ismernek téged, Szívvel neved tisztelik! Ne hagyd, hogy a kevély lába Rám rohanjon, és hatalma Letapodjon a földre; Adjad, hogy a hitetlenek Megessenek, sülylyedjenek, Fel se keljenek többé!"},{"m":37,"r":37,"c":"Ne boszszankodjál a gonosztévőkre, Midőn őnékik jól vagyon dolguk! Ne","b":"1. Ne boszszankodjál a gonosztévőkre, Midőn őnékik jól vagyon dolguk! Ne nézz búskodva ő szerencséjökre, Ha látod nékik jó állapotjuk! Mert mint a szénafű, levágattatnak, És mint a zöld fű, hamar elhullnak. \n2. Tégy jól és bízzál erősen Istenben: Békével élhetsz itt ez országban: Hűséggel járj el egész életedben, Örvendj az Úrnak nagy jóvoltában, És valamit kérsz tőle, mind megnyered, Mindent megád, amit kíván szíved. \n3. Csak az Istenre támaszd minden dolgod, És kétség nélkül bízzál őhozzá, Mert megcselekszi, bizonynyal meglátod: Ártatlanságod világra hozza, Hogy igazságod úgyan lássa minden, Mint a fényes nap fénylik délszínben. \n4. Bízzál az Úrban, csendes légy szívedben, És reménységed vessed őbenne! Ne haragudjál jó szerencséjeken Azoknak, akik élnek kedvükre! Ne gondolj semmit az ő életükkel, Hogy velük együtt bűnbe ne ess el! \n5. Mert a gonoszok mind eltöröltetnek, De akik a nagy Istenben bíznak, E földnek azok örökösi lesznek: A gonosztévők szörnyen elhullnak. Majdan, ha ő helyüket megtekinted, Aholott laktak, üresen leled. \n6. Élj igazán, légy hű és tökéletes, És nagy jól lészen tenéked dolgod, Békességed lészen nagy örvendetes. A gonoszok mind vallnak csúfságot, Mert ők szertelen nagy ínségbe esnek, És teljességgel végre elvesznek. \n7. Mert az Úr oltalma az igazaknak, Megmenti őket sok ínségükből, Vélük vagyon és tőle megtartatnak. És hogy őhozzá fordulnak szívből, A gonosztévőktől megszabadítja, És jelenvoltával vigasztalja."},{"m":38,"r":38,"c":"Haragodnak nagy voltában Megindulván, Ne feddj meg, Uram, engem! Búsul","b":"1. Haragodnak nagy voltában Megindulván, Ne feddj meg, Uram, engem! Búsult gerjedezésedben Rám tekintvén, Ne büntess meg Istenem! \n2. Nyilaid belém lövettek, Mik szereznek Énnekem nagy sérelmet; Kezeidnek súlyossága Hátam nyomja, És sanyargat engemet. \n3. Testemnek semmi részében Épség nincsen Haragodnak miatta; Nincs békesség tagjaimban, Csontjaimban Bűneimnek miatta. \n4. Mert az én nagy gyarlóságim És bűneim Fejem felülhaladták, Miknek nehéz, terhes voltát, Súlyosságát Tagjaim nem bírhatják. \n5. Minden mostani kérésem, Én Istenem, Vagyon szemeid előtt, És minden fohászkodásom, Óhajtásom Tőled el nem rejtetett. \n6. Szívem nyugalmat nem lelhet, Igen reszket, Minden erőm elfogyott; Szemeim világossága, Vidámsága Éntőlem eltávozott. \n7. De én Istenemben bízom, És elvárom, Hogy kérésem meghallja, Mert szívem hozzá emelem És elhiszem, Hogy szükségem meglátja. \n8. Uram, ne hagyj el engemet! Nézd ügyemet, Egyedül mint hagyattam! Kérlek, légy irgalmas nekem, Én Istenem, Mert csak tebenned bíztam! \n9. Azért tőlem ne állj meszsze, Szánj meg végre, Én kegyelmes Istenem! Segedelmeddel ne késsél, Siess, jöjj el, Én édes idvességem!"},{"m":39,"r":39,"c":"Magamban elvégezém, és mondám: Hogy dolgom megtartóztatnám, Hogy nyelv","b":"1. Magamban elvégezém, és mondám: Hogy dolgom megtartóztatnám, Hogy nyelvem oly i-gét nem ejtene, Mely énnekem bút szerzene, Én szájamra zabolát vetettem, Míg a hitlen áll előttem. \n2. Én mint a néma, veszteg hallgaték, Még a jóról sem beszélék, Sőt fájdalmam is titkolnom kelle, Min sérelmem öregbüle; Ég vala szívem, hogy meggondolám, Eltüzesülvén ezt mondám: \n3. Mutasd meg, Uram, éltemnek végét, És meddig éltetsz engemet? A napok számát jelentsd meg nekem! Míg e világon kell élnem, Mert időm nálad csak egy arasznyi, Előtted életem semmi. \n4. Bizony mulandó semmi az ember, Ki magának sokat ígér! Mint az árnyék, az ember elmúlik, Mégis szorgalmatoskodik, Sokat gyűjt és sok kincset rak öszsze, Nem tudja, kié lesz végre. \n5. Uram, hát nékem kiben kell bíznom? Nincs kívüled vigasságom! Ments ki engemet minden vétkemből, És a bolondok nyelvétől Őrizz meg, hogy ők ne csúfoljanak, Midőn ez ínségben látnak. \n6. Mint a néma, hallgatok erősen, Szájam fel sem nyitom, mert én Tudom, hogy ezt mind te cselekedted. Ostorod rólam elvegyed! Mert kemény kezed nagy volta miatt Minden életem ellankadt. \n7. Mert midőn te megfedded az embert Az ő nagy gyarlóságáért, Azonnal elvész szép ábrázatja, Mint a molytól a szép ruha. Lám, az ember mely igen mulandó, Semmi dolga nem állandó. \n8. Hallgasd meg, Uram, könyörgésemet, Kérésemre ne légy siket! Mert előtted vendég és zarándok, Mint atyáim, olyan vagyok. Szűnjél meg tőlem, hadd vegyek erőt Az én kimúlásom előtt!"},{"m":40,"r":40,"c":"Várván vártam a felséges Urat, És íme, hozzám fordula, Kegyelmesen meg","b":"1. Várván vártam a felséges Urat, És íme, hozzám fordula, Kegyelmesen meghallgata, És rajtam megmutatá jó voltát. Kivőn a mély veremből, És a sáros fertőből, És én lábaimat Szép egyenes kőre Elfelhelyeztette, Vezérlvén utamat. \n2. Ada én számba új énekeket Istenünk dicséretire, Hogy akik hallgatnak erre, higygyék és féljék ő Istenüket. Boldog, aki az Úrban Bízik, szemét elhajtván A kevély népektül, Kiknek minden dolgok Hazugságra hajlók: Tőlük távol kerül. \n3. Csudatételidnek sok ő száma, És nagy bölcs gondolatidnak, Hozzánk való jóvoltodnak Sokságát senki meg nem mondhatja. Ha elkezdem számlálni, Nem tudom kimondani, Mert te nem kívántad A sok áldozatot, De hogy fogadjak szót, Fülemet alkottad. \n4. Égő áldozat nincsen kedvedben, A bűnért valók sem kellők. Akkor mondom: ím, eljövök, Rólam írás van a törvénykönyvben: Hogy akaratod tegyem, Én kegyelmes Istenem! A te törvényedben Gyönyörködik lelkem És örvendez szívem A te szent igédben. \n5. Már tebenned mind örvendezzenek, Akik keresnek tégedet, Kívánják idvességedet, Mondván: dicsőség légyen Istennek! Noha én szegény vagyok, És én szükségim nagyok, De rám gondot visel Az Úr, én megtartóm, Jövel, szabadítóm, Úr Isten, ne késsél!"},{"m":41,"r":41,"c":"Boldog, aki a nyavalyást híven Szánja ínségében, Mert szükségében őtet","b":"1. Boldog, aki a nyavalyást híven Szánja ínségében, Mert szükségében őtet ismétlen Megmenti az Isten, Megtartja éltét, és ez országba' Lesz jó állapotja, Ellenséginek kívánságába, Nem adja markába. \n2. Fájdalmában az Isten megtartja, Szépen felgyógyítja; Betegágyát fordítja örömre, És jó egészségre. Azért így szólok neked, Istenem: Kegyelmezz meg nekem! Gyógyítsd meg, Uram, én betegségem, Mert igen vétkeztem. \n3. Tisztaságomban engem megtartasz, És megszabadítasz, És szemeid eleibe állatsz, Örökké el nem hagysz. Áldott légy, Izráelnek Istene, Most és mindörökké! Szent neved dicsértessék mindenben, Ámen és úgy légyen!"},{"m":42,"r":42,"c":"Mint a szép, híves patakra A szarvas kívánkozik, Lelkem úgy óhajt Uram","b":"1. Mint a szép, híves patakra A szarvas kívánkozik, Lelkem úgy óhajt Uramra, És hozzá fohászkodik, Tehozzád, én Istenem, Szomjúhozik én lelkem, Vajon színed eleiben Mikor jutok, élő Isten? \n2. Könnyhullatásim énnékem Kenyerem éjjel-nappal, Midőn azt kérdik éntőlem: Hol Istened, kit vártál? Ezen lelkem kiontom, És házadat óhajtom, Hol a hívek seregében Örvendek szép éneklésben. \n3. Én lelkem, mire csüggedsz el? Mit kesergesz enynyire? Bízzál Istenben, nem hágy el, Kiben örvendek végre, Midőn hozzám orcáját, Nyújtja szabadítását; Ó, én kegyelmes Istenem, Mely igen kesereg lelkem! \n4. Sebessége árvizednek, És a nagy zúgó habok Énrajtam öszszeütköznek, Mégis hozzád óhajtok; Mert úgy megtartasz nappal, Hogy éjjel vigassággal Dicséreteket éneklek Néked, erős őrizőmnek. \n5. Mondván: Isten, én kőszálam, Mire felejtesz így el? Ellenségim vannak rajtam, Gyászban járok veszélylyel. Mert az ő hamis nyelvek Csontjaimban megsértnek, Mert így boszszantnak ellened: Lássuk, hol vagyon Istened? \n6. Én lelkem, mire csüggedsz el: Mit kesergesz enynyire? Bízzál Istenben  s nem hágy el, Kiben örvendek végre. Ki nekem szemlátomást Nyújt kedves szabadulást, Nyilván megmutatja nekem, Hogy csak ő az én Istenem."},{"m":43,"r":43,"c":"Ítélj meg engemet, Úr Isten, És fogadd fel én ügyemet E kegyetlen nemz","b":"1. Ítélj meg engemet, Úr Isten, És fogadd fel én ügyemet E kegyetlen nemzetség ellen! A hamis embernek kezében Ne bocsáss, Uram, engemet, Tartsd meg én fejemet! \n2. Uram, engem miért hagyál el? Lám, te vagy én erősségem! Miért járok keserűséggel? Minden örömöm távozék el, Mert nyomorgat ellenségem És sanyargat engem. \n3. Igazságodat add értenem, Világosságod küldd alá, Mely megvilágosítson engem! Szent hegyedre légyen vezérem; Bémenésem igazgassa A te hajlékodba! \n4. Isten oltárához bemégyek Az én Uram eleiben, Aki öröme én szívemnek. Hegedűvel neked éneklek, És hálát adok szüntelen Tenéked, Úr Isten. \n5. Miért vagy szomorú, én lelkem? Mit kesergesz ily szertelen? Bízzál az Istenben, mert hiszem, Hogy őtet én még dicsőítem, Midőn híven megment engem Megváltó Istenem."},{"m":44,"r":44,"c":"Hallottuk, Isten, füleinkkel, Amit régenten cselekedtél, Nékünk atyáin","b":"1. Hallottuk, Isten, füleinkkel, Amit régenten cselekedtél, Nékünk atyáink mon-dották, Kik nagy dolgaidat látták; A pogány népet kezeddel Elvesztéd, földét elpusztítád; Néped más helyre vitted el, Holott ismét megszaporítád. \n2. Mert nem ő fegyverük által lett, Hogy ők megülték e jó földet; Nem az ő kezük, sem karjuk Volt nekik szabadítójuk, De te orcád tekintése És a te karod és jobb kezed őket így megsegítette, Mert őhozzájuk volt jó kedved. \n3. Úr Isten, te vagy én királyom És az én teljes vigasságom! Jákóbnak küldd segedelmed, Amint régenten mívelted. Általad ellenséginket Megökleldezzük és megrontjuk, És a mi gyűlölőinket A te nevedben letapodjuk. \n4. Mert én nem bízom kézívemben, Sem az én éles fegyveremben; Az engem meg nem szabadít, Ha az ellenség megszorít, De te tartasz meg bennünket Minden mi ellenségünk ellen, És a mi kergetőinket Elveszted, és ejted szégyenben. \n5. Azért az Istent magasztaljuk, És szent nevét örökké áldjuk; Mindennap dicsérvén őtet, Hirdessük nagy kegyességét! De minket te megvetettél, És juttattál nagy szégyenségben, A hadba velünk nem jövél, Hogy megtartottál volna épen. \n6. De mi teéretted naponkint, Üldöztetünk e világ szerint; Miként az ártatlan juhok, Kik a mészárszékre valók. Kelj fel azért, mit aluszol? És álmodból már serkenjél föl, Támadj föl, és hatalmadból Ments ki minket e nagy ínségből!"},{"m":45,"r":45,"c":"Egy szép dolgot hoz elő az én szívem, A dicső királyról lesz éneklésem","b":"1. Egy szép dolgot hoz elő az én szívem, A dicső királyról lesz éneklésem, Kit nyelvem dicsér nagy szép felszóval, Mint egy deák az írópennával. Sokkal szebb vagy te minden embereknél, Mindent felülmúlsz te szép termeteddel, Ajakidnak nagy ő kedvessége, Mert megáldott az Isten örökké. \n2. Te kegyes, erős vitéz, készüljél fel, Vedd fegyvered és oldaladra kösd fel, Úgy, mint királyi ékességedet, Ez ékességben végy győzedelmet! A jó igazság vezérlje utadat, Jóság, kegyesség bírja járásodat, És a te karodnak erejével Nagy csudákat téssz, megládd szemeddel! \n3. Mert hegyesek a te sebes nyilaid, Mit megéreznek minden ellenségid, Szívüket midőn általszegezed, És őket hatalmad alá veted. Ó, Úr Isten, a te királyi széked, Megmarad mindörökké dicsőséged; Pálcája a te királyságodnak: Pálcája bizony igazságodnak. \n4. Az igazságot te igen szereted, A hamisságot viszontag gyűlölöd, Azért az Isten mindenek felett Víg olajjal megkenett tégedet. A te nevedet mindenkor hirdetem, Nemzetségről nemzetségre beszélem: És minden maradéki ezeknek Mindörökké tégedet dicsérnek."},{"m":46,"r":46,"c":"Az Isten a mi reménységünk, Midőn reánk tör ellenségünk, Minden háború","b":"1. Az Isten a mi reménységünk, Midőn reánk tör ellenségünk, Minden háborúságinkban Megtart erős hatalmában. Azért a mi szívünk nem félne, Ha az egész föld megrendülne, És a hegyek a tengernek Közepibe bedűlnének. \n2. Ha a tenger szörnyen zúgna is, Minden víz felzavarodnék is, És ha a sebes szélvészszel A hegyek hányatnak széjjel: A szép folyóvíz mindazáltal Az ő szép tiszta folyásával Az Istennek szent városát, Megvigasztalná hajlékát: \n3. Mert közepén lakik az Isten, Azértan romlása nem lészen; Semmi ínségbe nem ejti, Az Isten jókor megmenti. A pogány népek dúlnak-fúlnak, Nagy sok országok feltámadnak, De az ő haragos szava Mind e földet elolvasztja. \n4. De az Isten minden időben Mivelünk vagyon ínségünkben; Jákób Istene oltalmunk, A Zebaóth erős várunk! Jertek, lássátok e nagy Úrnak, Csuda dolgait hatalmának, Ki mind e föld kerekségét, Elpusztítja ékességét! \n5. E földön széjjel nagy hadakat, Ő megcsendesít háborúkat, Ívet, kopjákat megrontat, Társzekereket felgyújtat, Így szólván: mindnyájan halljátok, Hogy erős Istenetek vagyok, És hogy birodalmam vagyon Minden népen e világon!"},{"m":47,"r":47,"c":"No, minden népek, Örvendezzetek És tapsoljatok, Istent áldjátok Szép h","b":"1. No, minden népek, Örvendezzetek És tapsoljatok, Istent áldjátok Szép hangossággal És nagy felszóval, Mert az Úr Isten Nagy felségében Ő királysága És nagy országa Kiterjed meszsze, Ez egész földre. \n2. Hatalmunkba vet Nagy sok népeket, És meghódoltat sok pogányokat Minékünk végre Ő nagy ereje. Minket ő felvett, Örökévé tett, Nékünk engedte Ő kegyessége Jákóbnak tisztét, Kit igen szeret. \n3. Íme, az Isten Szépen felmegyen Nagy vigasságban, Trombitaszókban; Urunk felmegyen Nagy dicsőségben. Énekeljetek Az Úr Istennek Zengő verseket, Szép énekeket, E nagy királynak, Mint mi Urunknak! \n4. Őnéki minden Jól énekeljen! Mert minden népek Néki engednek. Királyi székben Ül nagy kegyesen. A fejedelmek Őhozzá gyűlnek, Mint Ábrahámnak Istenét, áldják, Alázatosan Néki szolgálván."},{"m":48,"r":48,"c":"Nagy az Úr méltóságában, Az Isten szent városában, Holott lakozik dics","b":"1. Nagy az Úr méltóságában, Az Isten szent városában, Holott lakozik dicsősége, És dicsértetik ő szent neve. A szent Sionnak hegyén, Annak északi szélén, E gyönyörűséges helyen, Holott helyheztetett szépen A nagy királynak városa, Melynek nincs e földön mása. \n2. Mit megerősített Isten, Hogy romlása ne lehessen. Nézünk itt te kegyességedre Szent templomodnak közepette. Dicsőséges szent neved Mind e földre kiterjed; Ekképp a te dicséreted Nagy meszszire kiterjeszted; Jobbod teljes igazsággal, Mindenben irgalmassággal. \n3. Örül a Sionnak hegyi És a Judának leányi, Te igaz ítéleteiden Szíve szerint örvendez minden. A Siont járjátok meg, Tornyait lássátok meg, Nézzétek meg ő bástyáit, Szépen épített házait, Hogy ezt megbeszélhessétek A jövendő nemzedéknek."},{"m":49,"r":49,"c":"Hallgassátok meg, minden nemzetek, E föld lakói, jól figyeljetek, Közn","b":"1. Hallgassátok meg, minden nemzetek, E föld lakói, jól figyeljetek, Köznépek és a főrenden valók, Minden szegények és a gazdagok! Az én szájam szól nagy bölcses-séget, És elmém gondol jó értelmeket; E példára magam is figyelmezek, Hegedűszóban szép mesét jelentek. \n2. Mit félnék én a gonosz időben, Hogy nyomorgatóm engem elejtsen, Ha ellenségem mind azon vagyon, Hogy engemet láb alá tapodjon? Némelyek igen bíznak pénzükben, És dicsekednek az ő kincsükben; De senki meg nem váltja atyjafiát, Nem adhatja meg Istennél váltságát. \n3. Mert drága a léleknek váltsága, Életét senki meg nem válthatja, Hogy a halált ő elkerülhesse, És a sírba menni ne kellene. Mert látja, hogy sem bolond, sem eszes, A halál ellen nincsen mentséges, És holtuk után minden gazdagságuk, Más emberre száll az ő sok jószáguk. \n4. Ez őnékiek fő gondolatjuk, Hogy mindörökké tartson szép házuk, Hogy el ne fogyjon az ő nemzetük, És megmaradjon örökké nevük. Mert noha vagyon pénzük és tisztük, De nem sokáig tartnak mindezek, Mert végre minden jóktól elszakadnak, Mint oktalan állatok, ők meghalnak. \n5. Mert oda lészen minden ő dolguk, A koporsó lészen ő hajlékuk, De a haláltól engem az Isten Megment, és hozzá vészen kegyesen. Annak okáért azzal ne gondolj, Hogy némely ember igen gazdagul, Mert minden kincset másoknak kell hagyni, A dicsőségtől meg kell néki válni."},{"m":50,"r":50,"c":"Az erős Isten, uraknak Ura, Szól és e földet mind elő hívja, Támadatró","b":"1. Az erős Isten, uraknak Ura, Szól és e földet mind elő hívja, Támadatról és napenyészetről, Nagy szépséggel a Sion hegyéről Eljő az Isten ő fényességében, Semmit el nem hallgat ítéletében. \n2. Emésztő tűz mégyen őelőtte, Nagy forgó szélvész lészen körüle; Szólítja az eget és a földet, Hogy megítélje minden ő népét, Mondván: gyűjtsétek ide a híveket, Kik áldozattal vették kötésemet! \n3. Az egek hirdetik igazságát Az Istennek, mert ítél igazat. Én népem, hallgasd meg, szólok neked, Mert bizonyságot teszek ellened, Én tenéked erős Istened vagyok, Áldozatiddal keveset gondolok. \n4. Szükségben tőlem segítséget kérj, Én megsegítlek, hogy engem dicsérj! A gonosznak mond Isten: de mire Vészed törvényem a te nyelvedre? Kötésem szájjal vallod, de gyűlölöd Intésemet, és igémet megveted. \n5. És mikoron a lopót te látod, Együtt futsz véle, dolgát javallod; A paráznákkal örömest mulatsz, Rossz társaságnak gyakran helyet adsz; Szájaddal szólasz nagy sok gonoszságot, Nyelveddel szerzesz sok háborúságot. \n6. Leülsz és atyádfiát megszólod, Az anyád fiát is rágalmazod; Ezt míveled, de én csak hallgatok. Azt véled, én is csak olyan vagyok, Mint szintén te, de téged előveszlek, És szemlátomást bűnödről megfeddlek. \n7. Ezt mostan eszetekbe vegyétek, Kik az Istenről elfelejtkeztek, Hogy mentség nélkül el ne rántsalak! Az becsül engem, aki hálát ad; Mond Isten: az ily ember jár jó úton, És segedelmem néki jelen vagyon!"},{"m":51,"r":51,"c":"Úr Isten, kérlek, kegyelmezz nékem, És kegyelmedből könyörülj énrajtam","b":"1. Úr Isten, kérlek, kegyelmezz nékem, És kegyelmedből könyörülj énrajtam, Bűneimből tőled megtisztíttassam, Nagy irgalmaddal végy körül engem! Törüld el az én nagy bűneimet, Mosogass jól meg fertelmességimből, Amikkel fertéztetem éltemet: Tisztítsad el nagy kegyelmességedből! \n2. Mert ismerem jól gyarló voltomat, És bűnöm mindenkor forog előttem, Melyet csak teellened cselekedtem, Mely miatt tészek én nagy siralmat. Vétkeztem a te szemeid előtt, Melyért engemet méltán megbüntethetsz, Rám vethedd kemény ítéletedet, Mindazonáltal igazán ítélhetsz. \n3. Mert íme, látom, nyilván jól értem, Hogy én a gyarlóságban fogantattam, Vétekben az én anyámtól származtam, Szüleim bűnös véréből lettem. De te az igazságot szereted, És igen kedveled a tiszta szívet, És a te titkos bölcsességedet Nagy kegyelmesen nékem megjelented. \n4. Hints meg, Uram, engemet izsóppal, És én azontúl tisztán megújulok; Moss meg engem, és szépen megtisztulok, És fejérb lészek a tiszta hónál. Hogy örvendezhessen az én szívem, Add, hogy megértsem te nagy irgalmadat, És megvidul minden én tetemem, A te haragod melyet öszszerontott. \n5. Színedet rejtsd el vétkeim elől, Fertelmes bűneimet ne tekintsed, Haragos orcád énrólam elvégyed, Tisztíts meg engem minden bűnömből! És teremts tiszta szívet énbennem, Dolgomat mindig jóra vezéreljed, Az erős lelket újítsd meg bennem, Hogy kedves légyen életem előtted! \n6. Ne vess el engem szent színed elől, És ne vedd el szent Lelkedet éntőlem, Sőt szerezz teljes örömet énbennem, Tégy bizonyossá engedelmedről! Indíts szívemben nagy vigasságot, És engem vidám lélekkel erősíts, Értsem örömmel nagy irgalmadat, Kegyelmességgel engemet bátoríts! \n7. És példa lészek erről mindennek, A bűnösöket utadra tanítom, Bűnükből hozzád térésre indítom, Hogy csak tebenned reménykedjenek. Ó, én Istenem, én idvességem, Szabadíts meg e vérrel buzgó bűntől, Hadd énekeljen örökké nyelvem Te igazságos szent ítéletedről! \n8. Nyisd meg azért az én ajakimat, Hogy az én szájam dicsérhessen téged! Ha az áldozat kedves volna néked, Nem kíméleném áldozatomat, De nem kell néked égő áldozat: Az alázatos lelket te szereted, Az tenálad a kedves áldozat; A töredelmes szívet meg nem veted."},{"m":52,"r":52,"c":"Mit dicsekedel gonoszságban, Te hatalmaskodó? Mit fuvalkodol fel magad","b":"1. Mit dicsekedel gonoszságban, Te hatalmaskodó? Mit fuvalkodol fel magadban, Nagyravágyakozó? Mert az Istennek jóvolta A jókat megtartja. \n2. Én téged örökké dicsérlek, Mert megtartál engem, És a te nevedben remélek, Míg leszen életem, Mert jó a te híveiddel Lakoznom örömmel."},{"m":53,"r":53,"c":"A bolond így szól az ő szívében: \"nincs Isten\", azért nagy gonoszságba","b":"1. A bolond így szól az ő szívében: \"nincs Isten\", azért nagy gonoszságban él; Utálatos bűnt teszen, semmit nem fél. Ez egész földön aki jót tegyen, Senki nincsen. \n2. Az Úr az égből alátekinte E földön az emberek fiaira, Hogy meglássa, ha kinek esze volna, Ha valaki az Istent keresné És tisztelné. \n3. De azt jól látja dicsőségében, Hogy a jó útról eltértek mindenek, Mindnyájan fertelmes bűnben hevernek; Aki az Istent tisztelné híven, Csak egy sincsen. \n4. A Sionról vajon ki jövend el, Ki a szent Izráelt megszabadítja? Ha Isten fogságból népét kihozza, Örvend a Jákób és az Izráel Teljes szívvel."},{"m":54,"r":54,"c":"Tarts meg, Uram, én Istenem, És szent nevedért védelmezz meg, Ártatlan","b":"1. Tarts meg, Uram, én Istenem, És szent nevedért védelmezz meg, Ártatlan ügyemet tekintsd meg, Hatalmaddal támadj mellém! Kérem te szent Felségedet, Hallgass meg én könyörgésembe' És kegyesen vedd füleidbe Az én szájamnak beszédét! \n2. Mert ellenségim kevélyen Reám támadnak és kergetnek, És engem halálra keresnek, Eszükbe sem jut az Isten. De az Isten megtart engem, Kegyelmességét megmutatja, És segedelmét hozzám nyújtja, Jóra vezérli életem. \n3. Ez nékem szánt nagy nyavalyát Én ellenségimre téríti, És ezt nékiek megfizeti, Megmutatván igazságát. Akkoron neked víg szívvel Hálaadásokat áldozom, És szent nevedet magasztalom, Mert teljes vagy kegyességgel."},{"m":55,"r":55,"c":"Hallgasd meg az én könyörgésem, Úr Isten, ne fordulj el tőlem, Imádság","b":"1. Hallgasd meg az én könyörgésem, Úr Isten, ne fordulj el tőlem, Imádságom vedd füleidbe, Mert nagy kínokat szenvedek, Szívemben igen kesergek, Előtted panaszlok reszketve! \n2. Kesereg szívem nagy ínségben, Élek halálos félelemben, Teljességgel elszomorodtam; Rettegek, félek, gyötrődöm, Reszketvén szörnyen vesződöm, Úgy, hogy immár sokszor kívántam: \n3. Szárnyaim, ó, ha lehetnének, Mint a galamb, ha repülhetnék: Én elrepülnék meszsze földre, Elmennék e népek közül. Pusztát keresnék, ezektül Ahol nyugodalmam lehetne. \n4. Mind este, reggel őt óhajtom, Délkorban is őtet kiáltom, És meghallgatja könyörgésem, Megtart engem békességben Minden ellenségim ellen, Kik seregbe gyűltek ellenem."},{"m":56,"r":56,"c":"Kegyelmezz meg nekem, én Istenem, Mert az ember igen kerget engem, Nag","b":"1. Kegyelmezz meg nekem, én Istenem, Mert az ember igen kerget engem, Nagy hatalommal támad ellenem, Hogy engem elejthessen. Sok ellenségim háborgatnak szörnyen, Elszánták, hogy bényeljenek hirtelen, Úr Isten, én ilyen nagy félelmemben Benned reménységem! \n2. Én az Úr Istenben dicsekedem, Szent Igéjében nem kételkedem. Mit tehetne az ember énnekem, Aki kerget engemet? viszszafordítják az én beszédemet, És naponkint abban hányják eszüket, Hogy nékem szerezzenek veszedelmet, Csak gonoszt gondolnak. \n3. Énellenem ők öszszejárulnak, Hogy megkapjanak, azon forgódnak, És életemtől megfoszthassanak: Ez minden ő szándékuk. A gonoszságban nagy ő bizodalmuk, Azt vélik, hogy jól leszen minden dolguk, De haragod ha esik, Uram, rajtuk: Őket mind levered. \n4. Minden futásimat megemlíted, Könnyhullatásim tömlődbe szeded: A te könyveidbe fel is jegyzed Minden én ínségemet. Könyörgésemet midőn hozzád nyújtom, Ellenségimet ottan futni látom, Mert velem vagy, és te vagy megtartásom, Kegyelmes Istenem! \n5. Úr Isten, Fölségedet dicsérem, És szent igédet nagynak becsülöm; Áldom az Urat, míg lesz életem, Bízván ő beszédében. Reménységemet vetem az Istenben, Irgalmasságára nézek szüntelen, Azért félelmem senkitől nem leszen: Ki árthatna nékem? \n6. Szent fogadásom tartja azt nékem, Hogy jóvoltodért neved dicsérjem, Mert kegyelmesen megmentéd lelkem A halál köteléből. És lábaimat megtartád eséstől, Hogy én élhessek tenéked kedvesül; Az élők fényes világában szentül Járjak teelőtted."},{"m":57,"r":57,"c":"Irgalmazz, Uram, irgalmazz nekem, Mert tebenned bízik az én lelkem! Tö","b":"1. Irgalmazz, Uram, irgalmazz nekem, Mert tebenned bízik az én lelkem! Több segedelmem sehol nincsen nékem! Szárnyadnak árnyékában védelmem, Míg veszedelmem eltávozik tőlem. \n2. Én a felséges Istenben bízom, Ki jóra vezérli minden dolgom; Segedelmet küld alá ínségemben. Az ellen lészen nékem oltalmam, Aki engem kerget, hogy benyelhessen. \n3. Én nyelvem és lantom már serkenj föl, Véletek ím a hajnalt keltem föl! Jó reggel én is ágyamból fölkelek, És éneklek nagy dicsőségedről. Téged, Uram, minden népnek hirdetlek! \n4. Mert nagy jóvoltod, örök irgalmad És igazságod az égig fölhat! Nagy dicsőséged láttasd meg az égen, És jelentsd meg nagy hatalmasságod Az embereknek mind az egész földön!"},{"m":58,"r":58,"c":"Ti tanácsban ülő személyek, Kik zúgolódtok ellenem: Mondjátok csak meg","b":"1. Ti tanácsban ülő személyek, Kik zúgolódtok ellenem: Mondjátok csak meg énnekem, Ha igaz e, amit beszéltek, És ha igazat ítéltek, Ádámtól származott népek? \n2. Sőt ha ember jól megtekinti: Álnoksággal jár szívetek, Mér hamis fonttal kezetek; Nincs dolgotoknak tökéleti. A gonoszok eltévedtek, Mihelyt anyjuktól születtek. \n3. Végre is azt mondhatja minden, Hogy jó az igaznak dolga, Sok és nagy az ő jutalma. Azt vegye mindenki eszében, Hogy Isten mindent megítél, Aki gonoszul vagy jól él."},{"m":59,"r":59,"c":"Szabadíts meg engem, Úr Isten, És tarts meg ellenségim ellen! Mentsd m","b":"1. Szabadíts meg engem, Úr Isten, És tarts meg ellenségim ellen! Mentsd meg azoktól életem, Kik feltámadtak ellenem! Oltalmazz meg a hamis néptül, Ki én veszedelmemnek örül És szomjúzik ártatlan vért! Ments meg attól szent nevedért! \n2. Én ellenségimnek ereje, Kezedben minden tehetsége. Benned bízom, én Istenem, Mert te vagy én segedelmem. Az Isten jóvoltát jelenti, Nyavalyámnak elejét veszi, És megláttatja énvélem, Hogy elvész én ellenségem. \n3. Mert te vagy, Uram, én oltalmam, Reménységem és bizodalmam: Azért, ó, én erősségem, Mindenütt neved dicsérem, Hogy nekem az én szükségemben, Segedelmem vagy ínségemben; Te vagy én erős kőváram, Kegyességed nagy énhozzám."},{"m":60,"r":60,"c":"Minket, Úr Isten, elhagyál, És reánk megharagudtál, Tőled széjjel elos","b":"1. Minket, Úr Isten, elhagyál, És reánk megharagudtál, Tőled széjjel eloszlatánk, Térj kegyesen ismét hozzánk! Mind e földet megindítád, Nagy hatalmaddal megrontád, Építsd meg az ő nagy romlását, Mert romlás miatt alig állhat. \n2. Népedet keményen tartád, És igen megsanyargatád; Minket mintegy csípős borral, Itatál keserű búval, De akik tégedet félnek, A zászlót adád nékiek, Hogy fölemelnék igazságban, Bízván a te szent oltalmadban. \n3. Légy minékünk segítségül, Őrizz meg ellenséginktül, Mert az emberi segítség Hiábavaló epedség. Az Isten által minekünk Lészen erős győzedelmünk, És megszabadít ő bennünket, Megtapodja ellenségünket."},{"m":61,"r":61,"c":"Kiáltásom halld meg, Isten! Vedd füledbe Az én könyörgésemet, Mert én","b":"1. Kiáltásom halld meg, Isten! Vedd füledbe Az én könyörgésemet, Mert én szívem nagy ínségből, Meszsze földről Kiáltja Felségedet! \n2. Végy fel engemet kőszálra, Magasságra, Hol bátorságom legyen, Mert te vagy én erős tornyom, Vigasságom Én ellenségim ellen! \n3. Te hajlékodban lakásom Én kívánom És óhajtom szüntelen; Szárnyaidnak árnyékába Kívánkozva Vagyok jó reménységben. \n4. Meghallgatsz fogadásomban Engem, Uram, Nyújtván kegyességedet. Örökségüket megadod, És megáldod, Akik félik nevedet. \n5. És aztán vígan éneklek Szent nevednek Mostan és mindörökké, És amely fogadást tettem, Megfizetem Naponként őnékie."},{"m":62,"r":62,"c":"Az én lelkem szép csendesen Nyugszik csak az Úr Istenben, Mert csak ő","b":"1. Az én lelkem szép csendesen Nyugszik csak az Úr Istenben, Mert csak ő az én idvességem. Ő nékem erős kőváram, Megtartóm és én oltalmam, Minden gonosztól megment engem. \n2. Azért, szívem, reménységed Csak az Úr Istenben vessed, Élj csak az ő segedelmével! Ő nekem magas kőszálam, Oltalmam és erős bástyám, Hogy soha ne tántorodjam el. \n3. Az Isten én idvességem, Erősségem, dicsőségem; Bízzatok azért csak őbenne! Előtte ti szíveteket, töltsétek ki lelketeket, Ő legyen lelkünk hiedelme! \n4. Ne bízzatok erőszakban, Hamis ragadozástokban, Mulandó dolgon ne kapjatok! Ha sokasul ti kincsetek, Ahhoz ne bízzék szívetek, Mert nem állandó gazdagságtok. \n5. Az Isten egy szót szólt egyszer, Melyet én hallottam kétszer: Hogy nagy ereje vagyon néki. A kegyesség, Uram, tied, És te nyilván megfizeted, Akinek dolga mint érdemli."},{"m":63,"r":63,"c":"Isten, te vagy én Istenem, Jó reggel kereslek tégedet, Hozzád óhajtván","b":"1. Isten, te vagy én Istenem, Jó reggel kereslek tégedet, Hozzád óhajtván, elepedett Szomjúság miatt én lelkem. Én testem hozzád áhítozik, Szomjúságban elhalt szintén E puszta és száraz földön, Hol semmi víz nem találtatik. \n2. Mert látni igen kívánja A te nagy erős dicsőséged, És isteni tiszteletedet A te dicső templomodba’. Mert nekem kedvesb életemnél A te nagy kegyelmességed, Melyért én ajakim téged Dicsérjenek szép énekléssel. \n3. Magasztallak én tégedet Élete
