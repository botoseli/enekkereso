nynyei szent ajándékkal, Szívbéli szent buzgósággal, Melynek szentséges ereje Nyelveket egyező hitre Egybegyűjte sok népeket, Kik mondván, így énekeljenek; Alleluja! Alleluja! \n2. Te, szentségnek új világa, Vezérelj Igéd útjára, Taníts téged megismernünk, Istent atyánknak neveznünk. Őrizz hamis tudománytól, Hogy mi ne tanuljunk mástól, És ne légyen több más senki, Hanem Krisztus, kiben kell bízni! Alleluja! Alleluja! \n3. Ó, mi édes Vigasztalónk, Légy kegyes megoltalmazónk, Hogy maradjunk útaidban, ne csüggedjünk háborúnkban. Erőddel elménket készítsd, Gyenge hitünket erősítsd, Hogy halál és élet által Hozzád siessünk hamarsággal! Alleluja! Alleluja!"},{"m":371,"r":null,"c":"Jézus Krisztus, egy Mesterünk, Menynyei szent bölcsességünk, És nékünk","b":"1. Jézus Krisztus, egy Mesterünk, Menynyei szent bölcsességünk, És nékünk bizonyos idvességünk. \n2. Mostan néked mi könyörgünk, Szent nevedért esedezünk: A te Szentlelkedet adjad nékünk! \n3. Mi szívünket megújítsa, És sebeinket gyógyítsa: Bűnös életünket megjobbítsa. \n4. Munkáinkat megszentelje, Bennünk a hitet nevelje, Utunkat hazánkba vezérelje. \n5. Bölcsességre megtanítson, Hogy ördög meg ne csalhasson: Kísértések ellen bátorítson. \n6. Plántáljon nagy egyességet, Igaz és szent szeretetet, Szívünkbe isteni szent félelmet. \n7. Hogy téged bátran vallhassunk, E földön néked élhessünk, Mennyben aztán veled lakozhassunk."},{"m":372,"r":338,"c":"Könyörögjünk az Istennek Szentlelkének, Bocsássa ki magas mennyből fén","b":"1. Könyörögjünk az Istennek Szentlelkének, Bocsássa ki magas mennyből fénylő világát, Végye el mi szívünknek minden homályát, Hogy érthessük Istenünknek Mindenben akaratját. \n2. Ó, Szentlélek, árváknak kegyelmes Atyja, Szegény gyarló bűnösöknek bátorítója, Hitükben tántorgóknak erős gyámola, És az ő reménységüknek Csak te vagy táplálója. \n3. Te vagy a mi lelkünknek édes vendége, A mi szomorú szívünknek igaz öröme, Lelki háborúinknak csendesítője: Az örök életnek bennünk Csak te vagy elkezdője. \n4. Te tanítád régenten a prófétákat, Igazgatád ő nyelvüket és írásukat, Te tetted bölcscsé a szent apostolokat, Hogy megtérítsék tehozzád Mind e széles világot. \n5. Vedd el a mi szívünknek hitetlenségét, Világosítsd meg elménknek nagy setétségét, Rontsd el a gyűlölségnek kegyetlenségét, Engedd a te szent hitednek Mindenütt egyességét! \n6. Válassz minket magadnak élő templomul, Végyed mi könyörgésünket szent áldozatul; Vedd ki már e világot a kárhozatból, Engedj igaz hitben való Kimúlást e világból. \n7. Dicsértessél, felséges Atya Úr Isten, Légyen áldott a te neved, Fiú Úr Isten, Ezekkel egyetemben, Szentlélek Isten: Maradjon a te áldásod A te bűnös népeden."},{"m":373,"r":null,"c":"Jövel, teremtő Szentlélek, És híveiddel légy vélek, Szent ajándékiddal","b":"1. Jövel, teremtő Szentlélek, És híveiddel légy vélek, Szent ajándékiddal szívek Újuljon és teljesedjék. \n2. Hathatós Vigasztalónak És Isten ajándékának, Avagy hét ajándékúnak, Isten jobb keze ujjának; \n3. Mondatol élő kútfőnek, Tűznek és lelki kenetnek, Atyának ígéretinek És az igaz szeretetnek. \n4. Gerjessz világot elménkben, Önts szeretetet szívünkben, Erősíts minket hitünkben És nagy erőtlenségünkben. \n5. Adj nékünk teljes örömet, Idvességhozó kegyelmet; Köztünk minden gyűlölséget Ronts el, és adj egyességet. \n6. Távoztasd ellenséginket, És add meg békességünket; Mindenkor vezérelj minket, Utálhassuk bűneinket. \n7. Adjad ismernünk az Atyát, És az ő egyszülött Fiát, És hinnünk, hogy mindkettőtül Szentül származol, vég nélkül. \n8. Dicsőség az egy Istennek, Atya, Fiú, Szentléleknek; Kedves ajándéka ennek Lakjék szívében mindennek."},{"m":374,"r":null,"c":"A pünkösdnek jeles napján Szentlélek Isten küldeték, Megerősítni szívü","b":"1. A pünkösdnek jeles napján Szentlélek Isten küldeték, Megerősítni szívüket Az apostoloknak. \n2. Melyet Krisztus ígért vala Akkor a tanítványoknak, Mikor méne mennyországba Mindenek láttára. \n3. Tüzes nyelveknek szólása, Úgy mint szeleknek zúgása Leszálla az ő fejükre Nagy hirtelenséggel. \n4. Bételvén ők Szentlélekkel, Kezdének szólni nyelveken, Amint nékik a Szentlélek Ad vala szólani. \n5. Örüljünk azért őneki, Mondván szép ékes éneket, Felmagasztalván ő nevét Örökkön-örökké. \n6. Dicsértessél Atya Isten, És megváltó Fiú Isten, Szentlélekkel egyetemben, Mindörökké, Ámen."},{"m":375,"r":334,"c":"Jézus, az ígéretet Ím, bételjesítetted, Bátorító Lelkedet Mihozzánk el","b":"1. Jézus, az ígéretet Ím, bételjesítetted, Bátorító Lelkedet Mihozzánk elküldötted, Aki által híveid Elnyerik érdemeid. \n2. Ama megfeszíttetett Test az égbe vitetett, és helyette küldetett E reánk kitöltetett Lélek: örökkévaló Gyámol és vigasztaló. \n3. Isten, aki tűzben jött Mózest elbocsátani, S szélben ment Illés előtt Őtet bátorítani, Most kettős erőben: szent Tűzben s szélben megjelent. \n4. Bátorítja szívüket a Jézus híveinek; Tudományt és nyelveket Oszt kiküldötteinek. Tudatlanból tanítót Tesz, s betegből gyógyítót. \n5. Egy halász, ha prédikál, fog sok ezer lelkeket, S míg dühösen űzi Pál Az eloszlott híveket, Útban éri leverő Menynyei tüzes erő. \n6. Terjed e tűz az egész Föld színére hirtelen, Fú e szél s hatalmat vész, Ahol akar, szüntelen, Lelkesíti sorsosit, Szentel és világosít. \n7. Add nékünk is, Istenünk, A te áldott Lelkedet, Szent tűz adja érzenünk Éltető kegyelmedet; Adj hitet, szeretetet: Lelki boldog életet."},{"m":376,"r":332,"c":"Ó, áldott Szentlélek, ki az ég dicsőségével, Leszállván a földre zúgó","b":"1. Ó, áldott Szentlélek, ki az ég dicsőségével, Leszállván a földre zúgó szél és tűz jelével A tanítványok gyűlésébe, Úgy munkálkodtál, hogy lelkükbe' Csuda erőkkel telének be. \n2. Hatalmas erőddel őket egy szempillantásba’ Megvilágosítád s hoztad olyan változásba, Hogy aznap, melyen előálltak És a népeknek prédikáltak: Anyaszentegyházat fundáltak. \n3. Jövel mihozzánk is, részeltess ajándékidban, Lakozzál mibennünk, mint élő templomaidban! Adj hitet, adj jó reménységet, Adj szentid között egyességet, Békességet és idvességet. \n4. Oszlasd el homályos elménknek tudatlanságát, Enyhítsd meg elepedt szívünknek szomorúságát; Éreztessed még itt létünkben Az örömöt a mi lelkünkben, Melyet adsz örök életünkben!"},{"m":377,"r":337,"c":"Szentlélek, végy körül bennünket, Szenteld meg szívünket, Készíts neve","b":"1. Szentlélek, végy körül bennünket, Szenteld meg szívünket, Készíts neved imádására, Magasztalására, Hogy téged szívből imádhassunk, Hálákat adhassunk: Hiszszük, a mi szánknak szózatja Egeid meghatja. \n2. Szentlélek, mi imádunk téged, Valljuk istenséged. hiszszük, hogy az új ember szíve saját kezed míve. Te vagy a hitnek mind szerzője, Mind elvégezője, Te gyújtasz szívünkben világot, Forró buzgóságot. \n3. Szakaszd el hát most is szívünket, Minden érzésünket A sok hiábavalóságtól, E csalárd világtól, Hogy az Igének hallgatói, Légyünk megtartói; Mely szívünkben gyökeret verjen, Gyümölcsöt teremjen."},{"m":378,"r":341,"c":"Adjunk hálát mindnyájan Az Atya Úr Istennek, És mondjunk dicséretet Mi","b":"1. Adjunk hálát mindnyájan Az Atya Úr Istennek, És mondjunk dicséretet Mi teremtő Istenünknek, Ki egybegyűjte most minket, Hogy ünnepet szenteljünk, És szent Igéjével éljünk. \n2. Ó, kegyes Atya Isten, Te vagy Úr mindenekben, Ki megjelentéd magad Szent igédben itt e földön, És sok csudatételidben, A te áldott Fiadban, Mi kegyes Idvezítőnkben. \n3. Légy kegyelmes minékünk A te áldott Fiadért, Az Úr Jézus Krisztusért, Mi szentséges Megváltónkért, És ne állj boszszút mirajtunk A nagy hitetlenségért, Fertelmes sok bűneinkért! \n4. De szentelj meg bennünket, Bírj és segíts meg minket, Gerjeszd fel mi lelkünket És a mi gyarló szívünket, Hogy téged megismerhessünk, Segítségül hívhassunk, Néked hálákat adhassunk. \n5. Világosíts meg minket A Szentlélek Istennel, Hogy szépen tündököljék Bennünk az evangyéliom, És erősíts meg, Úr Isten, A te áldott Igéddel Minden tévelygések ellen! \n6. Te igazgasd elméjét És minden tanúságát, Vezéreld útát, nyelvét A mi lelkipásztorinknak, És oktassad elméjüket A te szent beszédedet Figyelmesen hallgatóknak. \n7. Tarts meg minden időben Minket az igaz hitben, És igaz értelmében A szent evangyéliomnak; Légyen foganatos köztünk A te kegyes beszéded, És minden jóra intésed. \n8. Hogy sok népek tehozzád Megtérjenek bűnükből És téged szolgáljanak Az ő szívükből-lelkükből; Hogy mindenek imádjanak S csak téged tiszteljenek, Hogy örökké élhessenek."},{"m":379,"r":210,"c":"Emlékezzél, Úr Isten, híveidről, Lelkitesti sokféle szükséginkről, Vis","b":"1. Emlékezzél, Úr Isten, híveidről, Lelkitesti sokféle szükséginkről, Viselj gondot irgalmasságodból Különösen te szentegyházadról. \n2. Adjad nékünk a kenyeret éltünkben, Amely táplál és erősít hitünkben, Nevekedést ád reménységünkben És megszentel lelkünkben-testünkben. \n3. Ne hagyj minket, Úr Isten, szomjúhoznunk, Az élő víz adassék most minékünk, Mely víz után soha nem szomjúzunk, Mert tebenned örökké vigadunk. \n4. Akik hallják, Úr Isten, beszédedet, Ebből értik irántuk jó kedvedet, Szent Fiadért kegyelmességedet, Hogy közlöd vélünk örökségedet. \n5. Adjad nékünk most is te Szentlelkedet, Ne hallgassuk hiába szent Igédet, Sőt a szerint féljük szent nevedet, Magasztaljuk mindég Felségedet. \n6. Dicsértessék már az Atya Úr Isten; Ő szent Igéje, a Fiú Úr Isten; Egyetemben Szentlélek Úr Isten: Szentháromság egy örök Úr Isten!"},{"m":380,"r":359,"c":"Semmit ne bánkódjál, Krisztus szent serege, Mert nem árthat néked senk","b":"1. Semmit ne bánkódjál, Krisztus szent serege, Mert nem árthat néked senki gyűlölsége, Noha e világnak rajtad dühössége, De nem hágy szégyenben Krisztus ő Felsége. \n2. Királyi nemzet vagy, noha te kicsiny vagy, Az Atya Istennél bizony te kedves vagy; Ő szent Fia által már te is fia vagy, Minden dicsőségben, higygyed, hogy részes vagy. \n3. Hogyha te igazán a Krisztusban bízol, higygyed, hogy lélekben Istennél gyarapszol, Ha Krisztus véréből igaz hittel iszol: higygyed, hogy örökké meg nem szomjúhozol. \n4. Akármint halászszon az ördög utánad, Az ő tagjaiban dühösködjék rajtad, Mind tőrrel, fegyverrel siessen utánad, Ha Krisztusban bízol, higygyed, az sem árthat. \n5. Rajtad semmit sem fog a pogány ellenség, Noha nehéz néked a rettenetesség; Bátor koncra hányjon a hitlen ellenség: Feltámaszt a Krisztus, néked nagy reménység. \n6. Oltalmazza Krisztus az ő szent egyházát, Miként a jó pásztor saját juhocskáját; Valaki hallgatja a Krisztus mondását, Viseli mindenkor szorgalmatos gondját. \n7. Siess most mihozzánk, Krisztus, segélj minket, A te szent igéddel neveljed hitünket És te Szentlelkeddel bírjad életünket, Hogy minden dolgunkban dicsérhessünk téged. \n8. Igaz fogadásod és minden beszéded, Nyilván vagyon immár minden dicsőséged; Ne hagyd elpusztulni e kicsiny sereget, Melyért a keresztfán vallál nagy gyötrelmet! \n9. Ne nézzed, Úr Isten, e világ vakságát, Te nagy jóvoltodról háládatlanságát, A te igéd ellen ily nagy káromlását: Nézzed a Krisztusnak ártatlan halálát. \n10. Vedd el már mirólunk a sok ellenséget, Vedd ki miközülünk a sok gyűlölséget; Essenek szégyenbe minden ellenségink, Kik dicsőségedet tagadják s nevetik. \n11. Senkiben nem bízik az anyaszentegyház, Hanem csak tebenned, ki minket oltalmazsz, És igazságoddal mindenkoron táplálsz, Te szent sebeiddel minket megvigasztalsz. \n12. Hálát adunk néked, mennybéli nagy Isten, Ki vagy egy szentségben és három személyben. Ne hagyj elrettennünk keserűségünkben, Halálunk óráján ne essünk kétségben!"},{"m":381,"r":340,"c":"Jézus Krisztus, mi kegyelmes Hadnagyunk, Könyörgéssel te elődbe járulu","b":"1. Jézus Krisztus, mi kegyelmes Hadnagyunk, Könyörgéssel te elődbe járulunk, Kik e siralomnak völgyén nyomorgunk: Te légy nékünk segítségünk, oltalmunk. \n2. Elmerültünk a sok nyomorúságban, Éjjel-nappal vagyunk szomorúságban, Számtalan sokféle sanyarúságban, Az ellenségnek vagyunk ő torkában. \n3. Reád hagyjuk anyaszentegyházunkat, hiszszük, hogy jól látod nyavalyáinkat; Elmerülni ne hagyd kicsiny hajódat, Parancsolj és csendesítsd a habokat. \n4. Ébredj Uram, mert immár elmerülünk, Veszedelmes habokban elsülylyedünk; Szükségünkben tehozzád esedezünk: Jézus Krisztus, hallgass meg, téged kérünk! \n5. Kérünk Uram, maradj velünk szálláson, Járj mivelünk, népeiddel egy úton. Látod, immár vagyunk napenyészetkor; Térj mihozzánk, járj mivelünk egy úton. \n6. Védelmezzed a te kicsiny bárkádat! Benned bízik a te küzdő egyházad; Te szent véred érette kiontottad: Elmerülni ne hagyd, ha megváltottad! \n7. Ne hagyj kérünk, egyetlenegy Jézusunk, Jusson te elődbe mi imádságunk És hallgass meg, egyetlenegy Szószólónk, Tekints reánk, hatalmas Közbenjárónk! \n8. Sőt légy erős kőfala te népednek, Szaporítsad számukat híveidnek, Vezéreljed nyelvét hirdetőidnek. Kik nevedért gyakran boszszút szenvednek. \n9. Szent az Atya, mindenek megtartója, Szent a Fiú, mindenek megváltója; Ó Szentlélek, hívek bátorítója, Szent, szent, szent a te neved, minden vallja!"},{"m":382,"r":null,"c":"Hogy panaszolkodik az anyaszentegyház, a Jézusnak jegyese, Melyet megt","b":"1. Hogy panaszolkodik az anyaszentegyház, a Jézusnak jegyese, Melyet megtisztíta az ő bűneiből a Krisztusnak szent vére, Aki a szent Páltól az élő Istennek mondatik szent házának, Minden igazságnak fundámentomának és erős oszlopának: \n2. Hallgass meg engemet, én Uram, Teremtőm, mindeneknek Istene, Ó, te igazságnak, minden jámborságnak oltalma és őrzője! Én gyenge koromban viselsz vala engem a te áldott méhedben: Ne hagyj el immáron vénségem idején, nagy erőtlenségemben! \n3. Mert ítéletedben, én édes Istenem, lám elhagytál engemet, Szegény árváimmal, kevés seregemmel megútáltál engemet; Gyászos özvegységre és nyomorúságra juttatád én ügyemet: Martalékra vetéd a hitetlen népnek én nyomorult fejemet. \n4. Az ennen szolgáim, kiket felneveltem, uralkodnak én rajtam, Az én koronámat és öltözetemet lefosztották én rólam; Mégis én anynyira ezeket nem bánom, mint az én árváimat: Szörnyű nagy vakságra, kárhozat útjára tőlem elszakadtakat. \n5. Megfelel az Isten szent Ézsaiásnál az anyaszentegyháznak, És így vígasztalja szomorú szívüket nyomorult árváinak: Noha egy kevéssé, egy szempillantásban tégedet elhagytalak, Ismét hozzám veszlek, irgalmasságomból téged megszabadítlak. \n6. És ha képes volna, hogy az édes anya elfelejtse magzatját, Nem akarok mégsem én elfelejtkezni mind örökké terólad; Az én tenyeremre írtalak fel téged: megemlékezem rólad, A te oltalmadra erős gondom lészen, mely örökké megmarad. \n7. Krisztus Urunk mondja evangyéliomban, mely nagy gondja van reánk A nagy úr Istennek, hogy még hajain is tőle megszámláltatvák; Azért keresztyének, illik hálát adnunk és az Istent dícsérnünk, A mi szíveinknek nagy-szép ajándékit előtte bemutatnunk. \n8. Dícsértessél azért, menynyei Úr Isten, ily nagy kegyes voltodért; Vígasztalj meg minket a te szent Fiadért, az Úr Jézus Krisztusért; Bátoríts meg minket nyomorúságinkban a te áldott igéddel, Hogy énekelhessünk a te szent nevednek öröké új énekkel."},{"m":383,"r":null,"c":"Könyörgünk néked, ó Isten Fia, Nyomorultak bizonyos oltalma, Ki uralko","b":"1. Könyörgünk néked, ó Isten Fia, Nyomorultak bizonyos oltalma, Ki uralkodol a mennyországba': Tekints reánk, Krisztus Jézus, megnyomorodtakra! \n2. Szertelen ront minket a pogányság, Mert övé már minden hatalmasság; Vagyunk immár sokaknak csak csúfság: Légy minékünk, Krisztus Jézus, mindenben bátorság! \n3. Istállókat sok szent templomidba Csináltanak te boszszúságodra, Melyben készek minden gonoszságra: Tekints reánk szent Atyáddal, megnyomorodtakra! \n4. Oltalmazzad keresztyén népedet, Rontsad meg már a pogány népeket, Kik foglalnak bűnben sok időket: Tiltsd meg immár, Krisztus Jézus, szertelenségüket! \n5. Légy minékünk kegyelmes királyunk; Ne bírassék pogánytól országunk, Se ne nézzed a mi bűnös voltunk: Szent Atyáddal, Jézus Krisztus, emlékezzél rólunk!\n6. Te híveid, tehozzád kiáltunk, Igaz hittel hozzád folyamodunk; Pogányságban élni nem akarunk: Mennyországban uralkodást te általad várunk! \n7. Vígasságos időket adj érni Szolgáidnak, kik tudnak tisztelni, Szent Atyádnak mondásiban járni: Bátorságot adj ó nékik ellenséget győzni! \n8. Segedelem te tőled adassék, Hogy dícsérjen tégedet a község; Hozzád illik a bizony Istenség, És te néked esedezik egész keresztyénség. \n9. Te népednek légy oltalmazója, Téged kérünk, Istennek szent Fia! Énekeljünk néked vígasságban, Szent Atyáddal, Szentlélekkel ki vagy mennyországban!"},{"m":384,"r":null,"c":"Sok ínségünkben hozzád kiáltunk, Felséges Úr Isten, Mert parancsoltad,","b":"1. Sok ínségünkben hozzád kiáltunk, Felséges Úr Isten, Mert parancsoltad, hogy megkeressünk A mi szükségünkben. \n2. Tudjuk, hogy méltán mi bűneinkért Te megvertél minket, Mert nem tiszteltünk, sőt ingerlettük Te szent Felségedet. \n3. A mi atyáink mi velünk együtt Ellened vétkeztek, Azért, hogy téged ők nem ismertek, Téged nem tiszteltek.\n4. Reád maradtunk, mert mindenektől Mi elhagyattattunk, Az ellenségtől ostromoltatunk, Naponként rontatunk. \n5. Ígéretedből, te szent igédből Téged megismertünk; Szent Fiad által néked könyörgünk: Légy kegyelmes nékünk!\n6. Ne hagyd, tekintsd meg ígéretedet, És a te népedet, Kik tiszta szívből mostan dícsérik A te szent nevedet. \n7. Végy ki immáron e nagy ínségből, Pokol köteléből, Hogy te szent neved magasztaltassék Mi nemzetségünktől. \n8. Sok hálát adunk, mint Istenünknek És mi Teremtőnknek, Te Szent Fiadnak és vígasztaló Szentlélek Istennek."},{"m":385,"r":null,"c":"Keserves szívvel Magyarországban mondhatjuk magunkról A nagy siralmat,","b":"1. Keserves szívvel Magyarországban mondhatjuk magunkról A nagy siralmat, kit Jeremiás régen írt zsidókról:\n2. Emlékezzél meg, hatalmas Isten, nyomoruságinkról; Tekints mi reánk, állj boszszút immár mi nagy romlásinkról!\n3. Mert örökségünk tőlünk fordúla pogány nemzetségre, Mi lakó helyünk szálla mi rólunk idegen népekre. \n4. Édes atyánktól immár megváltunk, árvaságra juttunk, Édes anyánkkal mind egyetemben özvegygyé maradtunk. \n5. Megszomjúhozván, a mi vizünket drága pénzen iszszuk; Nagy fáradsággal bégyüjtött fánkat immár áron veszszük. \n6. Sírván mondhatjuk, felséges Isten: vétkei atyáknak, Kik mi közülünk régen kimúltak, mireánk szállának. \n7. Kegyetlen szolgák nagy dühösséggel rajtunk uralkodnak; Nem találhatunk már reménységet szabadulásunknak. \n8. Nagy félelemmel és rettegéssel pusztában bujdosunk: Eledelünket, mi életünket kezünkben hordozzuk. \n9. Tisztes aszszonyok tisztaságukban meggyaláztatának, A gyenge szűzek sok városokban szeplőket vallának.\n10. A fejedelmek akasztófára felfüggesztetének, És vén népeknek ő tekintetek nem becsültetének.\n11. Ifjú népekkel és gyermekekkel gonoszúl élének; Kegyetlenséget, éktelenséget köztünk mívelének. \n12. A mi szívünknek minden öröme már elfogyatkozék, Gyülekezetünk nagy siralomra fordula s változék. \n13. A mi fejünknek szép ékessége kiesék közülünk; Jaj mindörökké immár minékünk, mert igen vétkeztünk! \n14. Nagy bánat miatt mi szívünk, lelkünk igen keseredék, s a mi szemünk siralom miatt mind megsetétedék. \n15. Keresztyéneknek lakó helyeik úgy elpusztultanak, Hogy vadak, rókák, hamis tanítók most immár ott laknak. \n16. Te pedig, kegyes, irgalmas Isten, örökké megmaradsz, Te országodban, birodalmadban örökké megállasz. \n17. Miért örökké elfelejtkezel mi rólunk, Úr Isten? Miért hagysz minket sok ideiglen e veszedelemben? \n18. Téríts tehozzád, és mi megtérünk, kegyelmes Úr Isten! Újítsd meg immár mi napjainkat, mint régi időben."},{"m":386,"r":null,"c":"Emlékezzél, mi történék, Uram, mirajtunk, És tekintsd meg, mely nagy s","b":"1. Emlékezzél, mi történék, Uram, mirajtunk, És tekintsd meg, mely nagy szidalomban mi vagyunk, Mert bűnünkért, Uram, tőled ostoroztatunk, Azért szükség éjjel-nappal hozzád kiáltnunk. \n2. Örökségünk, édes hazánk másra fordúla, Mi házunk és jószágunk idegenre szálla; Ügyünk juta már minékünk nagy árvaságra: Mert Istennek nem akaránk térni útjára. \n3. Hitetlen nép közt keressük mi kenyerünket: Mert földünkben nem segéljük a szegényeket. Nyomorultakról elfordítjuk szemeinket: Ezért Isten vete reánk haragvó szemet. \n4. Atyáink is vétkeztenek, de már meghaltak. Mi is követői voltunk álnokságiknak; Ím így vásott meg beléje foguk fiaknak: Mert ellene járunk Isten akaratjának. \n5. Közöttünk kik szolgák voltak, most uralkodnak Gazdák lévén, mert Istennek mi sem szolgálánk; Minden Isten-tiszteletet már megútálánk: Azért nincsen aki által megszabadulnánk. \n6. Ím csak markunkban viseljük a mi lelkünket, Nagy keserűséggel eszszük mi kenyerünket, Félelem és sok rettegés megemészt minket: Fegyver elől kietlenbe mentjük fejünket. \n7. Nagy haragja vagyon rajtunk az Úr Istennek: Természeti ellen élünk szent Igéjének És ellene járunk minden ő szerzésének: Ezzel adunk okot minden büntetésének. \n8. Bizodalmunk vagyon benned, felséges Isten, Mert megmaradsz mind örökké ígéretedben; Ha gyötrődünk bűnünk szerint ami testünkben: Azért nem hagysz elszakadnunk tőled lelkünkben. \n9. Vedd el rólunk, kérünk téged, nagy haragodat És újítsd meg már minékünk a mi napunkat; Kegyelmes Úr Isten, tartsd meg mi házainkat! Dícsérhessünk mind örökké, mint szent Atyánkat!"},{"m":387,"r":null,"c":"Úr Isten, légy most mivelünk, Mert sokan támadtanak ellenünk, Nincsen","b":"1. Úr Isten, légy most mivelünk, Mert sokan támadtanak ellenünk, Nincsen kihez a mi fejünket Szükségünkben hajtanunk. \n2. Reménységünk, bizodalmunk, Mindenkor te voltál mi oltalmunk: Azért most is te Felségednek Bátorsággal könyörgünk. \n3. A te szent Fiadért kérünk: Légy nékünk paizsunk és oltalmunk, Félelmünkben szárnyaid alatt Megmaradni hogy tudjunk. \n4. Meggyűlölt az Isten minket, Azt mondják: nem szeretsz, Uram, minket, Bűneinkért nagy haragodból Akarsz verni most minket. \n5. Ezt mi mind megérdemeljük, Vétkünket ha mind előszámoljuk; A bűn ellen nagy haragodat Akarod, hogy ismerjük. \n6. Könyörülj immár mirajtunk, Lelkünkben kik reád támaszkodunk, Szabadíts meg: ellenséginknek Kezébe hogy ne jussunk! \n7. Nagy hatalmadat hirdetjük, Ezért jóvoltodat dicsőítjük, Szent nevedet mindenek előtt Nagy felszóval dícsérjük. \n8. Kíméletlen sokszor vertél, De hamar ismétlen hozzánk tértél, Hogy lelkünkben inkább tisztuljunk: Tűzbe azért vetettél. \n9. Örökké, lám, el nem hagytál, A te Szentlelkeddel vigasztaltál; Most se hagyj el, kegyelmes Atyánk, Ha fiaddá fogadtál. \n10. Mikoron megmenekedünk, Melyet már bizonynyal mi reménylünk, Dícséretet és nagy hál'adást Mi tenéked éneklünk."},{"m":388,"r":null,"c":"Hallgasd meg, Jézus Krisztus, Te megszomorodott S igen megkeseredett S","b":"1. Hallgasd meg, Jézus Krisztus, Te megszomorodott S igen megkeseredett Szegény juhaidat, Hallgasd meg kegyelmesen A te szent egyházadat, Mely megnyomorodott. \n2. Ne hagyd, édes Jézusunk, Nyomorult népedet, Szent véreddel megváltott Kicsiny seregedet; Ne hagyjad elpusztulni A te örökségedet: A keresztyénséget. \n3. Kit a Sátán sokképpen Most megkörnyékezett, Sok fertelmes bűnökkel, És igen kísértget; Sok sanyarúságokkal És méreggel keserget, Szidalommal illet. \n4. Siess, láss azért hozzánk, Kegyelmes Istenünk, El ne vess színed elől, Szerelmes jegyesünk! Ne hagyj el minket és ne Feledkezzél el rólunk: Meszsze ne menj tőlünk! \n5. Maradj meg, Uram, vélünk, Mert beestvéledik És immáron a nap is Majdan elnyugoszik; Nagy homály és setétség Ígyen majd következik: A bűn sokasodik. \n6. Számtalan sok gonoszság Közöttünk megbővült, A te szent szereteted Igen meghidegült, És minden rendbéli nép Tőled elidegenült: A bűnben elmerült. \n7. Hallgass meg azért minket És ments meg ezektől A pokolbéli ördög Nagy dühösségétől, Minden tévelygésektől, Oktalan, hamis hittől, Kétségbeeséstől. \n8. El ne távozzék tőlünk A Szentlélek Isten, Légyen ő gyámolítónk A mi életünkben; Tartsa meg szent Igédnek Szerelmét mi szívünkben: Hogy legyünk kedvében. \n9. Úgyszintén vezéreljen Minket igazságban, Tartson meg szent nevednek Erős vallásában, És vigasztaljon minket Minden háborúságban És nyomorúságban. \n10. Hogy dicséretet mondjunk A te szent Atyádnak, Ővéle egyetemben Néked, mi Urunknak; Mindörökkön, örökké A Szentlélek Istennek, Mi megszentelőnknek."},{"m":389,"r":null,"c":"Jővel, légy velünk, Úr Isten, Segíts meg minket ügyünkben; Adj erőt az","b":"1. Jővel, légy velünk, Úr Isten, Segíts meg minket ügyünkben; Adj erőt az ellenségen, Mely reánk tör mind szüntelen, Háborgat minket hitünkben. \n2. Bízik ó sokaságában, Fegyverében, jó lovában, Elhitte már ő magában, Hogy nincsen már e világban, Ki megrontsa hatalmában. \n3. Bátran kergeti népedet, Ostorozza híveidet, Pusztítja örökségedet, Ostromolja seregedet, Nem féli büntetésedet. \n4. Azért tenéked könyörgünk: Támadj fel most mi mellettünk, Emeld fel zászlódat köztünk, Viadalmunkban légy velünk: Biztass, hogy meg ne rettenjünk. \n5. Bátorítsad mi szívünket, Igazgassad fegyverünket, Tőlünk el ne vedd eszünket, Egyengessed seregünket: Rettentsd meg ellenségünket. \n6. Nékünk nincs anynyi hatalmunk, Hogy ő ellene állhassunk; Te légy azért mi oltalmunk, Fegyverük ellen paizsunk, Erősségünk, diadalmunk. \n7. Nem sokaság a mi erőnk: Egyedül te vagy reményünk! Noha sokan nem lehetünk, Ha te velünk vagy, nem félünk: Sokat kevesen megverünk. \n8. Gyakorta kevés nép által Nagy hadakat levágatál, Erőseket letapodtál, kevélyeknek torkán jártál Kegyetleneket rontottál. \n9. Ők vívnak uralkodásért, Prédáért, ragadományért; Mi hitünkért, szent nevedért, Özvegyekért és árvákért, Megromlott édes hazánkért. \n10. Ne mondják azt mi felőlünk, Hogy nékünk nincsen Istenünk: Mutasd meg erődet bennünk, Viaskodjál együtt velünk, Magasztald fel kezed köztünk! \n11. Hogy mindenek, kik ezt hallják, Győzedelmedet csudálják, Jóvoltodat magasztalják, Hatalmasságodat áldják, Erődet meg ne útálják. \n12. Mi is innen viszszatérvén, Jó szerencsénken örülvén Adunk hálát, felemelvén Szemeinket, és dícsérvén Téged mind örökké. Ámen."},{"m":390,"r":null,"c":"Erős vár a mi Is tenünk, Jó fegyverünk és paj  zsunk, Ha ő velünk, ki","b":"1. Erős vár a mi Is tenünk, Jó fegyverünk és paj  zsunk, Ha ő velünk, ki el lenünk? Az Úr a mi oltal  munk. Az ős el lenség Most is üldöz még, Nagy a serege, Csalárdság fegyvere; Nincs ilyen több a föl  dön. \n2. Erőnk magában mit  sem ér, Mi csakhamar eles  nénk; De küzd értünk a hős  vezér, Kit Isten rendelt mel  lénk. Kérdezed:  ki az? Jézus Krisztus az, Isten szent Fia, Az ég és föld Ura, Ő a mi diadal  munk. \n3. E világ minden ör döge Ha elnyelni akar  na, Minket meg nem rémí tene, Mirajtunk nincs hatal  ma. E világ  ura Gyúljon boszszúra: Nincs ereje már, Reá ítélet vár: Az Ige porba dön  ti. \n4. Az Ige kőszálként  megáll, Megszégyenül, ki bánt  ja; Velünk az Úr tábor ba száll, Szent Lelkét ránk bocsát  ja. Kincset, é letet, Hitvest, gyermeket Mind elvehetik, Mit ér ez őnekik? Miénk a menny örök  re."},{"m":391,"r":null,"c":"Vedd el, Úr Isten, rólunk haragodat, És a te kemény, véres ostorodat;","b":"1. Vedd el, Úr Isten, rólunk haragodat, És a te kemény, véres ostorodat; Nagy bűneinkért mireánk ne ontsad boszszúállásodat. \n2. Ha bűnünk szerint kezdünk mi fizetni, Ítéletedet nem állhatja senki, Mint e világnak első veszedelmi Nékünk megjelenti. \n3. Mire mireánk gerjedez haragod, ó, mi szent Atyánk, rajtunk nagy csapásod? Kik nem különbek vagyunk, mint árnyékok, Rothadandó porok. \n4. Megfertőztettünk atyáink vétkével És gyarló lelkünk-testünk sok sebével; Mi romlásunkat, nagy veszedelmünket Nézd kegyelmes szemmel. \n5. Adjad minékünk a te Szentlelkedet: Ismerhessük meg mi Közbenjárónkat, Mert megismertük mi gonoszságinkat: Vedd el haragodat. \n6. Ne hagyd elveszni ilyen nagy munkáját, Ne hagyd hiába az ő szent halálát, A mi Urunknak keserves nagy kínját, Az ő áldozatját. \n7. Végye el rólunk a mi bűneinket, És mosogassa vérével vétkünket Ő, ki Atyjával és a Szentlélekkel Bizony örök Isten."},{"m":392,"r":344,"c":"Az egyháznak a Jézus a fundámentoma, A szent Igére épült fel lelki tem","b":"1. Az egyháznak a Jézus a fundámentoma, A szent Igére épült fel lelki temploma. Leszállt a mennyből hívni és eljegyezni őt, Megváltva drága vérén a váltságban hivőt. \n2. Kihívott minden népből egy lelki népet itt, Kit egy Úr, egy keresztség és egy hit egyesít. Csak egy nevet magasztal, csak egy cél vonja őt, És egy terített asztal ád néki új erőt. \n3. A világ fejedelme feltámad ellene, Vagy hamis tudománytól gyaláztatik neve, S míg egykor felderül majd az Úrnak hajnala, Csak virrasztói kérdik: „meddig az éjszaka?” \n4. Sok bajban, küzdelemben meghajszolt, megvetett, De szent megújulásért És békéért eped, Míg látomása egykor dicsőn beteljesül S a győzedelmes egyház Urával egyesül. \n5. A három-egy Istennel már itt a földön egy S az üdvözült sereggel egy nép és egy sereg. Ó, mily áldott reménység: ha itt időnk lejár, Te boldog szenteiddel fenn Nálad béke vár!"},{"m":393,"r":345,"c":"Ne csüggedj el, kicsiny sereg, Ha rád zúdul vad ellened, Hogy végkép ö","b":"1. Ne csüggedj el, kicsiny sereg, Ha rád zúdul vad ellened, Hogy végkép öszszetörjön; Bár elpusztításodra tör, Gond, kételkedés mit gyötör? Nem lesz ez így örökkön! Bízzál: ügyed az Istené, Népét ő el nem ejtené: Ő áll majd boszszút érted; Ő állít Gedeont melléd, Általa harcodban megvéd, Szent igéjét és téged. \r\n2. Él az Úr, áll ígérete: Ördög s világ minden csele Megszégyenül mi rajtunk! Vélünk az Úr, mi ő vele, Végtelen az ő ereje: Győzelmet kell aratnunk. Krisztusunk, segélj, el ne hagyj, Pártfogónk végig te maradj: Oltalmazz neved által, Hogy, mint hű nyájad, teneked Zenghessünk dícséreteket Víg, boldog hál'adással!"},{"m":394,"r":363,"c":"Térj magadhoz, drága Sion, Van még néked Istened, Ki atyádként felkaro","b":"1. Térj magadhoz, drága Sion, Van még néked Istened, Ki atyádként felkaroljon, S szívét oszsza meg veled! Azt bünteti, kit szeret, Máskép ő nem is tehet: Sion, ezt hát jól gondold meg, S szabj határt bús gyötrelmednek. \n2. Hullámok ha rémítenek Mérhetetlen víz felett, S a habok közt szíved remeg, Hogy sírod is ott leled; Ha aludni látod őt, Ki reményed és erőd: Sion, soha ne feledd el: Ő megvívhat tengerekkel! \n3. Bár hegy, halmok rengenének, Miket égi kéz emelt, S indulása a nagy égnek Végromlásra adna jelt: Ezt látva is el ne hidd, Hogy ez a perc elveszít; Sion, addig meg nem dőlhetsz, Míg oltalmad Istentől lesz! \n4. Bár könynyűid omlanának Gyöngyökűl a tengerbe, És elhalván hangja szádnak, Csak pihegnél, mint gerle, Bár vér volna bíborod S kő megszánná nyomorod: Sion, ne félj a gonosztól, Baj nem ér, míg Benne bízol! \n5. Bár hordozzad zsarnok láncát, Érjen kínos rabhalál, Ha hitedet el nem játszád, Útad égbe nyitva áll. Örvendj mindig és vígadj, Emlékezz, ki népe vagy! Sion, nincs több Isten egynél, Benne hát ne kételkedjél! \n6. Ó, ne csüggedj, ím az estnek Már leszállnak árnyai, Kihez ajkid oly hőn esdnek, Halld: Atyádnak hangja hí. Ő gyalázat, kín helyett Néked jobbján ad helyet; Sion, a menny lesz te részed, Föld gyötrelmét hát ne nézzed! \n7. Végső áldást mondj hazádra, Mely távolról int feléd, Égi honnak a határa Van már hozzád közelébb. Édes érzés mért fog el, Melytől olvad szív, kebel? Sion, minden máskép lesz ott, El fog tűnni nagy sírásod. \n8. Angyalok, ti fényes lelkek, Zengjetek víg éneket, Mert már biztos révbe tért meg, Kit bús szélvész hányt-vetett! Már meggyőzte a halált, Istenéhez égbe szállt: Sion, onnan számkivetni Nem fog téged soha senki!"},{"m":395,"r":355,"c":"Isten szívén megpihenve Forrjon szívünk egybe hát, Hitünk karja úgy öl","b":"1. Isten szívén megpihenve Forrjon szívünk egybe hát, Hitünk karja úgy ölelje Édes Megváltónkat át! Ő fejünk, mi néki  tagja, Ő a fény, mi színei; Mi cselédek, ő a gazda, Ő miénk, övéi mi. \n2. Szeretetben öszszeforrva, Egy közös test tagjai, Tudjuk egymásért harcolva, Ha kell, vérünk ontani. Úgy szerette földi  nyáját S halt meg értünk jó Urunk; Fájna néki, látva minket, Hogy szeretni nem tudunk. \n3. Nevelj minket egyességre, Mint Atyáddal egy te vagy, Míg egygyé lesz benned végre Minden szív az ég alatt; Míg Szentlelked tiszta  fénye Lesz csak fényünk és napunk, S a világ meglátja végre, Hogy tanítványid vagyunk."},{"m":396,"r":356,"c":"Ébredj, bizonyságtévő Lélek! A várfalakra őrök álljanak, Kik bátran sz","b":"1. Ébredj, bizonyságtévő Lélek! A várfalakra őrök álljanak, Kik bátran szólnak harcra készek, Ha éj borul le, vagy ha kél a nap. Hívásuk zengjen meszsze szerteszét, Az Úrhoz gyűjtve népek seregét! s \n2. Ó, bárha lángod fellobogna S ébredne föl sok nemzet fényinél Ó, bár sok szolga, sarlót fogva, Aratna, mígnem leborul az éj! Urunk, e roppant, ért vetésre nézz: A munka sok, a munkás oly kevés! \n3. Küldd útra hírnökid csapatját, És adj erőt onnan felül nekik, Hogy veszni a pogányt se hagyják, És szerteűzzék Sátán seregit. Országod jöjjön el minél elébb, Hirdetve szent neved dicséretét!"},{"m":397,"r":357,"c":"Ó, Sion, ébredj, töltsd be küldetésed, Mondd a világnak: hajnalod köze","b":"1. Ó, Sion, ébredj, töltsd be küldetésed, Mondd a világnak: hajnalod közel! Mert nem hagy az, ki népeket teremtett, Senkit sem éjben, bűnben veszni el. Légy örömmondó békekövet, Hirdesd: a Szabadító elközelgetett! \n2. Lásd: millióknak lelke megkötözve, Rabláncként hordoz sötét bűnöket; Nincs kitől hallja: Megváltónk keresztje Mily gazdag élet kútja lett neked. Légy örömmondó békekövet, Hirdesd: a szabadító elközelgetett! \n3. Mondd minden népnek: elveszett juháért Mit tett a Pásztor - csuda szerelem - Földig hajolt a kárhozott világért S meghalt alant, hogy élhess odafenn. Légy örömmondó békekövet, Hirdesd: a Szabadító elközelgetett! \n4. Küldj fiaidból, akik nemhiába Élvezik kincsed: Hirdessék szavad; Öntsd lelked értük győzelmes imába: Mindent, mit adtál, Krisztus viszszaad. Légy örömmondó békekövet, Hirdesd: a Szabadító elközelgetett! \n5. Ő viszszajön, Sion, előbb, mint véled, Felfedi titkát minden szív előtt. Egy lélekért se érjen vádja téged, Hogy temiattad nem látta meg Őt. Légy örömmondó békekövet, Hirdesd: a Szabadító elközelgetett!"},{"m":398,"r":358,"c":"Úr lesz a Jézus  minde nütt, Hol csak a napnak fénye süt, Úr lesz a me","b":"1. Úr lesz a Jézus  minde nütt, Hol csak a napnak fénye süt, Úr lesz a meszsze ten ge rig, Hol a hold nem fogy s nem telik. \n2. Őneki mondjunk  hő i mát, Díszítsük azzal homlokát, Jó illat légyen szent  ne ve, Minden napon dicsérete. \n3. Országok, népek  és nyel vek, Ő dicsőségét zengjétek, Gyermekek hangja hir des se: Áldott a Jézus szent neve! \n4. Ő királysága  bő ál dás, Ott van a felszabadulás, Fáradtak ott megnyug sza nak, Ínségesek megáldatnak. \n5. Minden teremtés  dicsér je, A Király Krisztust tisztelje; Angyali ének zeng jen  fenn, S mind e föld mondja rá: Ámen."},{"m":399,"r":null,"c":"Imhol vagyok, édes Uram, Istenem, Kész vagyok mindenben néked engednem","b":"1. Imhol vagyok, édes Uram, Istenem, Kész vagyok mindenben néked engednem, Szent nevedért szörnyű halált szenvednem, Csak az igaz hitben ne hagyj tőled elesnem! \n2. Oda megyek, ahova parancsolod, Akár tűzre, akár vízre akarod, Vagy fegyverre, tömlöcre te kívánod: Legyen, Uram Isten, valamint te akarod! \n3. A halálra imhol viszem fejemet, Nem szánom én kibocsátni lelkemet, A Krisztusért kiontatni véremet: Ezzel megmutatnom az én igaz hitemet. \n4. Én elhagyom már e földi házamat, Nem szánom az én édes magzatimat, Se nem szánom jámbor házas társamat, Én atyámfiait, sok jámbor barátomat. \n5. Semmi nékem itt e földön lakásom; Ha senkitől nem volna is bántásom: Mennyországra vagyon nagy kívánságom, Mert ott vagyon nékem maradandó városom. \n6. Egy keveset most ha én itt tűrendek, A Krisztusért ha valamit szenvedek: Nagy bőséges jutalmat tőle vészek, Örök dicsőségben véle mert együtt lészek. \n7. Erősb leszek mind e széles világnál, Gyorsabb leszek vadaknál, madaraknál, Fényesb leszek én a fényes szép napnál, Drágalátosb lészek minden szép sáraranynál. \n8. Halálból mert megyek örök életre, Kárhozatból az örök idvességre, Gyalázatból az örök dicsőségre, És keserűségből angyali nagy örömre. \n9. Nézz reám én Istenem, szent szemeddel, Hogy tűrhessek mindent nagy békességgel, És lehessek azokhoz szeretettel, Akik háborgatnak, megölnek fegyverükkel. \n10. Én elmegyek Atyámhoz, Istenemhez, Én lelkemnek megváltó Mesteréhez; Mennyországban vala örökségemhez, És a vígasztaló Szentlélek Úr Istenhez.\n11. Istennek ez oly nemes ajándéka: Hogy a bűnösöket ő nem útálja, De nagy szeretettel hozzá fogadja, Az ő szent országát Krisztusért nékik adja. \n12. Fordítsd hozzám, szent Atyám, szemeidet, Bocsássad el mennyből te Szentlelkedet, És tartsad meg mindvégig te hívedet, Hogy a világ előtt vallhassalak tégedet. \n13. Én kivallom a te igazságodat, Mindeneknek szent irgalmasságodat; Adjad nekem a te szent malasztodat, És bátorítsad meg ilyen szegény szolgádat! \n14. Semmit nem gondolok az én kínommal, Semminémű testem-szakadásával, Nem gondolok nagy szörnyű halálommal, Mert majd együtt lészek megváltó Krisztusommal. \n15. Jőjj el immár, ó én édes orvosom! Jőjj el, megváltó szép Jézus Krisztusom! Jöjj el, megnyugtatóm,édes Megváltóm: Testemet-lelkemet te kezedbe ajánlom!"},{"m":400,"r":479,"c":"Hagyjátok el, hív keresztyének, Fájdalmát a ti szíveteknek, Senki ne s","b":"1. Hagyjátok el, hív keresztyének, Fájdalmát a ti szíveteknek, Senki ne sirassa halottját, Mert megnyerte ő boldogságát. \n2. Anyák szűnjenek meg sírástól, Elfelejtkezvén magzatukról, Mert nem halál az ő haláluk, De életben megújulásuk. \n3. Ekképpen az elvetett magvak Rothadásukban gyarapodnak, És szépen fejüket vetendők, Végezetül jó gyümölcs termők. \n4. Fogadd be azért a holt testet, Kebeledbe, föld, vegyed őtet, Takargassad az ő tagjait, Mint édes anya magzatait. \n5. Szentléleknek edénye volt ez, Az élő Isten képe volt ez, A Krisztus Jézus lakott ebben, Volt Istentől nyert kegyelemben. \n6. Föld, híven tartsd e testet benned, Mert mikor Krisztus majd eljövend, Számon kéri ezt akkor tőled, Így lészen bizonynyal, elhigyjed! \n7. Noha ez mostan rothadandó És idővel porrá válandó, De feltámad az úr szavára, Angyali zengő harsonára."},{"m":401,"r":461,"c":"Szívem szerint kívánom Utolsó órámat, Mert nyomorúság, bánat Emészti n","b":"1. Szívem szerint kívánom Utolsó órámat, Mert nyomorúság, bánat Emészti napomat. Megválni kész vagyok már Várván én jussomat, Melyet Jézus megszerzett, Mint fő jutalmamat. \n2. A bűntől és haláltól Megváltál engemet, Ó Jézus, véred árán Megszerzéd üdvömet. Nem rettent már halálom, Sem semmi félelem; Nyugalmamat tebenned, Megváltóm, meglelem. \n3. A kedvére élőnek Keserű a halál, De én várom nyugodtan, Ha jő, készen talál. Jól tudom, fenn a mennyben Lesz dicsőbb életem, Így hát még a halál is Csak nyereség nekem. \n4. Ez a világ magához Ám vonja szívemet, Bár ígérjen bőséggel Elmúló kincseket, Nem ejthet tőrbe engem Már semmi földi jó: Megáll az Úr igéje, Más minden elmúló. \n5. Elválni kedvesinktől Fájdalmas és nehéz, De szívem szent reménynyel A jövendőbe néz. Jézus, én bizodalmam, Hiszem, hogy egy napon Szerettimet a mennyben Újra megláthatom. \n6. El nem bocsátlak többé, Nem hagylak, Jézusom, Te vagy üdvöm, reményem, Én csak benned bízom. Szent karod támogasson A végső harcon át, Hogy elvegyem kezedből Az égi koronát."},{"m":402,"r":null,"c":"Ó, örök hatalmu menynyei szent Isten, Minden dolgaimban benned van rem","b":"1. Ó, örök hatalmu menynyei szent Isten, Minden dolgaimban benned van reményem, Te vagy oltalmam, vígaszom nékem. \n2. Hogyha bánat árja szemeimre zúdul, Szívem fájdalmára balzsamot ád az Úr, S felszárad a könny, a seb begyógyul. \n3. Kínok hogyha gyötrik lelkemet halálra, Sóhajom akkor is Istenemet áldja, Hiszen föltámaszt egy szebb világra."},{"m":403,"r":null,"c":"Szomorú a halál a gyarló embernek, Halál követétől mindenek rettegnek,","b":"1. Szomorú a halál a gyarló embernek, Halál követétől mindenek rettegnek, Kiváltképpen kik e világban örülnek, Nehéz e világtól megválni ezeknek. \n2. Többet higgy a jégen rajzolt írásoknak, Mint a csalárd világ sok biztatásának, Szép szín alatt közli kis részét javának, De semmit sem hihetsz állandóságának. \n3. Romlandó az élet s csak veszendő hívság, Hamar elenyészik, mint a gyenge virág, Minden ékessége csak nagy sanyarúság: Helyette vár reád a fényes mennyország. \n4. Azért, gyarló világ, már maradj magadnak, Ám tartsd barátidnak, kik benned vigadnak, Tovább követője nem leszek utadnak, Nem leszek bús rabja mulandó javadnak. \n5. Tudom, kinek hittem és kinek szolgáltam, Kit szeretett lelkem, kihez folyamodtam, Kit hívtam Uramnak, ki mellett harcoltam, Azért hűségemnek jutalmát találtam. \n6. Elértem hitemnek egyetlenegy célját, Vitézkedésemnek reménylett pálmáját, Az örök életnek drága koronáját, Hogy abban tiszteljem a menynyek királyát. \n7. Ó, édes Megváltóm, ne nézd bűneimet, Sok ellened való cselekedetimet, Idvességem árát: tekintsd érdemedet, Jövel, Jézus Krisztus, vedd hozzád lelkemet! \n8. Igazságod szerint ne ítélj meg engem, Mert semmi kegyelmet nem talál érdemem, Nem lehet kívüled soha idvességem: Jövel, Jézus Krisztus, édes reménységem! \n9. Elvégeztem immár pályafutásomat, E világon való zarándoklásomat, Megtartottam hitem s igaz vallásomat: Jövel, Jézus Krisztus, add meg koronámat!"},{"m":404,"r":464,"c":"Jaj, mely hamar múlik világ dicsősége, Hirtelen változik minden ékessé","b":"1. Jaj, mely hamar múlik világ dicsősége, Hirtelen változik minden ékessége, Távozik szépsége! \n2. Mint a füst és árnyék, csak olyan életed, Hirtelen elmúlik, észre sem veheted, Mint lesz enyészeted. \n3. Mint a szép virágok tavaszszal újulnak, Ékes nyílásukkal fénylenek, vidulnak, De hamar elmúlnak: \n4. Ifjak rettegjetek, vének megtérjetek: Ím rajtatok a sor, azért készüljetek, Mert el kell mennetek. \n5. Ez úttól kincs, jószág senkit meg nem menthet, Egyedüli mentség csak Jézusod lehet, Ki velünk jót tehet. \n6. Ő a testi halált életre fordítja, A hívő léleknek szenynyét letisztítja, Végre boldogítja. \n7. Mi is végóránkon hogy erre juthassunk, Tiszta kegyességet Istenhez mutassunk: Így lesz boldog sorsunk. \n8. Ki-ki életében azért elkészítse Testét a férgeknek, lelkét az Istennek Örök dicsőségre."},{"m":405,"r":null,"c":"Minden ember csak halandó, Minden test, mint fű, virág; Itt ami van, m","b":"1. Minden ember csak halandó, Minden test, mint fű, virág; Itt ami van, mind romlandó, És elmúlik e világ. Porrá kell e testnek lenni, Hogyha el akarja venni Az örök dicsőséget, Melyet Isten készített. \n2. Azért e testi életem, Ha jön a sír éjjele, Bátran s örömmel leteszem, Semmit sem vesztek vele; Mert a Krisztus drága vére Utat nyit egy dicsőbb létre; A halálban biztatóm Jézus, az én Megváltóm. \n3. Ki szakaszthat el őtőle? Enyém ő, s övé vagyok. Tudom, el nem vet előle, Ígéreti mert nagyok; Sőt felvisz engem az égbe, Dicsőültek seregébe, Hol az Istent meglátom És mindörökké áldom. \n4. Ott van öröm s örök pálma, Hol sok ezren az égben, Isten trónja előtt állva Tündöklő fényességben, A dicső szent angyalokkal, Minden megboldogultakkal A Jézust magasztalják, Megtartójuknak vallják. \n5. Nagy keresztet Kik hordoznak S harcolják a hit harcát, Győzelemben vigadoznak S zengnek ott halléluját. Ott öröm s dicső korona Én fejemet körülfonja; Ott élem az életet, Melynek vége nem lehet."},{"m":406,"r":474,"c":"Én Istenem, benned bízom, Segélj, ne hagyj tántorodnom! Lelkem, testem","b":"1. Én Istenem, benned bízom, Segélj, ne hagyj tántorodnom! Lelkem, testem, minden tagom Reád bízom: Vezess, mert rád támaszkodom. \n2. Nem tudom: itt meddig élek, Mikor ér életem véget? Valamikor tetszik neked: hozzád megyek, Akaratodnak engedek. \n3. Minden órában kész lelkem, Hogy veled legyek, Istenem. Nem választok időt, órát, Hozzád jutást, Ha akarod, megyek mindjárt! \n4. Testemnek minden tagjait És a hajamnak szálait Tudod, Uram, mert fejemről Még csak egy szál Kedved nélkül alá nem száll. \n5. Itt csak bánat, keserűség, Vagyon fájdalom, betegség; Életünk többnyire ínség, Kedvetlenség: még erőnk is erőtlenség. \n6. Nincs orvosság halál ellen Patikában vagy más helyen, Széles mezőn, drága kertben Oly fű nincsen, Haláltól amely megmentsen. \n7. Te azért, ó, én Istenem, Add énnékem ezt értenem, Hogy nyomorult mi életünk, Meg kell halnunk, E világból ki kell múlnunk. \n8. A halálban biztatásom Nékem egyedül Jézusom, Ki énérettem szenvedett, Megfizetett: Szent Atyjának eleget tett. \n9. Azért mikor, én Istenem, Akarod, vedd hozzád lelkem, Hogy veled örökké éljek, Reád nézzek, Az angyalokkal örvendjek."},{"m":407,"r":null,"c":"Itt nincs igazi boldogság, Ez az élet csak fényes fogság; Nincsen való","b":"1. Itt nincs igazi boldogság, Ez az élet csak fényes fogság; Nincsen valóságos nyugodalom, Míg be nem fedez a sírhalom. \n2. E világnak kedvessége Tartatlan és keserű vége; A szenvedések és változások Uralkodnak, s itt van lakások. \n3. Csak a sírban van csendesség, Ott van a legnagyobb egyesség; Ott az úr és szolga megegyeznek, Mint csak por, föld: nem különböznek. \n4. Jézus porunkat felkölti, Mikor nyugvását itt kitölti; Lelkünkkel is újra egyesíti És idvességben részesíti."},{"m":408,"r":478,"c":"Seregeknek szent Istene, Mennynek, földnek teremtője, Jövel, jövel, én","b":"1. Seregeknek szent Istene, Mennynek, földnek teremtője, Jövel, jövel, én Krisztusom, Ne hagyj utolsó órámon! \n2. Végy be, kérlek, kegyelmedbe, Idvezítő szerelmedbe, Jövel, jövel, én Krisztusom, Ne hagyj utolsó órámon! \n3. Az egekre tégy méltóvá, Szent hitemben állandóvá; Jövel, jövel, én Krisztusom, Ne hagyj utolsó órámon! \n4. Életemben ki szerettél, Jóvoltodban részeltettél: Jövel, jövel, én Krisztusom, Ne hagyj utolsó órámon! \n5. Áldom azért szent nevedet, Hirdetem dicsőségedet: Jövel, jövel, én Krisztusom, Ne hagyj utolsó órámon! \n6. Testem nyugtasd meg a földbe', Lelkem vidd a magas égbe; Jövel, jövel, én Krisztusom, Ne hagyj utolsó órámon!"},{"m":409,"r":null,"c":"Utas vagyok e világban, Mennyországban Vár örök ha zám készen; A teste","b":"1. Utas vagyok e világban, Mennyországban Vár örök ha zám készen; A testem csak lelkesült por És ha a sor Reá jön, por rá lészen. \r\n2. Minden nap hoz rám fájdalmat: Nyugodalmat Szívem sehol  nem talál. Majd kár ér, majd búbánat sért, Majd bűn kísért, Végre eljön a  halál. \r\n3. Uram, te látod végemet, Mert testemet S lelkemet te  formáltad; Előbb, mint lettek napjaim, Hajszálaim Mind egyig meg számláltad. \r\n4. Lelkemnek földi társától, Sátorától Bizonyos meg válása; De csak annak, ki Istent fél, Kegyesen él, Lesz boldog ki múlása. \r\n5. Atyám, hogy meg ne rettenjek, S bátran menjek A minden test  útjára, Teremts tiszta szívet bennem: Néked élnem Légyen lelkem  fő vágya. \r\n6. Néked, napjaimnak Ura, Akár búra, Akár öröm re juttatsz, Szent megnyugvással engedek; Bár szenvedek, Mindent jómra  fordítasz. \r\n7. Akármikor jön a halál, Készen talál, Fájdalmimnak  vet véget; Bátran fogok vele kezet: Hozzád vezet S ád örök üd vösséget."},{"m":410,"r":473,"c":"Csak vándorút az életem, Míg majd hazámba érkezem, Szent Jeruzsálem vá","b":"1. Csak vándorút az életem, Míg majd hazámba érkezem, Szent Jeruzsálem városába, Mit fönn az Isten készített, Szövetségvérre épített, Hol ajkam majd csak őt imádja; Csak vándorút az életem, Míg majd hazám elérhetem. \n2. Árván megyek az élten át, Nem ismer itt a vak világ; Ott várnak rám a hű testvérek; Ott vár az égi szent sereg; Ujjongva szolgálok neked, És örökké csak érted égek; Ó, Megváltóm, jövel, siess, Szívem csak tégedet keres."},{"m":411,"r":null,"c":"Nem sokáig tart már földi bujdosásom, Atyám hajlékában lesz örök lakás","b":"1. Nem sokáig tart már földi bujdosásom, Atyám hajlékában lesz örök lakásom; A megfáradottnak jó lesz ott pihenni, Küzdelmei után nyugalomra lelni. \n2. Repülj hát én lelkem, repülj bontott szárnynyal: Vár az örökélet a nagy boldogsággal; Nincsen elegyítve az szomorúsággal, Zeng az örömének angyalok karával. \n3. Szerelmes Jézusom, egeknek Királya! Majd ha üt éltemnek utolsó órája, Nyugtassad békében a sírban testemet, Irgalmadból add meg várt üdvösségemet!"},{"m":412,"r":472,"c":"Porok vagyunk, porrá lészünk, E világtól búcsút vészünk, Mint az árnyé","b":"1. Porok vagyunk, porrá lészünk, E világtól búcsút vészünk, Mint az árnyék, elenyészünk. \n2. Itt nincsen semmi állandó, Minden változó, múlandó, Rövid életű, s halandó. \n3. Emberek, tapasztaljátok: Egyaránt tartozik rátok A paradicsomi átok. \n4. Anynyi nyugvó helyet adnak Neked is, mint portársadnak, Ha szemeid elszunynyadnak. \n5. A holtak csendes kertjében Melletted alszik békében, Kit gyűlöltél életében. \n6. Lelkem, ne bízz emberekben, A földi fejedelmekben: Nincsen segítség ezekben. \n7. El kell múlni a porrésznek; Ha kimegy lelkünk, enyésznek: Szándékink mind semmik lésznek. \n8. Így hát múlandó mindenem, Amivel,bírok, csak te nem, Mert örökké élsz, Istenem. \n9. Te vagy lelkem bizodalma, Szívem örök nyugodalma, Hitemnek boldog jutalma. \n10. Ha ostromol a test és vér, Szegény lelkem csak hozzád tér, Uram, kegyelmet tőled kér. \n11. Ha reám kereszt tétetett, Ha megúnom az életet: Vígasztalsz, örök szeretet. \n12. Ha sajtolgat a szegénység: Hozzád vezet a reménység, Édes Atya, nagy Istenség. \n13. Ha rettent halálfélelem: Édes Jézus, te légy velem; Megtartó kezed ölelem. \n14. Erősítsd gyenge hitemet, Halálos küzdéseimet, Segítsd, idvezítsd lelkemet. \n15. Nyugodt lesz így porba szállnom, Végső szómmal ezt kiáltom: Jővel, Úr Jézus, Megváltóm!"},{"m":413,"r":469,"c":"Menj el a te nyugalmadba, Boldog lélek, követünk; Hogy a kívánt nyugal","b":"1. Menj el a te nyugalmadba, Boldog lélek, követünk; Hogy a kívánt nyugalomba' Részt vehessünk, sietünk. Készíts, Uram, e jóra, Hogy midőn amaz óra Eljő, örömmel mehessünk Hozzád, jobbodra ülhessünk."},{"m":414,"r":null,"c":"Megszabadultam már én a testi haláltól, És megmenekedtem minden nyaval","b":"1. Megszabadultam már én a testi haláltól, És megmenekedtem minden nyavalyáimtól, Bűntől, a haláltól, e csalárd világtól, Az örök kárhozattól. \n2. Lelkemet ajánlom a hatalmas Istennek, És testemet hagyom ő anyjának, a földnek; Ez világot pedig az én feleimnek, és a benne élőknek. \n3. A testi halálból megyek örök életre, És megmondhatatlan örömre, dicsőségre, Kit kezdettől fogva a Krisztus megszerzett Az ő benne bízóknak. \n4. Nincsen már hatalma én rajtam az ördögnek, E csalárd világnak, sem a kegyetlen bűnnek, Mert Krisztus elrontá ezeknek hatalmát Az ő szent halálával. \n5. Az Atya Istennek vagyok én szerelmében. Az ő szent Fiának kedvében, kegyelmében: Részessé tett engem minden örökében, Az örök dicsőségben. \n6. Dicsőség tenéked, örök Atya Úr Isten, És tisztesség néked, megváltó Fiú Isten: Teljes Szentháromság egy bizony Istenség Az örök dicsőségben!"},{"m":415,"r":485,"c":"Jer, temessük el a testet, Melyről kétségünk nem lehet, Hogy az ítélet","b":"1. Jer, temessük el a testet, Melyről kétségünk nem lehet, Hogy az ítéletnek napján Fel fog támadni igazán. \n2. Porból való eredete, Azért porrá kell lennie, De majd feltámad a sírból, Mihelyt az Úrnak szava szól. \n3. Az ő lelke örökké él A más világon Istennél, Ki szent Fiának általa Őt a bűntől megváltotta. \n4. Lelke csendességben nyugszik, Teste a földben aluszik, Honnan ítélet napjára Feltámad nagy vigasságra. \n5. Itt volt ő nagy félelemben, De ott lészen csendességben, Örökkévaló örömben És hatalmas fényességben. \n6. Jer, hagyjuk itt őt aludni, Krisztus Jézusban nyugodni, És mi szüntelen vigyázzunk, Mert nékünk is meg kell halnunk. \n7. Erre Krisztus adjon erőt, Ki vérével minket kivett A veszedelmes pokolból És kínból, örök halálból. \n8. Ő mitőlünk dicsértessék, Örökké magasztaltassék Egyetemben az Atyával És Szentlélek Úr Istennel."},{"m":416,"r":467,"c":"Krisztus, én életemnek Te vagy reménysége, Szegény bűnös lelkemnek Örö","b":"1. Krisztus, én életemnek Te vagy reménysége, Szegény bűnös lelkemnek Örök üdvössége. Lészek hát  én csendességben, Bár a ha lál fúlánkjával rettentsen. \n2. Bátran éltem letészem, Mert jutalmát vészem, Elkészítve már nékem Királyi szent székem. Lészek hát  én csendességben, Bár a ha lál fúlánkjával rettentsen. \n3. Megyek hát én örömmel Sion királyához; Ó, Jézusom, vezess el Égi szent Atyádhoz! Örvendj, szí vem, repess, lelkem! Mert léssz menny ben angyali dicsőségben!"},{"m":417,"r":484,"c":"Gyarló testünk porrá lészen, Mivel porból vétetett, A halál vár kit-ki","b":"1. Gyarló testünk porrá lészen, Mivel porból vétetett, A halál vár kit-kit készen, Mert halálra született. A bennünk levő bűnért Ezzel fizetjük a bért: Minden nap, sőt minden óra Emlékeztet koporsóra. \n2. Sírva jöttünk e világra, Sírás közt költözünk el, De ha jutunk boldogságra, Semmit se vesztettünk el. Bár panasz tölti szánkat, Míg megfutjuk pályánkat, Bár e földön csak bujdosunk: Lesz mennyben örök városunk. \n3. Hadd menjen hát kiköltözött Lelkünk jobb hazájába, Testünk a halottak között Hadd nyugodjék sírjába': Nem alszik el örökre, Még boldogabb időkre Tartatik a sír fenekén, Biztatást innen veszek én. \n4. Eljön egykor amaz óra, Melyben a gyász sírhalmok Megnyílnak trombitaszóra S elvész minden hatalmok. Akkor majd lelkünk, testünk Elveszi, mit kerestünk; Szemünk téged is meglát ott, Kit most innen elbocsátott."},{"m":418,"r":482,"c":"Uram, majd egyszer feltámadnak, Kik a sírhalmokban szunynyadnak, Áldot","b":"1. Uram, majd egyszer feltámadnak, Kik a sírhalmokban szunynyadnak, Áldott kezed tágas tért nyitott, Hol a sírdomb húzott kárpitot, Jő majd a boldog kikelet, Elűzi a hoszszú telet. \n2. Boldog, aki nyugszik sírjában A Megváltó szent oltalmában; Bár rágja testét féregsereg, A rög közt is élte szendereg; S jő majd a boldog kikelet: A Góel áll sírja felett. \n3. Áldott légy hát, holtak országa, Az Istennek nagy majorsága; Megfogjuk azt élő hitünkkel, Hogy a halálban nem veszünk el: Jő majd a boldog kikelet, Ha kinyugoszszuk a telet. \n4. Jézus, ki isteni erővel Megvívtál a gyász temetővel, S feltámadtaknak vagy zsengéje, Kössön hozzád szád szent igéje; Téged követvén, úgy éljünk, Hogy sírunktól mi se féljünk."},{"m":419,"r":477,"c":"Már elmégyek az örömbe, Paradicsomnak kertébe, Lészek Istennek kedvébe","b":"1. Már elmégyek az örömbe, Paradicsomnak kertébe, Lészek Istennek kedvébe: \n2. Immáron bételjesedék, Mit éltemben sokszor hallék: Hogy még halálnak fizetnék. \n3. Keresztyén hitnek jutalmát, Már elvészem diadalmát: Az életnek koronáját. \n4. Lelkem Ábrahám keblében, Testem is nyugszik a földben, De vagyok oly reménységben: \n5. Onnét hogy még feltámadok, Krisztus Jézussal vígadok; Azért lelkemnek így szólok: \n6. Siess a boldog városba, Aholott bé vagyok írva A menynyeknek országába. \n7. Drága szép lakó városunk, Hol Istennel együtt lakunk; Krisztus is örökös társunk. \n8. E városnak boldogságát, Tündöklését, gazdagságát, Szent írás mondja mivoltát. \n9. Abban, úgymond, nem szükséges Napfény, s hold nem kellemetes: Isten benne fényességes. \n10. Keserűség, sem irígység, Nincs ott sántaság, betegség, Nincsen ott nyomorult vénség. \n11. De mindnyájan feltámadván, Lészünk erős állapotban Krisztus ítéleti után. \n12. Ott nincs továbbá kevélység, Nem uralkodik az éhség: Szeretet lesz az elégség. \n13. Lészünk hívek egy seregben, Mind egyenlő dicsőségben, Szent Pál mondja levelében. \n14. Gerjedez együtt szerelmünk, Istenünkhöz tiszteletünk; Arról el nem feledkezünk. \n15. Az angyalok, pátriárkák, Apostolok és próféták: Megismernek atyánk s anyánk. \n16. De még nagyobbnak mondatik, Hogy Isten veünk lakozik, Kinek dicsőség adassék!"},{"m":420,"r":null,"c":"Életemnek végső napját, Minthogy már elértem óráját, Testem leteszi bű","b":"1. Életemnek végső napját, Minthogy már elértem óráját, Testem leteszi bűnének zsoldját, Bátran megvívja halálbaját. \n2. Lelkem érzi, hogy testemtől, Meg kell válnia ez élettől, Tudja: búcsút vészen földiektől, Mert így van rendelve Istentől. \n3. Azért dolgát ő is bízza Istenre, ki magához hívja; Elhitte, hogy Krisztus őt nem hagyja, E harcban segedelmét nyújtja. \n4. Támadjon fel bár a Sátán, De nincs hatalom botja vállán; Nem örülhet soha lelkem kárán: Megváltott vagyok Krisztus árán. \n5. Isten ellen hogy bűnt tettem, Ezért akkor pereljen velem. Tudom: fortélya nem árt ellenem, Mert részes velem a kegyelem. \n6. Igyekezzék érdememtől, Eltiltani Idvezítőmtől, Kifogni a hívek számok közűl: Isten már nem ád ki kezéből. \n7. Enynyi ellenségim között Krisztus, ki magának gyűrűzött Nem hágy, mert jó reménységet szerzött. Kit nálam mindeddig megőrzött. \n8. Édes Jézus, segedelmem! Kérlek, már légy jelen mellettem, Pályafutásom ha elvégeztem, Letett jutalmát add meg nekem! \n9. Angyali tábor ne késsék, Kik lelkem hozzád felkísérjék, Ábrahámnak kebelébe vigyék, Hol Lázárral együtt nyúgodjék. \n10. Feltámadás felől hitem, Vagyon állhatatos értelmem, Jó bizodalom, reménység engem Táplál, mert kész életre mentem. \n11. Ha porrá változik testem, De hiszem, hogy én Idvezítőm Ezen testben szemeimmel nézem, Mikor eljő, mint én Ítélőm. \n12. Nem lesz nekem félelmemre, Ha mondatik, hogy ítéletre, Keljetek fel, holtak, számvetésre, Mert eljött Bíró fizetésre. \n13. Bátran a trombita szóra, Angyaloktól fúvallására Feltámad testem, mert vígasságra, Mennybe vitetik boldogságra. \n14. Áldott Jézus, végső szómat, Halljad, elégeld meg harcomat, Terjeszd ki lelkemnek szent markodat. Részeltesd velem országodat! \n15. Hol színről-színre Atyánkkal, Ezt kiáltsam Boldog juhokkal: Dícsértessél, Atyám, szent Fiaddal, Szent, szent, szent légy ajándékoddal!"},{"m":421,"r":314,"c":"Tudom, az én Megváltóm él,  Hajléka készen vár reám; Már int felém és","b":"1. Tudom, az én Megváltóm él,  Hajléka készen vár reám; Már int felém és koronát  Ígér a földi harc után. Bár a világ gúnyol, nevet, A honvágy tölti lelkemet, Mert nemsokára hív az Úr:  Jöjj haza, jővel, gyermekem! Kitárt karjával vár az Úr:  Jer, pihenj, nyugodj keblemen! \n2. Remélek Jézusomban én,  Ő törlé el sok bűnömet; Ajkáról hívón zeng felém:  „Jer haza, vár rád Mestered!\" Bár a világ gúnyol, nevet, A honvágy tölti lelkemet, Mert nemsokára hív az Úr:  Jöjj haza, jővel, gyermekem! Kitárt karjával vár az Úr:  Jer, pihenj, nyugodj keblemen! \n3. Előttem oly csudálatos,  Hogy értem szállt a földre le; Miattam anynyit szenvedett,  Bűnömért anynyit véreze. Bár a világ gúnyol, nevet, A honvágy tölti lelkemet, Mert nemsokára hív az Úr:  Jöjj haza, jővel, gyermekem! Kitárt karjával vár az Úr:  Jer, pihenj, nyugodj keblemen! \n4. Tudom, hogy közel Mesterem,  Az óra fut, a nap közel; Elébe állok csakhamar,  Megváltó Jézusom, jővel! Bár a világ gúnyol, nevet, A honvágy tölti lelkemet, Mert nemsokára hív az Úr:  Jöjj haza, jővel, gyermekem! Kitárt karjával vár az Úr:  Jer, pihenj, nyugodj keblemen!"},{"m":422,"r":null,"c":"Hadd menjek, Istenem, Mindig feléd, Fájdalmak útjain Min dig feléd. Ó,","b":"1. Hadd menjek, Istenem, Mindig feléd, Fájdalmak útjain Min dig feléd. Ó, sok keresztje van, De ez az én utam, Mert hozzád visz, Uram, Min dig feléd. \n2. Ha este száll reám S csöndes helyen Álomra hajtanám Fá radt fejem: Nem lesz hol nyughatom, Kő lesz a vánkosom, De álomszárnyakon Szál lok feléd. \n3. Szívemtől trónodig -mily szent csoda- Menynyei grádicsok Fé nyes sora, A szent angyalsereg Mind nékem integet; Ó, Uram, hadd megyek Én  is feléd! \n4. Álomlátás után Hajnal ha kél, Kínos kővánkosom Meg áldom én. Templommá szentelem, Hogy fájdalmas szívem, Uram, hozzád vigyem, Min dig feléd! \n5. Csillagvilágokat Elhagyva már, Elfáradt lelkem is Ha zatalál. Hozzád ha eljutok, Lábadhoz roskadok: Ottan megnyughatok Ö rökre én!"},{"m":423,"r":null,"c":"Akik bíznak az Úr Istenben, El nem vesznek életükben: Megtartatnak keg","b":"1. Akik bíznak az Úr Istenben, El nem vesznek életükben: Megtartatnak kegyelemben. \n2. Az Istennek szent beszédében, Kik maradnak szerzésében, Hitük által idvességben: \n3. Ezek lésznek nagy erősségben, Mint egy kőszál, keménységben: Megtartatnak kegyelemben. \n4. Sokszor esne kísértésekben, De ők el nem vesznek ebben: Megmaradnak igaz hitben. \n5. Akik pedig hitetlenségben Élnek és nagy kevélységben: Mind elvesznek azok ebben. \n6. De a hívek nagy békességben, Lésznek örök dicsőségben: Hitük által idvességben."},{"m":424,"r":364,"c":"Ó, mely boldog az oly ember éltében, Akit az Isten bévett kegyelmében,","b":"1. Ó, mely boldog az oly ember éltében, Akit az Isten bévett kegyelmében, És megbocsátá az ő vétkeit, És befedezte minden bűneit. Boldog, akinek ő nagy hamissága Istentől néki nincs tulajdonítva, És csalárdság nincsen ő szivében, Tettetés nélkül jár életében. \n2. Hogy bűnömet el akarám hallgatni, És neked meg nem akarám vallani, Csontjaim ottan elszáradának Soksága miatt én siralmimnak, Mert éjjel-nappal kezed nehéz volta Nagy bűneimért rajtam fekszik vala, Elfogya bennem minden erősség, Mint nyári hévségben a nedvesség. \n3. De hogy bűnömet előtted megvallám, Nagy vétkeimet el nem hallgathatám, De híven előbeszélém neked: Ott bocsánatot nyerék tetőled. Azért az Úr Istennek minden hívek Könyörögjenek, míg vagyon idejek, Mert ha nagy árvizek jönnének is, De nem árthatna ezeknek mégis! \n4. Te vagy oltalmam, őrizz meg engemet, Minden gonosz ellen tartsd meg lelkemet, Vigasztalj meg, hogy örvendezhessek, És vígan néked énekelhessek! Tanítlak téged, úgy mond az Úr Isten, És vezérellek az igaz ösvényen, Szememmel mindig reád vigyázok, És igazgatlak, rád gondot tartok."},{"m":425,"r":227,"c":"Ó, Ábrahám Ura, Hadd áldjuk szent neved, Mert mindenható vagy és örök","b":"1. Ó, Ábrahám Ura, Hadd áldjuk szent neved, Mert mindenható vagy és örök szeretet. Nagy Isten a neved, Ezt vallja föld és ég, Csak téged illet tisztelet és dicsőség. \n2. Ó, Ábrahám Ura, Ím, hallom szent szavad; Csak azt az üdvöt keresem, mit kezed ad. A múló földi jót És vágyát elhagyom, S őt választom, ki őrizőm és pásztorom. \n3. Ó, Ábrahám Ura, Szent kegyelmed nekem Az én örömöm, utamon ez vezessen. Te barátod lettem, Én Istenem te vagy: Tarts meg a Jézus véréért és üdvöt adj! \n4. Megesküvél, Uram, És igédben bízom, Hogy égbe viszed gyermeked sasszárnyakon. Meglátom Jézusom És áldom hatalmát, Szent kegyelmének éneklek halleluját."},{"m":426,"r":366,"c":"Már keresz tem  vállra vettem S érted mindent el ha gyok. Mindenem  va","b":"1. Már keresz tem  vállra vettem S érted mindent el ha gyok. Mindenem  vagy,  árva lettem, Honjavesztett szív  va gyok. Vágyat, célt a múltnak adtam, Nincs már bennem vak remény, Mégis gaz dag  úr maradtam: Isten és a menny  e nyém. \n2. Ember bánt hat  és zavarhat: Szíved áldott me ne dék; Sorsom pró bál  és sanyargat: Édes csenddel vár  az  ég. Nincsen búm, mely könynyet adjon, Míg szerelmed van velem, Nincs öröm,  mely  elragadjon, Hogyha nem benned  le lem. \n3. Lelkem, tel jes  üdv a részed, Hagyd a bút s a gon dot  el; Légy vidám,  ha  meg-megérzed: Tenni kell még s tűr ni  kell. Gondold el: ki Lelke éltet, Milyen Atya mosolya; Megváltód  meg halt teérted: Mit bánkódnál, menny- fi a? \n4. Kegyelem ből  dicsőségbe Szállj, hited majd szár nyat  ad, S az örök  menny  fénykörébe Bévezet majd szent  U rad. Véget ér itt küldetésed, Elszáll vándoréleted, Üdvösség gé  lesz reményed, Égi látássá  hi ted."},{"m":427,"r":365,"c":"Lelkem hozzád kíván menni, Veled lenni, ó, életem kővára, Mert nálad t","b":"1. Lelkem hozzád kíván menni, Veled lenni, ó, életem kővára, Mert nálad talál oltalmat, Nyugodalmat, Te lehetsz várt javára. \n2. Nem bízhatom érdememhez, Mert fejemhez Köttetett a gyarlóság; Ha vizsgálom testem s vérem, Megesmérem: Nincs bennem semmi jóság. \n3. Az úrnak parancsolatját, Akaratját, Ó hányszor hágtam által! Hányszor volt munkám éretlen És rendetlen Erőtlenségem által! \n4. Ha lelkem gerjed a jóra, Majd sátora, A halandó romlott test Készségét balra fordítja, Megtompítja, Hogy légyen a jóban rest. \n5. Ezért gyakran azt mívelem, Ha nincs velem Az Úrnak segedelme, Miről tudom, hogy helytelen, Törvénytelen S lelkemnek veszedelme. \n6. Ily bűnös gyarló voltommal, Oltalommal Ügyemben nem lehetek, Tettető igazságomért Jutalmat s bért Hasztalan követelek. \n7. Mert ki saját erejének, Érdemének Nagyságát veti, hányja, Szükség: légyen feddhetetlen Okvetetlen, Mint a törvény kívánja. \n8. Tudom, hogy a kegyességnek És hűségnek Vagyon drága jutalma; De azt adja kegyelemből, Nem érdemből Az Istennek irgalma. \n9. Én azért ez oltalomhoz, Mint kőfalhoz Egyedül támaszkodom; Jézusomnak kegyelméhez, Érdeméhez Jó hittel ragaszkodom. \n10. Te pedig, ki által élek, Ó Szentlélek, Úgy igazgasd dolgomat, Hogy e jót nálam tarthassam S megmutassam Hálaadó voltomat."},{"m":428,"r":null,"c":"Látod, Úr Isten, szívünket, Tudod erőtlenségünket, Nem rejtjük el bűne","b":"1. Látod, Úr Isten, szívünket, Tudod erőtlenségünket, Nem rejtjük el bűneinket: Várjuk kegyelmességedet. \n2. Mindnyájan arcra borulunk, Szent Atyánk, hozzád kiáltunk: Felejtsed el bűneinket, Tengerbe el-bévesd őket. \n3. Világosítsad elménket, Gerjeszd fel a mi szívünket, Hogy dícsérhessünk tégedet, És áldhassuk szent nevedet. \n4. Hajlékoddá mi szívünket Szenteljed, kérünk tégedet; Szíveinkben lakodalmat Szerezz, és nagy nyugodalmat. \n5. Így cselekedjél mivélünk Szent Fiadért, ki minékünk Nálad bizonyos reményünk, Hozzád egyenes vezérünk."},{"m":429,"r":367,"c":"Az Úr énnékem hűséges vezérem, Főpásztoromnak csak őtet ösmérem; Drága","b":"1. Az Úr énnékem hűséges vezérem, Főpásztoromnak csak őtet ösmérem; Drága jóvoltát elrejtem szívemben, Szent nevét áldom egész életemben, Mert kegyelméből én érdemem felett Sok lelki jókkal engemet körülvett. \n2. Szent beszédének gyönyörűségével, Áldott lelkének titkos erejével Sötét álomból híven felébresztett, Az én szívemben oly hitet gerjesztett, Mely bánatában lelkem vidámítja, jó reménységgel naponként újítja. \n3. Sőt, hogy még inkább érezzem kegyelmét, Várjam bizonynyal ígért segedelmét: Jósággal teljes, édes indulatja Sákramentomit vélem kóstoltatja, Így édesíti szívemet magához, Hogy erős hittel fussak oltalmához. \n4. Csak az szívemnek hozzád óhajtása, ó, idvességnek fakadó forrása: Ha kegyelmedből már Atyámmá lettél, Végezd el a jót, amit elkezdettél; Reménységemnek add meg kívánt végét: Az én lelkemnek örök idvességét."},{"m":430,"r":368,"c":"Úr Jézus, idvesség fejedelme, Én életemnek hű segedelme, Megtérek hozz","b":"1. Úr Jézus, idvesség fejedelme, Én életemnek hű segedelme, Megtérek hozzád hálaadással, Szent neved áldom énekmondással, Emlékezeted elrejtem szívemben, Rólad éneklek egész életemben. \n2. Mert gyarló voltom bűnben eredett, De nagy kegyelmed rám kiterjedett, Istenem voltál kezdettől fogva, Nem hagytad a bűnt, hogy tartson fogva, Sőt a világtól engem elszakasztál, Szent szerelmedből magadnak választál. \n3. Eljegyzél kegyelmed pecsétjével, A keresztségnek drága vizével, Zászlód alá én nevem beírtad, Néped közé szolgád befogadtad, Erőtlenségem lelked segítette, Házad javait velem éreztette. \n4. Testtől születtem s merő test voltam, Bűnöm sírjában szinte megholtam, Ámde szent véred drága hullása Lőn én lelkemnek megtisztulása, Újjászült Lelked, hathatós voltával, Felékesített égi koronával. \n5. Hát világ, test, bűn, tőlem távozzál, Bennem nincs részed, bármit okozzál! Uram pecsétjét én reám vettem, Már kegyelméből tagjává lettem, Fejedelmemnek csak őtet esmérem, Igéje s Lelke lesz holtig vezérem. \n6. Téged is kérlek, ó áldott Lélek, Vezess a jóban, amíglen élek, Hogy a bűnöknek épen meghaljak, Szent életet kövessek és valljak, Hogy az én Uram engem megkedveljen És végre bennem öröme beteljen."},{"m":431,"r":null,"c":"Úr Isten, kérünk tégedet: Keresztelj és moss meg minket, És tisztíts m","b":"1. Úr Isten, kérünk tégedet: Keresztelj és moss meg minket, És tisztíts meg kegyesen; A Krisztusnak ő vérével Nagy bűneinket töröld el Szentlelked erejében. Amit e szent fürdő jegyez, Mindent mi bennünk megszerezz: Végy körül szerelmeddel, Hogy a te szövetségedben Megmaradjunk mind végiglen, Minden mi gyermekinkkel."},{"m":432,"r":null,"c":"Mi kegyes Atyánk, bölcsességnek Ura, És mindeneknek nagy bölcs tanítój","b":"1. Mi kegyes Atyánk, bölcsességnek Ura, És mindeneknek nagy bölcs tanítója: Akinek nem vagy te igazgatója: Nincs oktatója. \n2. Mi, te fiaid, tudatlanságunkban, Gyermekségünkben és ifjúságunkban, Néked könyörgünk mi tanulásunkban, Imádságunkban. \n3. Világosítsd meg tudatlan elménket, Tanulásunkban vezérelj bennünket, A tudományra gerjeszd fel szívünket És mi lelkünket. \n4. Adj jó tanító mestereket nékünk, Adj bölcsességet általuk minékünk, Adj jó erkölcscsel, értelemmel élnünk, Mi jó Istenünk! \n5. Őrizz meg minket gonosz erkölcsöktől, Minden naponként fertelmes beszédtől, Szent színed előtt utált részegségtől, Éktelenségtől. \n6. Hogy jövendőre mi felnevekedvén, Téged dicsérjünk, mindenkor tisztelvén, Felmagasztaljunk, nagy jámborul élvén, Néked engedvén. \n7. Hogy szolgálhassunk te szent egyházadnak, És használhassunk felebarátinknak, De kiváltképpen atyánknak s anyánknak, Édes hazánknak. \n8. Hogy holtunk után a nagy iskolában, Szentháromságnak ő tanításában, Az angyaloknak szép társaságokban Tanuljunk jobban. \n9. Dicsőség néked, kegyes Atya Isten, És uralkodó áldott Fiú Isten! Te, vigasztaló Szentlélek Úr Isten! Áldj meg hitünkben!"},{"m":433,"r":null,"c":"Áldjad, én lelkem, felséges Uradat, Dícséretére emeld fel szavadat, Jó","b":"1. Áldjad, én lelkem, felséges Uradat, Dícséretére emeld fel szavadat, Jóvoltát hirdesd lelki örömmel! Terólad, Uram, csak rólad éneklek, Mindenek felett Tégedet szeretlek, Mert voltál hozzám nagy kegyelemmel. \n2. Gyarló éltemnek kezdetitől fogva Tartott kegyelmed én kezemnél fogva, Te szent szemeid én reám néztek; Erőtlen voltom még gyenge korában Talált nyugalmat szárnyad árnyékában, Midőn mellőlem sokan elvesztek. \n3. Keresztyén szülék által felneveltél, Engem, méltatlant, frigyedbe bévettél, Tettél házadnak élő tagjává. Szent irgalmadból énreám is tére Áldott Fiadnak drágalátos vére, Hogy a bűn ne tenne prédájává. \n4. A keresztségnek külső fürdőjével, Mint kegyelmednek bizonyos jelével Megmosád gyenge s erőtlen testem; Így szent házadban engem béavattál, A pogányoktól híven elszakasztál, Midőn én azt még nem is kerestem. \n5. Bízzál hát, lelkem, a te Istenedben, Ki Atyáddá lett még gyengeségedben. Mint a vízzel megmosá testedet, Úgy szent Fiának drága érdemével, Azzal érdemlett áldott Szentlelkével Bűneidből megtisztít tégedet. \n6. Tehozzád is, csak tehozzád emelem Szívemet, ó nagy jóság és kegyelem; Idvességemet tetőled várom. Ne hagyj el engem, ha Istenem lettél, Végezd el a jót, amit elkezdettél, Ó én Uram, Atyám és kővárom."},{"m":434,"r":397,"c":"Vezess, Jézusunk, S véled indulunk. Küzdelemre hív az élet, Hadd köves","b":"1. Vezess, Jézusunk, S véled indulunk. Küzdelemre hív az élet, Hadd kövessünk benne téged; Fogjad a kezünk, Míg megérkezünk. \n2. Adj erős szívet, Hogy legyünk hívek. És ha terhet kell viselnünk, Panaszt mégsem ejt a nyelvünk; Rögös bár utunk, Hozzád így jutunk. \n3. Sebzett szívünk majd Mikor felsóhajt, Vagy ha másért bánat éget, Adj türelmet, békességet, reménynyel teli Rád tekinteni. \n4. Kísérd lépteink Éltünk végéig, És ha roskadozva járunk, Benned támaszt hadd találunk, Míg elfogy az út S mennyben nyitsz kaput."},{"m":435,"r":null,"c":"Lelkem siet hozzád menni, Ámbár gyenge ereje, Kíván asztalodról enni,","b":"1. Lelkem siet hozzád menni, Ámbár gyenge ereje, Kíván asztalodról enni, Ó, életnek kútfeje! Hogy megelégülhessen, Benned része lehessen. \n2. Kedveld, Uram, kegyességét A te szegény szolgádnak, Éreztessed édességét Elkészült vacsorádnak, Hogy véled egyesüljön S lelke benned örüljön."},{"m":436,"r":377,"c":"Örülj, szívem, Vigadj, lelkem, Ékességed lett a hit; Vacsorához, Mégy","b":"1. Örülj, szívem, Vigadj, lelkem, Ékességed lett a hit; Vacsorához, Mégy Jézushoz, Hivatalos vagy te itt. \n2. Ha bűnödért Halálos bért Érdemlettél lelkedre: E szent asztal Megvigasztal S válik idvességedre. \n3. Ez örömben, Reménységben, Jézus, ma hozzád jövök. Asztalodnál Lábam megáll: Testem, lelkem újítsd meg. \n4. Tisztogass meg, Bűnből moss meg Kegyelmedből, Istenem, És a Sátán lelkem kárán Nem örül, nem árt nekem. \n5. E vacsora Égi módra Engem véled öszszead, Maradj Bennem, benned engem Hagyj lennem, hogy áldjalak. \n6. Csakhogy immár Bűntől elválj S légy hívséggel Jézushoz: Halálával, Váltságával Minden bűnből feloldoz. \n7. Hát jöjjetek, Bűnös lelkek, Orvosságot kik vártok! Jézus lelke, Szent kegyelme Kiárad ma reátok."},{"m":437,"r":371,"c":"Ó, Jézus, mi idvességünk, Fejedelmünk, dicsőségünk, Szívünknek fő viga","b":"1. Ó, Jézus, mi idvességünk, Fejedelmünk, dicsőségünk, Szívünknek fő vigasztalója! Rólad, csak rólad énekel Szánk buzgó dicséretekkel, Lelkünknek édes táplálója; Egyedül csak hozzád térünk, Mert hű pásztornak ismerünk. \n2. Ó, mily szent az az indulat, Mely veled örömest mulat, Ó, Jézus, idvesség forrása! Boldog, akit hívsz magadhoz, Méltóztatsz szent asztalodhoz, Hogy kegyelmed jelét ott lássa. Bizony, boldog az oly ember, Ki nálad kedvességet nyer. \n3. Mert érdemedben részesül, Teveled, Uram, egyesül, Ki hív tagja e vendégségnek. Mint a bort s kenyeret veszi, Akképp részesévé teszi A hite őt az idvességnek, Melyhez ártatlan Jézusunk Vére által vagyon jussunk. \n4. Azért, kit bűnök rongálnak, Járulj e kegyes királynak Víg örömmel szent asztalához! Nem vet el ez irgalmas szív, Mert könyörülő, igaz, hív, Csak hogy folyamodj oltalmához: Bévesz sebe rejtekébe, Mint ígéri szent jelébe. \n5. Nincs is egyébben oltalmunk, Reménységünk, bizodalmunk, Édes Jézus, hanem csak benned. Szállj hozzánk, kedves vendégünk, Oltsd meg lelki nagy éhségünk, Mert eledelünk csak érdemed; Szívünket, ímé, kitárjuk, Szentségedet várván várjuk."},{"m":438,"r":373,"c":"Hallottuk, Jézus, miképpen hívogatsz, Sietünk hozzád, tudjuk, hogy meg","b":"1. Életnek vize, nyiss magadnak utat, A szomjú hívek keresik e kutat; Szolgáltasd ingyen az italokat: Oltsd el végképpen szomjúságukat."},{"m":439,"r":375,"c":"Én lelkem, ébredj fel az Úrnak dicséretére, És szent emlékezetére Víg","b":"1. Én lelkem, ébredj fel az Úrnak dicséretére, És szent emlékezetére Víg szívvel gerjedjél. Kegyelmét keressed E te lelki orvosodnak, Hű és édes táplálódnak Jóvoltát hirdessed. \n2. Mert éhező valál, A szomjúság elepesztett, A bűn oly kútba rekesztett, Hol kész volt a halál. De lelke megesett Rajtad e kegyelmes Úrnak, Látván, nyavalyáid dúlnak, Téged felkeresett. \n3. A kútból kihozott, Az igazságnak mezején És az életnek kútfején Vezérlett, hordozott. Végre vitt magához, Bíborban felöltöztetett, És kegyelméből ültetett Ő szent asztalához. \n4. Hol megelégített Megtöretett szent testével És kifolyt drága vérével, melyet elkészített. Boldog, ki ezzel él, Mert a Sátán annak nem árt, Semmi veszély nem tehet kárt, A haláltól sem fél. \n5. Azért, kik éheztek, Jertek az Úr asztalához, Siessetek jóvoltához, És megelégesztek. Mert az Úr nem hagyja A töredelmes lelkeket, Sőt táplálja mindezeket: Magát nekik adja. \n6. Mint a száj részesül A látható szent jegyekben, Úgy e nagy Úr a hívekben Él, s vélek egyesül. Lesz édes dajkájuk: Megtöretett szent testének, Kiontott drága vérének Hasznát szabja rájuk. \n7. Hát lelkem, tégy vallást, Hogy igaz szívvel szereted Ez Urat, s híven követed, És néki adsz szállást. Jöjj be hozzám, kérlek, Jézus, én kedves vendégem, Mert te vagy én dicsőségem, Csak téged kedvellek."},{"m":440,"r":376,"c":"Jer, lássuk az Úr keresztjét, Melyet felvett érettünk, Megszánván embe","b":"1. Jer, lássuk az Úr keresztjét, Melyet felvett érettünk, Megszánván embernek vesztét, Megfizete helyettünk. Úr lévén, lett szolgává, Mindeneknek csúfjává, Istenségét elrejtette, Midőn testünket felvette. \n2. A Gecsemáné kertjében Kezdette szenvedését Érezvén a kínt lelkében S a halál rettentését, Ivék keserű pohárt, Fizette értünk az árt; Véres cseppjei testének Nékünk gyógyulást szerzének. \n3. Itt szintén lelkéig hata Sebes vizek mélysége, Itt kezdődék a nagy csata S lelke keserűsége: Egyedül hagyattaték, Éjjel megfogattaték; Ki mindent kézen fogva tart, Megfogattatni így akart. \n4. Feszítésre ítélteték S gyalázatos kínokra,pilátushoz vitetteték, Önként ment ez átokra. Ki ügyét hogy meghallá, Őt ártatlannak vallá, Mégis adá keresztfára, A legkínosabb halálra. \n5. Mint Prófétát, csúffá tették, Mert befedvén szent fejét, Verték, s ki verte? kérdezték, Kísértvén szent erejét. Mint Királyt, meggyalázák, Tövissel koronázák, Náddal verék a bársonyban, Csúfolák térdhajtásokban. \n6. A fát adván szent vállára, Mint Pap, meggyaláztaték, Az is lőn gyalázatjára, hogy megostoroztaték. A vitézek kifoszták, És ruháit megoszták; A nagy bűnöst elereszték, A szentet fára függeszték. \n7. Mily csuda buzgó szerelem: Meghalni barátiért, De e kegyes Fejedelem Meghalt ellenségiért. Ez lelkünk drága bére, Mert Isten fia vére: Mily drága az az áldozat, melylyel romol a kárhozat. \n8. Ezért szerzé szent asztalát, Hogy e jót előadja, Szenvedését és halálát Szemeink előtt hagyja. A kenyér megtörése, A bornak kitöltése Lelke, teste szenvedését, Jelenti megöletését. \n9. Ez egyszerű vendégségben Jézussal egyesülünk, Egy kenyérből e szentségben Hívők mind részesülünk. E rövid szent vacsora Mutat menynyei jóra; Ezt az ő kínt látott teste Választottinak kereste. \n10. Az Úr sebei mi sebünk, Halálunk ő halála; Ő érdeme mi érdemünk, Részesülés ez nála. Pecsétli ezt az étel, Együtt a pohárvétel: Testét midőn hittel eszszük, Magunk ő testévé teszszük. \n11. Ez eledel zálog nékünk, Hogy lesz mennyben menyegzőnk, Ezzel hitünk, reménységünk: Öregbül lelki erőnk. De mit ér sokszor enni, E szent vacsorát venni, Ha lélek szerint nem élünk, Büntetést enni nem félünk?! \n12. Ha meghaltunk Úr Jézussal, Nem illik már vétkeznünk; Feltámadván Úr Krisztussal, Le kell a bűnt vetkeznünk. Mint menynyei lakosok, Legyünk tiszták s okosok; Mint testének s vendégének, Szükséges lennünk szenteknek. \n13. Isten ártatlan Báránya, Méltó vagy, hogy végy áldást, Mert érdemed azt kívánja, Végy tőlünk hálaadást! Végy örök dicsőséget, Hatalmat, tisztességet, Mert értünk megölettettél, Atyádnak eleget tettél. \n14. Add, Úr Jézus, halálodban, Követnünk életedben, Szentséges tudományodban, Szelíd szenvedésedben. Légyünk alázatosak. Mindenhez irgalmasak; Segélj erre Szentlelkeddel, Oktass, vezérelj igéddel!"},{"m":441,"r":378,"c":"Kegyes Jézus, én imádságomra, Hajtsad füled én kiáltásomra, Jusson hoz","b":"1. Kegyes Jézus, én imádságomra, Hajtsad füled én kiáltásomra, Jusson hozzád kérésem én jómra, Ne nézz, Uram, méltatlan voltomra! \n2. Szomorkodom undok bűneimért, Fohászkodom sok gonoszságimért, Félek, Uram, mert sok rútságimért Megutáltál, tudom, én bűnömért. \n3. Tökéletes a te ítéleted, Tiszta, szent vagy, a bűnt nem nézheted, A vakmerő bűnöst megbünteted, Országodból méltán kirekeszted. \n4. Félek, azért megvallom, Istenem, Hogy ha úgy bánsz, mint érdemlem, velem, Szent színedet elfordítod tőlem, Országodból kirekeszted lelkem. \n5. Mert ha végignézek életemen, Látom, hogy a bűnt gyermekségemen Kezdettem, és azóta szüntelen Növekedett a teher lelkemen. \n6. Múló hasznát a bűnnek szerettem, Törvényedet azért félretettem; Felebarátomat sértegettem, Melyért hozzád méltatlanná lettem. \n7. De ez egyben biztatásom lelem, Hogy tenálad vagyon a kegyelem; Azért hozzád szívemet emelem: Cselekedjél irgalmasan velem. \n8. Mert nem azért vetted fel testünket, Hogy megítélj bűnünkért bennünket, Hanem hogy megszabadítsd lelkünket és megszerezd örök életünket. \n9. A megtérő bűnösnek kedveztél, Bűnbocsátó kegyelmet ígértél, Isten előtt érte kezes lettél, Minden átkot fejéről elvettél. \n10. Kívánkozom én is hozzád térni, Segélj, Uram, e szent célt elérni, Mert így lehet kegyelmedet kérni, Így lehet csak tőled azt megnyerni. \n11. Segélj, segélj, én édes Istenem! Néked adom s ajánlom ma lelkem: Kérlek, fogadd magadhoz, Jézusom, Idvességem s életem, Krisztusom! \n12. Míg itt élek, éltem vezéreljed, Tartóztasson a bűntől törvényed; Minden jóra segéljen Szentlelked, Kegyelemmel biztasson érdemed. \n13. Mikor érzem halálom óráját, Biztass, hogy jól kifutván a pályát, Majd meglátom az Isten orcáját, Elnyerem az élet koronáját."},{"m":442,"r":null,"c":"Idvességünk, váltságunk, Jézus! hozzád kiáltunk; Midőn a kegyelem aszt","b":"1. Idvességünk, váltságunk, Jézus! hozzád kiáltunk; Midőn a kegyelem asztalához lépünk: Jövel, maradj mivélünk! \n2. Nagy volt szüleink bűne, De Atyád könyörüle; És az örök halál tüzéből megváltott Engesztelő halálod. \n3. Ez a terített asztal Bűneinkben vigasztal: Hogy könyörülsz rajtunk s kegyelmed velünk lesz, Ha bízunk érdemedhez. \n4. Szent testednek jegyei Annak itt a jelei: Hogy csak az igazán megtérő találhat Idvességet tenálad. \n5. Vérednek kiömlése Bűneink eltörlése; Emlékeztess, midőn ajkunk a bort iszsza: Légyen éltünk szent s tiszta! \n6.
