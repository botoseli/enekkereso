kincsével ér tem. \n5. Így szólott Egyszülöttjéhez: Jött irgalomnak é ve, Én diadalmam, menj, siess, Légy népem üdvössé ge, Bűn átkából segítsd ki hát, Fojtsd meg a ráleső halált: Az embert térítsd hoz zád. \n6. S ím, az Atyának engedett A Fiú, hozzám jö ve, Egy tiszta szűztől született Testvéremül a föld re. Járt mint nagy titkos hatalom, Felölté önnön alakom, Hogy a Sátánt lebír ja. \n7. Szólt hozzám: tarts ki már velem, Most célod el kell ér ned, Immár enyém a küzdelem, Kiállok készen ér ted. Te az enyém, én a tied, S hol én vagyok, ott lesz helyed: Szét nem választ az el len. \n8. És bár kioltja életem, És bár kiontja vé rem: Mindezt javadra szenvedem, Hű légy e hitben vé lem. A halált éltem megveszi És szentségem jóváteszi A bűnt, hogy üdvözül hess. \n9. Én az Atyához felmegyek, Ha végeztem a föl dön, Hogy aztán Mestered legyek, A Lelket rád kitöl töm, Ki félelmedben bátorít, S hogy engem ismerj, megtanít És igazságban já rat. \n10. Mit tettem és hirdettem én, Azt kövesd szóban, tett ben, Az Úr országát építvén És dicsőségét egy ben. Ne hagyd, hogy hívság s emberek Megrontsák lelki kincsedet: Ez légyen örök ré szed!"},{"m":299,"r":null,"c":"Jézus hív, bár zúg, morajlik Életünk vad ten gere; Halk hívása tisztán","b":"1. Jézus hív, bár zúg, morajlik Életünk vad ten gere; Halk hívása tisztán hallik: \"jer, kövess, ó, jöjj ide!\" \n2. Vedd a példát Andrástól, ki Hallva hívó szó zatot, hálóját se vonszolá ki: Érte mindent elhagyott. \n3. Jézus hív, hogy Őt imádjad, Megragad, hogy el  ne ess, Mert kísért öntelt világod: „jöjj, engem jobban szeress!” \n4. Ha nehéz az élet terhe, Roskadozva hor dom azt: Bús orcám Hozzá emelve, Jézusban lelek vigaszt. \n5. Uram, hozzám légy kegyelmes, Tedd Tieddé szí vemet, Hadd lehessek engedelmes, Néked élő gyermeked!"},{"m":300,"r":null,"c":"Lelkem drága Jézusa, Hozzád hajt a félelem, Míg üvölt a habtusa, S nő","b":"1. Lelkem drága Jézusa, Hozzád hajt a félelem, Míg üvölt a habtusa, S nő a vész a tengeren, Rejts el, rejts el, itt ne hagyj, Míg eláll a fergeteg; Biztonságos révet adj, S majd fogadd el lelkemet. \n2. Nincs nekem más enyhelyem, Szívem Téged hív s keres, Ó, maradj itt, Mesterem, Őrizz, adj erőt, szeress! Véled állom a vihart, Hit s erő Te vagy, Te Szent, Szárnyad árnyával takard Fejemet, a védtelent. \n3. Csak Te kellesz, én Uram, Benned mindent meglelek; Támogasd, ki elzuhan, Gyógyítsd meg, ki vak s beteg. Szent szavadra hallgatok, Tévedés az én bajom, Én hamisság s bűn vagyok, Te igazság s irgalom. \n4. Kegyelem vagy, égi jó, Mely minden bűnt eltörül, Hagyd, hogy gyógyító folyó Tisztogasson meg belül. Élet-kút vagy, lüktetés, Vízmerítni drága hely, Ó, buzogj fel bennem és Öröklét felé emelj."},{"m":301,"r":265,"c":"Új világosság jelenék, Ó, tévelygés csendesedék; Isten igéje jelenék,","b":"1. Új világosság jelenék, Ó, tévelygés csendesedék; Isten igéje jelenék, Újonnan nékünk adaték. \n2. Evangéliom erejét, Krisztust, áldott szent Igéjét, Atya Isten nagy jó kedvét, Megmutatá ő kegyelmét. \n3. Kit sok száz esztendeiglen Eltitkolt volt Atya Isten, Mint megmondá jövendölvén Ámos próféta könyvében. \n4. Ezt a mi hitetlenségünk És nagy telhetetlenségünk, Érdemlette tévelygésünk, Emberbeli reménységünk. \n5. Igaz az Isten Igéje, Kivel él ember elméje, Kinek megmarad ereje És el nem vész ő reménye. \n6. Kérünk, Úr Isten, tégedet, Erősítsd meg híveidet, Hogy vehessük szent Igédet És vallhassuk te hitedet. \n7. Mert csak te vagy bizodalmunk, Ördög ellen nagy gyámolunk, Testünk ellen diadalmunk, E világ ellen oltalmunk. \n8. Dicsőség légyen Atyának És egyetlenegy Fiának, Ezeknek Ajándékának; A dicső Szentháromságnak."},{"m":302,"r":null,"c":"Ó, népeknek Megváltója, Jővel, szűznek szent Magzat ja, Mert mind ez v","b":"1. Ó, népeknek Megváltója, Jővel, szűznek szent Magzat ja, Mert mind ez világ csudál ja: Istennek szűztől  lesz fi a. \n2. Atyától lőn kijövése, És ahhoz lesz megtéré se; Pokolig lőn leszállá sa, De felmégyen menny ország ra. \n3. Ki Atyával vagy egyenlő, Testben légy nagy győzedel mű; Te isteni nagy erőd ből Ments meg erőtlen ségünk től. \n4. A te jászlad immár fénylik, Az éj megvilágoso dik; Homály, setétség távoz zék, A hitnek vilá ga fényl jék. \n5. Dicsőség légyen Atyának És egyetlen egy Fiá nak Szentlélekkel egyetem ben Most és mind örök ké, Á men."},{"m":303,"r":267,"c":"Jöjj, népek Megvál tója, Szűznek ékes virága, Mind e világ csudálja, M","b":"1. Jöjj, népek Megvál tója, Szűznek ékes virága, Mind e világ csudálja, Mint jöttél, Isten  Fia. \n2. Nem emberi e rőtől, De Szent Lélek Istentől Ige testbe öltözék, Szűz méhe megvi rágzék. \n3. Jöve ágyas há zából, Tiszta szűz szent méhéből; Isten, ember ő egyben, Eljött hozzánk már  testben. \n4. Szent Atyjától föld re jött, Szállt poklokra és győzött, Atyjához emelteték, Ő székibe ül teték. \n5. Atya Isten szent  Fia, E világnak istápja: Gyarló néped sok baja Rád szállt, légy bajví vója! \n6. Jászolod immár  fénylik, Új világa tündöklik, Melytől éj elenyészik, Hitünk megerő södik. \n7. Dicsőség néked,  Urunk, Mi kegyelmes Megváltónk! Dicsőség szent Atyádnak És mi Vigaszta lónknak!"},{"m":304,"r":269,"c":"Kapuk, emelkedjetek! Kiáltó szó hallik, Ím, jő fejedelmetek, Az idő ha","b":"1. Kapuk, emelkedjetek! Kiáltó szó hallik, Ím, jő fejedelmetek, Az idő hajnallik: Harmattal rakott feje, Véle sok áldása, Bétölt teljes ideje, Hogy minden test lássa. \n2. Ímhol jő a Vőlegény, Lelkem, menj elébe, Keresd nyugtod, mint szegény, Gazdag kebelébe’. Kedves vendéget várok, Szívem ajtajárul Hulljanak a závárok, Mert már közel járul. \n3. Már az ég harmatozzon, A föld igazságot, Mint bő gyümölcsöt, hozzon: Indíts vigasságot, Ó, kegyes Immánuel, Mert várlak valóba’; Ó, te kisded Sámuel, Jöjj el már Silóba! \n4. Az utat egyengessed, Szívemben a mérget S ürömgyökért égessed, Lelkemről a kérget, A keménységet vedd ki, Hogy meglágyulhassak, A gazt s gerendát szedd ki Szememből, hogy lássak. \n5. Az Illésnek lelkével Ruházz fel engem is, Szent szerelmed tüzével Égjen én lelkem is. Áldj meg oly kegyességgel, Hogy higygyek és szóljak, Hűségedre hűséggel Másokat unszoljak. \n6. Isten Báránya, jövel, Mutasd szelídséged; Uram, felemelt fővel Várom idvességed. Igazság napja, támadj, Adj világosságot, Magamnak nincs: reám adj Örök igazságot. \n7. Dávid gyökere s ága, Fényes hajnalcsillag, Pogányok kívánsága, megígért áldott mag; Isai törzsökéből Származott veszszőszál: Nékem Atyád kedvéből Erős torony s kőszál! \n8. Bennem az Úr temploma Általad készüljön, veszszen a bűnnek nyoma, Lelked újjászüljön. Méltóztass személyedre E gyarló világon, Dicső jelenlétedre Dűljön le a Dágon. \n9. Tégy szívedre pecsétül, Bélyegül karodra: Így lelked erejétül Élek csak számodra. Mindvégig velem maradj menynyei erővel, Holtom óráján ne hagyj, Jövel, Ámen, jövel!"},{"m":305,"r":261,"c":"Álmélkodással csudáljuk Véghetetlen szerelmed, Ó Isten, ha megvizsgálj","b":"1. Álmélkodással csudáljuk Véghetetlen szerelmed, Ó Isten, ha megvizsgáljuk Kijelentett kegyelmed; Ezt száj ki nem mondhatja, Nyelv nem magyarázhatja. \n2. Mert az emberi nemzetet Anynyira becsülötted, Hogy te egyetlen egyedet Érette elküldötted Emberi ábrázatban, Hogy élne gyalázatban. \n3. Ó Isten bölcseségének Megfoghatatlan titka! Hozzánk való szerelmének Mély tengere! - mily ritka Ki ezt eszébe venné, Mélyen szívébe tenné. \n4. Mi azért vígan dícsérünk ó, jó Atyánk, tégedet, Magasztalunk s arra kérünk, Hogy te szeretetedet gerjeszszed fel szívünkben, Jobban-jobban lelkünkben."},{"m":306,"r":262,"c":"Kegyes lelkek, az Urat dicsérjétek, Áldott Idvezítőnket tiszteljétek,","b":"1. Kegyes lelkek, az Urat dicsérjétek, Áldott Idvezítőnket tiszteljétek, Ki bételjesíté, amit ígére, Magát megalázván Isten létére, Felvevé testünket, Eltörlé bűnünket Szent ártatlan voltával; Fogadjuk hát, midőn Mostan is hozzánk jön, Dicséret mondásával. \n2. Lelkünk sebe már nem gyógyulhatatlan, Mert meggyógyítá azt a halhatatlan; Magára vett minden viszontagságot, Hogy így készítsen lelkünknek váltságot. Felkeresé nyáját, Elvégzé munkáját, Végyen hát dicsőséget! Zengjen annak ének, Ki hozott népének Ily kívánt idvességet! \n3. Ne vess meg, Jézusunk, tovább is kérünk, Légy életünkben hatalmas vezérünk; Szent igéd és Lelked segítsen minket, Hogy meggyőzzük lelki ellenséginket. Aki úgy szerettél, Hogy emberré lettél, Isten lévén, érettünk: Add viszont szeretnünk, Szent példád követnünk, Valamíg tart életünk."},{"m":307,"r":263,"c":"Dícséretet mond nyelve mindennek Tenéked, könyörülő Istennek, Hogy meg","b":"1. Dícséretet mond nyelve mindennek Tenéked, könyörülő Istennek, Hogy meglátván nyavalyás sorsunkat, Elvégezted szabadításunkat, E végre Fiad küldéd e világra, Hogy útat nyisson nékünk mennyországra. \n2. Megaláztad, hogy felmagasztaljon, Ő szomorkodott, hogy vígasztaljon; Szegénységben élt, hogy gazdagítson, Meghalt, hogy minket megszabadítson Kárhozatától az örök halálnak: Ily dolgot még angyalok is csudálnak. \n3. Áldott légy, Atyánk, hogy könyörültél is hozzánk ilyenmegtartót küldtél! Vígy elébb ennek ismeretében, Adj idvességet Fiad nevében; Igaz hit által köss öszsze ővele, Melynek a szeretet légyen kötele. \n4. Tekints Fiadnak szent érdemére, Melyet elődbe tett drága vére; Érte bocsásd meg sok bűneinket, A kárhozattól szabadíts minket, Általa végre hozzád égbe érjünk, Ott szent Fiaddal s Lelkeddel dícsérjünk!"},{"m":308,"r":264,"c":"Igaz Isten, ígéretedben Változhatatlan valóság! Amit te a te beszédedb","b":"1. Igaz Isten, ígéretedben Változhatatlan valóság! Amit te a te beszédedben Megmondasz, az mind valóság. könynyebb megavulni, Végképpen elmúlni A természetnek, Mint semmibe menni Az igaz isteni Szent ígéretnek. \n2. Megmondottad volt még kezdetben Az első egy pár embernek, Hogy ők a szomorú esetben Mindörökké nem hevernek: Küldesz vigasztalót, Ő magvukból valót, Ki eredeti Elvesztett jussukba És boldogságukba viszszahelyezi. \n3. Meglett ez, és a Szűz méhében Fogantatott az, akinek Jézusi felséges nevében Áldás szól a föld népinek. Így az ígértetett És kijelentetett Teljes időnek Hajnala felderült A sötétségben ült Sok kesergőnek. \n4. Lelki örömmel megújulva Imádjuk szent Felségedet, Hogy ismét mireánk fordulva Szemléljük régi kedvedet. Megnyitjuk szívünket, Tárjuk kebelünket, Hogy Jézusunkat Ekképpen fogadjuk, Híven általadjuk Néki magunkat. \n5. Tarts meg bennünket az országban, Melyet ő köztünk állított, Adj részt abban a boldogságban, Melyet a földre szállított! Majd éltünk végével Bocsáss el békével, Hogy oda térjünk, Hol az ő hívei Száma közt menynyei Országlást érjünk."},{"m":309,"r":null,"c":"Menynyei ige, jelenél, Örök Atyától kijövél, Testet magadra felvevél,","b":"1. Menynyei ige, jelenél, Örök Atyától kijövél, Testet magadra felvevél, S abban minket idvezítél. \n2. Te vagy Atyánknak Igéje, Kit Ádámnak megígére, És Ábrahámnak hirdete, Dávidnak is megjelente. \n3. Világosítsd meg elménket, Szenteld meg a mi szívünket, Hogy ismerhessünk tégedet, Útálhassuk bűneinket. \n4. Erősítsd bennünk hitünket, Nyerhessük idvességünket; Te légy minékünk épület, Út, igazság, örök élet. \n5. Hogy mikor eljössz ítélni, Minden szív titkát kivenni, A jóknak minden jót adni, A gonoszokat büntetni: \n6. Akkor tőled bűneinkért Ne vess el; lám te azokért Magas keresztfán ontál vért: Sőt idvezíts érdemedért. \n7. Dícséret és nagy dicsőség, Adassék néked tisztesség, Ki Atyával egy Istenség, Szentlélekkel vagy egy Felség."},{"m":310,"r":266,"c":"Küldé az Úr Isten Hűséges szolgáját Szűzhöz Názáretben Gábriel angyalá","b":"1. Küldé az Úr Isten Hűséges szolgáját Szűzhöz Názáretben Gábriel angyalát Hozzánk jókedvében: \n2. Menj el Máriának E jót megmondani, A régi Írásnak Titkát jelentsed ki Angyali erőddel. \n3. Mondd ezt: ó, szent, kegyes, Üdvözlésem végyed; Ajándékkal teljes, Az Úr van tevéled; Szűnjék hát félelmed. \n4. Szent szűz, méhedbe vedd Az Úr Isten Fiát, Melyben megőrizzed A szüzesség jussát, Minden tisztaságát. \n5. Hallá s elfogadá E parancsolatot, Hivé és fogada Méhében magzatot, De nagy Csudálatost, \n6. Emberi nemzetnek Hű tanácsadóját, Jövendő életnek Maradandó atyját Örök békességben; \n7. Kinek erőssége Minket úgy őrizzen, Hogy a világ vétke Minket meg ne sértsen, Pokolra ne vessen; \n8. De a Bűnbocsátó Végye el vétkünket, Légyen igazítónk S adjon örökséget menynyek országában."},{"m":311,"r":null,"c":"Szent Ézsaiás így ír Krisztusnak szent születéséről, Hogy egy veszszős","b":"1. Szent Ézsaiás így ír Krisztusnak szent születéséről, Hogy egy veszszőszál felnevekedik Jesse gyökeréről. \n2. Ennek gyökerén egy virágocska - ugymond - nevekedik, Kin az Istennek, ő szent Atyjának lelke megnyugoszik. \n3. Győzedelmesnek, nagy hatalmasnak, irgalmasnak vallja, A kegyelemmel és igazsággal őt teljesnek mondja. \n4. Ez által lészen az Úr Istennel nékünk békességünk, Mert közbenjárónk szent Atyja előtt ő lészen minékünk. \n5. Drága jószágot és örökséget szerez ő minékünk, Adósságinkat nagy gazdagsággal megfizeti értünk. \n6. Igazságával mind e világot megítélni fogja, Mert az Úr Isten az ítéletet kezébe bocsátja. \n7. Nagy békességet, lelki örömet hoz ő e világra, Mert birodalmat, nagy királyságot veszen fel vállára. \n8. Általa leszen, hogy a bárányok a farkassal laknak, Semmi bántásuk oroszlánoktól nem leszen juhoknak. \n9. Győzedelmének hatalmasságát valakik meglátják, Krisztus Jézusnak isteni voltát mindazok imádják. \n10. Nagy bátorsággal szegény bűnösök akkor könyörögnek; Krisztus nevében lelki és testi ajándékot vesznek. \n11. Az ő zászlóját felemelteti Anyaszentegyházban, És szent igéjét prédikáltatja e széles világban. \n12. Ezt megcselekszi a seregeknek Ura és Istene, Az Úr Istennek reánk áradott buzgó nagy szerelme. \n13. Nagy vígasságunk, örvendezésünk legyen e vermekben; Mert idvességünk vagyon minékünk szent születésében."},{"m":312,"r":272,"c":"Várj, ember szíve, készen! Mert jő a Hős, az Úr, Ki üdvösséged lészen.","b":"1. Várj, ember szíve, készen! Mert jő a Hős, az Úr, Ki üdvösséged lészen. Szent győztes harcosúl, Fényt, éltet hozva jő, Megtört az ősi átok: Kit vágyakozva vártok, Betér hozzátok Ő. \n2. Jól készítsétek útát! A Vendég már közel! Mi néki gyűlölt, útált, Azt mind vessétek el! A völgyből domb legyen, Hegycsúcs a mélybe szálljon, Hogy útja készen álljon, Ha Krisztus megjelen. \n3. Az Úr elé ha tárod A szív alázatát, Őt nemhiába várod: Betér hozzád, megáld. A testi gőg: halál! De bűnödet ha bánod, Szent Lelke bőven árad, S a szív üdvöt talál. \n4. Ó, Jézusom, szegényed Kér, vár, epedve hív: Te készítsd el: tenéked Lesz otthonod e szív. Jer hű szívembe hát! Habár szegény e szállás, De mindörökre hálás, Úgy áldja Krisztusát."},{"m":313,"r":null,"c":"Dicsérd Istent, keresztyén ség, Ő dicsőségében, Kitől árad rád idves s","b":"1. Dicsérd Istent, keresztyén ség, Ő dicsőségében, Kitől árad rád idves ség, Fia érdemében, Fia ér demében. \n2. Leszállván Atyja keblé ből, Kicsiny gyermek korban, Szegénységben, ruha nél kül Fekszik a jászolban, Fekszik a  jászolban. \n3. Letette minden hatal mát, Erőtelen vala, Felvette szolga formá ját Mindeneknek Ura, Mindenek nek Ura. \n4. Anyjának ölében nyug szik, Tejével táplálja; Az angyalok ezt örven dik, Mert Dávidnak fia, Mert Dávid nak fia. \n5. Ki az utolsó idő ben Eljövendő vala, Hogy építtessék hívek ben Az Isten országa, Az Isten  országa. \n6. Csuda változással tes tet Ő magára felvőn, Adván nékünk idvessé get, Mennyben részessé tőn, Mennyben ré szessé tőn. \n7. Én úr, ő pedig lett szol ga, Ó, csuda változás! Jobbat Jézus mit adhat na: Nékünk boldogulás, Nékünk bol dogulás. \n8. Ma Paradicsom kapu ját Ismét megnyitotta, Kérub nem állja ajta ját, Ezért minden áldja, Ezért min den áldja."},{"m":314,"r":281,"c":"Jézus, születél idvességünkre, Amint régenten vala ígérve, Atya Istenn","b":"1. Jézus, születél idvességünkre, Amint régenten vala ígérve, Atya Istennek nagy szerelme, Emberi nemhez tetszik ebbe Kegyessége. \n2. Első szüleink vétkei miatt És az ördögi csalárdság miatt Hoztunk magunkra örök halált, És kárhozatot, pokol kínját, sok nyavalyát. \n3. Nem volt senki sem, ki megmentene, Ámde szent Atyád megkönyörüle, Téged ígére, s idő telvén Szabadítóul nékünk mennyből Alákülde. \n4. Értünk felvevél a Szűztől testet, Melyben szenvedél s tettél eleget; Elvévéd a mi bűneinket, Nyervén minékünk örök éltet, Dicsőséget. \n5. Siess már hozzánk, megváltó Urunk! Adjad, hogy végig benned bízhassunk, És szent Atyáddal megláthassunk, Mennyben tevéled lakozhassunk, Vigadhassunk. \n6. Légyen tisztesség te Felségednek És szent Atyádnak, mi teremtőnknek, És egyetemben Szentléleknek: Dicsőség a Szentháromságnak, Egy Istennek!"},{"m":315,"r":274,"c":"Krisztus Urunknak áldott születésén, Angyali verset mondjunk szent ünn","b":"1. Krisztus Urunknak áldott születésén, Angyali verset mondjunk szent ünnepén, Mely Betlehemnek mezejében régen Zengett ekképpen: \n2. A magasságban dicsőség Istennek, Békesség légyen földön embereknek, És jóakarat mindenféle népnek És nemzetségnek! \n3. A nemes Betlehemnek városába’ Gyermek született szűztől e világra, Örömet hozott Ádám árváira, Maradékira. \n4. Eljött már, akit a szent atyák vártak, A szent királyok akit óhajtottak, Kiről jövendőt próféták mondottak, Nyilván szólottak. \n5. Ez az Úr Jézus, igaz Messiásunk, Általa vagyon bűnünkből váltságunk, A mennyországban örökös lakásunk, Boldogulásunk. \n6. Hála legyen mennybéli szent Atyánknak, Hála legyen született Jézusunknak, És Szentléleknek, mi vigasztalónknak, Bölcs oktatónknak! \n7. Ó, örök Isten, dicső Szentháromság, Szálljon mireánk menynyei vigasság, Távozzék tőlünk minden szomorúság, Légyen vidámság!"},{"m":316,"r":273,"c":"Az Istennek szent angyala menynyekből hogy alászálla, És a pásztorokho","b":"1. Az Istennek szent angyala menynyekből hogy alászálla, És a pásztorokhoz juta, Nékiek ekképpen szóla: \n2. Mennyből jövök most hozzátok, És íme, nagy jó hírt mondok, Nagy örömet majd hirdetek, Melyen örvend ti szívetek. \n3. E mai nap egy kis gyermek Szűztől született tinéktek, A gyermek szép és oly ékes, Vigasságra kellemetes. \n4. Már lehozta az életet, Mely Istennél volt készített, Hogy ti is véle éljetek, Boldogságban örvendjetek. \n5. Ez lesz néktek a jegy róla: Ímé, fekszik a jászolba’, Ott megtaláljátok őtet, Kitől menny, föld teremtetett. \n6. Ez Úr Krisztus mi Istenünk, Nyavalyáinkból kimentőnk, Ő lészen az Idvezítő, Minden bűnünkből kivévő. \n7. Nyílj meg, szívem, lásd meg jobban, Ki fekszik itt e jászolban? Ez a gyermek bizonyára Az Úr Jézus, Isten fia. \n8. Jertek hát, mi is örvendjünk, A pásztorokkal bémenjünk, Lássuk, mit adott az Isten Hozzánk való szerelmében. \n9. Mindeneknek teremtője, Miért vagy ily szegénységbe’? Hogy fekszel az aszú szénán, Szamár s ökrök közt aludván? \n10. Nincs-é senki e világon, Ki tégedet béfogadjon? Nincsen-é meleg helyecskéd, Sem gyengén rengő bölcsőcskéd? \n11. Néked bársonyod s tafotád, Aszú széna lágy párnácskád; Noha nagy dicső király vagy, Mostan ímé, mily szegény vagy! \n12. Ó, én szerelmes Jézusom, Édes megváltó Krisztusom! Jövel, csinálj csendes ágyat, Szívemben magadnak házat! \n13. Ó, kedves vendég, nálam szállj, Bűnömtől ne iszonyodjál, Jöjj be hozzám, te szolgádhoz, Szegény megtérő juhodhoz! \n14. Én lelkemnek rejtekébe, zárkózz emlékezetébe, Hogy el ne felejthesselek, Sőt örökké dicsérjelek! \n15. A menynyei magas égben Istennek dicsőség légyen, Ki szent Fiát küldé értünk, Hogy Megváltónk lenne nékünk."},{"m":317,"r":283,"c":"Jer, dícsérjük e szent napon a mi Urunkat, Bizony méltó dícséretünkre,","b":"1. Jer, dícsérjük e szent napon a mi Urunkat, Bizony méltó dícséretünkre, Nagy Tisztességre, Mert született ez nap nékünk idvességünkre. \n2. Vígasságnak és örömnek ez a nagy napja, Min örülnek mind az angyalok, No azért mi is Adjunk hálát e gyermeknek, mint mi Urunknak. \n3. Atya Isten ő szent fiát nem azért küldé, E világot hogy megítélje És elveszítse, De megtartsa, szabadítsa és idvezítse. \n4. Bizonyságul e világra azért születék, Hogy azok. kik teljes lélekkel Ő benne hisznek, Örök életet várjanak, Istent nézhessék. \n5. Azért higyjen minden ember Jézus Krisztusban, Mert kik bíznak ő érdemében, Születésében, Nem kárhoznak el, sőt véle örülnek mennyben. \n6. Ó te áldott Idvezítő, Úr Jézus Krisztus, Hálát adunk ez nap tenéked És kérünk téged, Tiéidet magas mennyből hogy megtekintsed. \n7. Adjad nékünk ajándékul te Szentlelkedet, Hogy örökké vallhassunk téged, És dícsérhessünk; Holtunk után mennyországban téged láthassunk. \n8. Dícsértessék Szentháromság e mai napon, Atya, Fiú és a Szentlélek: Egy bizony Isten; Dícséretet néki mondjunk örökké, Ámen."},{"m":318,"r":286,"c":"Jer, mindnyájan örüljünk, És szívünkben vigadjunk, Mert született Úr J","b":"1. Jer, mindnyájan örüljünk, És szívünkben vigadjunk, Mert született Úr Jézus nekünk. \n2. Kit az Atya Úr Isten, Könyörülvén emberen, Elbocsájta teljes időben. \n3. Elhagyá gazdagságát, Véghetetlen országát, Hogy érettünk adja önmagát. \n4. Ő életnek adója, Szívek vigasztalója, Lelkünk megvilágosítója. \n5. Azért jöve, hogy éljünk, Isten kedvébe essünk, Érdeméből kegyelmet nyerjünk. \n6. Nagy szeretet mindenhez, Hogy Isten emberekhez Jöve, fertelmes bűnösökhöz. \n7. Akik benne nem bíznak, Sőt bízni sem akarnak, Örök halállal mind meghalnak. \n8. Mi azért e felségben, Emberré lett Istenben: higygyünk mi egy reménységünkben."},{"m":319,"r":287,"c":"Kezdetben volt az Ige, A Krisztus ő Felsége, Szent Atyjának egyetleneg","b":"1. Kezdetben volt az Ige, A Krisztus ő Felsége, Szent Atyjának egyetlenegyje. \n2. Leszálla mennyországból, Atyja akaratjából, Istenségnek szent tanácsából. \n3. E világra adaték, És minékünk születék, Emberi nem hogy megváltatnék. \n4. Mint Ádámban kesergünk: A Krisztusban vígadunk, Mert ő nékünk minden örömünk. \n5. Mert Ádámban meghaltunk, De lőn Krisztus mi Urunk, Ki által ismét feltámadunk. \n6. Örvendjünk és vígadjunk, Istennek hálát adjunk, Hogy halálból életre jutunk."},{"m":320,"r":null,"c":"Ez nap nékünk dicséretes nap, Bizony vigasságnak napja, És idvességnek","b":"1. Ez nap nékünk dicséretes nap, Bizony vigasságnak napja, És idvességnek bizodalma, Mert született ez nap nékünk mi váltságunkra A Krisztus Jézus, Istennek Fia. Áronnak veszszeje megvirágozék, Tiszta szűztől gyermek születék, Menynyei királyul nékünk adaték, Krisztus Jézusnak nevezteték. \n2. Ez Gyermek volt a megígért mag A mi első atyáinknak, Ádám atyánknak, Ábrahámnak, Kiben minden nemzetségek megáldatnának, Örök életre feltámadnának. Áronnak veszszeje megvirágozék, Tiszta szűztől gyermek születék, Menynyei királyul nékünk adaték, Krisztus Jézusnak nevezteték. \n3. Megtöreték e Gyermek miatt Az ördögnek nagy hatalma, A halál, ördög, bűn országa; Megnyittaték mennyországnak erős kapuja: Istennek kedve mireánk szálla. Áronnak veszszeje megvirágozék, Tiszta szűztől gyermek születék, Menynyei királyul nékünk adaték, Krisztus Jézusnak nevezteték. \n4. Nincsen immár semmi félelmünk A mi nyomorúságinktól, Bűntől, haláltól, kárhozattól, Sem a Mózes törvényének kemény átkától, Ördögnek rajtunk nagy boszszújától. Áronnak veszszeje megvirágozék, Tiszta szűztől gyermek születék, Menynyei királyul nékünk adaték, Krisztus Jézusnak nevezteték. \n5. Megtöretnek a pogány népek, Kik e Gyermekben nem hisznek; A nagy Istennek nem kellenek, Az ördögnek hatalmába örökké esnek, Akik a bűnnek véget nem vetnek. Áronnak veszszeje megvirágozék, Tiszta szűztől gyermek születék, Menynyei királyul nékünk adaték, Krisztus Jézusnak nevezteték. \n6. Hálát adjunk az Úr Istennek, Atya-fiú-szentléleknek, És örüljünk mind e Gyermeknek; Nagy örömet az angyalok nékünk hirdetnek, Dicsérvén Istent, így énekelnek: Áronnak veszszeje megvirágozék, Tiszta szűztől gyermek születék, Menynyei királyul nékünk adaték, Krisztus Jézusnak nevezteték."},{"m":321,"r":275,"c":"Hogy eljött az időknek teljessége, Bétölt már minden szentek reménység","b":"1. Hogy eljött az időknek teljessége, Bétölt már minden szentek reménysége; Kit régtől fogva minden szent vára: A Fiú testet öltött magára. Nyilván lett hozzánk Isten jó szándéka: Ím, emberek közt van az ő hajléka; E világ éppen már-már megavult, De Jézus eljöttével megújult. \n2. Uraknak Ura értem lett szolgává, Tévén én dolgom a maga dolgává. Ami a testnek nem volt lehető, Elvégzi Jézus, mindent tehet ő. Ó, mint szerette Isten e világot! Számára nevelt egy szép szál virágot. Ma fakadt fel az élet kútfeje, És megvirágzott Áron veszszeje. \n3. Ezáltal a kegyelmi frigy felépült, Hogy halál árnyékában amely nép ült, Láthasson szép nagy világosságot, A bűnös is nyerhessen váltságot. Eljött, hogy a békességet hirdesse, Hogy az elveszett juhot megkeresse, Hogy az ördögnek dolgát elrontsa, Hogy értem drága vérét kiontsa. \n4. Ó, Isten, hozzám kötéd így magadat, Hogy értem küldéd világra Fiadat, Sok gonoszságom nem tekintetted, Veszendő sorsom szívedre vetted. Nem gondolál szent gyönyörűségeddel, Csak azzal, hogy jót tégy ellenségeddel; Csuda, hogy annak Istene lettél, Kinek teljességgel nem kellettél. \n5. Már megítélted szegény lelkem perét, Rám árasztottad szerelmed tengerét; Végét nem érem én e mélységnek, Angyalok is csak rebegnek ennek: Ó, nagy szeretet, melyhez hasonló nincs! Ha lett volna még Istennél nagyobb kincs, Nem tartózkodott volna iránta; Ez volt a legtöbb; nékem ezt szánta. \n6. E kedves vendéget már mint fogadjam? Dávid fiának immár mimet adjam? Ha nincs a vendégházakban helyed, Ímhol van szívem, itt hajtsd le fejed. Hagyd ott a barmot, jászolt és istállót, Hadd nyerjelek meg, mennyből hozzám szállót! Itt szállj, galambom, karjaim készek, E száraz fán vár egy üres fészek. \n7. Kereslek, Uram, engem te is keress; Szeretlek, tudod, ó, hát te is szeress! Tedd egy szívvé szívemet szíveddel, Ejts rabul engem hívó szemeddel. Vonj, hogy atyádhoz általad mehessek, Élj bennem, benned hogy én is élhessek! Ó, Uram, tőled hová mehetnék? Elveszném, tiéd ha nem lehetnék."},{"m":322,"r":null,"c":"E világot, bár ez bűnt tett, Az Isten úgy szeret te, Hogy kibocsátani","b":"1. E világot, bár ez bűnt tett, Az Isten úgy szeret te, Hogy kibocsátani kész lett Önnön Fiát éret te. Emberek, az Úrnak kedve Nincsen halálotokba', Ó, angyalok, legörbedve Nézzetek e titokba: \n2. Ím, az Atya kebeléből Leszáll ama Szerel mes, Lesz az ő jó tetszéséből Halálig engedel mes. Földi szállással váltja fel A dicsőségnek helyét, De anynyi helyet alig lel, Ahol lehajtsa fejét. \n3. Úr Jézus, lelkemtől kérdem: Téged mi indítha tott, Hogy értünk, kikben nincs érdem, Vállalj ily szolgála tot? Nem más, hanem az irántunk Benned égő szeretet, Mely, bár bűnünkkel megbántunk, Mégis meg nem hűlhetett. \n4. Isten, ha a te kebeled Kincsét adtad éret tünk, Midőn mint pártütők, veled Még ellenségesked tünk: Adj meg már Ővele mindent, Ami arra szükséges, Hogy itt légyen életünk szent, S halálunk idvességes. \n5. Jézus, felépítetted már A menynyeknek orszá gát, Hol, aki törvényidben jár, Megleli boldogsá gát. Mi, tenéked térdet hajtó Híveid, esedezünk: Nyíljon meg nékünk az ajtó, Vezess be, fogván kezünk."},{"m":323,"r":277,"c":"Dicsőség a magas menynyekben Istennek és ide alatt, A földi alacsony h","b":"1. Dicsőség a magas menynyekben Istennek és ide alatt, A földi alacsony helyekben Békesség és jóakarat! Így énekelnek az Istennek Az égi karok, buzdítván Az élőket, kik örvendeznek, Ez éneklést megújítván. \n2. Dicsőség, dicsőség az égben Istennek, ki úgy szerette E világot, hogy szegénységben Szent Fiát eleresztette, Hogy minket, gyarló halandókat, Kiket szomorú fogságba’ Tart vala a bűn, mint rabokat, Helyheztessen szabadságba. \n3. Ó, emberi testbe öltözött Jézusunk, lásd, mint gerjedez A mi szívünk az öröm között, Úgy újul és úgy éledez, Mint mikor a nap feljöttével, Kilövellvén az életet, Elűzi az éjjelt s fényével Felkölti a természetet. \n4. Jövel, fogadd el te magadnak E szívet és lakozz ebben; Ez az, amit adhatnak s adnak Híveid legszívesebben Azért a csuda szeretetért, Amelyet hozzánk mutattál, Midőn a mi már vesztére tért Lelkünkért alászállottál. \n5. Hozd el mihozzánk te magaddal Az isteni békességet; Bűnös lelkünknek irgalmaddal Nyújts biztatást, reménységet, Hogy bús háborúnk, amely belől Régóta szaggat már és tép, Ne kezdődjék elől, meg elől, Hanem hallgasson el végképp. \n6. Szülj újjá, értünk ma született Jézusunk, a te lelkeddel Ezen a néked szenteltetett Ünnepnapon, s kegyelmeddel Úgy igazgass és bírj bennünket, Hogy nyomdokid követhessük, És e mi földi életünket menynyeivel cserélhessük."},{"m":324,"r":278,"c":"Örvendjetek, keresztyének, Nyíljatok meg nyelvek és szívek, Az idvessé","b":"1. Örvendjetek, keresztyének, Nyíljatok meg nyelvek és szívek, Az idvesség Istenének Mondjatok áldást, minden hívek! Felváltatott nagy örömmel A haláltól való féle lem, Mit véghetetlen érdemmel Meggyőz az isteni kegyelem. \n2. A Megtartó ma született, Az örök Isten emberré lett, És ma viszszaszereztetett Az igazság s elvesztett élet. Kiküldé szerelmes Fiát Istenünk a teljes idő ben, Hogy a kezes a bűn díját Fizesse s szenvedje testében. \n3. Ó, imádandó titkai Ama békesség tanácsának, Ó, nagyhatalmú dolgai A menny és föld szabad Urának! Aki által teremtetett S lett minden serege az ég nek, Az Ige testté született, Személye az egy Istenségnek. \n4. Ennek örülnek az egek, A mély titkon elcsudálkoznak, Hirdetik angyalseregek Jézust, s előtte leborulnak. A Magasságost tisztelik, A földön békességet zeng nek, És ünnepnappá szentelik megjelenését az Istennek. \n5. Áldom én is szent nevedet, Én királyom, szenteknek szente, És vígan ülöm ünneped, Ó, Jézus, Istennek felkentje! Magasztalom Felségedet És imádlak szent félelem mel, De egyszersmind szerelmedet Megölelem igaz hitemmel."},{"m":325,"r":282,"c":"Szívünk vígsággal ma bétölt, Mert ígéret szerint felkölt Istenfélők sz","b":"1. Szívünk vígsággal ma bétölt, Mert ígéret szerint felkölt Istenfélők számára Az igazság fényes napja: Újtestámentomnak papja Eljött, kit sok szent vára. Csillag villog, Ragyog már rám, melyet Bálám láta régen, Fénylik, mint szép nap az égen. \n2. Megszáná az Úr estünket, Felöltözé portestünket, Szent kegyelme mily drága! Győzelmei már megszűnnek A kárhozatszerző bűnnek, Törvénynek nem sújt átka; Mérge, férge a pokolnak megromolnak ma végképpen, Nem árthatnak semmiképpen. \n3. Próféta, kinek nincs mása, Jött hozzánk, hogy népét lássa, Bölcsességre oktassa; A főpap jött, hogy áldozzon, Tiszta szívet, lelket adjon, Világ bűnét elmossa; Eljött s meglett a szenteknek, felkenteknek fejedelme, Királya, fősegedelme. \n4. Szelídség volt minden dolga, Önként leve értünk szolga, Megalázta önmagát; Földi fényt, hírt nem kergete, Szerény munkás volt élete S vérén szerzé birtokát; De épp ez szép bizonysága, hogy országa lelki, belső, Királysága égi, első. \n5. Jézus, engedj hozzád mennem, Éljek benned, te énbennem, Ha te hozzánk eljöttél; Adjad, legyek igaz híved, Ó, essék meg rajtam szíved, Ha kegyedbe bevettél; Mert nincs más kincs, mely hívekkel, bús szívekkel jót tehetne, Boldogságot szerezhetne."},{"m":326,"r":279,"c":"Dicsőség mennyben az Istennek! Dicsőség mennyben az Istennek! Az angya","b":"1. Dicsőség mennyben az Istennek! Dicsőség mennyben az Istennek! Az angyali seregek Vígan így énekelnek: Dicsőség, dicsőség Istennek! \n2. Békesség földön az embernek! Békesség földön az embernek, Kit az igaz szeretet A Jézushoz elvezet, Békesség, Békesség Embernek! \n3. Dicsérjük a szent angyalokkal, Imádjuk a hív pásztorokkal Az isteni Gyermeket, Ki minket így szeretett, Dicsérjük, Imádjuk És áldjuk! \n4. Ó, Jézus! ne vess meg bennünket, Hallgasd meg buzgó kérésünket! Jászolodnál fogadjuk, Hogy a vétket elhagyjuk, Ó, Jézus, Ne vess meg: Hallgass meg! \n5. Dicsőség az örök Atyának És értünk született Fiának, Mindkettő Szent Lelkének, Áldások kútfejének: Dicsőség, Dicsőség Istennek!"},{"m":327,"r":276,"c":"Ó, jöjjetek, hívek, ma lelki nagy örömmel, A jászolhoz Betlehembe jöjj","b":"1. Ó, jöjjetek, hívek, ma lelki nagy örömmel, A jászolhoz Betlehembe jöjjetek el! Megszületett az angyalok kirá lya: Ó, jöjjetek, imádjuk, Ó, jöjjetek, imádjuk, Ó, jöjjetek, imádjuk az Úr Krisztust! \n2. Az életnek szent Ura, dicsőség Királya Itt fekszik a jászol mélyén nagy szegényen. Nagy dicsőséges, szent és örök Is ten! Ó, jöjjetek, imádjuk, Ó, jöjjetek, imádjuk, Ó, jöjjetek, imádjuk az Úr Krisztust. \n3. Ti angyali lelkek, ma zengjetek az Úrnak És vigadva örvendjetek, buzgó hívek! A magas mennyben dicsőség Isten nek! Ó, jöjjetek, imádjuk, Ó, jöjjetek, imádjuk, Ó, jöjjetek, imádjuk az Úr Krisztust. \n4. Úr Jézus, ki ez napon érettünk születtél, Csak tégedet illet szívünk tisztelete! Isteni Gyermek, testet öltött I ge! Ó, jöjjetek, imádjuk, Ó, jöjjetek, imádjuk, Ó, jöjjetek, imádjuk az Úr Krisztust!"},{"m":328,"r":null,"c":"Jöjjetek Krisztust  dicsérni, Bí zó szív vel hozzá térni, Énekekkel ze","b":"1. Jöjjetek Krisztust  dicsérni, Bí zó szív vel hozzá térni, Énekekkel zengve kérni, Krisztus né pe, jöj jetek. \n2. Bűn, pokol már bú ban éljen, Ör dögöt  hadd ölje szégyen, Üdvösségünk szent ölében Már levet jük mind  a bút. \n3. Küldte Őt az Úr  kegyelme Ö röklét re, győzelemre, Hogy szívünket felemelje Boldogsá gos ég  felé. \n4. Irgalommal szán va minket, Nagy  jósá ga ránk tekintett, S ördögcsalta bús szívünket Mennymagas ból lát ni jött. \n5. Áldott óra, bol dog óra, Nagy  hitünk nek meghozója, Ajkunk zengő hálaszóra Nyílik, é des Jé zusunk. \n6. Jászol-ölben drá ga Gyermek, Ég  felé  vigyen kegyelmed, Hol dicsérve énekelnek Édes han gú an gyalok."},{"m":329,"r":284,"c":"Itt állok jászolod felett, ó, Jézusom, szerelmem, Eljöttem, elhoztam n","b":"1. Itt állok jászolod felett, ó, Jézusom, szerelmem, Eljöttem, elhoztam neked, amit kezedből nyertem; Vedd elmém, lelkem és szívem, Hadd adjam néked mindenem, Hogy kedves lé gyek  néked! \n2. Nem éltem még e föld színén: te értem megszülettél; Még rólad mit sem tudtam én: tulajdonoddá tettél; Még meg sem formált szent kezed, Már elválasztál engemet, Hogy társam légy  e  földön. \n3. Halálban, éjben vártam én: fölkelt a nap rám véled. Terólad ömlik rám a fény: a béke, boldog élet, A lélek ékességei; Belőlük hitnek menynyei Szép tisztasá ga  árad. \n4. Csak nézlek boldog szívvel, és nem győzlek nézni téged, Szóm és erőm mind oly kevés, hogy elmondhassa néked: Bár felfoghatna tégedet Az emberszív és ismeret, Hogy megfejthes se  titkod! \n5. Megváltóm, egy kérésemet nem vetheted meg nékem: Hogy szívem mélyén tégedet hordozhatlak, remélem, És bölcsőd, szállásod leszek; Jövel hát, tölts el engemet Magaddal: nagy  ö römmel!"},{"m":330,"r":290,"c":"Örvendezzen már e világ, Légyen mindenben vigasság, Mert Krisztus mind","b":"1. Örvendezzen már e világ, Légyen mindenben vigasság, Mert Krisztus mindenért váltság, Világ bűnéért orvosság. \n2. Zakariás szent próféta Már ezt régen megmondotta: Örvendezz, Sion leánya, És örülj nagy vigasságba’! \n3. Ne félj, mert íme örömed: A te királyod jő neked; Szamár vemhén telepedett, Mutatván nagy szelídséget. \n4. Véle vagyon istensége, mondhatatlan nagy kegyelme, Jóvolta, idvezítése, Mert ő mindeneknek feje. \n5. Elöl s utol nagy serege Szentlélek teljességében Hozsánnát kiált a mennybe, Dávid fiának örömben. \n6. Némelyek ruházatjokkal, Krisztus útját méltósággal, Mások hintik zöld ágakkal: Királyt tisztelnek azokkal. \n7. Mi is azért királyunknak, Menjünk elébe Urunknak; Vigyünk szép pálmaágakat: Hitünk győzedelmes voltát. \n8. Dicsőség Atyánknak mennyben, Mi királyunknak akképpen Szentlélekkel egyetemben Mostan és minden időben."},{"m":331,"r":289,"c":"A nagy király jön: Hozsánna! Hozsánna! Zeng e kiáltás előtte, utána; Z","b":"1. A nagy király jön: Hozsánna! Hozsánna! Zeng e kiáltás előtte, utána; Zöld ágakat szeldelnek útára, Békességet hoz népe javára. Áldott, aki jött az Úrnak nevébe' Általa léptünk az Isten kedvébe; Békesség ott fenn a mennyországban, Áldott az Isten a magasságban! \n2. Ó, szentegyház, hívek boldog országa! Mily édes ez a Jézus királysága! Szelíd, szegény ez és alázatos, De nagy hatalmú és csodálatos. Igaz ez és a bűnből szabadító, A bűnt, halált és népeket hódító; vasveszszővel bírja ellenségét, De szelíden őrzi örökségét. \n3. Jézus király és magát annak vallja, De hogy királylyá tegyék, nem javalja; Sőt, noha Isten, Sion királya: Lett az időben szolgák szolgája. Jön szamárháton alázatossággal, Aki pedig bír az egész világgal; Nem jön királyi fényes bíborban, Nem fegyverekkel zörgő táborban. \n4. Ó, édes Jézus, Atyádnak szent Fia! Ó, Isten, néped kegyelmes királya! Vezéreld jóra egész éltünket, Tégy tulajdon népeddé bennünket. Légy segítségül, ki a magasságban Ülsz drága véreden szerzett országban; Tégy engedelmes, hű polgárokká S nyert kincseidben birtokosokká. \n5. Hogy csak a Jézus és az ő szent Atyja Törvénye légyen és szent akaratja Cselekedetink zsinórmértéke: Áldott királyunk királyi széke Hű szíveinkben légyen felemelve, És hűségére életünk szentelve; Tégyen méltóvá a Jézus vére A boldog lelkek lakóhelyére."},{"m":332,"r":null,"c":"Jézusom, imádjuk szent nevedet, Áldjuk erős szerelmedet, Aki öröktől f","b":"1. Jézusom, imádjuk szent nevedet, Áldjuk erős szerelmedet, Aki öröktől fogva szerettél, Bűnünkért emberré lettél, A büntetést kiálltad helyettünk, És meg is haltál érettünk. \n2. A mindennel bíró szegénynyé lett; Küszködik az örök élet A rettentő halál fájdalmival, Harcol kemény kínjaival: Halála nemétől iszonyodik, Vért izzad és szomorkodik. \n3. Ím kiadá Isten édes Fiát, Hogy fizesse a bűn díját, És minden bűnt magára vállala Az, aki bűnt nem tud vala; Ki által ég és föld formáltatik, Emberek által kínzatik. \n4. Aki fog ítélni mindeneket, Holtakat, eleveneket, azt most halandó bírák büntetik, A halálra ítéltetik. Felbomol a természetnek sora: Meghal az életnek Ura. \n5. Bújj el és rejtsd el tekintetedet, Fényes nap: aki tégedet Teremtett, szenved; testbe öltözött Isten függ az ég s föld között! Föld, rendülj, és sírt készíts a testének, Ennek az Isten Szentjének. \n6. Ó, isteni végtelen szeretet! Ímé, mivel nem lehetett Más mód, hanem ártatlannak kellett Szenvedni a bűnös helyett: Hogy én lehessek újra ártatlan, Meghalt ím a Halhatatlan. \n7. Ez tészi végtelen érdeművé, Győzhetetlen erejűvé Azt az embertől ki nem telhetett, De Istentől rendeltetett Teljes elégtételt, mely bűnünket, Elveszi büntetésünket. \n8. Nyerj nékünk is, Jézus, érdemeddel, Véres elégtételeddel, Édes Atyádtól, a megbántatott Istentől bűnbocsánatot; Társaidnak híveidet vedd be menynyei örökségedbe."},{"m":333,"r":293,"c":"Buzdítsd fel Uram, lelkemet, Hogy dicső fejedelmemet, Kit, míg a mérté","b":"1. Buzdítsd fel Uram, lelkemet, Hogy dicső fejedelmemet, Kit, míg a mérték bételt, Sok szenvedés felszentelt, Kísérjem a Golgotára, Hol igazságod oltára, De a körül kegyelmednek Jó illatjai terjednek. \n2. Te, kit az égből lehallott Szó Isten fiának vallott, Melyet megerősítél, Mikor csudákat tettél: Rád nem jöhetett a vádban, Hogy álnokság volna szádban; Nem vala több célod ennél, Hogy széjjel járván, jót tennél. \n3. Mégis, mint egy nyilvánlévő Hitető, vagy gonosztévő, Halálra kerestetel, Törvénybe idéztetel. Ellened az ütött pártot, Ki veled egy tálba mártott, Árát felvette vérednek, Már utánad leselkednek. \n4. Sőt kiment a szentencia, Hogy vagy a halálnak fia; A töviskoronával S a megátkozott fával, Amelyet válladra tőnek, A feszítők előjőnek; Vernek és csúfolnak egyre, Míg kivezetnek a hegyre. \n5. Itt tested dárdával szúrva, Kezed, lábad szeggel fúrva, Végig a magas kereszt Oldalain vért ereszt. Míglen, lehajtván fejedet, Atyádnak ajánlt lelkedet Kiadod, leírhatatlan Kínok között, ó ártatlan. \n6. Már ezt a nap sem állhatja, Megsötétül ábrázatja; Hát én rád hogy nézhetek? Ó, Megváltóm, reszketek, Mert a világ bűne terhét, Melyet most a bíró rád vét, Sokkal neveltem éltemben: Te szenvedsz az én képemben. \n7. Uram, e szent vért tekintsd meg, Lelkem ez által tisztítsd meg; Ne legyek én átkozott, Ha kezesem áldozott! Én ez oltárt megölelem, Ha szorongat a félelem, Biztatásomat halálom óráján ebben találom."},{"m":334,"r":294,"c":"Ó, Isten, ki a törődött Szívet meg nem utálod, Sőt a bánatból ejtődött","b":"1. Ó, Isten, ki a törődött Szívet meg nem utálod, Sőt a bánatból ejtődött könynyeket megszámlálod: Kedveljed érzésimet És elmélkedésimet, Melyek szívemben támadnak Halálán te szent Fiadnak. \n2. Mint sír a kertben magában, Mint küszködik a harccal, Mely a sötét éjszakában A földre ejti arccal, Hol kínjait lelkében Érezvén és testében Vércseppel verejtékezik, Elalél és csüggedezik. \n3. De új erőt vesz magának, Lelkét megbátorítja, Mint a vitéz, ha harcának Kezdete tántorítja. Az eláruló csókra Önként megy a kínokra A fegyverekbe öltözött Vérengző kísérők között. \n4. A bíró bár elismeri, Hogy ő vétkét nem látja, Elereszteni nem meri, Ostor alá bocsátja. Látja a nép véresen, Nincs szíve, mely megessen, Fakad ily gyilkos lármára: Feszítsd fel a keresztfára! \n5. Függ már a fán kiterjesztett Kezekkel felszegezve, A föld testéből eresztett Vérrel van béfedezve. Elalélván végtére A kínok érzésére, Meghal, Atyjához sóhajtva, Fejét keresztjére hajtva. \n6. Ó, kínok közt elenyészett Megváltóm a keresztfán! Téged az egész természet Búslakodva sirat s szán. Reng a föld alkotmánya, A holtakat kihányja; A fényes nap is bújába’, Borul sötét éjszakába. \n7. Elhal énbennem is a szív Ez iszonyú látásra, Bánatba merült lelkem hív Bűneimért sírásra, Mert tudom, hogy helyettem, Ki sokképpen vétettem, Szenvedéd a vereséget, Mely így vet éltednek véget. \n8. Mégis biztat engem a hit, Hogy értem ontottál vért, Rettegésemben megenyhít, Tudván, hogy érdemedért Részeltetem az égben Ama nagy dicsőségben, Hol te, ki értem szenvedtél, Örök méltóságot vettél."},{"m":335,"r":295,"c":"Ó, ártatlanság báránya, E világnak ki vagy ára, Megtartója, táplálója,","b":"1. Ó, ártatlanság báránya, E világnak ki vagy ára, Megtartója, táplálója, Áldott légy, egek királya! \n2. Hogy érdemlettük ezt tőled, Hogy miértünk ezt felvégyed? Hogy szent tested vereséget, Szenvedjen enynyi sérelmet? \n3. Bár tiszta ártatlanság vagy, Káromlónak is mondanak, Ámde te mégis vesztegelsz, Ily hamis vádra nem felelsz. \n4. Mivelhogy Isten fiának, Mondod magad Messiásnak: Káromlónak elneveznek, Nem hisznek téged Istennek. \n5. Áldott légy ezért, Jézusunk, Édes megváltó Krisztusunk, Fő tanítónk és orvosunk, Megszabadító Királyunk!"},{"m":336,"r":296,"c":"Dícsérd lelkem Istenedet, Ki úgy szeretett tégedet, Hogy szent Fia kín","b":"1. Dícsérd lelkem Istenedet, Ki úgy szeretett tégedet, Hogy szent Fia kínt szenvedett, Éretted megfeszíttetett. \n2. Keresztfán bűnödért hala, Ő szent vérével áldoza, Halál tőriből oldoza, Pokoltól megszabadíta. \n3. Mert az Isten őtet tevé, Ki bűnt nem tud vala, bűnné, Hogy mi lennénk ő általa Az Istennek igazsága. \n4. Nem vala néki formája, Sem szép ékes ábrázatja; Testét vereségnek adta, Gyalázattól el nem vonta. \n5. Emberek között nem kedves, Megvettetett és beteges, Sok kínokkal rettenetes, Szörnyű fájdalmakkal teljes. \n6. Oly lett, mint ki előtt magát, Ember elrejti orcáját, Mert semminek ítéltetett, Csúf-beszéddel illettetett. \n7. Azt alították jóllehet, Hogy Istentől megveretett, De a mi betegséginket, Ő viselte sérelminket. \n8. Midőn megostoroztatott, Sebeivel meggyógyított, A mi sok álnokságinkért, Megrontatott bűneinkért. \n9. Mi, mint juhok, elszéledtünk, A bűn útján eltévedtünk: Büntetését bűneinknek, Szenvedte nagy vétkeinknek. \n10. Noha ő nem cselekedett Semminémű hitlenséget, Álnokság szájában nem volt, Bűn benne nem találtatott: \n11. Mint a bárány, olyanná lett, Mely mészárszékre vitetett, S mint juh, őtet nyírők előtt: Megnémult, szája veszteglett; \n12. Érettünk káromoltatott, És méreggel itattatott, Szörnyen megostoroztatott, Ruhája sorsra osztatott. \n13. És verejtékezett vérrel, Koronáztatott tövissel, Által veretett dárdával, így kiált fel nagy felszóval: \n14. Én Istenem, én Istenem! Miért hogy elhagyál engem? Kezedbe ajánlom lelkem, Immár letészem életem. \n15. A menynyei magas égben Istennek dicsőség légyen, Ki szent Fiát küldé értünk, Hogy Megváltónk lenne nékünk."},{"m":337,"r":297,"c":"Paradicsomnak te szép élő fája, Ó, kegyes Jézus, Istennek Báránya, Te","b":"1. Paradicsomnak te szép élő fája, Ó, kegyes Jézus, Istennek Báránya, Te vagy lelkünknek igaz Megváltója, Szabadítója. \n2. Értünk egyedül szörnyű kínt szenvedtél, Megfeszíttetvén töviset viseltél, Mi bűneinkért véreddel fizettél És megölettél. \n3. Csudánkra vannak a te szép gyümölcsid, Nagy kínjaid közt való szent beszédid, Kiket keresztfán szóltál, szent mondásid, Hét szép szavaid. \n4. Első szódban így könyörgél Istennek: ATYÁM, BOCSÁSD MEG BŰNÖKET EZEKNEK, MERT NEM TUDJÁK ŐK MOST, MIT CSELEKESZNEK, Kegyetlenkednek. \n5. Lőn második szód a szegény tolvajhoz, Bűnén kesergő s törődő latorhoz, Mondván: VELEM LÉSSZ MA PARADICSOMBAN, SZENT ORSZÁGOMBAN. \n6. Keserves szívű szentséges anyádnak, Harmadik szódat nyújtád Máriának, És ugyanakkor szóltál szent Jánosnak, Mondván azoknak: \n7. ÍMHOL AZ ANYÁD, kedves tanítványom, ÍMHOL A FIAD, aszszony, már ajánlom, Gyámolítódul ezt a Jánost hagyom, Kegyesen adom. \n8. Ártatlan Bárány, keserűségedben, Negyed szód ez lőn nagy kísértetedben: ÉN ISTENEM, ÉN ISTENEM, ÜGYEMBEN MIÉRT HAGYÁL EL? \n9. Jövendölések mind beteljesedvén, És minden dolgok már elvégeztetvén, Mondád ötödször: SZOMJÚHOZOM igen, Szíved epedvén. \n10. Mikoron, Uram, a mérget elvévéd, Ottan hatodszor mondál ilyen igét: Bételjesedett és ELVÉGEZTETETT Váltságnak dolga. \n11. Reád érkezvén a szomorú halál, Hetedszer ily szót s imádságot mondál: ATYÁM, KEZEDBE TÉSZEM LE LELKEMET, Én életemet. \n12. Édes Jézusunk, szenteld meg lelkünket, Hogy mi is megbocsáthassuk bűnüket Mindeneknek, kik ellenünk vétettek És elestenek. \n13. Adjad, hogy mi is értük könyörögjünk, Téged követvén, szívből esedezzünk, Hogy sok szentekkel tehozzád mehessünk, Idvezülhessünk. \n14. A pályafutást mi is elvégezvén, Lelkünket ajánlhassuk szent kezedben; Mint megváltottak, mondhassuk nagy szépen Éltünk végében: \n15. Hála légyen a mennybéli Istennek, Ki megváltója lőn bűnös embernek, És megszerzője szent békességünknek: Idvességünknek."},{"m":338,"r":395,"c":"Lelki próbáimban, Jézus, légy velem, El ne tántorodjék tőled életem. F","b":"1. Lelki próbáimban, Jézus, légy velem, El ne tántorodjék tőled életem. Félelem ha bánt,  vagy nyereség kísért, Tőled elszakadnom ne hagyj semmiért. \n2. Ha e világ bája engem hívogat, Nagy csalárdul kínál hitványságokat: Szemem elé ál lítsd szenvedésidet, Vérrel koronázott, szent keresztedet. \n3. Tisztogass bár bajjal olykor engemet: Kegyelmeddel szenteld szenvedésemet; Bár e test erőt len: te oltárodon Keserű pohárral, hittel áldozom. \n4. Ha halálra válik testem egykoron: Ragyogjon fel lelked e hitvány poron; Ama végső har con rád bízom magam: Örök hajlékodba fogadj be, Uram!"},{"m":339,"r":null,"c":"Jézus, Istennek Báránya, Kínjaidat ég s föld szánja. A nap, a nap söté","b":"1. Jézus, Istennek Báránya, Kínjaidat ég s föld szánja. A nap, a nap sötétté változik, A föld, a föld reng és ingadozik. \n2. Hegyek, halmok sülylyedeznek, A kősziklák repedeznek, Holtak, holtak Sírból feltámadnak, A szent, a szent Városban jelt adnak. \n3. Íme, a templom kárpitja Kettéhasad és megnyitja Helyét, helyét A szentek szentének, Jelét, jelét Jehova frigyének. \n4. Mindezekből, ó, mit értsünk? És szívünkbe vajh’ mit véssünk? Isten, Isten Végtelen kegyelmét, Hozzánk, hozzánk Csuda nagy szerelmét. \n5. Fiát a szeretet Atyja Kereszt kínjaira adja, Értünk, értünk Hogy eleget tégyen, Urunk, urunk S üdvözítőnk légyen. \n6. Köztünk van a Szentek Szentje: A híveknek ezt jelentse Az ép, az ép Kárpit hasadása, Földig, földig Kettéhasadása. \n7. Jézus, ki értünk szenvedtél, Hogy éljünk, halálra mentél: Néked, néked Szívből hálát adunk, Holtig, holtig Híveid maradunk."},{"m":340,"r":null,"c":"Te drága Jézus, mi történt tevéled, Hogy oly keményen sújt a zord ítél","b":"1. Te drága Jézus, mi történt tevéled, Hogy oly keményen sújt a zord ítélet? A szörnyű vétket el mivel követted? Mi volt a tetted? \n2. Megostoroznak, tövissel csúfolnak, Arcodba vágnak, gúnyolódva szólnak, Epét ecettel kínálgatni mernek, Keresztre vernek. \n3. Mondd, enynyi kínnak mi az eredetje? Jaj, vétkeimmel vertelek keresztre! Amit Te szenvedsz, Jézus, én okoztam, Fejedre hoztam. \n4. S mily büntetés, mit a világ Reád mért? A jó nyájőrző szenved a juháért; A bűnért, melyet szolgák elkövettek, Az Úr fizet meg. \n5. Meghal a jó, ki hűség volt s alázat, Az él, ki Isten bántására lázadt; A vétkes ember sértetlen, s bilincsben Ott áll az Isten. \n6. Ó, mérhetetlen szeretet, csodás hit, Amely a kínok zord útjára rávitt! Én vigadozva élek és örömben, Te kín-özönben. \n7. Ó, nagy Királyom, minden kor Királya, Hűségedet hogy hirdethesse hála? Nincs emberszív, melyben tanács fakadhat: Néked mit adhat? \n8. Ha trónusodnál, Jézusom, Vezérem, Fejem ragyogva fürdik majd a fényben: Énekelek, hol szentül zeng az ének, Dicsérve Téged."},{"m":341,"r":null,"c":"Ó, Krisztusfő, te zúzott, Te véres szenvedő, Te töviskoszorúzott Kigún","b":"1. Ó, Krisztusfő, te zúzott, Te véres szenvedő, Te töviskoszorúzott Kigúnyolt drága fő, Ki szépség tükre voltál, Ékes, csodás remek, De most megcsúfolódtál: Szent fő, köszöntelek! \n2. Ékességed, te drága, Melytől máskor remeg Világ hatalmassága, Köpés mocskolta meg. Milyen halványra váltál! Szemed fényét, amely Szebb volt minden sugárnál, Ki rútította el? \n3. Mind, ami kín, ütés ért, Magam hoztam Reád; Uram, e szenvedésért Lelkemben ég a vád. Feddő szót érdemelve itt állok én, szegény, S kérlek, lelked kegyelme Sugározzék felém. \n4. Itt állok - ó, ne vess meg - A gyötrelmek helyén; Amíg ki nem hűl tested, El nem mozdulok én. S ha életed kilobban, Alácsuklik fejed, Ölemben és karomban Lesz nyugtató helyed. \n5. Ó, légy érette áldott, Jézus, Egyetlenem, Hogy szörnyű kínhalálod Nagy jót akar velem. Add, hogy hódolva híven Tőled ne térjek el, S ha hűlni kezd a szívem, Benned pihenjek el. \n6. Mellőlem el ne távozz, Ha majd én távozom, A kínban, mit halál hoz, Állj mellém, Jézusom. Ha lelkem félve reszket, S rettent a meghalás, Nagy kínod és kereszted Legyen vigasztalás. \n7. Légy pajzsom és reményem, Ha kétség látogat, Véssem szívembe mélyen Kereszthalálodat. Rád nézzek, Rád szünetlen, S ha majd szívem megáll, Öleljen át a lelkem - Így halni: jó halál."},{"m":342,"r":null,"c":"Jézus, világ megváltója, Üdvösségem megadója, Megfeszített Isten Fia,","b":"1. Jézus, világ megváltója, Üdvösségem megadója, Megfeszített Isten Fia, Bűnömnek fán függő díja: Jézus, engedd hozzád térnem, Veled halnom, veled élnem. \n2. Szent kereszteden kereslek, Szomorú szívvel szemléllek, Mert így gyógyulást reménylek: Moss meg szent véredben s élek. Jézus, engedd hozzád térnem, Veled halnom, veled élnem. \n3. E keresztről, én Reményem, Tekints reám szerelmesen, Épen téríts hozzád engem, Mondván: ”bűnöd elengedtem”. Jézus, engedd hozzád térnem, Veled halnom, veled élnem. \n4. Ne gerjedezz vétkem ellen, Sőt véreddel kegyelmesen, Ily mocskos beteget, híven Moss meg, s bűntől üres lészen. Jézus, engedd hozzád térnem, Veled halnom, veled élnem. \n5. Engem ily nagy szerelmedből, Végy hozzád szent kegyelmedből, Vegyek erőt keresztedből, És végbúcsút bűneimtől. Jézus, engedd hozzád térnem, Veled halnom, veled élnem. \n6. Ajánlom magamat néked: Sebeidben szívemet vedd; Ó, nyíljál fel, piros forrás, mert nagy bennem rád a vágyás! Jézus, engedd hozzád térnem, Veled halnom, veled élnem. \n7. Ez keserves halálodért, Melyet felvettél éltemért, Vedd szívemet mindezekért, Megérdemlett jutalmadért. Jézus, engedd hozzád térnem, Veled halnom, veled élnem. \n8. Nyílj fel, édes szív rózsája, Jó illatú violája, Hogy lehessen maradása Szívemnek, s benned lakása. Jézus, engedd hozzád térnem, Veled halnom, veled élnem. \n9. Engem, bűnöst, kérlek, ne hagyj, Halál rabját kínra ne adj; Sőt, ha eljő majd halálom: Szent jobbodra engedj állnom. Jézus, engedd hozzád térnem, Veled halnom, veled élnem."},{"m":343,"r":null,"c":"Ó, Krisztus, láttam szenvedésed, S borzongásom véget nem ért, Jaj, hog","b":"1. Ó, Krisztus, láttam szenvedésed, S borzongásom véget nem ért, Jaj, hogy halálkín lett a részed Érettem, árva  bűnösért. \n2. A természet velünk zokogja Halálodért fájdalmait, Elbújt a nap, gyászukba rogyva Siratnak válasz tottaid. \n3. Szent áldozat, tedd, meg ne szűnjünk Kereszten látni tégedet! Szent véred mossa csak le bűnünk, Lelkünk előtt az  tár eget. \n4. Jóságod mély és mély a hála, amelylyel hozzád fordulunk; Bűnünkért mentél kínhalálba, Egyetlen Megvál tó Urunk."},{"m":344,"r":null,"c":"Királyi zászlók lobognak, Fénylik titka keresztfának; Az élet ottan ha","b":"1. Királyi zászlók lobognak, Fénylik titka keresztfának; Az élet ottan halni tért, Holtával nyervén drá ga bért. \n2. Átverve szeggel tagjai, És kinyújtva szent karjai; Idvességünknek ára lett, Bűnünkért ő tett e leget. \n3. Dávidnak bétölt írása, Minden népeknek mondása: Isten, kit felfeszítetek, Úr lesz e fán felet tetek. \n4. Légy áldott, oltár s áldozat, melylyel Krisztusunk áldozott: Holton az élet elesett, S holtával adott é letet. \n5. Élő kútfő, Szentháromság! Téged áldunk, legfőbb Jóság! Kérünk: a kereszt győzelmét, Közöljed vélünk ér demét!"},{"m":345,"r":191,"c":"Ím, nagy Isten, most előtted szívem kitárom, Menedékem nincs sehol e f","b":"1. Ím, nagy Isten, most előtted szívem kitárom, Menedékem nincs sehol e földi határon; Ha te nem jössz bánatomra biztató szóval, Italom könny, a kenyerem keserű sóhaj. \n2. Ha a világ nem tudná is számos bűnömet, Teelőled elrejtenem semmit sem lehet; Látja Lelked minden bűnöm, melynek átka sújt: Vedd le rólam, ó, Úr Isten, vedd le ezt a súlyt! \n3. Jézusomra föltekintek a kereszt alatt, Nincs szívemnek nyugodalma vétkeim miatt; Ó, ne büntesd, Uram, azt, kit megtört a bánat: Szálljon reám irgalmadból béke, bocsánat! \n4. Szent Fiadért, ki engemet vérén megváltott, Hallgass meg, ha bűnbánattal hozzád kiáltok! Vigaszoddal térj kegyesen beteg szívemhez, Hozzád térő gyermekednek, Atyám, kegyelmezz!"},{"m":346,"r":303,"c":"Győzhe tetlen én kő szálom, Védelmezőm és kővárom, A keresztfán drága","b":"1. Győzhe tetlen én kő szálom, Védelmezőm és kővárom, A keresztfán drága áron Oltalmamat tőled  várom. \n2. Sebe idnek nagy vol táért, Engedj kedves áldozatért, Drága szép piros véredért, Kit kiöntél ez vi lágért. \n3. Reád  bíztam én ü gyemet, Én Jézusom, én lelkemet, Megepedett bús szívemet, Szegény árva bús fe jemet. \n4. Irgal mazz meg én lel kemnek, Ki vagy ura mennynek, földnek, Könyörgök csak Felségednek, Én megváltó Iste nemnek. \n5. Mutass,  Jézus, kies  földet, Lakásomul adj jó helyet, Ez életben csendességet, Jövendőben idves séget."},{"m":347,"r":305,"c":"Jézus, ki a sírban valál, Általad megholt a halál, Az élet pedig feltá","b":"1. Jézus, ki a sírban valál, Általad megholt a halál, Az élet pedig feltámadott, Mert szent tested meg nem rothadott. Él a Jézus, a mi fejünk, Keresztyének, énekeljünk, Ülvén húsvét ünnepeket, Új győzedelmi éneket. \n2. Hol van, koporsó, hatalmad? Elveszett nyert diadalmad. Hová lett, ó, halál, a fúlánk, Melyet fensz már régóta reánk? Már nem rettegünk miatta, Mert Jézus meghódoltatta Ama félelmek királyát, megnyitván sírjának száját. \n3. Nincs már szívem félelmére Nézni sírom fenekére, Mert látom Jézus példájából, Mi lehet a holtak porából. Szűnjetek meg, kétségeim, Változzatok, félelmeim, Reménységgé, örömökké, mert nem alszom el örökké. \n4. Sőt hiszem, hogy e tört cserép Edény leend még egyszer ép, És tetemim megépíttetnek, Bár veséim megemésztetnek. Gyalázat elvettetésem, De pompás lesz kikelésem, Új eget látván ezekkel Az újra megnyílt szemekkel. \n5. Jézus, segíts engem ebben, Hogy éltem folyjék szentebben, És hogy ne menjek ítéletre, Támassz fel engem új életre. A te lelkednek ereje Az új életnek kútfeje; Hogy hadd legyek élő személy, Lelked által énbennem élj!"},{"m":348,"r":307,"c":"Örvendezzetek, egek, Ti is, földi seregek! Mindnyájan örüljetek, Vígan","b":"1. Örvendezzetek, egek, Ti is, földi seregek! Mindnyájan örüljetek, Vígan énekeljetek, Mert Urunk feltámadott, Nékünk életet adott. \n2. Jézus él, mi is élünk, A haláltól nem félünk, Mert legyőzte a halált, Örök váltságot talált Isteni erejével, Hathatós érdemével. \n3. Nékünk megigazulást És a bűnből gyógyulást, Istennel békességet És boldog reménységet Nyert feltámadásával, örök igazságával. \n4. Előtted arcra esünk, S kérünk, édes kezesünk: Részeltess halálodnak És feltámadásodnak Drága érdemeiben, Édes gyümölcseiben. \n5. Cselekedd Szentlelkeddel, Végtelen érdemeddel, Hogy új életet éljünk, Végre porból felkeljünk Örök, nagy boldogságra És halhatatlanságra."},{"m":349,"r":308,"c":"Jézus meghalt bűneinkért, Harmadnap feltámadott; Mi megigazulásunkért","b":"1. Jézus meghalt bűneinkért, Harmadnap feltámadott; Mi megigazulásunkért Mindenről számot adott. Menynyei szent Atyjának, És ő igazságának A váltságot megfizette A bűnösöknek helyette. \n2. Életét maga letette Önként és jó kedvéből, Azt maga ismét felvette Isteni erejéből. Ó, csudáknak csudája! Íme, az Isten fia Értem életet áldozott, Élővé holtból változott. \n3. A meghalt Jézus vére szólt Nékünk oly drága dolgot, Mert e vér Isten vére volt, Bűnt, halált ezzel oldott. Vér, melynek nincsen mása, Ó, Betlehem forrása! Ó, Jézus egy áldozatja, Isten gyönyörű illatja! \n4. Hogy ez kedves volt Istennek, Azt azzal megmutatta, Hogy szent testét ő Szentjének Sírban soká nem hagyta. És a halál kötelét, A koporsónak tőrét Harmadnap széjjel oldozta, Fiát fogságból kihozta. \n5. Jézus, én megholt életem, Jézus, feltámadásom, Benned bűntől mentté lettem, Benned igazulásom. Ó, adj hát segítséget, Lelki elevenséget Az első feltámadásra: Az új életben járásra. \n6. Istenséged megmutatád Életedben, holtodban; Hatalmasan bizonyítád Sírból kiszállásodban. Ez isteni erővel Jövel, ó, Jézus, jövel! Adj új életet s meghalást, S majd második feltámadást!"},{"m":350,"r":310,"c":"Feltámadt a mi életünk, Vígan méltó énekelnünk, Úr Krisztust dicsérnün","b":"1. Feltámadt a mi életünk, Vígan méltó énekelnünk, Úr Krisztust dicsérnünk, E szent napon is áldanunk, Angyalokkal őt imádnunk, Mint Urunkat, félnünk, Mert őt magasztalják nap, hold s égi seregek, A menynyei szentek. \n2. A földben minden gyökerek, Fáknak bimbói terjednek, Mezők megzöldülnek, Ég madarai zengenek, Fákon vígan énekelnek, Szárnyukon repdesnek; Minden illatozó fűvek gyönyörködtetnek, Dicséretre intnek. \n3. Mert feltámadt ő igazán, Angyala jelenté nyilván Koporsónak jobbján; Tanítványival vigadván megjelent Galileában, Pétert vigasztalván: Örvendj te, ki voltál gyakran bűnért sírásban, Alázatosságban. \n4. Dicséret a nagy Istennek, Életet ki nyert népének, A bűnös embernek, Őt részeltetvén egeknek, Gyönyörűségében minden Lakóhelyeinek; Lelki javaival népét meglátogatja, megtérését várja."},{"m":351,"r":309,"c":"Emlékezzünk ez napon Urunknak haláláról És feltámadásáról, Néki adván","b":"1. Emlékezzünk ez napon Urunknak haláláról És feltámadásáról, Néki adván hálákat: Irgalmazz nékünk! \n2. A Krisztus feltámada Nékünk idvességünkre, És feltámadásával Nékünk hoza életet: Irgalmazz nékünk! \n3. Ezen mi mind örüljünk, Az Úr Istent dícsérjük, És adjunk nagy hálákat Édes Idvezítőnknek: Irgalmazz nékünk! \n4. Krisztus nékünk adaték, Igaz húsvéti bárány, Ki elmosá vérével E világnak bűneit: Irgalmazz nékünk! \n5. Krisztus nagy kínt szenvede És eltörlé a halált Dicső győzedelmével Nékünk idvességünkre: Irgalmazz nékünk! \n6. Hála légyen tenéked, Mi édes Idvezitőnk, Hogy minket megmentettél Minden ellenséginktől: Irgalmazz nékünk! \n7. Adjad te Szentlelkedet, Hogy ezeket hihessük És vallhassuk örökké Mindeneknek előtte: Irgalmazz nékünk! \n8. Adjad, hogy feltámadjunk Mi is minden bűnünkből, És járhassunk előtted új életben örökké: Irgalmazz nékünk!"},{"m":352,"r":null,"c":"Krisztus ím feltámada, Nékünk örömet ada, Vére reánk árada, Haszna raj","b":"1. Krisztus ím feltámada, Nékünk örömet ada, Vére reánk árada, Haszna rajtunk marada: Nyerj irgalmat közbenjáró Jézus Krisztus, szent Atyád előtt! \n2. Krisztus meghalt bűnünkért, Feltámadott éltünkért, Mi vigasztalásunkért, Megigazulásunkért; Nyerj irgalmat közbenjáró Jézus Krisztus, szent Atyád előtt!  \n3. Krisztus kínja érdemünk, Szent halála váltságunk, Vére ártatlanságunk, Felkölte vígasságunk; Nyerj irgalmat közbenjáró Jézus Krisztus, szent Atyád előtt!\n4. Ez az Isten Báránya, Váltságunknak aranya, Halálunknak halála, A kígyónak rontója; Nyerj irgalmat közbenjáró Jézus Krisztus, szent Atyád előtt!\n5. Az ő feltámadása Lőn pokolnak romlása; Az ő örömmondása Lelkünknek vídulása; Nyerj irgalmat közbenjáró Jézus Krisztus, szent Atyád előtt!\n6. Ő megmente bűnünktől, A törvénynek átkától, Istennek haragjától, Az ördögtől, pokoltól; Nyerj irgalmat közbenjáró Jézus Krisztus, szent Atyád előtt!\n7. Azért mi is bűnünkből, Feltámadjunk vétkünkből, E világi kínunkból És mi nagy halálunkból; Nyerj irgalmat közbenjáró Jézus Krisztus, szent Atyád előtt!\n8. Közbenjáró Krisztusunk, Egyetlenegy váltságunk, Kérünk, légy mi oltalmunk, Hogy végre boldoguljunk; Nyerj irgalmat, Közbenjáró Jézus Krisztus, Szent Atyád előtt!"},{"m":353,"r":311,"c":"Krisztus feltámada Igazságunkra, Utat szerze mennyországra, Örök boldo","b":"1. Krisztus feltámada Igazságunkra, Utat szerze mennyországra, Örök boldogságra. \n2. Mind e világ terhét Vállára vette, A hatalmas Atya Istent Értünk megkövette. \n3. De lám, ezt nem érti A hálátlanság, Emberekre honnan szállott enynyi nyomorúság. \n4. Azért nem fogadják Isten beszédét, Jóra intő szent Igéjét: Krisztust, idvességét. \n5. ”Krisztus feltámada” - sokan kiáltjuk, De a bűnnek undokságát Mi meg nem utáljuk. \n6. Tudva, bűnben élünk, Semmit nem félünk, Azért a Krisztus halála Nem használ minékünk. \n7. Támadjunk fel testben Azért a bűnből, Melyért mi kirekesztettünk A nagy dicsőségből. \n8. Vegyük nagy jó kedvvel Krisztus jóvoltát, Atya Isten előtt való kedves áldozatját. \n9. Dicsőség mennyégben Az Úr Istennek, Atya, Fiú, Szentléleknek, Mindörökké, Ámen."},{"m":354,"r":null,"c":"A Krisztust megfeszíték Kegyetlen gonosz népek, Ki miértünk születék,","b":"1. A Krisztust megfeszíték Kegyetlen gonosz népek, Ki miértünk születék, Mennyből nékünk adaték: Kegyelmes Krisztus, Irgalmazz nékünk! \n2. Halálának utána Harmadnap feltámada, Hogy miértünk meghala, Örök halált megrontá. Kegyelmes Krisztus, Irgalmazz nékünk! \n3. Vagyon nagy bizodalmunk, Mert mi is feltámadunk, Krisztussal uralkodunk, Vele együtt vígadunk, Kegyelmes Krisztus, Irgalmazz nékünk! \n4. Reménységünk nagy legyen, Hitünk gyümölcsös legyen, Más istenünk ne legyen, Mely a pokolra vigyen: Kegyelmes Krisztus, Irgalmazz nékünk! \n5. Szálla alá poklokra, Sokaknak váltságára, Poklot hagyá bánatba', Mert nincsen bizodalma, Kegyelmes Krisztus, Irgalmazz nékünk! \n6. Igazságot szeressünk, Hamisságot ne tegyünk, Szegényeket segéljünk, Csak a Krisztusban higygyünk: Kegyelmes Krisztus, Irgalmazz nékünk!"},{"m":355,"r":null,"c":"Mély gyászba borult a természet, Nap, hold, minden csillagokkal; Dél,","b":"1. Mély gyászba borult a természet, Nap, hold, minden csillagokkal; Dél, kelet, észak és enyészet Sírt a sok szent aszszonyokkal, Mikor a Megváltó szenvedett, Feszíttetvén keresztfára, Mikor meghalt s eltemettetett, Hogy lenne váltságunk ára. \n2. De e mély gyászos siralomnak Vége leve nemsokára, És az érzékeny közbánatnak Harmadnap lőn véghatára; Elmúlt a gyász, megszűnt a jajszó, Az öröm viszszaadatott, Hogy hallatott ez angyali szó: Nincs itt az Úr, feltámadott! \n3. Ó, hát ezen mi is örüljünk Az istenfélő hívekkel; E feltámadt úrhoz készüljünk Buzgó és kegyes lélekkel; keljünk fel a bűn halálából, Akik még abban heverünk, Sőt gyarlóságunk mély álmából, Uram, költs fel, arra kérünk! \n4. Hogy így szent példádat követvén, Éljünk új és szent életet Minden bűnünket hátra vetvén, Úgy nyerjük meg jó kedvedet; Végre rövid életünk után Egyességedben lehessünk, Az igazság egyenes útján Szent országodba mehessünk!"},{"m":356,"r":null,"c":"Felvirradt áldott szép  napunk, Ma teljes szívvel vi gadunk, Ma győz a","b":"1. Felvirradt áldott szép  napunk, Ma teljes szívvel vi gadunk, Ma győz a Krisztus, és  ha int, Rab lesz sok ellensége mind. Hallé luja! \n2. Az ősi kígyót, bűnt,  halált, Kínt, poklot, szenvedés  jaját Legyőzte Jézus, Mes terünk, Ki most feltámadott nekünk. Hallé luja! \n3. Az élet győz, a mord  halál A prédát viszszaad ta már, Nagy úrságának vé ge lett, Krisztus hozott új életet. Hallé luja! \n4. A nap s a föld s minden,  mi él, Ma bút örömmel fel cserél, Mert a világnak zsar noka Nem kelhet többé fel soha. Hallé luja! \n5. Mi is éljünk vigad va hát, Daloljunk szép hallé luját, Hadd zengje Krisztust é nekünk, Ki sírból feltámadt nekünk! Hallé luja!"},{"m":357,"r":312,"c":"Jézus, én bizodalmam És Megváltóm életemben, Benned van nyugodalmam. N","b":"1. Jézus, én bizodalmam És Megváltóm életemben, Benned van nyugodalmam. Nem kell semmitől rettegnem, Halál nagy éjszakája, Bár rettentsen fúlánkja. \n2. Jézus, én Megváltóm, él, Én is látom az életet: Lészek Idvezítőmnél, Immár semmi sem rettenthet: Ő a Fő, és nem hagyja, Hogy elveszszék egy tagja. \n3. Reménység kötelével Véle már öszszeköttettem, Erős hitem kezével Már őbelé helyheztettem; El nem szakaszt tőle már Sem élet, sem a halál. \n4. Földi porból vett porom Végre ismét porba tér meg, De föltámaszt egykoron Megváltóm, hogy véle éljek Végtelen dicsőségben: Nála lészek mennyégben. \n5. Ami fáj itt és sóhajt, Az ott lészen dicsőséges; Földből szépen ott kihajt, Mi itt ínségekkel teljes. Erőtelenségemet, Ott letészem bűnömet. \n6. Bátorságban légyetek: Jézus hordoz, mint övéit, Hát ne keseregjetek: Krisztus újonnan megépít. Angyalának szavára Felkeltek nemsokára. \n7. Emeld fel hát lelkedet, hagyj el minden földi vágyat; Bízd rá arra szívedet, Kiből idvességed árad. Jézusnál tartsd kincsedet, Légyen Jézusé szíved!"},{"m":358,"r":321,"c":"A Krisztus mennybe felméne, Hogy nékünk helyet szerzene, Atyjával megb","b":"1. A Krisztus mennybe felméne, Hogy nékünk helyet szerzene, Atyjával megbékéltetne, Életre bévinne. \n2. Ó, mi kegyelmes Mesterünk, Emlékezzél meg mirólunk, Ki meghaltál volt érettünk, Légy jelen mivelünk! \n3. Te látod mennyből éltünket És nagy keserűséginket; Vigasztald meg mi lelkünket, Hogy higygyünk tégedet. \n4. Mert megfogadtad minekünk, Hogy léssz örökké mivelünk; Adjad Szentlelked minekünk, Hogy benned hihessünk. \n5. És oltalmazz meg mindentől, Szent Atyádnak haragjától, Ördögtől és kárhozattól, Minden dühösségtől. \n6. Tekints nagy gyarlóságinkra, E világ csalárdságára; Vigy bé a nagy boldogságba, Te szent országodba. \n7. Egyetemben keresztyének, Az Úr Krisztust dicsérjétek, Őnéki hálát adjatok, Felmagasztaljátok. \n8. Dicséret légyen Atyának És ő Fiának, Krisztusnak, És a mi Vigasztalónknak, A Szentháromságnak."},{"m":359,"r":319,"c":"Úr Jézus, aki felséggel, És dicsőséggel mentél égbe És ottan vettél ha","b":"1. Úr Jézus, aki felséggel, És dicsőséggel mentél égbe És ottan vettél hatalmat, Nagy birodalmat, teljességbe: Lelkünk áldja istenséged És híven téged magaszta lunk, Bárha nem látunk szemünkkel, De hitünkkel megtapasztalunk. \n2. Te is e dicsőségedből, Szent székedből fordítsd le szemed, Erőtlen teremtésidre, Híveidre öntsd ki érdemed. Mennyben létednek hasznában, Javaiban részesekké  tégy; Szent Atyád előtt érettünk, Kik vétettünk, esedezőnk légy. \n3. Mivel te utat nyitottál És tanítottál mennybe menni, Adjad, hogy téged kövessünk És siessünk nyomodba’ lenni. Segítsd igyekezetünket, Vond szívünket te magad u tán, Hogy a te akaratodnak S nyomdokodnak járhassunk útján. \n4. Míg bujdosunk e pusztában S mint hazánkba, az égbe érünk, Légy kezesünk, védj bennünket, És hitünket neveljed, kérünk, Hogy a veszedelmek között Megütközött köztünk ne lé gyen, Hitünknek elevenségét, Reménységét ne érje szégyen. \n5. Majd ha megfutjuk pályánkat, Várt pálmánkat a kezünkbe add, Lelkünket, ó, szerelmesünk, Hű kezesünk, magadhoz fogadd! Testünket is emeld végre Dicsőségre isteni kar ral, Hol tégedet szemlélhessünk, Dicsérhessünk az égi karral."},{"m":360,"r":320,"c":"Szent egek, minden boldogok hajléki, A nagy király jön, nyíljatok meg","b":"1. Szent egek, minden boldogok hajléki, A nagy király jön, nyíljatok meg néki! Nagy oszlopi a levegő égnek, Engedjetek útat e felségnek! Aki kezdetben titeket teremtett, Aki azt mondó: légyen ég és föld, s lett; Aki Igéje a nagy Istennek, Aki által lettenek mindenek. \n2. Ő a békesség örök tanácsában, Mint aki legfőbb a váltság titkában, Emberré lett a teljes időben, A Min terhét szenvedte testében. Meghalt, áldozván halálos kínjával, De fel is támadt maga hatalmával; Ím, győzedelmes bajnok módjára Felmegy és ül szent Atyja jobbjára. \n3. Mennybe menése az ember Fiának Záloga lelkünk menynyei jussának, Melyet szerzett, mint kezes. vérével És közöl minden igaz hívével. Ő emberré, mi atyánkfiává lett, Atyjának minket örökösivé tett: Maga előttünk mennybe felmene, Nékünk is helyet hogy készítene. \n4. Ó, kegyes Jézus, idvességünk ára, Vállalt kezes, ki szent Atyád jobbjára Magasztaltattál, te, ki örök, nagy, Atyáddal egy és örök Isten vagy: Arra szereztél útat érdemeddel, Isten Atyánktól nyert örökségeddel, Hogy dicsőséged lakóhelyébe Mégy könyörülő főpap képébe'. \n5. Áldunk s imádunk mindörökké téged És dicsőítjűk örök istenséged; Jó vagy, Uram, te, igen irgalmas, Pap és király vagy, kegyes, hatalmas. A te érdemed a mi nyereségünk, Mennybe menésed élő reménységünk, Hogy minket is, mint örökségedben, Részeltetsz megnyert dicsőségedben. \n6. Adjad, Úr Jézus, hogy még e világban Sátorozván is, ama mennyországban Részt vehessünk, s mint tulajdonunkkal, Szentül éljünk menynyei jussunkkal, És hogy e földet jó cselekedettel, Hálaadással, buzgó tisztelettel, Mint lakos társai a szenteknek, Pitvarivá tégyük az egeknek."},{"m":361,"r":318,"c":"Vedd el jutalmadat Krisztus, ki magadat Megüresítéd vala! Harcodnak vé","b":"1. Vedd el jutalmadat Krisztus, ki magadat Megüresítéd vala! Harcodnak vége lett, Minden egek felett Az Úr felmagasztala. E példán minden szent Jutalmat vár ott fent, Bár itt nem él boldogul, Mert, hogy felemeled, Mennybe meneteled Adtad erre zálogul. \n2. Jobbján szent Atyádnak Tégedet imádnak A mennyország polgári; Látják dicsőséged, Mely körülvesz téged, E föld minden határi. Mi is leborulunk, Kérvén: tégy ott rólunk Szent Atyád előtt vallást! Félelminket vedd el, Esedezéseddel Nyerj nekünk vígasztalást! \n3. Hiszünk, Uram, benned, Bár el kelle menned S nem látunk testi szemmel. Ó, viselj a mennyből Gondot híveidről, Hű pásztor, kegyelmeddel. Légy ott, hol nevedbe' Gyülekezik egybe Két, avagy három híved; Ha hozzád óhajtunk, Essék meg mi rajtunk Te könyörülő szíved. \n4. Midőn végezetre Eljössz ítéletre Az égnek felhőiben, Illvén méltósággal Szemben a világgal Dicsőséged székiben: Szólj nekünk ily módon, Kik állunk jobbodon, Mint nyájadnak juhai: Kész hajlékim rátok Várnak, ó, bírjátok, Jó Atyám áldottai!"},{"m":362,"r":null,"c":"Ébredjél fel, világ, bűneidből, Vedd eszedbe magad a nagy bűnből, Mely","b":"1. Ébredjél fel, világ, bűneidből, Vedd eszedbe magad a nagy bűnből, Melyet néked utolsó időkről Magyarázott Jézus Krisztus ő ítéletéről. \n2. Minden írások immár bétöltek, A próféták valamit hirdettek, A szent atyák amit reménylettek, Urunk Jézus Krisztus által véghez vitettenek. \n3. Nem késik már az ő eljövése, Közel vagyon e világnak vége, Minden dolgoknak már eljövése; Krisztus Jézus e világra eljő ítélnie. \n4. E világnak istentelensége, Az uraknak nagy kegyetlensége, A községnek engedetlensége Jele bizony, hogy közel már Krisztus eljövése. \n5. Minden rendek vagynak bátorságban, Gyönyörködnek csak az álnokságban; Szeretet nincs az atyafiakban, És kevesen vannak immár, kik hisznek Krisztusban. \n6. Esznek, isznak, nagy bátran lakoznak, Mennyországról de nem gondolkoznak; Elmúlandó dolgokban forgódnak; Azt sem tudják, mely órában azoktól megválnak. \n7. Siketségre vesznek minden intést, Megvetnek már minden jó rendelést; A tanítók nem látnak épülést. Szentírásból mikor tesznek idvességes intést. \n8. Adjunk hálát az Atya Istennek, Dícséretet mondjunk Szent Fiának, Véle egyetemben Szentléleknek: Mindörökkön és örökké a Szentháromságnak."},{"m":363,"r":null,"c":"Jön a harag napja lánggal, Végez majd a rossz világgal, Mondja Dávid a","b":"1. Jön a harag napja lánggal, Végez majd a rossz világgal, Mondja Dávid a szent Pállal. Hogy remeg majd holt, meg élő, Hogyha jön a bűnítélő, Minden tettet számon kérő. Rémes hangja trombitáknak Minden hanton holtig áthat, S felriasztva trónhoz állnak. Természet és halál retten, Hogyha kél a holt ijedten, Számot adni feleletben. Írott könyvet előadnak, Minden titkok benne vannak: Bűn könyve a bírság nap nak. Már ha Bíró ül a székben, Nem maradhat bűn sötétben, Nincs kivétel büntetés ben. Mit mondok majd, árva lélek, Pártfogónak, jaj, kit kérek, Hogyha ott a jók is félnek? Nagy Felség, ki úgy remegtet, S jónak ingyen ad kegyelmet: Irgalomnak kútja, ments meg! Drága Jézus, ne feledd el, Értem jöttél kegyelmeddel; El ne ejts a rossz sereggel! Értem fáradt drága tested, Értem hordtál kínt s keresztet, Kárba munkád mégse veszhet! Hű bírája boszszulásnak, Add, hogy bűnbocsátást lássak, Míg nem jő a számadás nap. Elbukott nőt feloldottál, Latornak is jó szót adtál, Engem is már megbiztat tál. Nyögve hordom anynyi bűnöm, Szégyenkezni meg nem szűnöm: Lelked rajtam könyörüljön! Mind méltatlan, amit kérek, Mégse hagyd, hogy roszszat érjek, Örök tűzben el ne égjek! Majd ha minden bűnös ott áll, Baktól juhnak elválaszszál, Jobbkezedhez kérlek oszszál. S majd ha szód lesz veszte soknak, S ítélt roszszak égni fognak: Végy rendjébe boldogoknak. Esdekellek térden állván, Porrá morzsolt szívvel, árván, Végnapomon jól vigyázz  rám! Az a könnynek lesz a napja, Melyen bírószó fogadja Majd a sírból felkelőket, Istenem, ne vesd el őket! Kegyes Jézus, el ne hagyj, Örök nyugodalmat adj. Á   men."},{"m":364,"r":487,"c":"Ments meg, U ram, engem az örök haláltól, Ama rettenetes napon minden","b":"1. Ments meg, U ram, engem az örök haláltól, Ama rettenetes napon minden bajtól! Midőn az ég és föld meg fognak indulni S eljössz a világot lángokban ítélni. \n2. Reszket min den tagom, borzadok és félek, Én, e földön küzdő szegény bűnös lélek; Ama napon engem ítéletre vonnak, Midőn az ég és föld egyben megindulnak. \n3. Haragnak  napja az, kínok, ínség napja, Nagy nap, mely a bűnöst gyötri, szorongatja, Midőn te, ki mindig éltél és fogsz élni, Eljössz a világot lángokban ítélni. \n4. Örök nyu godalmat adj, ó, Uram, nékünk, Örök világosság fényeskedjék nékünk, Hogy trónusod körül mi udvart állhassunk, S téged, boldogítót, örökké áldhassunk. \n5. Ments meg, U ram, engem az örök haláltól, Ama rettenetes napon minden bajtól, Midőn az ég és föld meg fognak indulni S eljössz a világot lángokban ítélni."},{"m":365,"r":322,"c":"Jézus Krisztus, mi királyunk, Teremtőnk és igazságunk, Megváltónk és v","b":"1. Jézus Krisztus, mi királyunk, Teremtőnk és igazságunk, Megváltónk és vidámságunk, Ki testben lakozál nálunk: \n2. Honnan érdemlettük tőled, Hogy bűneinket elvégyed, A szörnyű halált is szenvedd, E világot kedvedbe vedd? \n3. Pokolra értünk leszállál, Fogságból kiszabadítál, A halálból feltámadtál, Mennyben nékünk helyt foglaltál. \n4. Kérünk azért, édes Urunk, Légy szószólónk és gyámolunk, És mikor innen kimúlunk, Adjad szent színedet látnunk. \n5. Dicsőség légyen tenéked! Atyádnak együtt tevéled! Áldassék a te Szentlelked, Kit nálunk hagyál helyetted!"},{"m":366,"r":324,"c":"Az én időm, mint a szép nyár, Menten lejár, Nem meszsze tő lem a vég.","b":"1. Az én időm, mint a szép nyár, Menten lejár, Nem meszsze tő lem a vég. Ám a lélek el nem enyész, Sőt bére lész Jó vagy jaj: po kol vagy ég. \n2. Nem szükség hát veszteg ülnöm, Kell készülnöm: Égjen jól a  szövétnek, Mert majd amaz öt szüzekkel, Mint ezekkel, Vélem is szá mot vetnek. \n3. Ó, Uram, hová kell lennem, Ha kell mennem Veled, bírám mal szemben! Már ezt is alig állhatom, Ha forgatom Ezt előre  eszemben. \n4. A kürtzengés máris hallik, Már hajnallik, Útban már az  angyalok. Életem csak egy tenyérnyi, S számon kéri Jézusom, ha  meghalok. \n5. Taníts meg, Uram, hogy holtom S rövid voltom Soha el ne  felejtsem, És a jövendő életet, Ítéletet Szívemből ki  ne ejtsem. \n6. Lelkem, mondj le hát e testről, Jóra restről; Egy úton ez zel futnál? Kérlek, vedd ezt jól szívedre: E vér vedre Majd eltörik  egy kútnál. \n7. Segíts ezt megfeszítenem, Ó, Istenem! Magam nem bí rok véle, Mert ha ma megöldöklöttem, Ura lettem: Holnap felkél  új mérge. \n8. Uram, ha arra kell mennem, Hogy kell lennem Tanúnak a  hit mellett: Láttass nyílt eget lelkemmel, Így testemmel Ám ne légyen  kímélet. \n9. Mindebből észbe vehetem: Harc életem, Sok ellensé gim vernek, Lelkem sok ütközet vérzi, Ki nem érzi Vágtát enynyi  fegyvernek? \n10. Időm kevés, de sok a baj, Három a jaj, Ki ne kíván ná végét? Boldog, aki pályát futott, Célra jutott S megtartotta  hűségét. \n11. Kezem én is feléd nyújtom, Szabadítóm, Jézusom, hoz zád tartok! Bízzál, lelkem, nem sülylyedsz itt, Kormány a hit, Várnak már a  révpartok."},{"m":367,"r":328,"c":"Emeljük Jézushoz szemünk, Jön már királyi győztesünk, Mennyből leszáll","b":"1. Emeljük Jézushoz szemünk, Jön már királyi győztesünk, Mennyből leszáll s együtt leszünk. Lelkünk vigyázni meg ne szünjön, Felséges várástól feszüljön, Az álmot űzd el, készen állj, Krisztusnép, jön, jön a Király! \n2. Azt mondta Jézus: Idelenn Új próba és új küzdelem A hívők sorsa szüntelen. Azért ne csüggedjünk, ne féljünk, Az út rövid, végére érünk. Az álmot űzd el, készen állj, Krisztus-nép, jön, jön a Király! \n3. Éneklünk és a perc szalad, A nap, mely nesztelen halad, Az öröklét felé mutat. De míg hangunk majd zengve szárnyal Hozsánnás angyal-kar szavával, Az álmot űzd el, készen állj, Krisztus-nép, jön, jön a Király! \n4. Ó, kérünk, Jézus, jó Urunk, Te szabd meg életünk, utunk: Hány éjszakánk lesz s hány napunk. Bölcs szívedből töltsd meg szívünket. Te ismered jól kis hitünket: Küldj, küldj szent sóvárgást nekünk, Hogy majd ha jössz, készen legyünk."},{"m":368,"r":null,"c":"Jövel, Szentlélek Isten, Tarts meg minket Igédben, Ne légyünk setétség","b":"1. Jövel, Szentlélek Isten, Tarts meg minket Igédben, Ne légyünk setétségben: Maradjunk igaz hitben. \n2. Szenteld meg mi szívünket, Világosítsd elménket, Hogy érthessük Igédet, Mi édes Mesterünket. \n3. Adj isteni félelmet És bizonyos értelmet; Igéddel taníts minket, Gerjeszd fel mi szívünket. \n4. Vigasztald meg elménket; Mindenben segíts minket; Öregbítsed hitünket, Távoztassad bűnünket. \n5. Hogy téged az Atyával És az ő szent Fiával Dicsérhessünk mindnyájan A fényes mennyországban."},{"m":369,"r":null,"c":"Jövel, Szentlélek Úr Isten, Lelkünknek vigassága, Szívünknek bátorsága","b":"1. Jövel, Szentlélek Úr Isten, Lelkünknek vigassága, Szívünknek bátorsága, Adjad minden híveidnek Te szent ajándékodat; Jövel, vigasztaló Szentlélek Isten! \n2. Jövel megnyomorultaknak Nemes vigasztalója, Árváknak édes Atyja! Töltsd bé siralmas szívünket menynyei nagy örömmel. Jövel, mi lelkünknek Édes vendége! \n3. Távoztasd el mi lelkünknek Hitetlen sötétségét; Világosíts meg minket, Hogy az Istennek igéjét Hallhassuk és érthessük! Jövel és taníts meg Az igaz hitre. \n4. Jövel, gerjeszd fel szívünkben Szent szerelmednek tüzét, Rontsd el a gyűlölséget, Hogy mi egyesek lehessünk Isteni szerelmedben: Jövel, mi lelkünknek Nagy vigassága! \n5. Te vagy bizony örök Isten, Ki Atyától s Fiútól Mindörökké származol. Te vagy mi urunk Krisztusnak Áldott, szent ígérete: Te vagy mi lelkünknek Megszentelője. \n6. Te vagy, ki a prófétáknak Általa régen szóltál, Krisztust nekünk ígéréd; Te a szent apostoloknak Szívüket bátorítád; Te vagy erőssége Minden szenteknek. \n7. Te vagy a nagy Úr Istennek Menynyei ajándéka, Igazságnak mestere. Taníts minket a Krisztusnak Igaz ismeretire! Te vagy mi lelkünknek Bölcs tanítója. \n8. Világosítsd meg elménket, Hogy hihessük a Krisztust Egy idvességnek lenni, És az áldott Atya Istent Kegyes atyánknak lenni; Téged ismerhessünk Vigasztalónknak. \n9. Adjad szent ajándékodat, Bátorítsad lelkünket, Hogy vallhassuk a Krisztust! Adjad, hogy mi meggyőzhessük Az ördög csalárdságát! Te vagy mi biztatónk, Minden oltalmunk. \n10. Biztasd félelmes szívünket, Hogy kétségbe ne essünk Halálunknak idején, De nagy bátorsággal, vígan E világból kimúljunk! Jövel, vigasztaló Szentlélek Isten!"},{"m":370,"r":330,"c":"Jövel, Szentlélek Úr Isten, Töltsd bé szíveinket épen, Menynyei szent","b":"1. Jövel, Szentlélek Úr Isten, Töltsd bé szíveinket épen, Me
