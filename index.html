 engedhessünk akaratodnak, Dicséretet mondhassunk te szent Fiadnak, Jézus Krisztusnak. \n5. Hála néked, mennybéli Isten, Ki vigasztalsz minket éltünkben, És el nem hagysz minket nagy szükségünkben, Megerősítesz inkább az igaz hitben, Ígéretedben."},{"m":236,"r":null,"c":"Mindenek meghallják és jól megtanulják, Kik segedelmüket nem Istentől","b":"1. Mindenek meghallják és jól megtanulják, Kik segedelmüket nem Istentől várják: Nincsen Isten nélkül segítség és idvesség. \n2. Ha nem az Úr Isten építi a házat, Ahány építője, mind hiába fárad. Nincsen Isten nélkül segítség és idvesség. \n3. Csak hiába lészen reggel felkeléstek Néktek, kik erősen Istenben nem hisztek: Nincsen Isten nélkül segítség és idvesség. \n4. Ekképpen történik mindnyájan tinektek, Munkával, bánattal kenyeret kik esztek: Nincsen Isten nélkül segítség és idvesség. \n5. Nagy könynyen az Isten mindent ád azoknak, Kik csak benne bíznak s hozzá fohászkodnak: Nincsen Isten nélkül segítség és idvesség. \n6. Mint a sebes nyilak az erős kezében, Erősek a hívek Isten kegyelmében: Nincsen Isten nélkül segítség és idvesség. \n7. Boldog, aki lelkét hittel erősíti, Minden ellenségét bizonynyal meggyőzi: Nincsen Isten nélkül segítség és idvesség."},{"m":237,"r":null,"c":"Reménységemben hívlak, Uram Isten! Reggeli órám rólad áll szívemben; T","b":"1. Reménységemben hívlak, Uram Isten! Reggeli órám rólad áll szívemben; Testem is óhajt hozzád e helyben, Hol éltető víz nincs e kietlenben. \n2. Csudámra vagyon szépsége házadnak, Vajha ott volnék, hol téged szolgálnak! Orvosság én lelkem fájdalmának, Az lenne öröm könynyező orcámnak! \n3. Élesztő nékem nagy-drága beszéded, Melyben dicsőségedet kijelented, Embernek szívét azzal emeled, Szent biztatásra mikor kényszeríted. \n4. Velem viselem ott is ízit annak, Valahol nékem nyugodalmat adnak, Csak jókat tőlem mindenütt hallnak, Édességedben ajakim mozognak. \n5. Sőt mind egész jövendő életemben Áldlak, dicsérlek tégedet örömben. Élet vagy: azért tiszteletedben Hozzád emelem kezeimet hitben. \n6. Azért ajakim csak téged dicsérnek, Szájam és nyelvem rólad énekelnek, Ágyamban is veled beszélgetnek, Éjjel és nappal téged emlegetnek. \n7. Mint drágalátos illatú kenettel És kívánatos, ízes eledellel: Úgy vidul lelkem éltetéseddel, Mikor vigasztalsz angyali örömmel. \n8. Te vagy, ki nékem váltságot ígérhetsz, Ki engemet szent szárnyad alá rejthetsz, Vélem egyedül minden jót tehetsz, Előttem, Uram, soha el nem mehetsz. \n9. Te ígéretedhez mert támaszkodom, Az én lelkemben csak tebenned bízom; Én árvaságom azzal táplálom, Hogy jobb karodnak árnyékában nyugszom."},{"m":238,"r":null,"c":"Teremtő Istenünk, Édes Atyánk nékünk! Hatalmas vagy, Irgalmad nagy: Ín","b":"1. Teremtő Istenünk, Édes Atyánk nékünk! Hatalmas vagy, Irgalmad nagy: Ínségemben, Szükségemben, Kérlek, engem ne hagyj! \n2. Szívem benned bízik, Hozzád fohászkodik; Nézz csendesen, Kegyelmesen, Fájdalmimon, Bánatimon Könyörülj kegyesen. \n3. Tudom, hogy kegyelmed Enyhít mindeneket, Bús szíveket, Sebeseket, Szegénységben, Betegségben ellankadt fejeket. \n4. Jelen van az idő, Hogy te, jó segítő, Meghallgatod Siralmimat, Nékem adod Tanácsodat, Mert tudod sorsomat. \n5. Megváltó Istenünk, Szabadító Urunk: Vagy paizsom, Fő orvosom, Reménységem, Idvességem És gyönyörűségem. \n6. Azért, ó, Jézusom, Legbölcsebb orvosom, Siess, siess, És lelkemnek Segítője Légy testemnek, Megepedt szívemnek! \n7. Nálad lehetetlen, Tudom, semmi sincsen. Nyújtsd kezedet: Bús szívemet, Erősítsd bágyadt lelkemet, Mert áldlak tégedet. \n8. Szent Lélek Istenünk, Vigasztaló Urunk: Bátoríts meg, Oltalmazz meg, Igaz hitben, Szerelmedben Minden jókkal áldj meg! \n9. Keresztemben tűrést, Adj boldog szenvedést, Hogy abban ne Zúgolódjam, És búban ne Tántorodjam, Hozzád folyamodjam. \n10. Légy erős gyámolom, Csak rád támaszkodom. E világi Életemben, Halálom után mennyégben Véled legyek, Ámen."},{"m":239,"r":null,"c":"Úr Jézus hozzád kiáltok, Ó, halld meg esdeklésem; Tetőled kegyelmet vá","b":"1. Úr Jézus hozzád kiáltok, Ó, halld meg esdeklésem; Tetőled kegyelmet várok, Ne hagyj kétségbe esnem! Az igaz hitet kívánom, Ó, adjad azt énnékem: Néked élnem, Mindennek használnom, Szent igédet követ nem. \n2. Ezt is kérem, én Istenem, Megadhatod azt könynyen: Szégyenbe ne engedj esnem, Tarts meg reménységemben. Kiváltkép, ha ki kell múlnom, Hogy csak te benned bízzam, Ne magamban, Sem én jóságomban; Ezt örökké megbán nám. \n3. Adjad, hogy teljes szívemből Engedjek vétetteknek, Te is ingyen kegyelmedből Kegyelmezz vétkeimnek, Igéd légyen eledelem, melylyel lelkem tápláljam És megóvjam, Ha ínség ellenem Támad, el ne nyomas sam. \n4. Gyönyörűség, vagy félelem Te tőled el ne űzzön, Állhatatos mindvégiglen Légyek az igaz hitben. Az van kezedben: add ingyen, Nem cselekedetimből, De kedvedből Ments ki a halálból, Az örök kárhozat ból! \n5. Nagy harcban, ellenkezésben Te segélj meg, Istenem! Csak a te nagy kegyelmedben Van nyugtom és védelmem. Ha kísértet jő, védelmezz; Szent kezed megsegítsen, Meg ne ejtsen, Ami kárt szerezhet; Tudom: nem hagysz elvesz nem."},{"m":240,"r":null,"c":"Ó, én két szemeim, ti az Úrra nézzetek, Hogy kegyelmes hozzám, mindenk","b":"1. Ó, én két szemeim, ti az Úrra nézzetek, Hogy kegyelmes hozzám, mindenkor elhigygyétek; Az ő nagy szerelmét, Hozzám nagy jó voltát Mindenkor hirdessétek. \n2. Megragadlak, Uram, az én igaz hitemmel, Reád támaszkodom erős reménységemmel, El sem is bocsátlak, Amíg meg nem hallgatsz, Az én lelki kezemmel. \n3. Felindítlak téged nagy nyomorúságimmal, Az én bűneimnek számtalan sokságával; Mindaddig kiáltok, Míg bé nem kötsz engem Szent irgalmasságoddal. \n4. Ó, mennybéli Isten, te vagy én reménységem, Kinek hatalmában, kezében ellenségem; Ott vagy te, Úr Isten, Én nagy segítségem, Ahol nincs reménységem. \n5. Tanítsál meg engem a te igaz utadra, Hadd lássak elmenni a te igazságodra; Én ellenségimet Gonosz szándékukban Ne bocsássad szájukra. \n6. Ha tebenned, Uram, nem reménylettem volna, A nagy bánat miatt megemésztettem volna; Az élőknek földén A te javaidat Meg nem láthattam volna. \n7. Azért, ó, én lelkem, serkentsd fel te magadat: Mit töröd, fárasztod nagy bánatban magadat? Majd meg fogod látni Uradnak jóvoltát, Csak el ne hagyd magadat."},{"m":241,"r":215,"c":"Szent vagy örökké, Atya Úr Isten, A magas menynyekben, Ki teremtettél","b":"1. Szent vagy örökké, Atya Úr Isten, A magas menynyekben, Ki teremtettél és megtartottál E nyomorult testben. \n2. Szent a mi Urunk, Úr Jézus Krisztus, Kit értünk bocsátál, Kivel megváltál, Hogy testünk miatt Lelkünk el ne veszszen. \n3. Szent a Szentlélek, Ki az Atyával Egy és a Fiúval, Aki vigasztal És tanít minket Az örök életre. \n4. Szentség, dicsőség, Légyen tisztesség A Szentháromságnak, Ki uralkodik egy Istenségben Most és mindörökké."},{"m":242,"r":216,"c":"Téged, Úr Isten, mi keresztyének Dicsérünk és áldunk, És Atya, Fiú, Sz","b":"1. Téged, Úr Isten, mi keresztyének Dicsérünk és áldunk, És Atya, Fiú, Szentléleknek vallunk. \n2. Néked a tiszta, ártatlan és szent Angyalok szolgálnak, Szüntelen hangos felszóval kiáltnak: \n3. Szent, szent, szent Isten, te seregednek Vagy Ura, Istene! Teljes a menny s föld nagy dicsőségeddel! \n4. Téged a földön a keresztyének Szent gyülekezetje, Szent Atya Isten, mindenkoron dicsér. \n5. És imádandó te szent fiadat, Az Úr Jézus Krisztust, És vigasztaló Szentlélek Úr Istent. \n6. Oltalmazzad meg veszedelemtől A te népeidet: Oltalmazz bűntől s lelki kártól minket. \n7. Dicsérünk téged, menynyei Atyánk, A te szent Fiaddal És mindörökké Szentlélek Istennel."},{"m":243,"r":217,"c":"Téged, ó Isten, dícsérünk, Téged urunknak vallunk, Fő királyunknak esm","b":"1. Téged, ó Isten, dícsérünk, Téged urunknak vallunk, Fő királyunknak esmérünk, Áldunk és magasztalunk; Véghetetlen felséged, Felséged, dicsőséged, Angyal, ember nem foghatja, Mindenik csak csudálhatja. \n2. Királyi széked kerítik Kérubok és szeráfok, Magukat arcra terítik Sok százezer angyalok, Minden boldog seregek, Kikkel az egek zengnek, Lerakván koronájukat, Téged imádnak, Urukat. \n3. És ezt kiáltják szüntelen: Szent, szent, szent a Jehova! Dicsősége földön menynyen Elterjed mindenhova! Mindenütt jelen való, Mindent látó és halló, Királya az angyaloknak, Ura földi királyoknak. \n4. Téged dícsér, Atya Isten, Szent egyházadnak népe, Mind ott fenn, mind alant itten, Mint szent felséged képe. A megszerzett idvesség, A hit és a kegyesség, Mind nagy kegyelmed munkája, Dicsőséged prédikálja. \n5. Istennek egyszülött Fia, Ki bűn nélkül testünket Felvőd és lől atyánkfia, Hogy megváltsál bennünket, Ó dicsőség királya, Minden keresztyén szája Szívből származott énekkel Dícséretedre énekel. \n6. Ó, Szentlélek, egy Istenség Az Atyával s Fiúval, Téged egész keresztyénség Megszentelőjének vall. Ó, dicső Szentháromság, Legfőbb szentség és jóság, Egy idvezítő Istenünk, Téged örökké dícsérünk. \n7. Ó győzedelmes királya, Jézus megváltottidnak! Feje s irgalmas bírája Véren vett szolgáidnak! Jőjj, vezéreljed néped, És áldd meg örökséged; Tápláljad lelkünk igéddel, Szent testeddel, szent véreddel. \n8. Hitünket, reménységünket Szentlelkeddel erősítsd, Istenhez szeretetünket S feleinkhez öregbítsd. Vígy előbb a szentségben, Adj részt a dicsőségben Testi halálkor lelkünknek, Feltámadáskor testünknek. \n9. E végre még ez életben Bocsásd meg bűneinket, Hogy a jövő ítéletben Ne vádoljanak minket. Bízunk is szent véredben, Kezesi érdemedben; A halálban is remélünk, hiszszük, meg nem szégyenülünk."},{"m":244,"r":null,"c":"Áldott légy, örök Úr Isten, Ki vagy foghatatlan felségben, A menynyei","b":"1. Áldott légy, örök Úr Isten, Ki vagy foghatatlan felségben, A menynyei nagy dicsőségben, Angyaloknak nagy örömökben És dícséretökben. \n2. Áldott légy, szentséges Atyánk, Ki kegyesen tekintél reánk, Bár mi halálra méltók valánk, Mert vétkezett mi első atyánk, Kitől mind származánk. \n3. Tőled azért el nem vetél, De minket oly igen szeretél, Hogy szent Fiadnak nem kedvezél, E világra kit értünk küldél, Kivel hozzád szerzél. \n4. Könyörülj mi rajtunk, kérünk, Szent igédet adjad értenünk, Honnan téged megismerhessünk, Hogy örökké Véled élhessünk És örvendezhessünk. \n5. Áldott légy, Úr Jézus Krisztus, És mi egyetlenegy Megváltónk, Mi életünk és közbenjárónk, Szent Atyád előtt egy szószólónk És egy bizodalmunk! \n6. Tekints meg, édes Mesterünk, Ne hagyj bűnünk miatt elvesznünk; Szent hitedet erősítsd bennünk, Mindenben néked engedhessünk És benned bízhassunk. \n7. Mert mi csak te tőled függünk, Azért csak tenéked könyörgünk, Hogy életünkben légy mivelünk, És csak te tőled viseltessünk, El ne tévelyedjünk. \n8. Adj igaz fejedelmeket És keresztyén, bölcs tanítókat, Kik hirdessék akaratodat És hozzánk való jó kedvedet, Irgalmasságodat. \n9. Áldott légy, Szentlélek Isten, Ki Atya-Fiúval vagy Isten Egy természetben s dícséretben, Egy akaratban és szentségben És egy dicsőségben. \n10. Áldott légy, árváknak atyja, Özvegyeknek kegyes bírája, Tévelygőknek igazgatója, Szomorú szívek biztatója És vígasztalója! \n11. Bátoríts minket hitünkben, Adj szeretetet mi szívünkben, Tarts meg mindvégiglen ezekben, Hogy halálunknak idejében Ne essünk kétségben. \n12. De mehessünk az életre, Hol Atya Istennek felsége És a Fiúnak dicsősége Láttatik véled egyetembe' Örökkön-örökké."},{"m":245,"r":null,"c":"Dícséret a Szentháromságnak, Egy örök Istennek, Ki Ura mindennek És te","b":"1. Dícséret a Szentháromságnak, Egy örök Istennek, Ki Ura mindennek És teremtője a világnak: Csak övé légyen a dicsőség És a tisztesség! \n2. Dícséret légyen az Atyának, Ki teremtett épen És takargat szépen Szárnyai alatt hatalmának, Sőt gondot tart bűnös testemre S egész éltemre. \n3. Dícséret légyen a Fiúnak, Ki értem testté lett, S minden bűnt eltörlött, És hozzám nagy-bő irgalmúnak Jelenti magát az életben S az ítéletben. \n4. Dícséret légyen Szentléleknek, Ki engem megszentelt S magának pecsételt, És vígassága a híveknek, Ki vezérel az igaz hitre S örök életre. \n5. Dícséret, áldás és dicsőség, Erő és hatalom, Örök birodalom, Felmagasztalás és tisztesség Légyen lelkemtől néked, Isten, Mennyben és itten!"},{"m":246,"r":null,"c":"Adj Úr Isten, nékünk Szentlelket, Szent igédben építs meg minket, Adja","b":"1. Adj Úr Isten, nékünk Szentlelket, Szent igédben építs meg minket, Adjad megismernünk természetünket, Tekintsd meg szükségünket, könyörgésünket: Adj igaz hitet. \n2. Te vagy, Atyánk, örök Úr Isten, Kiben semmi kétségünk nincsen; Neveljed hitünket te szent igédben, Szent Fiadnak, Krisztusnak ismeretében, Idvességünkben. \n3. Te vagy, Krisztus, mi Idvezítőnk, Szent Atyádnál békesség-szerzőnk; Mi életünk vagy te: lakozzál bennünk, Hogy minden mi dolgunkban téged dícsérjünk És dicsőítsünk. \n4. Ó Szentlélek, kérünk tégedet: Bátorítsad a mi szívünket; Vígasztalj meg minket s igazgass minket, Hogy hallván megérthessük te szent igédet, Idvességünket."},{"m":247,"r":219,"c":"Imádandó Isten, e széles föld néked Zsámolyod és a menny fényes ülő sz","b":"1. Imádandó Isten, e széles föld néked Zsámolyod és a menny fényes ülő széked, A te mindenható kezeid csinálmánya És erőd tüköre e világ alkotmánya; Csak homályt találunk előttünk és mélységet, Elménkkel megfogni akarván ily felséget. \n2. Kezdete sohasem volt a te idődnek, Esztendeid soha el nem végeződnek. Minden dolgok tőled származnak, mint kútfőtől; Te lételt nem vettél semmi megelőzőtől, A változásoknak körülötted helyt nem adsz, Aki régen voltál, te ugyanazon maradsz. \n3. Láthatatlan lélek, te betöltesz mindent, Jelen vagy itt alant, valamint odafent. Nincs oly dolog, melyet szemeid ne látnának, Bár fedjék ködei a sötét éjszakának. Ó, emberek, nincsen az Isten előtt titok, Tudva vannak nála minden gondolatitok. \n4. Csudákkal teljes a természet temploma, Melyekből kitetszik bölcseséged nyoma. Nagy vagy a nagyokban, bölcs vagy a kicsinyekben, Gondod el nem fárad anynyi sok ezerekben; Végtelen jóságod a menny és föld hirdeti, Sokaságát nyelvünk mert ki nem beszélheti. \n5. Szenteknek szentje vagy, ó Isten s nincs hiba Szent akaratodnak határozásiba'. Megáll igazságod, ha tartasz törvényszéket, Mivel jól ismered a szívet és veséket; Mégis a bűnösnek halálán te nem örülsz, Inkább nagy irgalmad szerint rajta könyörülsz. \n6. Boldog nép az, amely imád ily felséget, Boldog, kit ily felség kegyelmébe bévett, Akinek hatalma mindenre elégséges, Jósága megadja, akinek mi szükséges. Tartsd fenn, ó jó Atyánk, köztünk ez ismeretet, Hogy te nem egyéb vagy, hanem merő szeretet."},{"m":248,"r":220,"c":"A csillagos égnek seregei ott fent Tündöklő fényükkel dicsérik az Iste","b":"1. A csillagos égnek seregei ott fent Tündöklő fényükkel dicsérik az Istent. Az egek boltjai alatt forgó világok Mély bölcsességéről beszélő bizonyságok; Az ő szavára lett tenger, hegy, füvek és fák Jóvoltát erejét szüntelenül kiáltják. \n2. Hát én, kibe lelket a jó Teremtő tett, Némán vesztegeljek s ne dicsérjem őtet? Nem, sőt minden lelki erőmet öszszeszedem, Elmémnek szárnyain székihez emelkedem; Szólok, s ha tétováz rebegése nyelvemnek, könynyeim tanúi lesznek tiszteletemnek. \n3. Nyelvem rebeg, de te, ki szívem vizsgálod, Abban oltárodat füstölve találod. Én, ha a napfénybe mártanám is ecsetem, Felséges voltodnak árnyékát sem festhetem; A te tisztelőid bár legyenek angyalok, Csak erőtlen hangon dicsértetel általok. \n4. Ki ruházott fényt a sok ezer napokra, Színes sugárokat rakván orcájokra? Ki indítá útnak a számtalan földeket? Ki kötött egymáshoz enynyi ezer testeket? Kimért útjaikon ezeket ki mozgatja? Uram, a te szádnak mindenható szózatja. \n5. Te tartod a zsengés tavasznak kezeit, Míg kiteregeti színes szőnyegeit; Aranyszín ruhát adsz az ért gabonafőre, Fürtökből koronát tűzöl a szőlőtőre, A megfagyott földet hópelyhekbe pólyálod, Lakosit élesztő örömökkel kínálod. \n6. Uram, ezer nyelvek kellenének számba, Jóságod csudáit hogy vehessem számba; Még ami gonosz is, használ nékünk más részbe, Istennel nem tartók, ezt vegyétek jól észbe, És ha nem vagytok megilletve jóvoltától, Féljetek, mint szökött rabszolgák, haragjától! \n7. Felelj, kételkedő: ki mennydörög ott fent? A szélvész harsogó zúgása kit jelent? A sík tenger vizét ki emeli hegyekké? A szárazföld színét ki sülylyeszti völgyekké? Mindegyik éltető elem ím, felemelte Szavát, hogy van Isten: hát mit kételkedel te? \n8. Uram, munkáidról lészen dicséretem, Míg tart az e végre adatott életem. Kérlek, vedd jó néven, ha egy gyarló féregnek Ajkai töredék dicséretet rebegnek! Te látod, mily buzgók bennem az indulatok, Melyeket jól érzek, ki nem magyarázhatok. \n9. Ó, ha kivetkezvén e testből idővel, Állok széked előtt koronázott fővel, Több lesz énekemben az erő és méltóság, Magasztalván téged, ó, felséges valóság. Röpüljetek elő, kívánt idők, sebesen, Hogy örömeimben több változás ne essen!"},{"m":249,"r":null,"c":"Nagy az Úr, ki fényes házát építette, Ott fenn a számtalan egeknek fel","b":"1. Nagy az Úr, ki fényes házát építette, Ott fenn a számtalan egeknek felette, Hol sok ezer napok fényesítik pitvarát, A magasság s mélység határozzák udvarát: Újul a föld színe vidám tekintetétől, Tengelyestől reszket bús gerjedezésétől. \n2. Dicsérjétek őtet, a menynyei boltok Alatt, ó, csillagok, mik ott lámpásoltok; Ti napok seregi, világító fáklyátok Neve dicséreti között lobogtassátok; Ti sok rendű holdak, a bújdosó földekkel E nagy, erős Urat dicsérjétek énekkel. \n3. Énekeljen neki az egész természet, Napkelet, dél, észak és a napenyészet; Kettőztessék meg a dícséret, midőn annak Hangjai a hegyek felől viszszapattannak; És te, ember, kit ő tett e földön elsővé, Változz dicsőségét mindig buzgó kútfővé. \n4. Magasztald fel őtet, hogy használj magadnak, Dícséretid neki mert hasznot nem adnak; A bűnt vetkezzed le rólad s a testiséget, Hozzá emelkedve dicsőítése végett; Lehullnak, ha vele társalkodol, menynyei Származású lelked földön ragadt szenynyei. \n5. Egyszer se fogjon úgy a nap futásához, Egyszer se jusson el úgy lenyugvásához, Hogy őt ne dícsérnéd szívednek tolmácsával, Egyesítvén szavad a természet szavával; Ez szólít meg téged, hogy hál'adásra serkenj: Szívednek-értelmednek beszél a föld és menny. \n6. Ha esők omlanak a földre záporral, Ha az aszály miatt füstöl a föld porral, Ha fagyos fürtjeit látod a zuzmarának, Ha a liliomok a réteken pompáznak, Ha tisztán süt a nap, vagy fergetegek jőnek: Nagyságos dolgait hirdesd a Teremtőnek! \n7. Ha elborítással az árvíz fenyeget, Ha a dögvész pusztít, ha a had rettegtet: Bízz benne s énekelj őnéki dícséretet, Mert híven szereti az emberi nemzetet; ő a bölcs, ő tudja, néked mi használ, nem te: Győződj meg, hogy téged boldogságra teremte. \n8. Ez a kegyes Isten nem vet engem is el, Rólam is hűséges volta gondot visel; A kincs és dicsőség ha enyémek nem lettek: Igazság-vizsgáló lelket adott helyettek; Adott külső-belső ép érzékenységeket, Kezeimbe lantot, szájamba új éneket. \n9. Uram, amit adtál, tartsd meg azt számomra, Több nem kívántatik én boldogságomra; Én pedig mit adjak néked gyarló létemre, Háládatlanságom hogy ne térjen szememre? Imádlak téged, bételvén szent félelemmel, És dícséretedet egygyé teszem éltemmel."},{"m":250,"r":null,"c":"Atya Úr Isten, rólad vallást tészek, Dícséretedre szám és szívem késze","b":"1. Atya Úr Isten, rólad vallást tészek, Dícséretedre szám és szívem készek: Te vagy az erős, ki tudtál isteni Szóddal semmiből mindent teremteni; Amit fent s alant szemeink szemlélnek, Általad vannak, mozognak és élnek. \n2. Világosság lőn parancsolatodra, A menny és a föld előállt egy szódra; A levegő eget kiterjesztetted, Azzal az egész földet körülvetted; Szódra vált külön a föld a vizektől, Ékesíttetvén fáktól és füvektől. \n3. A napot, holdat és a csillagokat Te függesztetted fel, mint lámpásokat, A madaraknak te adtál szárnyakat, Te küldéd vízben lakni a halakat; A barmok testét élettel élesztéd, Az emberrel bölcs munkád bérekesztéd. \n4. Imádlak téged, aki teremtettél, Szeretlek, mivel Atyámmá is lettél; Ha terheltetik szükséggel életem, Bizodalmamat benned helyheztetem, Mert hatalmas vagy engem megtartani, Még nyavalyám is jómra fordítani."},{"m":251,"r":null,"c":"Meghódol lelkem tenéked, nagy Felség, Szentháromságban ki vagy egy Ist","b":"1. Meghódol lelkem tenéked, nagy Felség, Szentháromságban ki vagy egy Istenség. Csak téged illet minden tisztesség, Mert téged ural az egész föld s ég. \n2. Imád a nagy ég ő teljességével, Mondván: szent, szent, szent az Úr felségével! Teljes a föld s ég dicsőségével, Seregek Ura erősségével! \n3. Imád a földnek kiterjedt nagysága, Mind e világnak nagy hatalmassága; A sok népeknek minden országa, Roppant táborok sűrű sosága. \n4. Imád téged a napnak fényessége, Az éjszakának titkos setétsége; Imád a holdnak ő teljessége: A csillagoknak szép ékessége. \n5. Imád a tenger s a vizek folyása, A sok hegyeknek magas fennállása; Minden szeleknek széjjeloszlása S a madaraknak ékes szólása. \n6. Imádlak én is téged, Teremtőmet, Gondviselőmet és Idvezítőmet, Megszentelőmet s erősítőmet: Én Istenemet, egy Segítőmet. \n7. Imádlak téged, Urát kezdetemnek, Urát végemnek s egész életemnek, Fő szerző okát a természetnek, Halálnak Urát és kegyelemnek. \n8. Imádlak téged, egyedül Uramat, Nem vetem másban én bizodalmamat; Mikor imádlak, halld meg én szómat, Írd be könyvedbe hódolásomat."},{"m":252,"r":null,"c":"Menynyei seregek, boldog, tiszta lelkek, Az Úrra örökké kik az égen né","b":"1. Menynyei seregek, boldog, tiszta lelkek, Az Úrra örökké kik az égen néztek: Őtet teljes szívből ti mind dicsérjétek! \n2. Angyalok, az Úrnak követi kik vagytok, Szentek, kik ő székét mind körülálljátok: Örökké az Urat felmagasztaljátok! \n3. Fényes nap világa, ez világ fáklyája; Szép hold, éj lámpása, csillagok nagy száma Az Úrnak szent nevét mindörökké áldja. \n4. Mert csak ő egyedül minden teremtője, S mindent bír, valamint magában rendelte; Megmarad mindenek ellen ő szerzése. \n5. Azért hát, ti hívek, Úrnak szent serege, Kik leginkább vagytok néki szerelmébe', Örökké szent nevét dicsérjétek mennybe'!"},{"m":253,"r":222,"c":"Isten kezét mutatja Az égnek boltozatja, Mely felettem kiterjed, Szíve","b":"1. Isten kezét mutatja Az égnek boltozatja, Mely felettem kiterjed, Szívem örömre gerjed E remeknek látására. Alkotója lelkemet És minden érzésemet Ragadja csudálására. \n2. Ha elmémmel felhágok E számtalan világok Roppant alkotmányába: Ott látom valójába' Nagy voltát a Teremtőnek. Minél feljebb repülök, Annál jobban szédülök Magasságán e tetőnek. \n3. Ki gyújtá meg ezeket Az örökös tüzeket? E nagy testeket fontba Ki vetette, hogy pontba Egymásnak megfeleljenek? Ki mérte ki útjukat És örök pályájukat, Hogy erről el ne térjenek? \n4. Te vagy az, Mindenható, Kihez hasonlítható Nincs sem földön, sem égen! Te vagy, ki voltál régen, Kiben nincsen fogyatkozás, Kiben nincsen hajdani, Jövendő vagy mostani, Kihez nem járul változás. \n5. Én hát mély tisztelettel, Mely teljes szeretettel, Előtted megnémulok, Zsámolyodhoz borulok, És imádom nagy voltodat, Hogy bármily kicsiny vagyok, Szintúgy, mint ezen nagyok, Tapasztalom jóságodat."},{"m":254,"r":230,"c":"Mindenkoron áldom az én Uramat, Kitől várom én minden oltalmamat. Benn","b":"1. Mindenkoron áldom az én Uramat, Kitől várom én minden oltalmamat. Benne vetem minden bizodalmamat; Mindenkoron dicsérem, mint Uramat. \n2. Igen vigad és örvendez én lelkem, Az Istennek segedelmét hogy kérem, Nyomorultak meghallják, azt örvendem, Vigadjanak Istenben, arra intem, \n3. És mikoron Istenhez kiáltottam, Kegyelmesen tőle meghallgattattam, Őáltala hamar megszabadultam, Háborúságimban is megtartattam. \n4. Lám, Istennek angyala mind tábort jár, Az istenfélő emberek körül jár. Az Istentől azért ki oltalmat vár, Útaiban mindenütt az nagy jól jár. \n5. Segítségül azért Istent hívjátok, Ő jóvoltát kóstoljátok, lássátok! Igen nagy-jó, azt bizonynyal tudjátok: Benne bízó emberek mind boldogok. \n6. Valamíglen élsz ez árnyék világban, Szántszándékkal ne élj a gonoszságban, Sőt életed foglaljad minden jóban, Hogy lakozzál Istennek oltalmában. \n7. Sok jók közt a békességet szeressed, És éltedben mindenkor azt keressed; E világnak békességét ne nézzed, Az ördöggel ne légyen közösséged. \n8. A felséges Isten szemei vannak Igazakon, kik csak őbenne bíznak; Mindazok, kik tőle oltalmat várnak, Kérésükben mindig meghallgattatnak. \n9. Igen közel az Úr Isten azoknak, Töredelmes szívvel akik óhajtnak; Alázatos lélekkel akik járnak, Sok ínségből bizton megszabadulnak."},{"m":255,"r":247,"c":"Mely igen jó az Úr Istent dicsérni, Felségednek, én Uram, énekelni, Sz","b":"1. Mely igen jó az Úr Istent dicsérni, Felségednek, én Uram, énekelni, Szent nevedet dicsérvén magasztalni És mindenütt e világon hirdetni. \n2. Igen reggel irgalmadat hirdetni, Igazságodról éjjel gondolkodni, Hegedűvel, orgonával zengetni, Minden éneklő szerszámmal tisztelni. \n3. Csudaképpen én vigasztalást vészek, Cselekedetidre hogyha tekintek, Kezeidnek munkájában örvendek, Teremtőmnek, megváltómnak éneklek. \n4. Az esztelen ember ezt nem esméri, A hitetlen bolond ember nem érti; Kinek rólad nincs igaz esméreti: Szent Fiadban mert nincs hite őnéki. \n5. E világon gonoszok gyökereznek, Kik mindenkor hamisan cselekesznek; Mint a füvek, virágoznak, terjednek, Hogy örökül-örökké elveszszenek. \n6. Lám, ezeket, Uram, felséges Isten, Kik támadnak a te szent igéd ellen, Viaskodnak a te híveid ellen: Megbünteted, mert vagy örök Úr Isten. \n7. Rólad, Uram, akik megemlékeznek, Mint pálmafák úgy szintén ők zöldellnek; Mint cédrusfák, ugyan meggyökereznek Az igazak, kik igaz hitben élnek. \n8. Vallást tesznek Minden emberek előtt, Hogy az Isten igaz mindenek fölött; Hamisságot soha nem cselekedett, Mint kőszikla, ő ád nagy erősséget."},{"m":256,"r":null,"c":"Irgalmazz, Úr Isten, immáron énnékem! Irgalmazz, Úr Isten, immáron énn","b":"1. Irgalmazz, Úr Isten, immáron énnékem! Irgalmazz, Úr Isten, immáron énnékem, Mert tebenned bízik, Uram, az én lelkem, És tebenned nyugszik, Uram, az én szívem. \n2. Szárnyad alá vetem az én reménységim, Míg elmúlnak tőlem az én ellenségim, És míg eltávoznak tőlem én bűneim: Csak tebenned lésznek, Uram, én örömim. \n3. Tehozzád kiáltok, hatalmas Úr Isten, Mert nincsen, énvélem ki már jót tehessen, Én ellenségimtől engem megmenthessen, És én dolgaimban ki jóra vihessen. \n4. Velem, én szent Atyám, nagy-sok jókat tettél, Mert énnékem mennyből őrizőt küldöttél, Én ellenségimtől engem megmentettél És az én szívemben örömöt szerzettél. \n5. Azért téged, Uram, én felmagasztallak, Te dicsőségedben hatalmasnak mondlak, Mind e világ előtt irgalmasnak vallak; És jóakarómnak én tégedet hívlak. \n6. Kész már az én szívem néked énekelni, Kész most jóvoltodért nagy hálákat adni, És mindenek előtt téged megvallani, A te szent nevedet örökké dicsérni. \n7. Kelj fel azért mostan, én nagy dicsőségem, Légy mindenben nékem kedves segítségem, Erőtlenségemben légy én erősségem És veszedelmemben légy oltalmam nékem. \n8. Én felmagasztalom irgalmasságodat, Mindenkoron vallom te igazságodat, Mind ez egész földön hatalmasságodat: Mindenkor hirdetem a te jó voltodat."},{"m":257,"r":null,"c":"Ne hagyj elesnem, felséges Isten, keserűségemben! Te szent Fiadért lég","b":"1. Ne hagyj elesnem, felséges Isten, keserűségemben! Te szent Fiadért légy segítséggel: ne essem kétségben, Mert mindenfelől, látod, Úr Isten, Vagyok kísértetben. \n2. Az írás rólad, Felséges Isten, bizonynyal azt mondja, Hogy valakinek tebenned vagyon szíve nyugodalma, Az olyan ember meg nem szégyenül, mert te vagy oltalma. \n3. Gyermekségemtől fogva, Úr Isten, mind ez ideiglen Téged hívtalak én segítségül minden szükségemben, Mostan is nincsen több bizodalmam sem földön, sem menynyen. \n4. Nincsen szívemnek több bizodalma, Úr Isten, náladnál, Valamíg gyötresz, szabad légy velem, csak ne haragudjál, Mint kegyes Atya, fiadat dorgálj, csak hogy meg nem utálj. \n5. Csak te egyedül voltál, Istenem, énnékem gyámolom, Nagy fájdalmimban és romlásimban az én vigasztalóm; Ne hagyj elesnem s megszégyenülnöm, kegyes oltalmazóm! \n6. Mely nagy örömem és bizodalmam vagyon nékem ebben: Hogy ígéreted, mint drága zálog, itt van én szívemben; Krisztus Jézusért engem meghallgatsz, tudom, kérésemben. \n7. Jelentsd meg hozzám, felséges Isten, kegyelmességedet És véghetetlen, kegyes atyai te nagy szerelmedet, Hogy teljesítsd be könyörgésemre szent ígéretedet. \n8. Add meg, Úr Isten, te szent nevedért, amit tőled kérek, Szent Fiad által, teljes szívemből melyért most könyörgök, Mert csak tebenned bízom, Úr Isten, míg e testben élek."},{"m":258,"r":null,"c":"Fohászkodom hozzád, Uram, Istenem! Kérlek, kegyelmesen hallgass meg en","b":"1. Fohászkodom hozzád, Uram, Istenem! Kérlek, kegyelmesen hallgass meg engem, Mert tebenned soha nem volt kétségem, Azért most is tehozzád esedezem. \n2. Látod, Uram, igen megnyomorodtam. Előtted nagy nyavalyára jutottam, De míg te szent istenségedben bíztam, Soha semmiben el nem hagyattattam. \n3. Reménységem míg el nem fogyatkozott, A te ígéreted nálam nyilván volt, Hogy énnékem mind megadod azokat, Melyeket én szívem tőled óhajtott. \n4. Azért téged hívlak csak segítségre, És magamat nem is bízom senkire; Én lelkemet vigyed hálaadásra, És szívemet juttasd nagy vigasságra. \n5. Irgalmasságodat mikor hallhatom, Legott elfelejtem minden bánatom; Abban vagyon nékem nagy vigasságom, Bűneimnek bocsánatját hogy bírom. \n6. Jelentsd nékem a te akaratodat, Fordítsd hozzám szent irgalmasságodat; Add meg nékem most, amit tőled várok, Melyért dicséretet örökké mondok."},{"m":259,"r":null,"c":"Benned bíztam, Uram Isten, soha ne gyaláztassam; A te szent igazságodé","b":"1. Benned bíztam, Uram Isten, soha ne gyaláztassam; A te szent igazságodért kérlek, szabadíttassam: Éjjel-nappal könyörgök, halld meg én kérésemet. \n2. Nincs én nékem segítségem: Uram, te légy oltalmam; Bátorságom vagy én nékem és örök bizodalmam: Hajtsd hozzám te füledet, siess, tarts meg engemet. \n3. Erősségem ördög ellen, te vagy nagy reménységem, Szent nevedért ments meg engem, mert nincs nékem érdemem: Éjjel-nappal könyörgök, halld meg én kérésemet. \n4. De sietnek ellenségim titkon tőrbe ejteni; Uram, te vagy reménységem, nékik ne hagyj elveszni: Hajtsd hozzám te füledet, siess, tarts meg engemet. \n5. Ím ajánlom kezeidbe én szomorú lelkemet: Igazmondó örök Isten, oltalmazz meg engemet: Éjjel-nappal könyörgök, halld meg én kérésemet. \n6. Csak hívságot követőknek rontója vagy, Úr Isten; Benned erősen hívőknek irgalmas vagy szüntelen: Hajtsd hozzám te füledet, siess, tarts meg engemet. \n7. Értem immár hozzám való kedves akaratodat; Benned bíztam: mutasd immár nagy irgalmasságodat: Éjjel-nappal könyörgök, halld meg én kérésemet. \n8. Isten, mily nagy dicsőséget tartasz szeretőidnek, Hol örökké gyönyörködnek és véled örvendeznek: Hajtsd hozzám te füledet, siess, tarts meg engemet. \n9. Soha nékik már nem lészen szükségük, szegénységük, Tartod őket titkos házban, hol nincs semmi félelmük: Éjjel-nappal könyörgök, halld meg én kérésemet. \n10. Vallást tészek, hálát adván néked, kegyes Istenem: Mindennémű szükségemben jelen voltát én nekem; Hajtsd hozzám te füledet, siess, tarts meg engemet!"},{"m":260,"r":null,"c":"Szent Dávid próféta éneklő könyvének huszonharmad részében Bízván az I","b":"1. Szent Dávid próféta éneklő könyvének huszonharmad részében Bízván az Istennek az ő reá való nagy gondviselésében, És hálákat adván ő szent Felségének mind egész életében, Igyen dicsekedik lelkében minden hív keresztyének képében. \n2. Tudom, hogy pásztorom s vezérem énnékem az én Uram Istenem, Kinek gondja vagyon testemre, lelkemre, mert ő teremtett engem, Én ő juha vagyok, ő hozzá hallgatok, mert ő megváltott engem; Azért benne bízom, tudom, élet nélkül hogy én nem szűkölködöm. \n3. Az 6 mezejének szép zsíros füvével szépen legeltet engem, Szent ígéretinek édes beszédével mikor vígasztal engem; Anyaszentegyházban és az ő aklában szépen megnyugtat engem, Lopótól, farkastól, hamis tanítótól ott megoltalmaz engem. \n4. Reggel, hogy kiviszen, én előttem mégyen igaz tudományával, Minden napon kétszer megitat engemet ő lelki italával, Lelki folyóvíznek és élő kútfőnek ő gyenge folyásával, Evangéliumnak anyaszentegyházban ő prédikálásával. \n5. Azzal én lelkemet ugyan megújítja és újonnan megáldja, Mennyországnak útát és az igaz hitet énnékem megmutatja; Az ő szent Fiában szomorú lelkemet csak egyedül biztatja, Méltatlanságomban az ő szent Fiáért irgalmasságát nyújtja. \n6. Ily nagy reménységgel és bizodalommal azért te benned bízom, Én Uram, Istenem, testemet, lelkemet én tenéked ajánlom; Ha szintén a halál völgye árnyékában az én fejemet látom: Mert te vagy én vélem, szabadulásomat azért tetőled várom. \n7. Megvígasztalt engem te pásztori veszsződ és te pásztori botod, A sok nyomorúság, melylyel híveidet megsújtod, sanyargatod; melylyel beszédedhez oly nagy szépen őket szoktatod és tanítod, Hogy el ne vesszenek, sőt veled legyenek, mindörökké megtartod. \n8. Ily nagy készülettel ellenségim előtt asztalt szerzesz énnékem, A te szent Fiadnak egy áldozatjával táplálod az én lelkem; Megvígasztalsz engem s mindenkor megáldod bőséggel én életem, Én ellenségimnek nagy boszszúságukra megtartod az én lelkem. \n9. Halandó testemnek ő gyarlóságától megszabadítasz engem, E világ sem árthat sem álnokságával, sem boszszújával nékem, Mert én te általad fő ellenségemet, az ördögöt meggyőztem, Az én életemet csak te benned, bízván, mindenkor helyheztetem. \n10. A te jóvoltodból, kegyelmességedből mindezeket én várom, Mert ezekre való nagy méltóságomat magamban nem találom, Azért minden napon az én életemet én csak tereád bízom, És tudom bizonynyal, hogy tebenned soha én meg nem csalatkozom. \n11. Lészek mindörökké az én Istenemnek és Uramnak házában, Az én Krisztusomnak pásztorsága alatt az anyaszentegyházban, Az ő juhainak, igaz híveinek kívánt társaságában, Kikkel egyetemben örökké vigadok az örök boldogságban."},{"m":261,"r":245,"c":"Kegyelmes Isten, kinek kezében Életemet adtam, Viseld gondomat, vezérl","b":"1. Kegyelmes Isten, kinek kezében Életemet adtam, Viseld gondomat, vezérld utamat, Mert csak rád maradtam. \n2. Add meg énnékem én reménységem Szerint való jódat! Áldd meg fejemet, ki bízik benned, S viseljed gondomat! \n3. A szép harmatot miként hullatod tavaszszal virágra, Sok jódat, Uram, úgy hullasd reám, Te régi szolgádra. \n4. Hogy mind holtomig szívem legyen víg, Téged magasztalván, Mindenek előtt s mindenek fölött Szent nevedet áldván."},{"m":262,"r":231,"c":"Forog a szerencse, Mit bízunk őbenne? Semmiben nem állandó. Csak ideig","b":"1. Forog a szerencse, Mit bízunk őbenne? Semmiben nem állandó. Csak ideig kedvez, Tündöklő üveghez Mindenképpen hasonló. Ki minthogy eltörik, Így ő is változik, Állapotja romlandó. \n2. E rossz, csalárd világ, Ki merő hamisság, Engem már majd elveszte, Mint halat horogra, Úgy csala sok búra Hízelkedő beszéde. Étkével táplála, Melyben rejtve nála Iszonyú csalárd mérge. \n3. Nyughatatlan sok gond Íme, anynyira ront, Hogy nem soká megemészt. Ha nem szánja lelkem Teremtő Istenem, Sok bú, siralom elvészt, Sőt én ellenségem Csudálja, hogy engem A föld is el nem sülylyeszt. \n4. Éljek-e? - nem tudom, Mert késik halálom S kínjaim nevekednek. Kétségbe essem-e, Halált szerezzek-e Nyomorodott fejemnek? Azt nem mívelhetem, Mert elveszti lelkem Haragja Istenemnek. \n5. Tűrnöm hát jobb lészen, Mert még elővészen Istenem, szent Fiáért. Bűnöm elfelejti, Pokolra sem veti Lelkem, ki hozzá megtért. Bár súlyos kereszttel Próbál és megterhel Méltatlan életemért. \n6. Szenvedek békével, Magamat is ezzel Biztatom mindenekben: Szenvedett Megváltóm Többet, én jól tudom, Üdvösségemért testben. Nem egyedül vagyok Földön, ki nyomorgok: Szenvedik ezt is többen! \n7. Megszán még Istenem, enynyi sok siralmim, Tudom, jóra fordulnak. Múlnak sóhajtásim, Noha most könynyeim Szemeimből csordulnak. Mint nap eső után, Így bánatim után örömim megújulnak."},{"m":263,"r":244,"c":"Mikoron Dávid nagy búsultában, Baráti miatt volna bánatban, Panaszolko","b":"1. Mikoron Dávid nagy búsultában, Baráti miatt volna bánatban, Panaszolkodván nagy haragjában, Ilyen könyörgést kezde ő magában: \n2. Istenem, Uram, kérlek tégedet: Fordítsad reám szent szemeidet; Nagy szükségemben ne hagyj engemet, Mert megemészti nagy bánat szívemet. \n3. Csak sírok-rívok nagy nyavalyámban, Elfogyatkoztam gondolatimban, Megkeseredtem nagy búsultomban, Ellenségemre való haragomban. \n4. Hogyha énnékem szárnyam lett volna, Mint a galamb, elrepültem volna; Hogyha az Isten engedte volna, Innét én régen elfutottam volna. \n5. Akarok inkább pusztában laknom, Vadon erdőben széjjel bujdosnom, Hogynem mint azok között lakoznom, Kik igazságot nem hagynak szólanom. \n9. Egész e város rakva haraggal, Egymásra való nagy boszszúsággal; Elhíresedett a gonoszsággal, Hozzá fogható nincsen álnoksággal. \n10. Gyakorta köztünk gyűlések vannak; Özvegyek, árvák nagy boszszút vallnak. Isten szavával ők nem gondolnak, Mert jószágukban felfuvalkodtanak. \n15. Én pedig, Uram, hozzád kiáltok, Reggel és délben s estve könyörgök; Megszabadulást tetőled várok, Az ellenségtől mert én igen tartok. \n18. Te azért, lelkem, gondolatodat, Istenbe vessed bizodalmadat; Rólad elvészi minden terhedet És meghallgatja te könyörgésedet. \n19. Igaz vagy, Uram, ítéletedben: A vérszopókat ő idejükben Te meg nem áldod szerencséjükben; És hoszszú életük nem lészen a földön. \n20. Az igazakat te mind megtartod, A kegyeseket megoltalmazod, A szegényeket felmagasztalod, A kevélyeket aláhajigálod. \n21. Ha egy kevéssé megkeseríted, Az égő tűzbe el-bétaszítod: Nagy hamarsággal onnét kivonszod, Nagy tisztességre ismét felemeled. \n22. Szent Dávid írta a Zsoltárkönyvben, Ötvenötödik dicséretében, Melyből a hívek, keserűségben, Vigasztalásért szerzék így versekben."},{"m":264,"r":null,"c":"Áldjad, én lelkem, a dicsőség erős királyát! Őnéki menynyei karokkal e","b":"1. Áldjad, én lelkem, a dicsőség erős királyát! Őnéki menynyei karokkal együtt zengj hálát! Zúgó harang, Ének és orgonahang, Mind az ő szent nevét áldják! \n2. Áldjad Őt, mert az Úr mindent oly szépen intézett! Sasszárnyon hordozott, vezérelt, bajodban védett. Nagy irgalmát Naponként tölti ki rád: Áldását mindenben érzed. \n3. Áldjad őt, mert csodaképen megalkotott téged, Elkísér útadon, tőle van testi épséged. Sok baj között Erőd volt és örömöd: Szárnyával takarva védett. \n4. Áldjad Őt, mert az Úr megáldja minden munkádat, Hűsége, mint az ég harmatja, bőven rád árad. Lásd: mit tehet Jóságos Lelke veled, És hited tőle mit várhat. \n5. Áldjad az Úr nevét, Őt áldja minden énbennem! Őt áldjad, lelkem, és Róla tégy hitvallást, nyelvem! El ne feledd: Napfényed Ő teneked! Őt áldjad örökké! Ámen."},{"m":265,"r":242,"c":"HAGYJAD az Úr Istenre Te minden utadat, Ha bánt szíved keserve, Ő néke","b":"1. HAGYJAD az Úr Istenre Te minden utadat, Ha bánt szíved keserve, Ő néked nyugtot ad. Ki az eget hordozza, Oszlat felhőt, szelet, Napját rád is felhozza, Atyád ő, áld, szeret. \n2. AZ ÚRRA bízzad dolgod: könynyebbül a teher; Ezer baj közt is boldog, Aki nem csügged el. Minek a gond, a bánat? Mit gyötröd lelkedet? Az Istent kérjed, várjad, S megnyered ügyedet. \n3. A TE irgalmasságod Van rajtam, Istenem, Te jól tudod, jól látod, Hogy mi használ nekem. Sorsomat úgy intézed, Amint te akarod; Bölcs a te végezésed, Ha áld, ha sújt karod. \n4. UTAD van számtalan sok, Uram, és eszközöd; Reánk is szent áldásod Bőséggel öntözöd. Művednek akadálya, Szünetje nincs soha; Úgy téssz, amint kívánja Gyermekeid java. \n5. BíZZÁL, bánatos lélek! Mit bánt a bú, a gond? Él még, ki anynyi vészek Torkából már kivont. Bajaidból kiment ő, Szűnnek keserveid; Rád még a jó Teremtő Víg napot is derít. \n6. ŐBENNE vesd halálig Jó reménységedet: Ő biztos révbe szállít A bajból tégedet. Bár késik a segítség És nem találsz vigaszt: Eloszlik gond és kétség Előbb, mint véled azt. \n7. Ő MEGCSELEKSZI végre Velünk azt, ami jó; Ösvényünk erőssége Te vagy, Mindenható! Bár nehéz földi pályánk, Könny lepi és tövis, De örök pálma vár ránk: Utunk a mennybe visz."},{"m":266,"r":349,"c":"Egek nagy Királya, Magasztalunk téged, Térjen nevedre dicséret! Muland","b":"1. Egek nagy Királya, Magasztalunk téged, Térjen nevedre dicséret! Mulandó és gyarló Életünk átjárja Végtelen kegyelmed árja. Jöjj, segíts, Jóra ints; Rólad zengjen nyelvünk, Vígan énekeljünk! \n2. Dicsérjed, világom, Alkotód hatalmát, Mindenek felett uralmát! Hirdesse a csillag Ránk sugárzó fénye, Mily csodás az Isten lénye! Nagy égbolt, Nap és hold, Kik ott fennen jártok: Ti is Őt áldjátok! \n3. Zengjen minden szívben Boldog hálaének A világ Teremtőjének! Nagy kegyelmessége Gondot visel rólunk, számon tartja minden dolgunk. Égben fenn, Földön lenn Áldassék jósága, Nagy irgalmassága! \n4. Halleluját zengve, Magasztalva áldjad Krisztus által jó Atyádat! Ha az Istent élő, Igaz hittel féled És a szíved Jézusé lett: Boldogság, Üdv vár rád Fenn az ég honában, Hófehér ruhában."},{"m":267,"r":238,"c":"Mire bánkódol, ó, te, én szívem, Mit töröd magad ilyen igen? Ím, a tes","b":"1. Mire bánkódol, ó, te, én szívem, Mit töröd magad ilyen igen? Ím, a testi jókért Bízzál csak az Úr Istenben, Ki uralkodik menynyekben. \n2. A nagy Úr Isten nem hágy tégedet, Tudja ő minden szükségedet, Mind e világ övé; Azért minden szükségedben Bízzál csak az Úr Istenben. \n3. Én Uram és én Istenem te vagy: Szegény szolgádat, engem ne hagyj, Ó, én édes Atyám! Én te szegény fiad vagyok, Senkiben bízni nem tudok. \n4. A gazdag bízik az ő kincsében, De én bízom csak az Istenben, Noha szegény vagyok, Mert aki őbenne bízik, Soha meg nem csalatkozik. \n5. Nem kérek, Uram, én gazdagságot, Ami szükségem, te jól tudod, Mert mindeneket látsz, De főképpen arra kérlek, Uram, hogy teveled légyek. \n6. Minden, ami e világon vagyon, Ezüst vagy arany s egyéb vagyon, Akármi légyen az, Csak kevés ideig tarthat, És idvességet nem adhat. \n7. Nagy hálát adok, Uram, teneked, Értenem hogy adtad ezeket A te szent igédből. Adj mindvégig megmaradást. És idvességes kimúlást!"},{"m":268,"r":225,"c":"Dícsérjük hálaadással Az egy fővalóságot, Ki hűséges gondtartással Vez","b":"1. Dícsérjük hálaadással Az egy fővalóságot, Ki hűséges gondtartással Vezérli e világot. Megtartatik általa, Amit teremtett vala, Ami kezdetben volt, ma is Megvan, és nincs egy híja is. \n2. Tud, mint tőle készült művet Minden dolgot egyenként, Szálanként lát minden füvet És minden port szemenként. Úgy vigyáz az ő szeme Földi teremtésire, Hogy mind megelégül épen, Magához illendőképen. \n3. E világnak történeti Lesznek akaratjából, Nem a szerencse vezeti Azokat csak vaktából, Hanem úgy mennek végbe A földön és az égbe', Amint szájából kijőnek Az egy fő gondviselőnek. \n4. Ha hát tőle kívánatos Jókat áldásul vészek, Jóvoltának háládatos Megismerője lészek; Ha rám nyavalyát ereszt, Rajtam lévén a kereszt, Bár, hogy könynyítsem, nincs módom: Ellene nem zúgolódom."},{"m":269,"r":226,"c":"Istenre bízom magamat, Magamban nem bízhatom; Ő formált, tudja dolgoma","b":"1. Istenre bízom magamat, Magamban nem bízhatom; Ő formált, tudja dolgomat, Lelkem ezzel biztatom. E világ szép formája Az ő keze munkája. Mit félek? - mondom merészen: Istenem és Atyám lészen. \n2. Öröktől fogva ismerte, Hogy mire lesz szükségem, Éltem határát kimérte, Szükségem s elégségem. Lelkem, hát ne sülylyedezz, A hitben ne csüggedezz! Egy kis bajt nem győznél-e meg? Hogy tántorítana ez meg? \n3. Tudja Isten kívánságod, Ád is, mert csak ő adhat, De bölcs, Uram, te jóságod, Tudod, sok elmaradhat. Tudom: gondod reám nagy, Mivel édes Atyám vagy; Mint akarod, hát úgy légyen! Másként hinnem volna szégyen. \n4. A valóságos igaz jót Az Úr meg nem tagadja; Nagy gazdagság és rakott bolt Nem fő jó, ritkán adja. Ki az Isten tanácsát, Megszívleli mondását, Azt ő Lelkével serkenti, Gondját is megédesíti. \n5. E világnak dicsősége Igen hamar elmarad, Kit ma gondok sújtnak, végre Holnap diadalt arat. Csak Atyámban bízhatom, Ő megsegít, jól tudom, Mert az igazaknak Atyja Hű szolgáját el nem hagyja."},{"m":270,"r":235,"c":"Légy csendes szívvel és békével Életednek  Istenében! Ő bír örömnek bő","b":"1. Légy csendes szívvel és békével Életednek  Istenében! Ő bír örömnek bőségével, Véle boldo gulsz mindenben, Ő kútfőd és ő fényes napod, Őtőle jön minden vígságod: Légy csendes szívvel! \n2. Ő bír vígsággal, kegyelemmel, Oly szívvel, mely  feddhetetlen, Ahol ő van, nem sért semmivel, Hordozzon bár  mélységekben; Sok nyavalyádat elfordítja, A halált is kezében tartja: Légy csendes szívvel! \n3. Mint légyen néked s másnak dolga, Az nála nin csen elrejtve, Arra néz szemének világa, Ki búval van  megterhelve. Ő számlálja fohászkodásid, öszszefogja könnyhullatásid: Légy csendes szívvel! \n4. Ha egy sem volna e világon, Kire magad  rábízhatnád, Akkor is állna oldaladon, És hűségét  tapasztalnád. Ő tudja titkos bánatidat, Elvenni mikor kell azokat: Légy csendes szívvel! \n5. Ő hallja lelked óhajtásit, Mit nem mernél  megmondani, Néki szíved titkos panaszit Éppen bízvást  megvallani. Nincs meszsze ő, sőt itt áll köztünk, Meghallja s adja, amit kérünk: Légy csendes szívvel! \n6. Ki a mezei madaraknak Megadja e ledelüket, Ki juhoknak s egyéb barmoknak Szépen tartja  életüket, Ő téged, egyet eltartani, Éhség ellen meg tud menteni: Légy csendes szívvel! \n7. A segítség ha kissé késik, De ugyan csak  eljő végre, A várakozás, roszszul esik, De majd válik  üdvösségre; Ami lassan jő, bizonyosabb, Ami késik, kívánatosabb: Légy csendes szívvel! \n8. Ne vedd szívedre, az ellenség Amit rád költ  hazugsággal. Hadd jöjjön csúfság, keserűség: Ítél az Úr  igazsággal. Ha Isten a te jó barátod, Nem lehet emberektől károd: Légy csendes szívvel! \n9. Hogy is lehetne másként dolgunk? Szenvedni kell  az embernek, Amíg e földnek útján járunk, Csak nyavalyák  környékeznek. A kereszt botja bárha terhel, Azt is leteszszük életünkkel: Légy csendes szívvel! \n10. Van Isten népének szombatja, Akkor az  Úr megszabadít, Ínség kötelét elszaggatja, Teljes sza badságra állít, S az idvezültek seregében Vég nélkül élünk békességben: Légy csendes szívvel!"},{"m":271,"r":null,"c":"Mint Isten akarja, legyen, Szent az ő végezé  se. Kész segítségükre me","b":"1. Mint Isten akarja, legyen, Szent az ő végezé  se. Kész segítségükre megyen, Kik benne bíznak vég  re. Inségekből, Kegyelméből Megsegít, sújt mértékkel: Ki benne bízik, nem esik Szégyenbe, és nem vész   el. \n2. Az Úr vígságom s reményem, Bizodalmam s éle  tem, Mint akarja, mind úgy légyen, Megnyugszik abban hi  tem. Igaz szava: hajam szála Nála számba vétetett, Vigyáz, őriz, sem tűz, sem víz Nékem hát kárt nem te  het. \n3. Azért bízvást e világból, Amint az Úrnak tet  szik, Elmégyek akaratjából: Mindenkor jómra vá  lik. Néki adom és ajánlom Végső órán lelkemet, Bűnön, poklon és halálon Jézus vett győzedel  met. \n4. Uram, még ez egyre kérlek, Ne tagadd ezt meg tő  lem: Ha ostromol gonosz lélek, Ó, ne hagyj megcsügged  nem! Segélj engem, én Istenem, Neved dicsőségére, Ki ezt hiszi, az megnyeri, Ámen-t hát mondok er  re."},{"m":272,"r":412,"c":"Mind jó, amit Isten tészen, Szent az ő akaratja, Ő énvélem is úgy tégy","b":"1. Mind jó, amit Isten tészen, Szent az ő akaratja, Ő énvélem is úgy tégyen, Mint kedve néki tartja. Ő az Isten, Ki ínségben Az övéit megtartja, Hát légyen, mint akarja. \n2. Mind jó, amit Isten tészen, Ő engemet meg nem csal, De igaz ösvényen viszen, Én megelégszem azzal, Hogy kedvében, Kegyelmében Ő forgatja dolgomat, Csak rá hagyom magamat. \n3. Mind jó, amit Isten tészen, Ő engem meg nem utál, Mint jó orvosom, úgy tészen, És mérget ő nem kínál. Orvosságot, Boldogságot Énnékem készít, tudom, Azért csak benne bízom. \n4. Mind jó, amit Isten tészen, Ő az én idvességem, Ő velem roszszul nem tészen, Rábízom egész éltem. Örömömben, Keresztemben Mind nyilván megmutatja, Hogy javamat akarja. \n5. Mind jó, amit Isten tészen: Ha oly pohárt innék is, Amelynek íze szívemnek Nagy-keserűn esnék is, De eltűröm, Mert víg öröm Felváltja ezt végtére, Sok búm enyhítésére. \n6. Mind jó, amit Isten tészen, Mind örökké ezt vallom, Ha rajtam bú, bánat lészen S kell boszszúságot látnom. Mindazáltal Megvigasztal, Mint édes Atyám, engem, Mert csak ő segítségem."},{"m":273,"r":null,"c":"Az Úr Istent magasztalom, Jó voltáról emlékezem, Mindig hozzá folyamod","b":"1. Az Úr Istent magasztalom, Jó voltáról emlékezem, Mindig hozzá folyamodom, Mert meghallgat, azt jól tudom. \n2. Számtalan kínokban valék, Bűneimért kit érdemlék: De ismét megkönynyebbülék, Mihelyt vigasztalást hallék. \n3. Elterjesztvén kezeimet, Kiáltottam Istenemet, Csak bé sem hunytam szememet; Nem leltem sehol helyemet. \n4. Magamban én dolgaimról, Elébbeni életemről, Nagy kedves nyájasságomról: Gondolkodtam énekimről. \n5. Nagy erősen, igaz hittel, Magam Isten beszédével, Kegyelmes ígéretével, Bátorítám Szentlelkével. \n6. Csuda irgalmasságodat, Hiszem, Uram, hatalmadat, Onnan vészen bizodalmat, Én lelkem minden oltalmat. \n7. Kezeidnek karjaiban, Élet, halál birtokodban, Megmutatád, hogy markodban, Vagyon minden oltalmadban. \n8. Erős vitéz mint népeit, Az ember ő két szemeit, Mint jó pásztor ő juhait: Úgy oltalmazza híveit. \n9. A híveknek számuk vagyon, Nevük nála írva vagyon, Hajuk szála számon vagyon: Rájuk gondja van oly nagyon. \n10. Ne félj azért háborúdban, Ó, én lelkem, nyavalyádban; Erős légy bizodalmadban, Mert vagy Isten oltalmában."},{"m":274,"r":null,"c":"Ki Istenének átad mindent, Bizalmát csak belé veti, Azt csudaképpen őr","b":"1. Ki Istenének átad mindent, Bizalmát csak belé veti, Azt csudaképpen őrzi itt lent, Ínség, baj közt is élteti. Ki mindent szent kezébe tett, Az nem fövényre épített. \n2. A súlyos gondok mit használnak, A sóhaj, sok jajszó mit ér, Ha sebeink még jobban fájnak S mindennap kínunk viszszatér? Így terhünk egyre súlyosabb, Ha lelkünk búnak helyet ad. \n3. Csak légy egy kissé áldott csendben: Magadban békességre lelsz, Az Úr rendelte kegyelemben Örök, bölcs célnak megfelelsz. Ki elválasztá életünk, Jól tudja, hogy mi kell nekünk. \n4. Zengj hát az Úrnak s járd az utat, Mit éppen néked Ő adott; A mennyből gazdag áldást juttat S majd Jézus ád szép, új napot. Ki Benne bízik és remél, Az mindörökké Véle él."},{"m":275,"r":null,"c":"Az Úr Isten az én reménységem, Erősségem Mindenféle ínségben; Csak től","b":"1. Az Úr Isten az én reménységem, Erősségem Mindenféle ínségben; Csak tőle várom Igaz boldogságom: S meg is találom. \n2. Benne élek, haláltól nem félek: Jót reménylek, Hogy tőle el nem térek; El nem enyészem A sírban egészen: Mennyben lesz részem. \n3. Semmi engem tőle el nem választ, Jól tudván azt, Hogy sok jóval eláraszt; Erősít engem Erőtlenségemben És szükségemben. \n4. Azért egész életem fogytáig Csodálom itt Szent kezének munkáit, S intem lelkemet: Áldjad Istenedet, Üdvözítődet. \n5. Oltalmazzad, Uram, egyházadat, Szent nyájadat, mely vallja szent Fiadat, Ki bűneinkért Ártatlan bárányként Szenvedett sok kínt. \n6. Hogy e földön szent gyülekezeted Dicséretet Zengvén, áldja nevedet, Míg szemtől szemben Magasztalunk mennyben Mind egyetemben."},{"m":276,"r":212,"c":"Egyedüli reményem, Ó, Isten, csak te vagy; Jövel és nézz meg engem, Ma","b":"1. Egyedüli reményem, Ó, Isten, csak te vagy; Jövel és nézz meg engem, Magamra, ó, ne hagyj! Ne légy tőlem oly távol, Könyörülj hű szolgádon, Úr Isten, el ne hagyj! \n2. Ha a nehéz időkben Elcsügged a szívem, Vigasztalást igédben, Uram, te adj nekem! Ha kétség közt hányódom És mentségre nincs módom, Te tarts meg, Istenem! \n3. A földön ha elvesztem Szerelmem tárgyait, Maradjon meg mellettem Szerelmed és a hit; Csak azt el ne veszítsem, Mi benned, ó, Úr Isten, Remélni megtanít! \n4. Földi jó és szerencse Mulandó, mint magunk, De a hit drága kincse Örök és fő javunk; Hitünk áll rendületlen, Hogy Isten véd szüntelen: Élünk vagy meghalunk. \n5. Uram, a nyomorultat, a gyöngét el ne hagyd, Az árvát, elhagyottat Gyámolítsd te magad! A szegényt, ki remélve Csak reád néz az égre: Úr Isten, el ne hagyd!"},{"m":277,"r":229,"c":"Gondviselő jó Atyám vagy, Ó, én édes Istenem! Látom én, hogy minden el","b":"1. Gondviselő jó Atyám vagy, Ó, én édes Istenem! Látom én, hogy minden elhagy E világon, csak te nem! Hozzád vágyom, benned élek, Üdvöt mástól nem remélek. \n2. Mint az alélt bús virágra Megújító harmatot: Vérző szívem fájdalmára Csak te hintesz balzsamot. könynyű sorsom terhe rajtam, Ha imára nyílik ajkam. \n3. Rám-rám derül ismeretlen Utamon egy kis öröm, Azt is a te véghetetlen Jóságodnak köszönöm; hálakönynyem tündöklése A te neved hirdetése. \n4. Gyenge vagyok, lankadoznak Buzgóságom szárnyai, Bármily híven vágyakoznak Színed elé szállani; Ó, adj erőt, hogy míg élek, Egyedül csak néked éljek! \n5. Ó, add, hogy ha majd bevégzem E mulandó életet, Lelkem tisztán és egészen Egyesüljön teveled. El ne vonjon semmi többé, Tied legyek mindörökké!"},{"m":278,"r":457,"c":"Dicsőült helyeken, menynyei paradicsomban, Akik vigadoztok véghetetlen","b":"1. Dicsőült helyeken, menynyei paradicsomban, Akik vigadoztok véghetetlen boldogságban, Szent és ártatlan állapotban; Az Úrnak nevét énekszóban, Magasztaljátok vigasságban. \n2. Lássátok, ti dicső angyali lelkek az égben, A fénylő menynyei testek roppant seregében: Mint uralkodik dicsőségben Az Úr, és őtet felségében Imádjátok tiszta szentségben! \n3. Nap, hold, csillagos ég! Ti az Urat dicséritek, Jóságát, hatalmát, bölcsességét hirdetitek; Mert amely rendet ő tinéktek Kiszabott, az a ti törvénytek És ti annak híven engedtek. \n4. Felhők, égi vizek, harmat, hó, jég és záporok! Villám, égi tüzek, dörgések és csattogások! Szélvész és csendes fuvallások! Színekkel ékes szivárványok! Mind az Úrnak szolgái vagytok. \n5. A földet kinyitó kies tavasz vidámsága, A mindent érlelő nyári idő forrósága, A gyümölcsös ősz gazdagsága, Sőt még a tél is bizonysága: Hogy nagy a teremtő jósága! \n6. Tenger, föld, szigetek s a hegyek pompás szépsége, Erdők és ligetek, folyóvizek kiessége, Sík mezők, rétek ékessége, Vetések kellemetessége: Mind a teremtő dicsősége! \n7. Fák, bokrok, csemeték, gyümölcsöket hozó kertek, Pompás liliomok s minden virági szépségek, Színekkel kihímezett rétek, Apróbb és nagyobb növevények: A gondviselést hirdessétek. \n8. E földön lakozó minden állat boldogsága, A szárnyon repdeső madaraknak vidámsága, A halak s férgek sokasága, Egyszóval az élők világa Mondja: mily nagy az Úr jósága! \n9. Bölcs Isten remeki! Kik az ő képei vagytok És őtőle lehelt emberi lélekkel bírtok: Az örökkévalót lássátok Munkáiban és imádjátok; Egy szívvel és szájjal mondjátok: \n10. Dicséret, dicsőség, tisztesség és hálaadás, A szentek Urának légyen örök magasztalás! Kiben soha nincs megváltozás, Vagy ígérettől elhanyatlás: Tőle fejünkre szálljon áldás!"},{"m":279,"r":443,"c":"Vígak e föld lakosai, Mert megnyíltak ajtajai Az Úr bő tárházának, Víg","b":"1. Vígak e föld lakosai, Mert megnyíltak ajtajai Az Úr bő tárházának, Víg a magvető, hogy néki Orcájának verejtéki Nem hiában hullának Mert ahol hintett marokkal, Most kiterjesztett karokkal Hordja kévéi sorát; Aki segítségül híván Az Urat, dolgozni kíván, Nyer tőle ily adományt. \n2. Ezért, ó jóltévő Atyánk, A mi szívünk, nyelvünk és szánk Csak tégedet magasztal: Hogy ékeskedik a mező gyümölcscsel és az éhező Számára készül asztal. Mert amit más nem adhatott, Hintél esőt és harmatot A szomjúzó földekre. Napodat az igazaknak, Valamint a hamisaknak Felhoztad mezejükre. \n3. Tartsd meg, Uram, a munkásnak Erejét az aratásnak Örvendetes idején, Oltalmazd meg kezünk között, Amit a föld gyümölcsözött Kinek kinek mezején, És adjad, hogy mi azokkal A tőled vett áldásokkal Háládatosan éljünk; Akár iszunk, akár eszünk, Vagy akármit cselekeszünk, Jóvoltodról beszéljünk. \n4. Ha a kenyeres kosárok Bételnek, mi mint sáfárok, úgy tartsuk a magunkét. Marhánkat el ne tagadjuk, Sőt abból önként kiadjuk A felebarátunkét. Add tudtunkra, hogy el nem vész Az ajándék, sőt az a rész Marad örökre nálunk, Melyet fordítunk a végre, Hogy másokat, ha szükségre Jutnak, abból tápláljunk."},{"m":280,"r":454,"c":"Ismét egyik esztendeje, Istentől kimért ideje Telék el a mulandóságnak","b":"1. Ismét egyik esztendeje, Istentől kimért ideje Telék el a mulandóságnak: Az égi testek órája Lefolyván, lett új példája A közös változandóságnak; Elmúlt vége, mint kezdete, Már van csak emlékezete. \n2. Boldog, ki csendes lélekkel, És nem könynyező szemekkel Tekinthet viszsza folyására, Ki, ha magát megkérdezi, Belső örömmel érezi, Hogy szolgált ez jobbulására, Hogy ment mind az ismeretben Előbb, mind a szeretetben. \n3. Boldog, kinek nem kell szánni Elvesztett idejét s bánni Megbecsülhetetlen óráit, Kinek hív emlékezeti Elébe nem helyezteti Helyrehozhatatlan hibáit, Ki az időt megbecsülte, A hivalkodást kerülte. \n4. De vajon melyik halandó Volna anynyira állandó A jóban, aki meg ne esne? Kinek volna olyan szíve, Hogy a kísértésnek íve Rajta oly nyílást ne keresne, Melyen lopva hozzá férjen És az elevenig érjen? \n5. Tökéletességnek Atyja, Az öröm szívemet hatja, Valahányszor azt elgondolom, Mely sok jókat vettem tőled! De elrejtőzném előled, Ha meg másrészről megfontolom: Azokkal mily roszszul éltem, Elvesztegetni nem féltem. \n6. Minthogy azért te teheted, Véghez egyedül viheted, Hogy a jót akarjam és tégyem: Engedd, hogy a múlt esztendőt, Mint már viszsza nem jövendőt, Magamnak tükörül felvégyem; A jót benne követhessem, A roszszat elkerülhessem."},{"m":281,"r":456,"c":"Lelkünk, testünk teremtője És kegyes gondviselője, Imádjuk jóságodat É","b":"1. Lelkünk, testünk teremtője És kegyes gondviselője, Imádjuk jóságodat És irgalmasságodat Hogy minden elfolyt időnkben, Közelebb ez esztendőnkben A te kezed béfedezett, Gonoszoktól védelmezett. \n2. Szent igédet hirdettetted, Mi lelkünket legeltetted, Adtál jó békességet, A jóra tehetséget; Ételt, italt, ruhát adtál, Egészséget szolgáltattál, És az esztendő végére, Juttattál várt estvéjére. \n3. Uram, a te kegyelmednek És hű gondviselésednek Ily sok ajándékiért, Drága adományiért Teljes szívünkből, lelkünkből És minden tehetségünkből Áldjuk te istenségedet, Nyújtsad erre kegyelmedet. \n4. Jézus szent áldozatjáért És érdemes haláláért Töröld el bűneinket És minden vétkeinket, Melyeket eltölt időnkben, Közelebb ez esztendőnkben Cselekedtünk és gondoltunk, Vétkes nyelvünkkel szólottunk. \n5. Urunk, újítsd meg szívünket, Világosítsd értelmünket, Adj a jóra kegyelmet, Vezérlő segedelmet, Hogy új életet élhessünk, Végre te hozzád mehessünk, Szent Felségednek elébe, A boldogok seregébe."},{"m":282,"r":null,"c":"Nékünk születék menynyei király, Idvezítőnek kit mond az angyal: Új es","b":"1. Nékünk születék menynyei király, Idvezítőnek kit mond az angyal: Új esztendőben mi vigadjunk, Született Jézust mi imádjuk! \n2. Régen megírák ezt a próféták, Hogy fiat szül majd egy nemes virág: Új esztendőben mi vigadjunk, Született Jézust mi imádjuk! \n3. Szűz Máriától gyermek születék, De Szentlélektől ő fogantaték: Új esztendőben mi vigadjunk, Született Jézust mi imádjuk! \n4. Nagy hatalmas lőn e kisded gyermek, Megtöretének sok ellenségek: Új esztendőben mi vigadjunk, Született Jézust mi imádjuk! \n5. Győzedelmet vőn a kárhozaton, Győzedelmet vőn örök halálon: Új esztendőben mi vigadjunk, Született Jézust mi imádjuk! \n6. Nincsen a bűnnek hatalma rajtunk, Kiknek e gyermek lészen oltalmunk: Új esztendőben mi vigadjunk, Született Jézust mi imádjuk! \n7. Adjunk nagy hálát az Úr Istennek És idvezítő Jézus Krisztusnak: Új esztendőben mi vigadjunk, Született Jézust mi imádjuk! \n8. Dicsőíttessék a Szentháromság, Adja minékünk szent ajándékát: Új esztendőben mi vigadjunk, Született Jézust mi imádjuk!"},{"m":283,"r":451,"c":"Az Úrnak jó volta napjainkhoz napokat told, Melyeket bizonyos részekre","b":"1. Az Úrnak jó volta napjainkhoz napokat told, Melyeket bizonyos részekre oszt a nap és hold; Nyomain e két vezetőnek Tél, tavasz, nyár és ősz eljőnek, Engedvén a bölcs Teremtőnek. \n2. Jó Atyánk, az elmúlt esztendő minden szakasza Jóságod tanúja, szívünknek nincs rád panasza; Bizony, az Úr minket kedvellett, mert lelki adományi mellett megadta, ami nékünk kellett. \n3. Úr Isten, ki minket sok áldásiddal töltél be, Ez új esztendővel jó kedved ne szakaszd félbe! Áldd meg kezdetét s végét ennek, Hogy midőn napjai lemennek, Mondhassuk: dicsőség Istennek! \n4. Vigyázz híveidre s hab közt hánykódó hajódra, Vigyázz országunkra s minden elöljáróinkra, Akik népedet úgy vezessék, Hogy igazság és jó békesség Egymást csókolva ölelgessék. \n5. E gyülekezeten, mely e helyre telepedett, Könyörülj, Úr Isten, Bővítsd rajta kegyelmedet, Áldd meg nagyjait, kicsinyjeit, Mind köz, mind tanácsos rendjeit; Töröld el a sírók könynyeit! \n6. Adj vidám órákat, ha nekünk azt jónak látod, Békességes tűrést, ha veszsződet ránk bocsátod; Ha több esztendőt nem számlálunk, És ma vagy holnap el kell válnunk: Add, hogy légyen boldog halálunk!"},{"m":284,"r":453,"c":"Áldjuk a nagy Isten jóságát, Magasztaljuk irgalmasságát; Szívünkből sz","b":"1. Áldjuk a nagy Isten jóságát, Magasztaljuk irgalmasságát; Szívünkből szánk énekeljen, Dícséretével bételjen E mi kegyelmes jó Atyánknak!\n2. Mert megújítá esztendőnket, meghoszszabbította időnket, Virrasztván új szakaszára És e nappal új napjára Világi rövid életünknek. \n3. Ó, nagy Isten, hát mik vagyunk mi? Porok, és nincs érdemünk semmi. Nagy bűnösök, méltatlanok, Mert vétkeink számtalanok: Mégis kedvezél életünknek. \n4. Mivel fizessünk, Atyánk, néked, Kinek a menny felséges széked? Semmire nincsen szükséged: Elégséged, dicsőséged Magadban vagyon határ nélkül. \n5. Nálad legkedvesebb ajándék A szent életre való szándék; A jó szív és tiszta lélek, Ő, legfelségesebb Lélek, Nem útáltatik meg tetőled. \n6. Teremts új szívet hát mibennünk, Hogy lehessen elődbe mennünk, És nálad kedvet találjunk, Boldog napokat számláljunk E felderült új esztendőben. \n7. Lelki s testi áldások Atyja, Egeidnek gazdag harmatja Szálljon mennyből híveidre, Tulajdon teremtésidre, Kik tőled várnak minden jókat. \n8. A Jézusért, közbenjárónkért, Mi egyetlenegy szószólónkért Légy kegyelmes, kérésünket, Halld meg esedezésünket, Kik rád bízzuk minden ügyünket."},{"m":285,"r":452,"c":"Örök Isten, kinek esztendők Nincsenek létedben, Jelen vannak múltak, j","b":"1. Örök Isten, kinek esztendők Nincsenek létedben, Jelen vannak múltak, jövendők Egy tekintésedben; Minket pedig, mihelyt születünk, Már a koporsó vár, A bűn miatt lefoly életünk a halál velünk jár. \n2. Ó, mely sokan elaluvának A múlt esztendőbe’! Kik nálunknál jobbak valának, Szálltak temetőbe, Minket pedig, kedvező Atyánk, Eddig takargattál, S ez új esztendőt derítvén ránk, Erre eljuttattál. \n3. Uram, a te lelked ereje Vélünk ily jót tégyen, Hogy jókedvednek esztendeje Ez az új is légyen; Atyai karoddal forgassad A mi dolgainkat, Dicsőségedre igazgassad Minden szándékinkat. \n4. Adj minékünk megújult szívet És új indulatot, Tehozzád mindenekben hívet És szent akaratot. Újítsd meg rajtunk a te képed, Mely áll szent életben, Hogy lehessünk választott néped, Élvén szeretetben. \n5. Ez esztendőt testi jókkal is, Uram, koronázzad, A szükséges mulandókkal is Házunk felruházzad; Földünket bő gyümölcsözéssel Munkálkodásunkra Áldd meg, hogy szükséges terméssel Szolgáljon javunkra. \n6. Kegyelmed s áldásod újítsad Te szent egyházadon: Közelebbről azt szaporítsad Itt lévő nyájadon. Gátold hazánkban áradását A sok gonoszságnak, Fordítsd el eshető romlását Nemzetnek, országnak. \n7. Tekintsd meg a szűkölködőket, Légy az árvák atyja, Vigasztalja a kesergőket Szád édes szózatja, Akik betegágyukban nyögnek, Vidámítsd lelküket; Ínségükben kik könyörögnek, Add meg kérésüket. \n8. Végre midőn mind megavúlunk Az esztendeinkkel, Egymás után mi is kimúlunk Emlékezetinkkel: Uram, sorsunkon könyörülvén, Vigy a dicsőségbe, Minden bűnünket eltörölvén, Újíts meg az égbe’!"},{"m":286,"r":248,"c":"Jer, dicsérjük az Istennek Fiát, A szép szűznek áldott szent magzatját","b":"1. Jer, dicsérjük az Istennek Fiát, A szép szűznek áldott szent magzatját, E világnak édes Megváltóját, Bűnösöknek kegyes szószólóját. \n2. Jézus Krisztus, kegyelmes Megváltónk, Úr Istentől adatott tanítónk, Szent Atyáddal felséges megtartónk, Szentlélekkel mi megigazítónk! \n3. Téged vallunk hatalmas Istennek, Kezdet nélkül való természetnek, Szent Atyáddal egy örök Istennek: Szentlelkétől lelkeztél Istennek. \n4. Felöltözél az emberi testbe, E világra jövél miközinkbe, Igaz hitet adál mi szívünkbe, Új világot gerjesztél lelkünkbe'. \n5. Szent véreddel minket te megváltál, Bűneinkből szépen kitisztítál, Szentlélekkel megvilágosítál, És Atyádnak kedvébe juttattál. \n6. A keresztfán érettünk meghaltál, Harmadnapra ismét feltámadtál, Mennyországban felmagasztaltattál, Tisztességgel megkoronáztattál. \n7. Azért vallunk téged királyunknak És örökké való főpapunknak, Isten előtt minden gyámolunknak, E világon minden oltalmunknak. \n8. Te vagy nékünk mi nagy igazságunk, Jámborságunk és ártatlanságunk, Te vagy nékünk szentségünk, váltságunk, Isten előtt örök boldogságunk. \n9. Te vagy nékünk a mi reménységünk, Ez világon mi nagy tisztességünk, Isten előtt minden dicsőségünk, Mennyországban örök idvességünk. \n10. Ó, Istennek drága kincstartója, Szentléleknek rajtunk nyugtatója, Nyomorodott árvák megtartója, Mi hitünknek megkoronázója. \n11. Ó, Istennek kedves áldozatja, Kit jó szemmel megtekint az Atya, És megmarad az ő jó illatja, Mindörökké kedves foganatja. \n12. Édes Jézus, Elődbe járulunk, Széked előtt arccal leborulunk, Keservesen tehozzád óhajtunk, És nagy sírván mennybe felkiáltunk. \n13. Adjad nékünk a te Szentlelkedet, Terjesztessed a te szent igédet; Ismerjünk meg mindnyájan tégedet, Dicsérhessük a te szent nevedet. \n14. Tekints reánk most a magas mennyből, Látogass meg királyi székedből, Tégy jól vélünk kegyelmességedből, Ments meg minket keserűséginkből. \n15. Vigasztald meg a mi siralminkat, Teljesítsd bé mi kívánságinkat; Mi is néked hálaadásinkat, Bémutatjuk mi áldozatunkat. \n16. Édes Jézus, néked hálát adunk Jóvoltodért és felmagasztalunk, Ajándékot elődbe mutatunk, Dicséretet te nevedre mondunk. \n17. Dicsértessék az Atya Úr Isten, Dicsértessék a Fiú Úr Isten, Dicsértessék a Szentlélek Isten, Szentháromság egy örök Úr Isten!"},{"m":287,"r":250,"c":"Járuljunk mi az istennek szent Fiához, A mi idvezítő Urunk Jézus Krisz","b":"1. Járuljunk mi az istennek szent Fiához, A mi idvezítő Urunk Jézus Krisztushoz, Mint kegyes és hatalmas szabadítónkhoz, Testi-lelki nyavalyánkban Csak egy vígasztalónkhoz. \n2. Ó irgalmas Megváltó Fiú Úr Isten, Ki országolsz szent Atyáddal földön és menynyen, Tehozzád esedezünk könyörgésünkben: Segítségül légy minékünk Mostani szükségünkben!\n3. Sok szükségink jóllehet vannak minékünk, De most néked kiváltképpen ezen könyörgünk: Szentlelked erőssége légyen mivelünk, Hogy az igaz tudományban Épületet vehessünk! \n4. Mi elménknek homályát távoztassad el, Ajándékozz engedelmes szívvel, lélekkel, Hogy a te szent igédet vegyük jó kedvvel, Tanulhassuk és éltünkben Kövessük nagy örömmel. \n5. Öregbítsed, neveljed bennünk a hitet És az igaz szeretetet, adj reménységet; Adj minden jóra való igyekezetet, Tiszta lelki ismeretet És szentséges életet!\n6. Szent nevedet engedjed, nyilván vallhassuk, Az ördögöt s e világot megútálhassuk, És te szent országodba kívánkozhassunk, Felségeddel egyetemben Örökké vígadhassunk!\n7. Légyen néked dícséret és nagy tisztesség, Ki Atyával s Szentlélekkel vagy egy Istenség, Felséges hatalmasság, örök fényesség. Téged illet mindörökké Véghetetlen dicsőség!"},{"m":288,"r":323,"c":"E világnak fényessége, És szenteknek idvessége, Krisztus Jézus, egy re","b":"1. E világnak fényessége, És szenteknek idvessége, Krisztus Jézus, egy reménye, Mennynek, földnek teremtője!\n2. Kegyetlen halált meggyőzéd, Ördög hatalmát el vévéd, Pokol torkát bérekesztéd, Bűnünket rólunk el vévéd. \n3. Te általad megváltattunk, Te általad szabadultunk, Te általad igazultunk, Te általad megtartattunk. \n4. Alázatosan könyörgünk Buzgó szívből esedezünk: Légy minékünk segítségünk Mert jól látod, mely sok bűnünk. \n5. Add Szentlelked ajándékát. Örök életnek jutalmát, Engeszteld Atyád haragját, Láthassuk ő szent irgalmát. \n6. Te vagy mennyország kapuja, És idvességnek ajtaja, Bűnösöknek szószólója, És csak egy közbenjárója. \n7. Dicsőség légyen Atyának, Tenéked, ő szent Fiának, És a mi Vígasztalónknak, A teljes Szentháromságnak."},{"m":289,"r":null,"c":"Zengj nyelvem ékesen, Az én édes Jézusomnak, Kegyes lelki orvosomnak S","b":"1. Zengj nyelvem ékesen, Az én édes Jézusomnak, Kegyes lelki orvosomnak Szólj szerelmetesen, Mert csak ő érdemel Áldást és minden szerelmet, Ki reám önt bő kegyelmet S kőszálra felemel.\n2. Jézus, én reményem, Bűnös lélek bizodalma S hozzád térőknek oltalma Gyönyörű Napfényem! Kegyes vagy azokhoz, Kik szívből téged keresnek, És ismerős híveidnek Béköszönsz házukhoz. \n3. Ó Jézus, élő kút, Szívemnek nagy édessége S elmémnek gyönyörűsége, Mely csupán hozzád fut; Tégedet keresni Legfőbb öröm és vígasság; Nincsen több lelki igazság, Mint téged követni. \n4. Jézus, kegyes király, Ki mindennek szívét bírod, S arra szent neved felírod, Kérlek, hozzám is szállj; Mert ha te elfoglalsz, Elszáll a világ szerelme, Tündöklik bennem az elme, Ebben sok jót találsz. \n5. Kedves szereteted, Mert szent véredet jókedvből, Kiontád, hogy, mint kútfőből, Folyjék ismereted. Megnyerted, hogy lássuk, Szent Atyádnak dicsőségét, És hogy lelkünk idvességét Tovább ne halaszszuk. \n6. Dícsérd hát minden nép Az Úr Jézust és szeressed, Buzgó szívedből keressed, Mert minden dolga szép. Ő a kegyelemnek És minden jónak kútfeje, Reménylő szívnek ereje, S oka az örömnek. \n7. Uram, hadd érezzem Hű szerelmednek bőségét, Hogy biztos jelenlételét Kincsül megszerezzem. Bár ne érdemeljem, De jóvoltod bizodalmát Nyújtsd, hogy ezen birodalmát Kérni merészeljem. \n8. Csak téged kívánlak Valahol járok, vagy kelek, És végre, hogyha rád lelek, Magamnak foglallak. Jőjj azért s hűvösíts Jelenléted illatjával, Szentlélek áldozatjával Lelkemben megfrissíts. \n9. Tégedet dícsérlek, E világnak megváltóját, Kárhozatnak elrontóját, Mert szívből szeretlek. Valahol hát lészesz, Szívemmel utánad járok, Mit tőled viszsza nem várok, Mert hozzád felvészesz. \n10. Tiéd, Uram, az ég Minden ő teljességével, Hol országolsz dicsőséggel, Melyben nincs semmi vég. Ne hagyj Uram, kérlek, Vedd el szívemet magadhoz, Mert úgy állhatok jobbodhoz S örökké dícsérlek. \n11. Dícsérje és áldja Lelkem az Atya úr Istent, Ki benned idvezít mindent, Ha szódat fogadja. Dícséret, dicsőség Légyen Szentlélek Istennek, Ki hitet adott lelkemnek, Hogy befogja az ég."},{"m":290,"r":null,"c":"Dicsérlek téged, Idvezítőmet, Úr Jézus Krisztus, Istennek egy Fia! Meg","b":"1. Dicsérlek téged, Idvezítőmet, Úr Jézus Krisztus, Istennek egy Fia! Megváltott nyájadnak hű atyjafia: Csak téged várlak, egy segítőmet. \n2. Tenéked minden térdet s fejet hajt, Mert erős torony nékünk a te neved; Felvette szegény ügyünket jó kedved, A kárhozatban hogy ne lássunk bajt. \n3. Te vagy Istennek szelíd Báránya, Ki e világnak bűneit elvetted, Szent véred omlását nem kíméletted, melylyel nem ér fel Ofir aranya. \n4. Ó, örök Isten, lelkem reménye, Az Atya Istennek fő bölcsessége, Szentegyházadnak ő nagy dicsősége, Minden híveknek ragyogó fénye! \n5. Dicsérlek, mennyből leszállott Kenyér, Isten s Ember, Jézus, egy Közbenjáró! Bűnösök térését kegyesen váró, Kitől kegyelmet minden lélek nyér. \n6. Mely buzgó, Uram, a te szerelmed, Ki miérettünk magad megáldoztad, A halált, Sátánt, poklot megrontottad, Most is fenntartván hű segedelmed."},{"m":291,"r":256,"c":"Ó mi kegyelmes Krisztusunk, Ki vagy nékünk igazságunk, Békességünk és","b":"1. Ó mi kegyelmes Krisztusunk, Ki vagy nékünk igazságunk, Békességünk és váltságunk: Kelljen, kérünk, imádságunk. \n2. Mi szívünket, kegyes Isten, Igaz hitben, reménységben Kiváltképen erősítsed, Hogy bízhassunk csak tebenned. \n3. Te isteni jóvoltodat, Ismerhessük hatalmadat, Melyet hozzánk megmutattál, Mikor érettünk áldoztál. \n4. Csak egyedül e világnak Viseléd terhét bajának, Nyerél nékünk idvességet És menynyei örökséget. \n5. Azért ily nagy szerelmedért, Kérünk, ne vess el bűnünkért, Ne vehessen ellenségünk Dühösséggel semmit tőlünk. \n6. Ó mi irgalmas Királyunk, És győzedelmes Hadnagyunk, Hozzád hitből folyamodunk, Tudjuk, meg nem fogyatkozunk. \n7. Kérünk, ily nehéz ügyünkbe' Ne adj ellenség kezébe, Ne vesd bűnünket elődbe, Végy be inkább kegyelmedbe. \n8. Keresztyéni egyességben, Nevednek szentelésében, Szent igédnek értelmében, Tarts meg minket mindvégiglen. \n9. Bírjad lelki országodat, Véreden vett jószágodat, Hogy e siralom völgyében Légyünk csendesek szívünkben. \n10. Adj állandó egyességet, Lelki-testi békességet, Hogy megfutván itt a pályát, Vehessük el a koronát. \n11. Dícsértessél áldott Isten, Ki minket könyörgésünkben Meghallgatsz nagy kegyelmesen És részeltetsz mindezekben."},{"m":292,"r":257,"c":"Ó dicsőségnek felkent fejedelme, Úr Jézus Krisztus, hívek segedelme, K","b":"1. Ó dicsőségnek felkent fejedelme, Úr Jézus Krisztus, hívek segedelme, Kit az Úr Isten rendelt váltságra S felemelt bölcsen nagy méltóságra: Felékesített, mint drága ruhával, A Szentléleknek bő ajándékával, És reád bízván az idvességet, Adott válladra hármas tisztséget. \n2. Te vagy az Úrnak egy FŐPRÓFÉTÁJA, Te vagy titkának világos táblája, Ki megjelentéd nagy indulatját, A váltság felől szent akaratját: Hogy akik Meg nagy sötétben volnának, Az igazság napjára találnának És általlátnák, mint napnak fényét Az idvességnek igaz ösvényét. \n3. Te vagy az úrnak megszentelt FŐPAPJA, Általad költ fel jókedvének napja, Ki szent testednek áldozatjával Váltságot nyertél annak árával. Szent érdemednek most is jelentése Olyan, mint szádnak drága könyörgése, Ez által szíved valamit kíván, Az Úr megadja néked azt nyilván. \n4. Te vagy az Úrnak felkent nagy KIRÁLYA, Kinek vettettek mindenek alája, Aki népedet tiszta igéddel, Oktatod s vezérled Szentlelkeddel. Minden ügyében felállasz mellette, Ellenségivel harcolsz ő helyette, Minden veszélyét karod elhajtja S az idvességben végig megtartja. \n5. E nagy királynak nálam is zálogja, Igaz hit által én is vagyok tagja, Őtet ismerem, mint fő Uramat És keresztyénnek vallom magamat. Áldott nevéről bátran vallást tészek, Szent törvényének követője lészek, Lelkem és testem hálaadással, Nékie vallom hív ajánlással. \n6. Mivel hívattam lelki vitézségre, Míg lelkem eljut a várt dicsőségre, Ellenségimnek dühösségökkel Harcolok bátran igaz lélekkel. A bűn s test ellen holtig törekedem, Szép koronámat másnak nem engedem, Hogy harcom után diadalommal Együtt örüljek az én Urammal. \n7. Te pedig, híveidnek szemefénye, Úr Jézus Krisztus, életem reménye, Vedd fel szolgádat erős karodra, És vigyázz énrám, gyenge juhodra. Oktass és taníts hathatós igéddel, Bíztass, erősíts, a te Szentlelkeddel, Hogy végre pályafutásom után, Hozzád mehessek az élet útján."},{"m":293,"r":null,"c":"Jézus, ó, mi Idvezítőnk, Kiben vagyon hitünk, Ki miértünk születtél, É","b":"1. Jézus, ó, mi Idvezítőnk, Kiben vagyon hitünk, Ki miértünk születtél, És nagy halált szenvedtél; Irgalmazz minékünk! \n2. Rólunk elvetted haragját A te szent Atyádnak; Vérednek hullásával Megengesztelted hozzánk: Irgalmazz minékünk! \n3. Az ördögnek tömlöcéből, Kivettél a bűnből; A halál köteléből, Megmentettél rabságból: Irgalmazz minékünk! \n4. Te bűn nélkül születtetvén A Szűznek méhéből, Értünk válladra vetted A mi adósságinkat: Irgalmazz minékünk! \n5. Bűnön, poklon és halálon Birodalmad vagyon; Az élet és kegyelem Csak te kezedben vagyon: Irgalmazz minékünk! \n6. Kérünk téged azért mostan: Tekints reánk mennyből, Kik hozzád esedezünk És segítséget várunk: Irgalmazz minékünk!"},{"m":294,"r":null,"c":"Jézus, vigasságom! Esdekelve várom Áldó szavadat! A te jelenléted Megv","b":"1. Jézus, vigasságom! Esdekelve várom Áldó szavadat! A te jelenléted Megvidámít, éltet, Bátor szívet ad. Légy velem, Ó, mindenem! Nálad nélkül nem is élek: Te vagy örök élet! \n2. Jézus, menedékem! Hű oltalmam nékem Te vagy egyedül! Lelkem a viharból, Bűnből, minden bajból Hozzád menekül. Bár a föld Mind romba dőlt, S ha a pokol hada hány tőrt: Jézus maga áll őrt! \n3. Jézus, üdvösségem! Te vagy földön-égen Örök örömem! Kik szeretjük Istent, Zengjünk neki itt lent S otthon: odafenn! Lelkem esd, Hogy Te vezesd! S hazahívó szavad várom, Jézus, Vigasságom!"},{"m":295,"r":null,"c":"Jézusom, ki árva lelkem Megváltottad véreddel, Kárhozattól óvtál engem","b":"1. Jézusom, ki árva lelkem Megváltottad véreddel, Kárhozattól óvtál engem, Bűnös szívem, ó, vedd el! Add, hogy néked megháláljam. Hogy nem hagytál a halálban, megmutattad: Bármit adj, Én oltalmam csak te vagy.\n2. Jézus, benned bízva bízom, Elpusztulnom, ó, ne hagyj! Te, ki bűnön, poklon, síron Egyedüli győztes vagy: Gyönge hitben biztass engem, Készíts arra, hogy én lelkem Láthat majd fenn, ó, Uram, Mindörökké boldogan."},{"m":296,"r":null,"c":"Szép tündöklő hajnal csillag, Ki kegyelemmel felragyog, Jessének szép","b":"1. Szép tündöklő hajnal csillag, Ki kegyelemmel felragyog, Jessének szép veszszeje, Dávid királynak magzatja, Sok királyoknak királya, Lelkemnek vőlegénye: Kedves, kegyes, kellemetes, ékes és gyönyörűséges, Gazdagsággal dicsőséges. \n2. Ó, gyöngyös, drága korona, Embernek, Istennek fia, Menny áldott, szent gyümölcse! Szívemnek vagy lilioma, Édes evangélioma, Kedvességeknek kincse! Egygyem, lelkem, Szép violám, égi mannám, eledelem: Rólad el nem feledkezem. \n3. Öntsd mélyen az én szívembe, Szerelmed tüzét lelkembe, Ó, drága jáspis kövem! Fogadj hozzád s vigasztalj meg, Hogy eleven tagod legyek, Benned legyen örömem. Hozzád kiált Sebhedt szívem, lelki rózsa: légy orvosa; Nélküled nincs vigassága. \n4. Mennyből nagy öröm fénylik rám, Midőn szemeddel énreám Kegyelmesen tekintesz, Ó, Uram Jézus, szent Lelked, Szent igéd, tested és véred Vélem közölvén, éltetsz. Ilyen híven Tarts öledben, táplálj engem mindvégiglen, Mert fogadtad szent igédben. \n5. Teremtő Atyám, Úr Isten, Ki engem örök időkben Szent Fiadban szerettél: Ő engem magának jegyzett, Szentlélekkel elpecsétlett, Megtisztított vérével. Vigadj és adj Szívem hálát, Istent imádd, hogy mennyégben Idvességet szerzett nékem. \n6. Szóljon tehát az orgona, Gyönyörűséges muzsika, Ujjongva énekeljek, Hogy megváltó Jézusomnak, Drága szép kegyes Uramnak Szerelmében örvendjek. Zengjen, pengjen Vigasságos, buzgóságos hál’adó szó, Nagy az Úr, ezekre méltó. \n7. Ily kedvvel vigad én szívem, Mert drága kincsem az Isten, Ki kezdet s vég mindenben. Ő engem dicséretire, Mennybe viszen nagy örömre, Min tapsolok szívemben. Ámen, ámen! Jövel, Uram, szép koronám, jöjj sietve: Téged várlak reménykedve!"},{"m":297,"r":254,"c":"Ó seregeknek Hatalmas királya, A nagy Istennek, Mi teremtőnknek, Gondv","b":"1. Ó seregeknek Hatalmas királya, A nagy Istennek, Mi teremtőnknek, Gondviselőnknek Szerelmes szent Fia: \n2. Szent indulattal Minden hívő lélek Téged magasztal, ó fő bölcseség, Áldott Istenség! Én is, amíg élek. \n3. Uram, mert te vagy Amaz örök Ige, Eredeted nagy, Minden dolgoknak, Amelyek vannak, Vagy kezdete s vége. \n4. Az Úr Istennek Te vagy dicsősége, Dicsőségének Minden vég nélkül Te vagy egyedül Teljes fényessége. \n5. Te vagy részese Isteni voltának; Szent jelentése Tégedet mond s vall Minden bizonynyal Tulajdon Fiának. \n6. Te általad lett Nékünk is Atyánkká; Kegyelemből tett Engedelmedért, Szent érdemedért Fogadott fiakká. \n7. Te vagy az Ura Választott népednek, És hű pásztora Minden időben Most s jövendőben Gyenge seregednek, \n8. Kiket megváltál Drága szent véreddel, Megszabadítál Bűntől, haláltól, A kárhozattól Elégtételeddel. \n9. Azért már élünk Néked, nem magunknak; Hát úgy bánj velünk, Hogy nagy örömmel Szolgáljunk szívvel Néked, mi Urunknak!"},{"m":298,"r":null,"c":"Jer, Krisztus népe, nagy vígan Mind egy örömre kel jünk, És egybeforrv","b":"1. Jer, Krisztus népe, nagy vígan Mind egy örömre kel jünk, És egybeforrva, boldogan Csak arról énekel jünk, Hogy könyörülő Istenünk Mily áldott csodát tett velünk, Mit drágán szerzett né künk. \n2. A Sátán tett rám rabigát És már halálba vesz tem, A bűn gyötört éj- s napon át, Mert benne gyökerez tem. Mind jobban elsülylyedtem én, Nem volt számomra már remény, Megült a bűnnek át ka. \n3. Nem használt, sőt káromra lett, Ha bármi jót is tet tem, Mert az égi ítéletet Önkényből megvetet tem. Mégis kínzott a félelem, Hogy csak a halál van velem És a poklokra hul lok. \n4. Ám az örök szent irgalom Nagy ínségem megszán ta, És könyörülvén ily bajon, Megenyhítni kíván ta. Mint jó Atya, szívébe vett, Nem játék volt, amit megtett Legfőbb
